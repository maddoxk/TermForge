<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TermForge Documentation Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Theme variables mapping */
            --bg-color: #0f111a;
            --text-color: #e6edf3;
            --sidebar-bg: rgba(20, 24, 38, 0.6);
            --card-bg: rgba(30, 35, 54, 0.4);
            --border-glow: #7f00ff;
            --accent-glow: #00f0ff;
            
            /* ANSI Palette fallback mapping */
            --ansi-black: #151820;
            --ansi-red: #ff5555;
            --ansi-green: #50fa7b;
            --ansi-yellow: #f1fa8c;
            --ansi-blue: #bd93f9;
            --ansi-magenta: #ff79c6;
            --ansi-cyan: #8be9fd;
            --ansi-white: #f8f8f2;
            
            --ansi-bright_black: #6272a4;
            --ansi-bright_red: #ff6e6e;
            --ansi-bright_green: #69ff94;
            --ansi-bright_yellow: #ffffa5;
            --ansi-bright_blue: #d6acff;
            --ansi-bright_magenta: #ff92df;
            --ansi-bright_cyan: #a4ffff;
            --ansi-bright_white: #ffffff;
        }
        
        /* Dracula theme skin override */
        .theme-dracula {
            --bg-color: #282a36;
            --text-color: #f8f8f2;
            --sidebar-bg: rgba(40, 42, 54, 0.7);
            --card-bg: rgba(68, 71, 90, 0.4);
            --border-glow: #bd93f9;
            --accent-glow: #8be9fd;
        }

        /* Tokyo Night theme skin override */
        .theme-tokyo {
            --bg-color: #1a1b26;
            --text-color: #a9b1d6;
            --sidebar-bg: rgba(26, 27, 38, 0.7);
            --card-bg: rgba(36, 40, 59, 0.4);
            --border-glow: #bb9af7;
            --accent-glow: #7aa2f7;
        }

        /* Catppuccin Mocha theme skin override */
        .theme-catppuccin {
            --bg-color: #1e1e2e;
            --text-color: #cdd6f4;
            --sidebar-bg: rgba(30, 30, 46, 0.7);
            --card-bg: rgba(49, 50, 68, 0.4);
            --border-glow: #b4befe;
            --accent-glow: #89b4fa;
        }

        /* High Contrast theme skin override */
        .theme-contrast {
            --bg-color: #000000;
            --text-color: #ffffff;
            --sidebar-bg: #111111;
            --card-bg: #222222;
            --border-glow: #ffffff;
            --accent-glow: #00ffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        
        /* Neon Blur Background Highlights */
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.35;
        }
        .sphere-1 {
            width: 400px;
            height: 400px;
            background: var(--border-glow);
            top: -100px;
            right: -100px;
        }
        .sphere-2 {
            width: 350px;
            height: 350px;
            background: var(--accent-glow);
            bottom: -50px;
            left: -50px;
        }
        
        /* Layout */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        
        .logo-container h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--border-glow), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .menu-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.4;
            margin-bottom: 10px;
        }
        
        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .menu-item button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color);
            text-align: left;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .menu-item button:hover, .menu-item.active button {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.02);
            color: #ffffff;
        }
        
        .menu-item.active button {
            border-left: 3px solid var(--border-glow);
            border-radius: 0 8px 8px 0;
            padding-left: 12px;
        }
        
        /* Main Panel */
        .main-content {
            flex-grow: 1;
            padding: 50px 60px;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        /* Header switcher card */
        .controls-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .controls-title h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
        }
        
        .theme-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .theme-selector select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }
        
        /* Terminal Showcase Emulator */
        .terminal-container {
            background: rgba(10, 11, 16, 0.95);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(127, 0, 255, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        
        .terminal-header {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.08);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .terminal-dots {
            display: flex;
            gap: 8px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        
        .terminal-title {
            font-size: 13px;
            font-family: 'Fira Code', monospace;
            opacity: 0.5;
        }
        
        .terminal-body {
            padding: 24px;
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            line-height: 1.45;
            white-space: pre;
            overflow-x: auto;
            color: var(--ansi-white);
        }
        
        /* Floating animations */
        @keyframes pulse-glow {
            0% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(127, 0, 255, 0.1); }
            50% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 35px rgba(0, 240, 255, 0.2); }
            100% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(127, 0, 255, 0.1); }
        }
        
        .terminal-container {
            animation: pulse-glow 8s infinite alternate;
        }
    </style>
</head>

        function populateMenu() {
            const menu = document.getElementById("component-menu");
            menu.innerHTML = "";
            
            let firstKey = null;
            
            for (const mod in storiesData) {
                for (const comp in storiesData[mod]) {
                    const key = mod + "/" + comp;
                    if (!firstKey) firstKey = key;
                    
                    const li = document.createElement("li");
                    li.className = "menu-item";
                    li.id = "item-" + mod + "-" + comp;
                    
                    const btn = document.createElement("button");
                    btn.textContent = mod + " : " + comp;
                    btn.onclick = () => selectStory(mod, comp);
                    
                    li.appendChild(btn);
                    menu.appendChild(li);
                }
            }
            
            if (firstKey) {
                const [mod, comp] = firstKey.split("/");
                selectStory(mod, comp);
            }
        }
        
        function selectStory(mod, comp) {
            // Remove active classes
            document.querySelectorAll(".menu-item").forEach(el => el.classList.remove("active"));
            
            // Set active class
            const item = document.getElementById("item-" + mod + "-" + comp);
            if (item) item.classList.add("active");
            
            // Update title & screen
            document.getElementById("active-title").textContent = mod.toUpperCase() + " : " + comp.toUpperCase();
            document.getElementById("term-filename").textContent = comp + ".py";
            
            const screen = document.getElementById("terminal-screen");
            screen.innerHTML = storiesData[mod][comp];
        }
        
        function changeThemeSkin(theme) {
            document.body.className = "theme-" + theme;
        }
        
        window.onload = populateMenu;
    </script>
