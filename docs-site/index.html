  "termforge/keylegend/render.py": "\"\"\"TermForge keybinding shortcut legend renderer.\"\"\"\nfrom __future__ import annotations\n\nfrom termforge.core.types import Size, ColorDepth, StyleSpec, ColorValue\nfrom termforge.core.theme import ThemeTokens, resolve_token\nfrom termforge.text.render import style_to_ansi\nfrom termforge.keylegend.types import KeyLegendSpec\n\n\ndef _style_part(text: str, token: str | None, theme: ThemeTokens | None, depth: ColorDepth) -> str:\n    if not token or not theme or depth == ColorDepth.MONOCHROME:\n        return text\n    token_path = token if token.startswith(\"colors.\") else f\"colors.{token}\"\n    try:\n        res = resolve_token(theme, token_path)\n        if isinstance(res, ColorValue):\n            style = StyleSpec(fg=ColorValue(res.r, res.g, res.b, name=None))\n            start, end = style_to_ansi(style, theme, depth)\n            return f\"{start}{text}{end}\"\n    except KeyError:\n        pass\n    return text\n\n\ndef _truncate_legend_item(\n    key: str,\n    action: str,\n    format_template: str,\n    avail_width: int,\n) -> tuple[str, str]:\n    static_len = len(format_template.replace(\"{key}\", \"\").replace(\"{description}\", \"\"))\n    max_len = avail_width - static_len\n\n    if max_len <= 0:\n        return \"\u2026\", \"\"\n\n    if max_len > len(key):\n        # Keep key intact, truncate description\n        desc_avail = max_len - len(key)\n        if len(action) > desc_avail:\n            trunc_desc = action[:max(0, desc_avail - 1)] + \"\u2026\"\n        else:\n            trunc_desc = action\n        return key, trunc_desc\n    else:\n        # Key exceeds space, clear description and truncate key\n        if len(key) > max_len:\n            trunc_key = key[:max(0, max_len - 1)] + \"\u2026\"\n        else:\n            trunc_key = key\n        return trunc_key, \"\"\n\n\ndef render_key_legend(\n    spec: KeyLegendSpec,\n    max_size: Size,\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth = ColorDepth.TRUECOLOR,\n) -> list[str]:\n    \"\"\"Render the key legend component to formatted and styled strings.\n\n    Args:\n        spec: KeyLegendSpec defining bindings, orientation, and styling.\n        max_size: Size constraints for the rendering viewport.\n        theme: Optional theme tokens for style resolution.\n        depth: Color depth tier to simulate.\n\n    Returns:\n        List of rendered lines.\n    \"\"\"\n    if not spec.bindings:\n        return []\n\n    # 1. Horizontal rendering layout\n    if spec.orientation == \"horizontal\":\n        raw_items = []\n        for b in spec.bindings:\n            raw_items.append(spec.format.format(key=b.key, description=b.action))\n\n        sep = \" \" * spec.spacing\n        current_len = 0\n        styled_parts = []\n\n        for i, b in enumerate(spec.bindings):\n            raw_item = raw_items[i]\n            prefix_len = len(sep) if i > 0 else 0\n            \n            if current_len + prefix_len + len(raw_item) > max_size.width:\n                # Truncate this item to fit remainder\n                avail = max_size.width - current_len - prefix_len\n                if avail > 0:\n                    trunc_key, trunc_desc = _truncate_legend_item(b.key, b.action, spec.format, avail)\n                    sk = _style_part(trunc_key, spec.key_style, theme, depth)\n                    sd = _style_part(trunc_desc, spec.desc_style, theme, depth)\n                    styled_rendered = spec.format.format(key=sk, description=sd)\n                    \n                    if i > 0:\n                        styled_parts.append(sep)\n                    styled_parts.append(styled_rendered)\n                break\n\n            # Fully fit item\n            sk = _style_part(b.key, spec.key_style, theme, depth)\n            sd = _style_part(b.action, spec.desc_style, theme, depth)\n            styled_item = spec.format.format(key=sk, description=sd)\n\n            if i > 0:\n                styled_parts.append(sep)\n            styled_parts.append(styled_item)\n            current_len += prefix_len + len(raw_item)\n\n        line = \"\".join(styled_parts)\n        return [line] if max_size.height > 0 else []\n\n    # 2. Vertical rendering layout\n    else:\n        lines = []\n        for b in spec.bindings:\n            raw_item = spec.format.format(key=b.key, description=b.action)\n            \n            if len(raw_item) > max_size.width:\n                trunc_key, trunc_desc = _truncate_legend_item(b.key, b.action, spec.format, max_size.width)\n                sk = _style_part(trunc_key, spec.key_style, theme, depth)\n                sd = _style_part(trunc_desc, spec.desc_style, theme, depth)\n                line = spec.format.format(key=sk, description=sd)\n            else:\n                sk = _style_part(b.key, spec.key_style, theme, depth)\n                sd = _style_part(b.action, spec.desc_style, theme, depth)\n                line = spec.format.format(key=sk, description=sd)\n                \n            lines.append(line)\n\n        return lines[:max_size.height]\n",
  "termforge/windows/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec\nfrom termforge.core import FlexDirection\nfrom termforge.borders.types import BorderStyle\nfrom termforge.text.types import TextOverflow, TextAlign\nfrom termforge.core.hooks import RenderHook\n\n@dataclass\nclass WindowSpec(RenderableSpec):\n    title: str = \"Window\"\n    border_style: BorderStyle = BorderStyle.SINGLE\n    width: int | None = None\n    height: int | None = None\n    scroll_y: int = 0\n    focused: bool = False\n    z_index: int = 0\n    content: RenderableSpec | None = None\n    shadow: bool = False\n    tags: list[str] = field(default_factory=list)\n    padding: int = 0\n    margin: int = 0\n    text_overflow: TextOverflow | None = None  # if set, cascades to child TextSpec.overflow\n    title_align: TextAlign = TextAlign.CENTER   # alignment of title in the top border\n    title_pad: int = 1                          # spaces to pad on each side of the title text\n    hooks: list[RenderHook] = field(default_factory=list)\n    spec_type: str = \"window\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"title\": self.title,\n            \"border_style\": self.border_style.value,\n            \"width\": self.width,\n            \"height\": self.height,\n            \"scroll_y\": self.scroll_y,\n            \"focused\": self.focused,\n            \"z_index\": self.z_index,\n            \"content\": self.content.to_dict() if self.content else None,\n            \"shadow\": self.shadow,\n            \"tags\": self.tags,\n            \"padding\": self.padding,\n            \"margin\": self.margin,\n            \"text_overflow\": self.text_overflow.value if self.text_overflow else None,\n            \"title_align\": self.title_align.value,\n            \"title_pad\": self.title_pad,\n            \"hooks\": [h.to_dict() for h in self.hooks],\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> WindowSpec:\n        content_dict = d.get(\"content\")\n        content = RenderableSpec.from_dict(content_dict) if content_dict else None\n        overflow_val = d.get(\"text_overflow\")\n        return cls(\n            title=d.get(\"title\", \"Window\"),\n            border_style=BorderStyle(d.get(\"border_style\", \"single\")),\n            width=d.get(\"width\"),\n            height=d.get(\"height\"),\n            scroll_y=d.get(\"scroll_y\", 0),\n            focused=d.get(\"focused\", False),\n            z_index=d.get(\"z_index\", 0),\n            content=content,\n            shadow=d.get(\"shadow\", False),\n            tags=d.get(\"tags\", []),\n            padding=d.get(\"padding\", 0),\n            margin=d.get(\"margin\", 0),\n            text_overflow=TextOverflow(overflow_val) if overflow_val else None,\n            title_align=TextAlign(d.get(\"title_align\", \"center\")),\n            title_pad=d.get(\"title_pad\", 1),\n            hooks=[RenderHook.from_dict(h) for h in d.get(\"hooks\", [])],\n        )\n\n@dataclass\nclass PaneSpec(RenderableSpec):\n    direction: FlexDirection = FlexDirection.ROW\n    children: list[RenderableSpec] = field(default_factory=list)\n    ratios: list[float] | None = None\n    gap: int = 0\n    text_overflow: TextOverflow | None = None  # if set, cascades to child TextSpec.overflow\n    hooks: list[RenderHook] = field(default_factory=list)\n    spec_type: str = \"pane\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"direction\": self.direction.value,\n            \"children\": [c.to_dict() for c in self.children],\n            \"ratios\": self.ratios,\n            \"gap\": self.gap,\n            \"text_overflow\": self.text_overflow.value if self.text_overflow else None,\n            \"hooks\": [h.to_dict() for h in self.hooks],\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> PaneSpec:\n        overflow_val = d.get(\"text_overflow\")\n        return cls(\n            direction=FlexDirection(d.get(\"direction\", \"row\")),\n            children=[RenderableSpec.from_dict(c) for c in d.get(\"children\", [])],\n            ratios=d.get(\"ratios\"),\n            gap=d.get(\"gap\", 0),\n            text_overflow=TextOverflow(overflow_val) if overflow_val else None,\n            hooks=[RenderHook.from_dict(h) for h in d.get(\"hooks\", [])],\n        )\n\n@dataclass\nclass ModalSpec(RenderableSpec):\n    content: RenderableSpec | None = None\n    backdrop: bool = True\n    width: int = 40\n    height: int = 10\n    spec_type: str = \"modal\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"content\": self.content.to_dict() if self.content else None,\n            \"backdrop\": self.backdrop,\n            \"width\": self.width,\n            \"height\": self.height\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ModalSpec:\n        content_dict = d.get(\"content\")\n        content = RenderableSpec.from_dict(content_dict) if content_dict else None\n        return cls(\n            content=content,\n            backdrop=d.get(\"backdrop\", True),\n            width=d.get(\"width\", 40),\n            height=d.get(\"height\", 10)\n        )\n",
  "termforge/windows/compositor.py": "from __future__ import annotations\nfrom termforge.core.types import Size, Position, ColorDepth, StyleSpec, ColorValue, RenderableSpec\nfrom termforge.core.theme import ThemeTokens, resolve_state_token\nfrom termforge.core import FlexDirection\nfrom termforge.windows.types import WindowSpec, PaneSpec, ModalSpec\nfrom termforge.borders.types import BorderSpec, BorderSide, BorderStyle\nfrom termforge.borders.render import render_border, strip_ansi\nfrom termforge.text.render import style_to_ansi\n\ndef compose_panes(spec: PaneSpec, available: Size) -> list[tuple[Position, Size, RenderableSpec]]:\n    if not spec.children:\n        return []\n        \n    num_children = len(spec.children)\n    ratios = spec.ratios\n    if ratios is None or len(ratios) != num_children:\n        ratios = [1.0] * num_children\n        \n    total_ratio = sum(ratios)\n    gaps_space = spec.gap * (num_children - 1)\n    \n    results = []\n    \n    if spec.direction == FlexDirection.ROW:\n        rem_w = max(0, available.width - gaps_space)\n        curr_x = 0\n        for i, child in enumerate(spec.children):\n            w = int((ratios[i] / total_ratio) * rem_w)\n            # Adjust last child to prevent rounding gaps\n            if i == num_children - 1:\n                w = available.width - curr_x\n            child_size = Size(width=max(1, w), height=available.height)\n            child_pos = Position(x=curr_x, y=0)\n            results.append((child_pos, child_size, child))\n            curr_x += w + spec.gap\n            \n    else: # FlexDirection.COLUMN\n        rem_h = max(0, available.height - gaps_space)\n        curr_y = 0\n        for i, child in enumerate(spec.children):\n            h = int((ratios[i] / total_ratio) * rem_h)\n            if i == num_children - 1:\n                h = available.height - curr_y\n            child_size = Size(width=available.width, height=max(1, h))\n            child_pos = Position(x=0, y=curr_y)\n            results.append((child_pos, child_size, child))\n            curr_y += h + spec.gap\n            \n    return results\n\ndef apply_scroll(lines: list[str], scroll_y: int, viewport_height: int) -> list[str]:\n    if len(lines) <= viewport_height:\n        return lines + [\"\"] * (viewport_height - len(lines))\n    start = max(0, min(scroll_y, len(lines) - viewport_height))\n    return lines[start : start + viewport_height]\n\ndef z_sort(windows: list[WindowSpec]) -> list[WindowSpec]:\n    return sorted(windows, key=lambda w: w.z_index)\n\ndef render_window(\n    spec: WindowSpec,\n    content_lines: list[str],\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth = ColorDepth.TRUECOLOR\n) -> list[str]:\n    # Determine window dimensions\n    width = spec.width if spec.width is not None else 80\n    height = spec.height if spec.height is not None else 24\n\n    padding = max(0, spec.padding)  # inner padding (horizontal pad applied as left/right spaces)\n    margin = max(0, spec.margin)    # outer margin (blank rows/cols around the whole result)\n\n    # Inner dimensions: border takes 2 (1 per side) + padding takes 2*padding per axis\n    inner_w = max(0, width - 2 - 2 * padding)\n    inner_h = max(0, height - 2 - 2 * padding)\n\n    # 1. Apply scroll to content lines\n    scrolled_lines = apply_scroll(content_lines, spec.scroll_y, inner_h)\n\n    # 1b. Apply inner padding (indent each content line and pad to inner_w)\n    if padding > 0:\n        pad_str = \" \" * padding\n        padded_lines: list[str] = []\n        # top padding rows\n        for _ in range(padding):\n            padded_lines.append(\" \" * (inner_w + 2 * padding))\n        for line in scrolled_lines:\n            # Strip trailing so we can safely pad\n            padded_lines.append(pad_str + line[:inner_w].ljust(inner_w) + pad_str)\n        # bottom padding rows\n        for _ in range(padding):\n            padded_lines.append(\" \" * (inner_w + 2 * padding))\n        scrolled_lines = padded_lines\n\n    border_spec = BorderSpec(\n        style=spec.border_style,\n        title=spec.title,\n        content=spec.content,\n        tags=spec.tags,\n        title_align=spec.title_align,\n        title_pad=spec.title_pad,\n    )\n    \n    # 3. Render the border\n    bordered = render_border(border_spec, scrolled_lines, width=width, theme=theme, unicode_supported=True)\n    \n    # 4. Apply highlight styling to border if focused/stateful\n    state = \"disabled\" if getattr(spec, \"disabled\", False) else (\"focused\" if spec.focused else None)\n\n    border_color = None\n    if theme:\n        try:\n            border_color = resolve_state_token(theme, \"colors.border\", state=state)\n        except KeyError:\n            pass\n\n    if isinstance(border_color, ColorValue):\n        # Strip name to bypass re-resolution in style_to_ansi\n        border_color = ColorValue(border_color.r, border_color.g, border_color.b, name=None)\n    else:\n        # Fallback to hardcoded names mapping to default colors\n        border_color_token = \"primary\" if spec.focused else \"border\"\n        border_color = ColorValue(0, 0, 0, name=f\"colors.{border_color_token}\")\n\n    style = StyleSpec(fg=border_color)\n\n    start_ansi, end_ansi = style_to_ansi(style, theme, depth)\n    \n    final_lines = []\n    if start_ansi:\n        # We want to color only the border frame (corners, top, bottom, sides)\n        # For simplicity, we can wrap the top line, bottom line, and the side characters of each line.\n        # This keeps the content styles completely untouched!\n        \n        # Top line\n        final_lines.append(f\"{start_ansi}{bordered[0]}{end_ansi}\")\n        \n        # Body lines (each has side borders)\n        for line in bordered[1:-1]:\n            # Left side char is first character, right side is last character (or last after ANSI)\n            # Since render_border adds exactly 1 char border on left and right:\n            # line starts with left border char and ends with right border char\n            if len(line) >= 2:\n                # Extract first char and last char\n                left_border = line[0]\n                right_border = line[-1]\n                content = line[1:-1]\n                final_lines.append(f\"{start_ansi}{left_border}{end_ansi}{content}{start_ansi}{right_border}{end_ansi}\")\n            else:\n                final_lines.append(line)\n                \n        # Bottom line\n        if len(bordered) > 1:\n            final_lines.append(f\"{start_ansi}{bordered[-1]}{end_ansi}\")\n    else:\n        final_lines = list(bordered)\n        \n    if spec.shadow:\n        shadow_style = StyleSpec(fg=ColorValue(80, 80, 80), dim=True)\n        s_shad, e_shad = style_to_ansi(shadow_style, theme, depth)\n        shadow_block = \"\u2588\"\n        \n        shadowed_result = []\n        # Row 0 has no side shadow, pad with 2 spaces\n        shadowed_result.append(final_lines[0] + \"  \")\n        \n        # Rows 1 to height-1 get 2 columns side shadow\n        for line in final_lines[1:]:\n            shadowed_result.append(line + f\"{s_shad}{shadow_block * 2}{e_shad}\")\n            \n        # Row height gets bottom shadow shifted by 2 columns\n        bottom_row = \"  \" + f\"{s_shad}{shadow_block * width}{e_shad}\"\n        shadowed_result.append(bottom_row)\n        \n        final_lines = shadowed_result\n\n    # 5. Apply outer margin: blank rows top/bottom, blank cols left/right\n    if margin > 0:\n        blank_row = \" \" * (width + 2 * margin)\n        margin_col = \" \" * margin\n        margined: list[str] = []\n        for _ in range(margin):\n            margined.append(blank_row)\n        for line in final_lines:\n            margined.append(margin_col + line + margin_col)\n        for _ in range(margin):\n            margined.append(blank_row)\n        final_lines = margined\n\n    return final_lines\n",
  "termforge/windows/__init__.py": "\"\"\"TermForge windows module \u2014 composable containers, scroll, focus, z-order.\"\"\"\nfrom termforge.windows.types import WindowSpec, PaneSpec, ModalSpec\nfrom termforge.windows.compositor import compose_panes, apply_scroll, z_sort, render_window\n\n__all__ = [\n    \"WindowSpec\",\n    \"PaneSpec\",\n    \"ModalSpec\",\n    \"compose_panes\",\n    \"apply_scroll\",\n    \"z_sort\",\n    \"render_window\",\n]\n",
  "termforge/tabs/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec\n\n@dataclass\nclass TabSpec(RenderableSpec):\n    titles: list[str] = field(default_factory=list)\n    active_index: int = 0\n    spec_type: str = \"tab\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"titles\": self.titles,\n            \"active_index\": self.active_index\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> TabSpec:\n        return cls(\n            titles=d.get(\"titles\", []),\n            active_index=d.get(\"active_index\", 0)\n        )\n",
  "termforge/tabs/__init__.py": "from termforge.tabs.types import TabSpec\nfrom termforge.tabs.render import render_tabs\n\n__all__ = [\n    \"TabSpec\",\n    \"render_tabs\",\n]\n",
  "termforge/tabs/render.py": "from __future__ import annotations\nfrom termforge.core.types import Size\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.tabs.types import TabSpec\n\ndef render_tabs(spec: TabSpec, max_size: Size, theme: ThemeTokens) -> list[str]:\n    # Render tab headers as:\n    # \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n    # \u2502 Tab1 \u2502 \u2502*Tab2*\u2502\n    # \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500...\n    if not spec.titles:\n        return [\"\"] * max_size.height\n\n    top = \"\"\n    mid = \"\"\n    bot = \"\"\n\n    for i, title in enumerate(spec.titles):\n        is_active = (i == spec.active_index)\n        display = f\"*{title}*\" if is_active else f\" {title} \"\n        w = len(display)\n\n        if is_active:\n            top += \"\u250c\" + \"\u2500\" * w + \"\u2510 \"\n            mid += \"\u2502\" + display + \"\u2502 \"\n            bot += \"\u2514\" + \"\u2500\" * w + \"\u2518 \"\n        else:\n            top += \"\u250c\" + \"\u2500\" * w + \"\u2510 \"\n            mid += \"\u2502\" + display + \"\u2502 \"\n            bot += \"\u2514\" + \"\u2500\" * w + \"\u2518 \"\n\n    lines = [top, mid, bot]\n    # pad/truncate width\n    result = []\n    for line in lines:\n        if len(line) > max_size.width:\n            line = line[:max_size.width - 1] + \"\u2026\"\n        else:\n            line = line + \" \" * (max_size.width - len(line))\n        result.append(line)\n\n    while len(result) < max_size.height:\n        result.append(\" \" * max_size.width)\n\n    return result[:max_size.height]\n",
  "termforge/keyvalue/types.py": "\"\"\"TermForge key-value grid component specifications.\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec\n\n\n@dataclass\nclass KeyValueItemSpec(RenderableSpec):\n    \"\"\"Specification for a single key-value row.\n\n    Attributes:\n        key: The row header/key label.\n        value: The value string.\n        key_style: Optional theme style token for the key.\n        value_style: Optional theme style token for the value.\n    \"\"\"\n    key: str = \"\"\n    value: str = \"\"\n    key_style: str | None = None\n    value_style: str | None = None\n    spec_type: str = \"keyvalue_item\"\n\n\n    def to_dict(self) -> dict[str, Any]:\n        \"\"\"Serialize to a JSON-compatible dict.\n\n        Returns:\n            A plain dict containing item properties.\n        \"\"\"\n        return {\n            \"spec_type\": self.spec_type,\n            \"key\": self.key,\n            \"value\": self.value,\n            \"key_style\": self.key_style,\n            \"value_style\": self.value_style,\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> KeyValueItemSpec:\n        \"\"\"Deserialise from a dict produced by :meth:`to_dict`.\n\n        Args:\n            d: Dict containing item properties.\n\n        Returns:\n            A new :class:`KeyValueItemSpec` instance.\n        \"\"\"\n        return cls(\n            key=d[\"key\"],\n            value=d[\"value\"],\n            key_style=d.get(\"key_style\"),\n            value_style=d.get(\"value_style\"),\n        )\n\n\n@dataclass\nclass KeyValueGridSpec(RenderableSpec):\n    \"\"\"Specification for a grid containing aligned key-value listings.\n\n    Attributes:\n        items: List of KeyValueItemSpec rows.\n        separator: Separator characters between keys and values.\n        key_width: Optional fixed width for the key column. If None,\n            the key column is dynamically sized to fit the longest key.\n        width: Optional fixed overall width.\n        height: Optional fixed overall height.\n    \"\"\"\n    items: list[KeyValueItemSpec] = field(default_factory=list)\n    separator: str = \": \"\n    key_width: int | None = None\n    width: int | None = None\n    height: int | None = None\n    spec_type: str = \"keyvalue_grid\"\n\n    def to_dict(self) -> dict[str, Any]:\n        \"\"\"Serialize to a JSON-compatible dict.\n\n        Returns:\n            A plain dict containing grid properties.\n        \"\"\"\n        return {\n            \"spec_type\": self.spec_type,\n            \"items\": [item.to_dict() for item in self.items],\n            \"separator\": self.separator,\n            \"key_width\": self.key_width,\n            \"width\": self.width,\n            \"height\": self.height,\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> KeyValueGridSpec:\n        \"\"\"Deserialise from a dict produced by :meth:`to_dict`.\n\n        Args:\n            d: Dict containing grid properties.\n\n        Returns:\n            A new :class:`KeyValueGridSpec` instance.\n        \"\"\"\n        return cls(\n            items=[KeyValueItemSpec.from_dict(item) for item in d.get(\"items\", [])],\n            separator=d.get(\"separator\", \": \"),\n            key_width=d.get(\"key_width\"),\n            width=d.get(\"width\"),\n            height=d.get(\"height\"),\n        )\n",
  "termforge/keyvalue/__init__.py": "\"\"\"TermForge key-value grid component module.\"\"\"\nfrom __future__ import annotations\n\nfrom termforge.keyvalue.types import KeyValueItemSpec, KeyValueGridSpec\nfrom termforge.keyvalue.render import render_keyvalue_grid\n\n__all__ = [\n    \"KeyValueItemSpec\",\n    \"KeyValueGridSpec\",\n    \"render_keyvalue_grid\",\n]\n",
  "termforge/keyvalue/render.py": "\"\"\"TermForge key-value grid renderer.\"\"\"\nfrom __future__ import annotations\n\nfrom termforge.core.types import Size, ColorDepth, StyleSpec, ColorValue\nfrom termforge.core.theme import ThemeTokens, resolve_token\nfrom termforge.text.render import style_to_ansi\nfrom termforge.keyvalue.types import KeyValueGridSpec\n\n\ndef render_keyvalue_grid(\n    spec: KeyValueGridSpec,\n    max_size: Size,\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth = ColorDepth.TRUECOLOR,\n) -> list[str]:\n    \"\"\"Render a aligned key-value grid to a list of lines.\n\n    Args:\n        spec: KeyValueGridSpec defining the items and formatting.\n        max_size: Size constraints for the rendered output.\n        theme: Optional theme tokens for styling.\n        depth: Color depth tier to use.\n\n    Returns:\n        List of formatted and optionally ANSI-styled line strings.\n    \"\"\"\n    if not spec.items:\n        return []\n\n    # 1. Determine key column width\n    if spec.key_width is not None:\n        key_col_w = spec.key_width\n    else:\n        key_col_w = max(len(item.key) for item in spec.items) if spec.items else 0\n\n    lines: list[str] = []\n\n    # 2. Render each item row\n    for item in spec.items:\n        # Pad key to column width\n        padded_key = f\"{item.key:<{key_col_w}}\"\n\n        raw_line_len = len(padded_key) + len(spec.separator) + len(item.value)\n        \n        # Determine if we need to truncate\n        val_str = item.value\n        if raw_line_len > max_size.width:\n            allowed_val_w = max_size.width - len(padded_key) - len(spec.separator)\n            if allowed_val_w > 1:\n                val_str = val_str[:allowed_val_w - 1] + \"\u2026\"\n            else:\n                val_str = \"\u2026\"[:max(0, allowed_val_w)]\n\n        # Apply styling if theme and depth are provided\n        styled_key = padded_key\n        styled_val = val_str\n\n        if theme and depth != ColorDepth.MONOCHROME:\n            # Render Key Style\n            if item.key_style:\n                token_path = item.key_style\n                if not token_path.startswith(\"colors.\"):\n                    token_path = f\"colors.{token_path}\"\n                try:\n                    res_val = resolve_token(theme, token_path)\n                    if isinstance(res_val, ColorValue):\n                        style = StyleSpec(fg=res_val)\n                        start, end = style_to_ansi(style, theme, depth)\n                        styled_key = f\"{start}{padded_key}{end}\"\n                except KeyError:\n                    pass\n\n            # Render Value Style\n            if item.value_style:\n                token_path = item.value_style\n                if not token_path.startswith(\"colors.\"):\n                    token_path = f\"colors.{token_path}\"\n                try:\n                    res_val = resolve_token(theme, token_path)\n                    if isinstance(res_val, ColorValue):\n                        style = StyleSpec(fg=res_val)\n                        start, end = style_to_ansi(style, theme, depth)\n                        styled_val = f\"{start}{val_str}{end}\"\n                except KeyError:\n                    pass\n\n        line = f\"{styled_key}{spec.separator}{styled_val}\"\n        lines.append(line)\n\n    return lines[:max_size.height]\n",
  "termforge/cli/responsive.py": "from __future__ import annotations\nimport sys\nimport os\nfrom termforge.config.loader import load_config_yaml, load_config_json, load_config_toml, config_to_specs\nfrom termforge.cli.layout import spec_to_layout_node, validate_layout\nfrom termforge.core.types import BoxConstraints\nfrom termforge.core.layout import compute_layout\n\ndef main() -> None:\n    import argparse\n    parser = argparse.ArgumentParser(description=\"TermForge Layout Responsive Breakpoint Simulator\")\n    parser.add_argument(\"path\", help=\"Path to layout config file (yaml/json/toml)\")\n    parser.add_argument(\"--min-width\", type=int, default=40, help=\"Minimum width to simulate (default: 40)\")\n    parser.add_argument(\"--max-width\", type=int, default=120, help=\"Maximum width to simulate (default: 120)\")\n    args = parser.parse_args()\n    \n    if not os.path.exists(args.path):\n        print(f\"Error: File {args.path} does not exist.\")\n        sys.exit(1)\n        \n    ext = os.path.splitext(args.path)[1].lower()\n    try:\n        if ext in (\".yaml\", \".yml\"):\n            config = load_config_yaml(args.path)\n        elif ext == \".json\":\n            config = load_config_json(args.path)\n        elif ext == \".toml\":\n            config = load_config_toml(args.path)\n        else:\n            print(f\"Error: Unsupported format {ext}\")\n            sys.exit(1)\n            \n        specs = config_to_specs(config)\n        if not specs:\n            print(\"No components found in layout config.\")\n            sys.exit(0)\n            \n        print(f\"Simulating Responsive Widths from {args.min_width} to {args.max_width} columns...\")\n        print(\"-\" * 65)\n        \n        breakpoints = []\n        \n        for w in range(args.min_width, args.max_width + 1):\n            for root_spec in specs:\n                node = spec_to_layout_node(root_spec)\n                max_h = getattr(root_spec, \"height\", 24) or 24\n                constraints = BoxConstraints(min_width=0, max_width=w, min_height=0, max_height=max_h)\n                result = compute_layout(node, constraints)\n                \n                errors: list[str] = []\n                validate_layout(result, root_spec, errors)\n                if errors:\n                    breakpoints.append((w, errors))\n                    break\n                    \n        if breakpoints:\n            print(\"\u26a0\ufe0f  Responsive Layout Breakpoints Detected:\")\n            for w, errs in breakpoints:\n                print(f\"  - Width {w:3}: {errs[0]}\")\n            sys.exit(0)\n        else:\n            print(\"\u2705 Layout is fully responsive across the simulated range! No collapses detected.\")\n            sys.exit(0)\n            \n    except Exception as e:\n        print(f\"Error simulating responsive layout: {e}\")\n        sys.exit(1)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/play.py": "import sys\nimport os\n\ndef main() -> None:\n    print(\"Initializing TermForge Component Playground Shell...\")\n    print(\"Preloading modules: core, text, image, charts, borders, windows, animation, logos, config, theme\")\n    print(\"Type help() or exit() to leave the REPL.\")\n    \n    # Import everything so it is available in the REPL\n    import termforge\n    from termforge.core import ColorDepth, detect_capabilities\n    from termforge.theme.builtin import BUILTIN_THEMES\n    \n    local_vars = {\n        \"termforge\": termforge,\n        \"ColorDepth\": ColorDepth,\n        \"detect_capabilities\": detect_capabilities,\n        \"BUILTIN_THEMES\": BUILTIN_THEMES,\n    }\n    \n    import code\n    code.interact(banner=\"--- TermForge Interactive Playground REPL ---\", local=local_vars)\n    sys.exit(0)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/layout.py": "from __future__ import annotations\nimport sys\nimport os\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec, Size, Position, BoxConstraints, Spacing, LayoutResult, ColorDepth\nfrom termforge.core.layout import LayoutNode, BoxModel, FlexContainer, FlexDirection, compute_layout\nfrom termforge.core.theme import ThemeTokens\n\ndef spec_to_layout_node(spec: RenderableSpec) -> LayoutNode:\n    width = getattr(spec, \"width\", None)\n    height = getattr(spec, \"height\", None)\n    \n    padding_top = 0\n    padding_bottom = 0\n    padding_left = 0\n    padding_right = 0\n    \n    if spec.spec_type in (\"window\", \"border\", \"modal\"):\n        padding_top = 1\n        padding_bottom = 1\n        padding_left = 1\n        padding_right = 1\n        \n    box = BoxModel(\n        width=width,\n        height=height,\n        padding=Spacing(top=padding_top, bottom=padding_bottom, left=padding_left, right=padding_right)\n    )\n    \n    flex = None\n    children = []\n    if spec.spec_type == \"pane\":\n        direction = FlexDirection.ROW if getattr(spec, \"direction\", \"row\") == \"row\" else FlexDirection.COLUMN\n        flex = FlexContainer(\n            direction=direction,\n            gap=getattr(spec, \"gap\", 0)\n        )\n        ratios = getattr(spec, \"ratios\", None) or [1.0] * len(getattr(spec, \"children\", []))\n        for i, child_spec in enumerate(getattr(spec, \"children\", [])):\n            child_node = spec_to_layout_node(child_spec)\n            child_node.box.flex_grow = ratios[i] if i < len(ratios) else 1.0\n            children.append(child_node)\n    elif spec.spec_type in (\"window\", \"border\", \"modal\"):\n        flex = FlexContainer(\n            direction=FlexDirection.COLUMN,\n            gap=0\n        )\n        content_spec = getattr(spec, \"content\", None)\n        if content_spec:\n            child_node = spec_to_layout_node(content_spec)\n            child_node.box.flex_grow = 1.0\n            children.append(child_node)\n            \n    return LayoutNode(\n        spec=spec,\n        box=box,\n        flex=flex,\n        children=children\n    )\n\ndef draw_layout_result(\n    result: LayoutResult,\n    spec: RenderableSpec,\n    grid: list[list[str]],\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth | None = None\n) -> None:\n    x = result.position.x\n    y = result.position.y\n    w = result.size.width\n    h = result.size.height\n    \n    start_ansi, end_ansi = \"\", \"\"\n    if depth is not None and theme is not None:\n        from termforge.core.types import StyleSpec, ColorValue\n        from termforge.text.render import style_to_ansi\n        color_name = \"colors.border\" if spec.spec_type == \"window\" else \"colors.primary\"\n        style = StyleSpec(fg=ColorValue(0, 0, 0, name=color_name))\n        start_ansi, end_ansi = style_to_ansi(style, theme, depth)\n    \n    def set_cell(cy: int, cx: int, char: str) -> None:\n        if 0 <= cy < len(grid) and 0 <= cx < len(grid[0]):\n            if start_ansi or end_ansi:\n                grid[cy][cx] = f\"{start_ansi}{char}{end_ansi}\"\n            else:\n                grid[cy][cx] = char\n\n    for i in range(x, x + w):\n        set_cell(y, i, \"-\")\n        set_cell(y + h - 1, i, \"-\")\n                \n    for j in range(y, y + h):\n        set_cell(j, x, \"|\")\n        set_cell(j, x + w - 1, \"|\")\n                \n    set_cell(y, x, \"+\")\n    set_cell(y, x + w - 1, \"+\")\n    set_cell(y + h - 1, x, \"+\")\n    set_cell(y + h - 1, x + w - 1, \"+\")\n        \n    label = f\"{spec.spec_type} ({w}x{h})\"\n    label_x = x + 2\n    label_y = y + 1\n    if label_y < y + h - 1 and 0 <= label_y < len(grid):\n        for idx, char in enumerate(label):\n            target_x = label_x + idx\n            if target_x < x + w - 1 and target_x < len(grid[0]):\n                set_cell(label_y, target_x, char)\n                \n    if hasattr(spec, \"content\") and spec.content is not None and result.children:\n        draw_layout_result(result.children[0], spec.content, grid, theme, depth)\n    elif hasattr(spec, \"children\") and spec.children and result.children:\n        for idx, child_spec in enumerate(spec.children):\n            if idx < len(result.children):\n                draw_layout_result(result.children[idx], child_spec, grid, theme, depth)\n\ndef validate_layout(result: LayoutResult, spec: RenderableSpec, errors: list[str]) -> None:\n    w = result.size.width\n    h = result.size.height\n    if w <= 0 or h <= 0:\n        errors.append(f\"Constraint Error: Component '{spec.spec_type}' collapsed to size {w}x{h}!\")\n        \n    if hasattr(spec, \"content\") and spec.content is not None and result.children:\n        validate_layout(result.children[0], spec.content, errors)\n    elif hasattr(spec, \"children\") and spec.children and result.children:\n        for idx, child_spec in enumerate(spec.children):\n            if idx < len(result.children):\n                validate_layout(result.children[idx], child_spec, errors)\n\ndef render_once(path: str, strict: bool, color_depth: str | None = None) -> bool:\n    from termforge.config.loader import load_config_yaml, load_config_json, load_config_toml, config_to_specs\n    from termforge.core.types import ColorDepth, ColorValue\n    \n    target_depth = None\n    if color_depth is not None:\n        depth_map = {\n            \"truecolor\": ColorDepth.TRUECOLOR,\n            \"color_256\": ColorDepth.COLOR_256,\n            \"color_16\": ColorDepth.COLOR_16,\n            \"monochrome\": ColorDepth.MONOCHROME\n        }\n        target_depth = depth_map.get(color_depth, ColorDepth.TRUECOLOR)\n    \n    ext = os.path.splitext(path)[1].lower()\n    if ext in (\".yaml\", \".yml\"):\n        config = load_config_yaml(path)\n    elif ext == \".json\":\n        config = load_config_json(path)\n    elif ext == \".toml\":\n        config = load_config_toml(path)\n    else:\n        print(f\"Error: Unsupported file format {ext}\")\n        return False\n        \n    specs = config_to_specs(config)\n    if not specs:\n        print(\"No components found in layout config.\")\n        return True\n        \n    theme_name = config.theme or \"nord\"\n    from termforge.theme.builtin import BUILTIN_THEMES\n    theme_pack = BUILTIN_THEMES.get(theme_name)\n    theme_tokens = theme_pack.tokens if theme_pack else None\n    \n    color_warnings: list[str] = []\n    \n    for root_spec in specs:\n        node = spec_to_layout_node(root_spec)\n        \n        max_w = getattr(root_spec, \"width\", 80) or 80\n        max_h = getattr(root_spec, \"height\", 24) or 24\n        constraints = BoxConstraints(min_width=0, max_width=max_w, min_height=0, max_height=max_h)\n        \n        result = compute_layout(node, constraints)\n        \n        errors: list[str] = []\n        validate_layout(result, root_spec, errors)\n        \n        if theme_tokens and target_depth is not None:\n            def check_node_colors(s: RenderableSpec) -> None:\n                for prop_name in (\"text_color\", \"border_color\"):\n                    val = getattr(s, prop_name, None)\n                    if val:\n                        from termforge.core.color import resolve_color\n                        from termforge.core.theme import resolve_token\n                        try:\n                            token_path = f\"colors.{val}\" if not val.startswith(\"colors.\") else val\n                            color_val = resolve_token(theme_tokens, token_path)\n                            if isinstance(color_val, ColorValue):\n                                rgb = resolve_color(color_val, target_depth)\n                                if rgb is None:\n                                    color_warnings.append(f\"Color Warning: Token '{val}' resolves to empty/null at depth {target_depth.name}\")\n                        except KeyError:\n                            pass\n                if hasattr(s, \"content\") and s.content is not None:\n                    check_node_colors(s.content)\n                if hasattr(s, \"children\") and s.children:\n                    for child in s.children:\n                        check_node_colors(child)\n            check_node_colors(root_spec)\n            \n        grid = [[\" \" for _ in range(max_w)] for _ in range(max_h)]\n        draw_layout_result(result, root_spec, grid, theme_tokens, target_depth)\n        \n        print(f\"\\n--- Visualizing Layout for {root_spec.spec_type.upper()} ({max_w}x{max_h}) ---\")\n        for row in grid:\n            print(\"\".join(row))\n            \n        if errors:\n            print(\"\\n\u26a0\ufe0f  Layout Validation Warnings:\")\n            for err in errors:\n                print(f\"  - {err}\")\n            if strict:\n                sys.exit(1)\n                \n    if color_warnings:\n        print(\"\\n\u26a0\ufe0f  Color Depth Simulation Warnings:\")\n        for warn in color_warnings:\n            print(f\"  - {warn}\")\n            \n    return True\n\ndef main() -> None:\n    import argparse\n    import time\n    \n    parser = argparse.ArgumentParser(description=\"TermForge Layout Visualizer & Validator\")\n    parser.add_argument(\"path\", help=\"Path to layout config file (yaml/json/toml)\")\n    parser.add_argument(\"--strict\", action=\"store_true\", help=\"Exit with code 1 if layout validation fails\")\n    parser.add_argument(\"--watch\", \"--hot-reload\", action=\"store_true\", help=\"Watch file for modifications and reload layout preview\")\n    parser.add_argument(\"--color-depth\", choices=[\"truecolor\", \"color_256\", \"color_16\", \"monochrome\"], default=None, help=\"Color depth tier to simulate (default: None)\")\n    args = parser.parse_args()\n    \n    if not os.path.exists(args.path):\n        print(f\"Error: File {args.path} does not exist.\")\n        sys.exit(1)\n        \n    if not args.watch:\n        render_once(args.path, args.strict, args.color_depth)\n        return\n        \n    print(f\"Watching {args.path} for changes... Press Ctrl+C to stop.\")\n    last_mtime = 0.0\n    \n    try:\n        while True:\n            try:\n                mtime = os.path.getmtime(args.path)\n            except OSError:\n                time.sleep(0.2)\n                continue\n                \n            if mtime != last_mtime:\n                last_mtime = mtime\n                sys.stdout.write(\"\\033[H\\033[2J\")\n                sys.stdout.flush()\n                print(f\"Reloading layout preview for {args.path}...\")\n                try:\n                    render_once(args.path, strict=False, color_depth=args.color_depth)\n                except Exception as e:\n                    print(f\"\\n\u274c Syntax/parsing error in configuration: {e}\")\n                    \n            time.sleep(0.2)\n    except KeyboardInterrupt:\n        print(\"\\nStopping watcher.\")\n        sys.exit(0)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/watch.py": "\"\"\"CLI subcommand: termforge-watch \u2014 monitors and hot-reloads declarative layout configurations.\"\"\"\nfrom __future__ import annotations\n\nimport argparse\nimport os\nimport sys\nimport time\n\nfrom termforge.cli.layout import render_once\n\n\ndef main() -> None:\n    \"\"\"Watch command entrypoint.\"\"\"\n    parser = argparse.ArgumentParser(\n        description=\"TermForge Live Layout Config Watcher & Hot-Reloader\"\n    )\n    parser.add_argument(\"path\", help=\"Path to layout configuration file (yaml/json/toml)\")\n    parser.add_argument(\n        \"--color-depth\",\n        choices=[\"truecolor\", \"color_256\", \"color_16\", \"monochrome\"],\n        default=None,\n        help=\"Simulated color depth tier (default: None)\",\n    )\n    args = parser.parse_args()\n\n    if not os.path.exists(args.path):\n        print(f\"Error: Target configuration file '{args.path}' does not exist.\")\n        sys.exit(1)\n\n    print(f\"Watching '{args.path}' for modifications... Press Ctrl+C to stop.\")\n    last_mtime = 0.0\n\n    try:\n        while True:\n            try:\n                mtime = os.path.getmtime(args.path)\n            except OSError:\n                time.sleep(0.2)\n                continue\n\n            if mtime != last_mtime:\n                last_mtime = mtime\n                # Clear terminal screen and reset cursor home\n                sys.stdout.write(\"\\033[H\\033[2J\")\n                sys.stdout.flush()\n                print(f\"Reloading layout preview for '{args.path}'...\")\n                try:\n                    render_once(args.path, strict=False, color_depth=args.color_depth)\n                except Exception as e:\n                    print(f\"\\n\u274c Error parsing configuration: {e}\")\n\n            time.sleep(0.2)\n    except KeyboardInterrupt:\n        print(\"\\nStopping hot-reloader watcher.\")\n        sys.exit(0)\n\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/format.py": "from __future__ import annotations\nimport sys\nimport os\nfrom termforge.config.formatter import format_config_file\n\ndef main() -> None:\n    import argparse\n    parser = argparse.ArgumentParser(description=\"TermForge Layout Configuration Formatter\")\n    parser.add_argument(\"path\", help=\"Path to layout config file (yaml/json/toml)\")\n    parser.add_argument(\"--write\", \"-w\", action=\"store_true\", help=\"Write formatted output back to the file.\")\n    args = parser.parse_args()\n    \n    if not os.path.exists(args.path):\n        print(f\"Error: File {args.path} does not exist.\")\n        sys.exit(1)\n        \n    try:\n        formatted = format_config_file(args.path, write=args.write)\n        if args.write:\n            print(f\"\u2705 Successfully formatted and updated {args.path}\")\n        else:\n            sys.stdout.write(formatted)\n    except Exception as e:\n        print(f\"Error formatting layout config: {e}\")\n        sys.exit(1)\n        \n    sys.exit(0)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/benchmark.py": "from __future__ import annotations\nimport sys\nimport os\nimport time\nimport tracemalloc\nfrom termforge.config.loader import load_config_yaml, load_config_json, load_config_toml, config_to_specs\nfrom termforge.cli.layout import spec_to_layout_node, draw_layout_result\nfrom termforge.core.types import BoxConstraints\nfrom termforge.core.layout import compute_layout\n\ndef main() -> None:\n    import argparse\n    parser = argparse.ArgumentParser(description=\"TermForge Layout Performance Benchmarker\")\n    parser.add_argument(\"path\", help=\"Path to layout config file (yaml/json/toml)\")\n    parser.add_argument(\"--iterations\", type=int, default=1000, help=\"Number of simulation iterations (default: 1000)\")\n    args = parser.parse_args()\n    \n    if not os.path.exists(args.path):\n        print(f\"Error: File {args.path} does not exist.\")\n        sys.exit(1)\n        \n    ext = os.path.splitext(args.path)[1].lower()\n    try:\n        if ext in (\".yaml\", \".yml\"):\n            config = load_config_yaml(args.path)\n        elif ext == \".json\":\n            config = load_config_json(args.path)\n        elif ext == \".toml\":\n            config = load_config_toml(args.path)\n        else:\n            print(f\"Error: Unsupported format {ext}\")\n            sys.exit(1)\n            \n        specs = config_to_specs(config)\n        if not specs:\n            print(\"No components found in layout config.\")\n            sys.exit(0)\n            \n        root_spec = specs[0]\n        node = spec_to_layout_node(root_spec)\n        max_w = getattr(root_spec, \"width\", 80) or 80\n        max_h = getattr(root_spec, \"height\", 24) or 24\n        constraints = BoxConstraints(min_width=0, max_width=max_w, min_height=0, max_height=max_h)\n        \n        tracemalloc.start()\n        \n        start_time = time.perf_counter_ns()\n        for _ in range(args.iterations):\n            result = compute_layout(node, constraints)\n            grid = [[\" \" for _ in range(max_w)] for _ in range(max_h)]\n            draw_layout_result(result, root_spec, grid)\n            \n        total_time_ns = time.perf_counter_ns() - start_time\n        _, peak_mem = tracemalloc.get_traced_memory()\n        tracemalloc.stop()\n        \n        avg_duration_us = (total_time_ns / args.iterations) / 1000.0\n        peak_mem_kb = peak_mem / 1024.0\n        \n        print(f\"Layout Performance Benchmark for: {args.path}\")\n        print(\"-\" * 65)\n        print(f\"Iterations:                 {args.iterations}\")\n        print(f\"Average Solver Duration:    {avg_duration_us:.2f} \\u03bcs\")\n        print(f\"Peak Memory Overhead:       {peak_mem_kb:.2f} KB\")\n        print(f\"Component Count:            {len(specs)}\")\n        print(\"-\" * 65)\n        print(\"Performance Status: PASS \\u2705\")\n        sys.exit(0)\n        \n    except Exception as e:\n        print(f\"Error benchmarking layout performance: {e}\")\n        sys.exit(1)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/contrast.py": "from __future__ import annotations\nimport sys\nimport os\nimport time\nfrom termforge.theme.loader import load_theme_yaml, load_theme_json\nfrom termforge.theme.contrast import check_contrast\n\ndef main() -> None:\n    import argparse\n    parser = argparse.ArgumentParser(description=\"TermForge Theme WCAG Contrast Validator\")\n    parser.add_argument(\"path\", help=\"Path to custom theme pack configuration file (yaml/json)\")\n    args = parser.parse_args()\n    \n    if not os.path.exists(args.path):\n        print(f\"Error: File {args.path} does not exist.\")\n        sys.exit(1)\n        \n    ext = os.path.splitext(args.path)[1].lower()\n    \n    try:\n        start_time = time.perf_counter()\n        if ext in (\".yaml\", \".yml\"):\n            theme = load_theme_yaml(args.path)\n        elif ext == \".json\":\n            theme = load_theme_json(args.path)\n        else:\n            print(f\"Error: Unsupported format {ext}\")\n            sys.exit(1)\n            \n        results = check_contrast(theme)\n        elapsed = (time.perf_counter() - start_time) * 1000.0\n        \n        print(f\"Contrast Audit for Theme: {theme.meta.name} ({elapsed:.2f}ms)\")\n        print(\"-\" * 65)\n        \n        all_passed = True\n        for res in results:\n            fg = res[\"fg_token\"]\n            bg = res[\"bg_token\"]\n            ratio = res[\"ratio\"]\n            passes_aa = res[\"passes_aa\"]\n            passes_aaa = res[\"passes_aaa\"]\n            \n            status = \"AAA\" if passes_aaa else (\"AA\" if passes_aa else \"Fail\")\n            if not passes_aa:\n                all_passed = False\n                \n            print(f\"Token: {fg:<12} on {bg:<8} | Ratio: {ratio:<6} | Compliance: {status}\")\n            \n        print(\"-\" * 65)\n        if all_passed:\n            print(\"Status: AA Compliance Passed \u2705\")\n            sys.exit(0)\n        else:\n            print(\"Status: Contrast Verification Failed \u274c (AA standards not met)\")\n            sys.exit(1)\n    except Exception as e:\n        print(f\"Error checking theme contrast: {e}\")\n        sys.exit(1)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/validate.py": "from __future__ import annotations\nimport sys\nimport os\nimport yaml  # type: ignore\nimport json\nfrom termforge.config.validator import validate_config, LineNumberLoader\n\ntry:\n    import tomllib  # type: ignore\nexcept ImportError:\n    tomllib = None\n\ndef main() -> None:\n    import argparse\n    parser = argparse.ArgumentParser(description=\"TermForge Declarative Configuration Validator (Linter)\")\n    parser.add_argument(\"path\", help=\"Path to layout or theme config file (yaml/json/toml)\")\n    parser.add_argument(\"--check-cyclic\", action=\"store_true\", help=\"Audit the configuration for circular component references\")\n    parser.add_argument(\"--check-bounds\", action=\"store_true\", help=\"Audit the configuration for layout size/boundary overflows\")\n    args = parser.parse_args()\n    \n    if not os.path.exists(args.path):\n        print(f\"Error: File {args.path} does not exist.\")\n        sys.exit(1)\n        \n    ext = os.path.splitext(args.path)[1].lower()\n    try:\n        if ext in (\".yaml\", \".yml\"):\n            with open(args.path, \"r\", encoding=\"utf-8\") as f:\n                data = yaml.load(f, Loader=LineNumberLoader)\n        elif ext == \".json\":\n            with open(args.path, \"r\", encoding=\"utf-8\") as f:\n                data = json.load(f)\n        elif ext == \".toml\":\n            with open(args.path, \"rb\") as f:\n                if tomllib:\n                    data = tomllib.load(f)\n                else:\n                    raise ImportError(\"TOML support requires Python 3.11+ (tomllib)\")\n        else:\n            print(f\"Error: Unsupported file format {ext}\")\n            sys.exit(1)\n    except Exception as e:\n        print(f\"Error parsing configuration file: {e}\")\n        sys.exit(1)\n        \n    errors = validate_config(data, check_cyclic=args.check_cyclic, check_bounds=args.check_bounds)\n    fatal_errors = [e for e in errors if \"Error:\" in e]\n    warnings = [e for e in errors if \"Warning:\" in e]\n    \n    if errors:\n        if fatal_errors:\n            print(f\"\u274c Configuration validation failed for {args.path}:\")\n            for err in errors:\n                print(f\"  {err}\")\n            sys.exit(1)\n        else:\n            print(f\"\u26a0\ufe0f  Configuration {args.path} validated with warnings:\")\n            for err in warnings:\n                print(f\"  {err}\")\n            sys.exit(0)\n    else:\n        print(f\"\u2705 Configuration {args.path} validated successfully (0 errors, 0 warnings).\")\n        sys.exit(0)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/demo.py": "from __future__ import annotations\nimport sys\nimport time\nimport os\nfrom termforge.core import Size, ColorDepth, detect_capabilities\nfrom termforge.core import FlexDirection\nfrom termforge.core.scheduler import create_scheduler, register_animation, tick, AnimationSpec\nfrom termforge.windows.types import WindowSpec, PaneSpec\nfrom termforge.windows.compositor import compose_panes, render_window\nfrom termforge.text.types import TextSpec\nfrom termforge.text.render import render_text\nfrom termforge.charts.types import ChartSpec, ChartType, OHLCSeries\nfrom termforge.charts.chart import render_chart\nfrom termforge.logos.types import LogoSpec\nfrom termforge.logos.render import render_logo\nfrom termforge.animation.types import SpinnerSpec, SpinnerStyle\nfrom termforge.animation.spinners import render_spinner\n\ndef create_ohlc_data() -> list[dict[str, float]]:\n    return [\n        {\"open\": 100.0, \"high\": 105.0, \"low\": 98.0, \"close\": 102.5},\n        {\"open\": 102.5, \"high\": 108.0, \"low\": 101.0, \"close\": 107.0},\n        {\"open\": 107.0, \"high\": 107.5, \"low\": 99.0, \"close\": 101.2},\n        {\"open\": 101.2, \"high\": 104.0, \"low\": 95.0, \"close\": 96.8},\n        {\"open\": 96.8, \"high\": 102.0, \"low\": 96.0, \"close\": 101.5},\n        {\"open\": 101.5, \"high\": 106.0, \"low\": 100.2, \"close\": 105.1},\n        {\"open\": 105.1, \"high\": 111.0, \"low\": 104.0, \"close\": 109.8},\n        {\"open\": 109.8, \"high\": 110.0, \"low\": 105.0, \"close\": 106.5}\n    ]\n\ndef main() -> None:\n    # 1. Detect capabilities\n    caps = detect_capabilities()\n    depth = caps.color_depth\n    \n    # 2. Main Window setup (width 80, height 24)\n    win_w, win_h = 80, 24\n    main_win = WindowSpec(title=\"TermForge Flagship Dashboard\", width=win_w, height=win_h, focused=True)\n    \n    # Inner viewport size\n    inner_w = win_w - 2\n    inner_h = win_h - 2\n    inner_size = Size(inner_w, inner_h)\n    \n    pane = PaneSpec(\n        direction=FlexDirection.COLUMN,\n        children=[\n            LogoSpec(text=\"TF\", font=\"small\"),\n            ChartSpec(chart_type=ChartType.CANDLESTICK),\n            TextSpec(content=\"\")\n        ],\n        ratios=[5.0, 12.0, 5.0],\n        gap=0\n    )\n    \n    # 3. Setup Scheduler\n    scheduler = create_scheduler()\n    anim_spec = AnimationSpec(fps=10.0, duration_ms=None, callback_id=\"spinner\")\n    scheduler = register_animation(scheduler, anim_spec)\n    \n    # Render loop\n    print(\"\\033[2J\", end=\"\") # Initial full screen clear\n    \n    try:\n        while True:\n            # Update scheduler clock (in ms)\n            curr_time_ms = time.time() * 1000.0\n            scheduler, fired = tick(scheduler, curr_time_ms)\n            \n            # Get current frame for spinner\n            spinner_frame_num = scheduler.frame_counts.get(\"spinner\", 0)\n            \n            # Resolve layout geometry\n            layouts = compose_panes(pane, inner_size)\n            \n            # --- Render Row 0 (Top Panel: Logo & Spinner split) ---\n            pos_top, size_top, _ = layouts[0]\n            top_pane = PaneSpec(direction=FlexDirection.ROW, children=[LogoSpec(), SpinnerSpec()], ratios=[1.0, 2.0])\n            top_layouts = compose_panes(top_pane, size_top)\n            \n            # Left Top: Logo\n            _, size_logo, _ = top_layouts[0]\n            logo_spec = LogoSpec(text=\"TF\", font=\"small\", gradient=[\"#ff007f\", \"#7f00ff\"])\n            logo_lines = render_logo(logo_spec, depth=depth)\n            logo_lines += [\"\"] * (size_logo.height - len(logo_lines))\n            logo_lines = [f\"{line:<{size_logo.width}}\" for line in logo_lines]\n            \n            # Right Top: Spinner & Status\n            _, size_spin, _ = top_layouts[1]\n            spin_spec = SpinnerSpec(style=SpinnerStyle.DOTS, label=\"Streaming Real-Time Stock Feed...\")\n            spin_frame = render_spinner(spin_spec, spinner_frame_num, depth=depth)\n            \n            spin_lines = [\n                spin_frame,\n                \"Market Status: \\033[32mOPEN\\033[0m\",\n                \"Connected to WebSocket server\",\n                \"Refresh rate: 10 FPS\"\n            ]\n            spin_lines += [\"\"] * (size_spin.height - len(spin_lines))\n            spin_lines = [f\"{line:<{size_spin.width}}\" for line in spin_lines]\n            \n            top_panel_lines = []\n            for r in range(size_top.height):\n                top_panel_lines.append(logo_lines[r] + spin_lines[r])\n                \n            # --- Render Row 1 (Candlestick Chart) ---\n            _, size_chart, _ = layouts[1]\n            ohlc_data = create_ohlc_data()\n            chart_spec = ChartSpec(\n                chart_type=ChartType.CANDLESTICK,\n                ohlc_series=OHLCSeries(data=ohlc_data),\n                width=size_chart.width,\n                height=size_chart.height,\n                title=\"Apple Inc. (AAPL) 1-Minute Candle\",\n                show_legend=False\n            )\n            chart_lines = render_chart(chart_spec, depth=depth)\n            chart_lines += [\"\"] * (size_chart.height - len(chart_lines))\n            \n            # --- Render Row 2 (Data Table) ---\n            _, size_table, _ = layouts[2]\n            table_markup = (\n                \"[bold]Ticker \u2502 Open   \u2502 High   \u2502 Low    \u2502 Close  \u2502 Volume[/bold]\\n\"\n                \"\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\\n\"\n                \"AAPL   \u2502 100.00 \u2502 111.00 \u2502 95.00  \u2502 106.50 \u2502 4.8M\\n\"\n                \"GOOG   \u2502 172.10 \u2502 175.40 \u2502 170.80 \u2502 174.90 \u2502 1.1M\"\n            )\n            table_spec = TextSpec(content=table_markup, max_width=size_table.width)\n            table_lines = render_text(table_spec, depth=depth)\n            table_lines += [\"\"] * (size_table.height - len(table_lines))\n            \n            # --- Composite all parts ---\n            full_body = top_panel_lines + chart_lines + table_lines\n            \n            # Wrap in main bordered window\n            screen = render_window(main_win, full_body, depth=depth)\n            \n            # Draw on screen in-place\n            print(\"\\033[H\", end=\"\")\n            for line in screen:\n                print(line)\n                \n            print(\"\\nPress Ctrl+C to exit demo.\")\n            time.sleep(0.1)\n            \n    except KeyboardInterrupt:\n        print(\"\\033[2J\\033[HTermForge Demo completed.\")\n        sys.exit(0)\n\nif __name__ == \"__main__\":\n    main()\n",

  "termforge/cli/init.py": "from __future__ import annotations\nimport sys\nimport os\nimport yaml  # type: ignore\nimport json\nfrom termforge.config.loader import serialize_toml\n\nMINIMAL_CONFIG = {\n    \"theme\": \"nord\",\n    \"components\": [\n        {\n            \"spec_type\": \"window\",\n            \"properties\": {\n                \"title\": \"Hello World\",\n                \"border_style\": \"rounded\"\n            },\n            \"children\": [\n                {\n                    \"spec_type\": \"text\",\n                    \"properties\": {\n                        \"text\": \"Welcome to TermForge!\",\n                        \"align\": \"center\"\n                    }\n                }\n            ]\n        }\n    ]\n}\n\nDASHBOARD_CONFIG = {\n    \"theme\": \"dracula\",\n    \"components\": [\n        {\n            \"spec_type\": \"pane\",\n            \"properties\": {\n                \"direction\": \"column\"\n            },\n            \"children\": [\n                {\n                    \"spec_type\": \"window\",\n                    \"properties\": {\n                        \"title\": \"Main Table\",\n                        \"height\": 10\n                    },\n                    \"children\": [\n                        {\n                            \"spec_type\": \"text\",\n                            \"properties\": {\n                                \"text\": \"Data Table Placeholder\"\n                            }\n                        }\n                    ]\n                },\n                {\n                    \"spec_type\": \"pane\",\n                    \"properties\": {\n                        \"direction\": \"row\"\n                    },\n                    \"children\": [\n                        {\n                            \"spec_type\": \"window\",\n                            \"properties\": {\n                                \"title\": \"Chart Pane\",\n                                \"flex_grow\": 1.0\n                            },\n                            \"children\": [\n                                {\n                                    \"spec_type\": \"text\",\n                                    \"properties\": {\n                                        \"text\": \"Line Chart Placeholder\"\n                                    }\n                                }\n                            ]\n                        },\n                        {\n                            \"spec_type\": \"window\",\n                            \"properties\": {\n                                \"title\": \"Summary Panel\",\n                                \"width\": 30\n                            },\n                            \"children\": [\n                                {\n                                    \"spec_type\": \"text\",\n                                    \"properties\": {\n                                        \"text\": \"Stats Panel Placeholder\"\n                                    }\n                                }\n                            ]\n                        }\n                    ]\n                }\n            ]\n        }\n    ]\n}\n\nEDITOR_CONFIG = {\n    \"theme\": \"catppuccin_mocha\",\n    \"components\": [\n        {\n            \"spec_type\": \"pane\",\n            \"properties\": {\n                \"direction\": \"row\"\n            },\n            \"children\": [\n                {\n                    \"spec_type\": \"window\",\n                    \"properties\": {\n                        \"title\": \"Explorer\",\n                        \"width\": 25\n                    },\n                    \"children\": [\n                        {\n                            \"spec_type\": \"text\",\n                            \"properties\": {\n                                \"text\": \"Directory Tree\"\n                            }\n                        }\n                    ]\n                },\n                {\n                    \"spec_type\": \"window\",\n                    \"properties\": {\n                        \"title\": \"File Editor\",\n                        \"flex_grow\": 1.0\n                    },\n                    \"children\": [\n                        {\n                            \"spec_type\": \"text\",\n                            \"properties\": {\n                                \"text\": \"Editor Buffer Content\"\n                            }\n                        }\n                    ]\n                }\n            ]\n        }\n    ]\n}\n\ndef main() -> None:\n    import argparse\n    parser = argparse.ArgumentParser(description=\"TermForge Layout Configuration Scaffolder\")\n    parser.add_argument(\"path\", help=\"Target path to output file layout stub\")\n    parser.add_argument(\"--type\", \"-t\", choices=[\"minimal\", \"dashboard\", \"editor\"], default=\"minimal\", help=\"Template type structure (default: minimal)\")\n    parser.add_argument(\"--format\", \"-f\", choices=[\"yaml\", \"toml\", \"json\"], help=\"Output configuration file format (yaml/toml/json)\")\n    args = parser.parse_args()\n    \n    fmt = args.format\n    if not fmt:\n        ext = os.path.splitext(args.path)[1].lower()\n        if ext in (\".yaml\", \".yml\"):\n            fmt = \"yaml\"\n        elif ext == \".toml\":\n            fmt = \"toml\"\n        elif ext == \".json\":\n            fmt = \"json\"\n        else:\n            fmt = \"yaml\"\n            \n    templates = {\n        \"minimal\": MINIMAL_CONFIG,\n        \"dashboard\": DASHBOARD_CONFIG,\n        \"editor\": EDITOR_CONFIG\n    }\n    \n    config_dict = templates[args.type]\n    \n    try:\n        dirname = os.path.dirname(args.path)\n        if dirname and not os.path.exists(dirname):\n            os.makedirs(dirname, exist_ok=True)\n            \n        if fmt == \"yaml\":\n            with open(args.path, \"w\", encoding=\"utf-8\") as f:\n                f.write(f\"# TermForge {args.type.capitalize()} Layout Configuration\\n\")\n                yaml.dump(config_dict, f, default_flow_style=False, sort_keys=False)\n        elif fmt == \"json\":\n            with open(args.path, \"w\", encoding=\"utf-8\") as f:\n                json.dump(config_dict, f, indent=2)\n        elif fmt == \"toml\":\n            with open(args.path, \"w\", encoding=\"utf-8\") as f:\n                f.write(f\"# TermForge {args.type.capitalize()} Layout Configuration\\n\")\n                f.write(serialize_toml(config_dict))\n        else:\n            print(f\"Error: Unsupported format {fmt}\")\n            sys.exit(1)\n            \n        print(f\"\u2705 Successfully initialized {args.type} layout configuration at {args.path}\")\n    except Exception as e:\n        print(f\"Error scaffolding configuration: {e}\")\n        sys.exit(1)\n        \n    sys.exit(0)\n\nif __name__ == \"__main__\":\n    main()\n",

  "termforge/cli/story.py": "from __future__ import annotations\nimport sys\nimport os\nimport subprocess\nimport argparse\nimport difflib\n\ndef find_stories() -> list[tuple[str, str, str]]:\n    # Returns list of tuples: (module_name, story_name, path_to_py_file)\n    stories_dir = os.path.abspath(os.path.join(os.path.dirname(__file__), \"..\", \"..\", \"stories\"))\n    results = []\n    for root, _, files in os.walk(stories_dir):\n        for file in files:\n            if file.endswith(\".py\") and not file.startswith(\"__\"):\n                path = os.path.join(root, file)\n                rel_path = os.path.relpath(path, stories_dir)\n                parts = rel_path.split(os.sep)\n                if len(parts) >= 2:\n                    module_name = parts[0]\n                    story_name = os.path.splitext(parts[1])[0]\n                    results.append((module_name, story_name, path))\n    return sorted(results)\n\ndef run_story_captured(path: str) -> str:\n    # Run the python script with PAGER=cat and capture stdout\n    env = dict(os.environ)\n    env[\"PAGER\"] = \"cat\"\n    env[\"PYTHONPATH\"] = os.path.abspath(os.path.join(os.path.dirname(__file__), \"..\", \"..\"))\n    \n    # Run with same python interpreter\n    res = subprocess.run([sys.executable, path], capture_output=True, text=True, env=env)\n    if res.returncode != 0:\n        raise RuntimeError(f\"Story {path} exited with code {res.returncode}. Stderr: {res.stderr}\")\n    return res.stdout\n\ndef main() -> None:\n    parser = argparse.ArgumentParser(description=\"TermForge Storybook CLI\")\n    parser.add_argument(\"--regenerate\", action=\"store_true\", help=\"Regenerate golden files for all stories\")\n    args = parser.parse_args()\n    \n    stories = find_stories()\n    if not stories:\n        print(\"No stories found.\")\n        sys.exit(0)\n        \n    print(f\"Found {len(stories)} stories.\")\n    failed = False\n    \n    for mod, name, path in stories:\n        golden_path = os.path.splitext(path)[0] + \".golden.txt\"\n        \n        try:\n            output = run_story_captured(path)\n        except Exception as e:\n            print(f\"\u274c {mod}/{name} failed to execute: {e}\")\n            failed = True\n            continue\n            \n        if args.regenerate:\n            with open(golden_path, \"w\", encoding=\"utf-8\") as f:\n                f.write(output)\n            print(f\"\u2705 {mod}/{name} golden file regenerated.\")\n        else:\n            if not os.path.exists(golden_path):\n                print(f\"\u26a0\ufe0f {mod}/{name} golden file missing. Regenerating automatically...\")\n                with open(golden_path, \"w\", encoding=\"utf-8\") as f:\n                    f.write(output)\n                continue\n                \n            with open(golden_path, \"r\", encoding=\"utf-8\") as f:\n                golden_content = f.read()\n                \n            if output == golden_content:\n                print(f\"\u2705 {mod}/{name} passed.\")\n            else:\n                print(f\"\u274c {mod}/{name} golden mismatch!\")\n                # Show diff\n                diff = difflib.unified_diff(\n                    golden_content.splitlines(),\n                    output.splitlines(),\n                    fromfile=\"golden\",\n                    tofile=\"actual\"\n                )\n                print(\"\\n\".join(diff))\n                print()\n                failed = True\n                \n    if failed:\n        sys.exit(1)\n    else:\n        print(\"\\nAll storybooks passed successfully.\")\n        sys.exit(0)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/inspect.py": "from __future__ import annotations\nimport sys\nimport os\nimport yaml  # type: ignore\nimport json\nfrom termforge.config.loader import load_config_yaml, load_config_json, load_config_toml, config_to_specs\nfrom termforge.cli.layout import spec_to_layout_node\nfrom termforge.core.types import BoxConstraints, LayoutResult\nfrom termforge.core.layout import LayoutNode, compute_layout\n\ntry:\n    import tomllib  # type: ignore\nexcept ImportError:\n    tomllib = None\n\ndef print_tree(node: LayoutNode, result: LayoutResult, prefix: str = \"\", is_last: bool = True) -> None:\n    marker = \"\u2514\u2500 \" if is_last else \"\u251c\u2500 \"\n    spec_type = node.spec.spec_type\n    pos = f\"pos=({result.position.x},{result.position.y})\"\n    size = f\"size={result.size.width}x{result.size.height}\"\n    \n    sys.stdout.write(f\"{prefix}{marker}{spec_type.capitalize()} ({spec_type}) [{pos} {size}]\\n\")\n    \n    child_prefix = prefix + (\"   \" if is_last else \"\u2502  \")\n    n = len(node.children)\n    for i, child in enumerate(node.children):\n        if i < len(result.children):\n            print_tree(child, result.children[i], prefix=child_prefix, is_last=(i == n - 1))\n\ndef main() -> None:\n    import argparse\n    parser = argparse.ArgumentParser(description=\"TermForge CLI Layout Hierarchy Inspector\")\n    parser.add_argument(\"path\", help=\"Path to layout config file (yaml/json/toml)\")\n    parser.add_argument(\"--width\", type=int, default=80, help=\"Simulated terminal width columns (default: 80)\")\n    parser.add_argument(\"--height\", type=int, default=24, help=\"Simulated terminal height rows (default: 24)\")\n    args = parser.parse_args()\n    \n    if not os.path.exists(args.path):\n        print(f\"Error: File {args.path} does not exist.\")\n        sys.exit(1)\n        \n    ext = os.path.splitext(args.path)[1].lower()\n    try:\n        if ext in (\".yaml\", \".yml\"):\n            config = load_config_yaml(args.path)\n        elif ext == \".json\":\n            config = load_config_json(args.path)\n        elif ext == \".toml\":\n            config = load_config_toml(args.path)\n        else:\n            print(f\"Error: Unsupported file format {ext}\")\n            sys.exit(1)\n    except Exception as e:\n        print(f\"Error parsing layout config: {e}\")\n        sys.exit(1)\n        \n    specs = config_to_specs(config)\n    constraints = BoxConstraints(\n        min_width=0,\n        max_width=args.width,\n        min_height=0,\n        max_height=args.height\n    )\n    \n    print(f\"Layout Hierarchy Inspection for {args.path} ({args.width}x{args.height}):\")\n    for i, spec in enumerate(specs):\n        layout_node = spec_to_layout_node(spec)\n        layout_result = compute_layout(layout_node, constraints)\n        print_tree(layout_node, layout_result, prefix=\"\", is_last=(i == len(specs) - 1))\n        \n    sys.exit(0)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/cli/schema.py": "from __future__ import annotations\nimport sys\nimport os\nimport json\nfrom termforge.config.schema import generate_json_schema\n\ndef main() -> None:\n    import argparse\n    parser = argparse.ArgumentParser(description=\"TermForge JSON Schema Exporter\")\n    parser.add_argument(\"--output\", \"-o\", help=\"Optional path to output file. Prints to stdout if not specified.\")\n    args = parser.parse_args()\n    \n    schema = generate_json_schema()\n    payload = json.dumps(schema, indent=2)\n    \n    if args.output:\n        try:\n            with open(args.output, \"w\", encoding=\"utf-8\") as f:\n                f.write(payload)\n            print(f\"\u2705 Successfully wrote JSON Schema to {args.output}\")\n        except Exception as e:\n            print(f\"Error writing schema to file: {e}\")\n            sys.exit(1)\n    else:\n        sys.stdout.write(payload + \"\\n\")\n        \n    sys.exit(0)\n\nif __name__ == \"__main__\":\n    main()\n",
  "termforge/core/types.py": "\"\"\"Core data types and the Renderable protocol for TermForge.\n\nAll types are plain dataclasses with to_dict()/from_dict() round-trip\nserialization. No Rich/Textual imports.\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom enum import Enum\nfrom typing import Any\n\n\nclass ColorDepth(Enum):\n    \"\"\"Supported terminal color depth tiers.\"\"\"\n\n    TRUECOLOR = \"truecolor\"\n    COLOR_256 = \"color_256\"\n    COLOR_16 = \"color_16\"\n    MONOCHROME = \"monochrome\"\n\n\n@dataclass\nclass ColorValue:\n    \"\"\"Stores a color as an (r, g, b) tuple with an optional semantic name.\"\"\"\n\n    r: int\n    g: int\n    b: int\n    name: str | None = None\n\n    @property\n    def rgb(self) -> tuple[int, int, int]:\n        return (self.r, self.g, self.b)\n\n    def to_dict(self) -> dict[str, Any]:\n        d: dict[str, Any] = {\"r\": self.r, \"g\": self.g, \"b\": self.b}\n        if self.name is not None:\n            d[\"name\"] = self.name\n        return d\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ColorValue:\n        return cls(r=d[\"r\"], g=d[\"g\"], b=d[\"b\"], name=d.get(\"name\"))\n\n\n@dataclass\nclass Size:\n    \"\"\"Width \u00d7 height in character cells.\"\"\"\n\n    width: int\n    height: int\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\"width\": self.width, \"height\": self.height}\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> Size:\n        return cls(width=d[\"width\"], height=d[\"height\"])\n\n\n@dataclass\nclass Position:\n    \"\"\"(x, y) position in character cells, origin at top-left.\"\"\"\n\n    x: int\n    y: int\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\"x\": self.x, \"y\": self.y}\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> Position:\n        return cls(x=d[\"x\"], y=d[\"y\"])\n\n\n@dataclass\nclass Spacing:\n    \"\"\"Spacing for padding/margin: top, right, b
