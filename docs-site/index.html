  "termforge/config/converter.py": "from __future__ import annotations\nimport os\nfrom termforge.config.loader import (\n    load_config_yaml, load_config_json, load_config_toml,\n    config_to_specs, save_config_to_file\n)\n\ndef convert_config_file(input_path: str, output_path: str) -> None:\n    \"\"\"Read a TermForge configuration file and write it back in a different format.\"\"\"\n    if not os.path.exists(input_path):\n        raise FileNotFoundError(f\"Input file {input_path} does not exist.\")\n        \n    input_ext = os.path.splitext(input_path)[1].lower()\n    if input_ext in (\".yaml\", \".yml\"):\n        config = load_config_yaml(input_path)\n    elif input_ext == \".json\":\n        config = load_config_json(input_path)\n    elif input_ext == \".toml\":\n        config = load_config_toml(input_path)\n    else:\n        raise ValueError(f\"Unsupported input extension: {input_ext}\")\n        \n    specs = config_to_specs(config)\n    \n    output_ext = os.path.splitext(output_path)[1].lower()\n    if output_ext in (\".yaml\", \".yml\"):\n        fmt = \"yaml\"\n    elif output_ext == \".json\":\n        fmt = \"json\"\n    elif output_ext == \".toml\":\n        fmt = \"toml\"\n    else:\n        raise ValueError(f\"Unsupported output extension: {output_ext}\")\n        \n    save_config_to_file(\n        spec=specs,\n        path=output_path,\n        format=fmt,\n        theme=config.theme,\n        title=config.title\n    )\n",
  "termforge/config/loader.py": "from __future__ import annotations\nimport json\nimport yaml  # type: ignore\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec\nfrom termforge.config.types import LayoutConfig, ComponentConfig\n\n# Try importing tomllib (Python 3.11+)\ntry:\n    import tomllib  # type: ignore\nexcept ImportError:\n    # simple fallback mapping if tomllib not present\n    tomllib = None\n\ndef load_config_yaml(path: str) -> LayoutConfig:\n    with open(path, \"r\", encoding=\"utf-8\") as f:\n        data = yaml.safe_load(f)\n    return LayoutConfig.from_dict(data)\n\ndef load_config_json(path: str) -> LayoutConfig:\n    with open(path, \"r\", encoding=\"utf-8\") as f:\n        data = json.load(f)\n    return LayoutConfig.from_dict(data)\n\ndef load_config_toml(path: str) -> LayoutConfig:\n    with open(path, \"rb\") as f:\n        if tomllib:\n            data = tomllib.load(f)\n        else:\n            # Fallback raise\n            raise ImportError(\"TOML support requires Python 3.11+ (tomllib)\")\n    return LayoutConfig.from_dict(data)\n\ndef map_component(config: ComponentConfig) -> RenderableSpec:\n    from termforge.text.types import TextSpec\n    from termforge.image.types import ImageSpec\n    from termforge.charts.types import ChartSpec\n    from termforge.borders.types import BorderSpec\n    from termforge.windows.types import WindowSpec, PaneSpec, ModalSpec\n    from termforge.logos.types import LogoSpec, BannerSpec\n    from termforge.animation.types import SpinnerSpec, TransitionSpec\n    from termforge.keyvalue.types import KeyValueItemSpec, KeyValueGridSpec\n    from termforge.keylegend.types import KeyLegendSpec\n    \n    spec_classes = {\n        \"text\": TextSpec,\n        \"image\": ImageSpec,\n        \"chart\": ChartSpec,\n        \"border\": BorderSpec,\n        \"window\": WindowSpec,\n        \"pane\": PaneSpec,\n        \"modal\": ModalSpec,\n        \"logo\": LogoSpec,\n        \"banner\": BannerSpec,\n        \"spinner\": SpinnerSpec,\n        \"transition\": TransitionSpec,\n        \"keyvalue_grid\": KeyValueGridSpec,\n        \"keyvalue_item\": KeyValueItemSpec,\n        \"key_legend\": KeyLegendSpec,\n    }\n\n\n    \n    spec_type = config.spec_type.lower()\n    cls: Any = spec_classes.get(spec_type)\n    if not cls:\n        raise ValueError(f\"Unknown component type: {spec_type}\")\n        \n    # Reconstruct from properties dictionary\n    spec: Any = cls.from_dict(config.properties)\n    \n    # Process children recursively\n    if spec_type in (\"window\", \"border\", \"modal\"):\n        if config.children:\n            spec.content = map_component(config.children[0])\n    elif spec_type == \"pane\":\n        spec.children = [map_component(c) for c in config.children]\n        \n    from typing import cast\n    return cast(RenderableSpec, spec)\n\ndef config_to_specs(config: LayoutConfig) -> list[RenderableSpec]:\n    return [map_component(c) for c in config.components]\n\ndef spec_to_component(spec: RenderableSpec) -> ComponentConfig:\n    d = spec.to_dict()\n    spec_type = d.pop(\"spec_type\", spec.spec_type)\n    \n    children_configs = []\n    # If the spec is a window, border, or modal, pop 'content' and serialize recursively\n    if hasattr(spec, \"content\") and isinstance(spec.content, RenderableSpec):\n        d.pop(\"content\", None)\n        children_configs.append(spec_to_component(spec.content))\n    # If the spec is a pane, pop 'children' and serialize recursively\n    elif hasattr(spec, \"children\") and isinstance(spec.children, list) and all(isinstance(c, RenderableSpec) for c in spec.children):\n        d.pop(\"children\", None)\n        for child in spec.children:\n            children_configs.append(spec_to_component(child))\n            \n    return ComponentConfig(\n        spec_type=spec_type,\n        properties=d,\n        children=children_configs\n    )\n\ndef toml_value(v: Any) -> str:\n    if isinstance(v, bool):\n        return \"true\" if v else \"false\"\n    elif isinstance(v, (int, float)):\n        return str(v)\n    elif isinstance(v, str):\n        escaped = v.replace(\"\\\\\", \"\\\\\\\\\").replace(\"\\\"\", \"\\\\\\\"\").replace(\"\\n\", \"\\\\n\")\n        return f'\"{escaped}\"'\n    elif isinstance(v, list):\n        if not v:\n            return \"[]\"\n        items = [toml_value(x) for x in v]\n        return \"[\" + \", \".join(items) + \"]\"\n    elif isinstance(v, dict):\n        parts = []\n        for k, val in v.items():\n            if val is not None:\n                parts.append(f\"{k} = {toml_value(val)}\")\n        return \"{ \" + \", \".join(parts) + \" }\"\n    return f'\"{v}\"'\n\ndef serialize_toml(data: dict[str, Any], parent_key: str = \"\") -> str:\n    lines = []\n    \n    # 1. Primitives (including inline tables/lists)\n    for k, v in data.items():\n        if v is None:\n            continue\n        if not isinstance(v, list):\n            lines.append(f\"{k} = {toml_value(v)}\")\n        elif v and not isinstance(v[0], dict):\n            lines.append(f\"{k} = {toml_value(v)}\")\n            \n    # 2. Array of tables (lists of dicts)\n    for k, v in data.items():\n        if isinstance(v, list) and v and isinstance(v[0], dict):\n            current_key = f\"{parent_key}.{k}\" if parent_key else k\n            for item in v:\n                lines.append(f\"\\n[[{current_key}]]\")\n                lines.append(serialize_toml(item, parent_key=current_key))\n                \n    return \"\\n\".join(lines)\n\ndef save_config_to_file(\n    spec: RenderableSpec | list[RenderableSpec],\n    path: str,\n    format: str = \"yaml\",\n    theme: str | None = None,\n    title: str | None = None\n) -> None:\n    specs = spec if isinstance(spec, list) else [spec]\n    components = [spec_to_component(s) for s in specs]\n    layout_config = LayoutConfig(\n        components=components,\n        theme=theme,\n        title=title\n    )\n    \n    data = layout_config.to_dict()\n    format_lower = format.lower()\n    \n    if format_lower == \"yaml\":\n        with open(path, \"w\", encoding=\"utf-8\") as f:\n            yaml.dump(data, f, default_flow_style=False, sort_keys=False)\n    elif format_lower == \"json\":\n        with open(path, \"w\", encoding=\"utf-8\") as f:\n            json.dump(data, f, indent=2)\n    elif format_lower == \"toml\":\n        with open(path, \"w\", encoding=\"utf-8\") as f:\n            f.write(serialize_toml(data))\n    else:\n        raise ValueError(f\"Unsupported format: {format}\")\n",
  "termforge/config/validator.py": "from __future__ import annotations\nimport os\nimport yaml  # type: ignore\nimport json\nfrom typing import Any\nfrom termforge.theme.builtin import BUILTIN_THEMES\nfrom termforge.theme.contrast import check_contrast, ColorValue\nfrom termforge.theme.types import ThemePack\n\nclass LineNumberLoader(yaml.SafeLoader):\n    def construct_mapping(self, node: Any, deep: bool = False) -> Any:\n        mapping = super().construct_mapping(node, deep=deep)\n        mapping[\"__line__\"] = node.start_mark.line + 1\n        return mapping\n\ndef validate_properties(properties: dict[str, Any], spec_type: str, line: int, errors: list[str]) -> None:\n    for prop in (\"width\", \"height\"):\n        if prop in properties:\n            val = properties[prop]\n            if val is not None:\n                if not isinstance(val, int) or val < 0:\n                    errors.append(f\"[Line {line}] Error: Property '{prop}' in '{spec_type}' must be a non-negative integer, got {val}\")\n                    \n    if \"gap\" in properties:\n        val = properties[\"gap\"]\n        if val is not None:\n            if not isinstance(val, int) or val < 0:\n                errors.append(f\"[Line {line}] Error: Property 'gap' in '{spec_type}' must be a non-negative integer, got {val}\")\n                \n    if \"glyphs\" in properties:\n        glyphs = properties[\"glyphs\"]\n        if not isinstance(glyphs, dict):\n            errors.append(f\"[Line {line}] Error: Property 'glyphs' in '{spec_type}' must be a dictionary.\")\n        else:\n            for k, v in glyphs.items():\n                if v is not None:\n                    if not isinstance(v, str) or len(v) != 1:\n                        errors.append(f\"[Line {line}] Error: Custom glyph '{k}' in '{spec_type}' must be exactly a single character, got '{v}'\")\n\ndef validate_component(comp: dict[str, Any], errors: list[str]) -> None:\n    line = comp.get(\"__line__\", 1)\n    if \"spec_type\" not in comp:\n        errors.append(f\"[Line {line}] Error: Missing 'spec_type' in component configuration.\")\n        return\n        \n    spec_type = comp[\"spec_type\"]\n    known_types = {\n        \"text\", \"image\", \"chart\", \"border\", \"window\",\n        \"pane\", \"modal\", \"logo\", \"banner\", \"spinner\", \"transition\"\n    }\n    if spec_type.lower() not in known_types:\n        errors.append(f\"[Line {line}] Error: Unknown component type: '{spec_type}'\")\n        \n    properties = comp.get(\"properties\", {})\n    validate_properties(properties, spec_type, line, errors)\n    \n    children = comp.get(\"children\", [])\n    if isinstance(children, list):\n        for child in children:\n            if isinstance(child, dict):\n                validate_component(child, errors)\n    elif isinstance(children, dict):\n        validate_component(children, errors)\n\ndef validate_theme_contrast(theme_pack: ThemePack, line: int, errors: list[str]) -> None:\n    results = check_contrast(theme_pack)\n    for res in results:\n        if not res[\"passes_aa\"]:\n            errors.append(\n                f\"[Line {line}] Warning: Contrast ratio for '{res['fg_token']}' on '{res['bg_token']}' is {res['ratio']}, \"\n                f\"which fails WCAG AA standards (minimum 4.5).\"\n            )\n\ndef check_circular_references(obj: Any, visited: dict[int, str], path: list[str]) -> list[str]:\n    errors: list[str] = []\n    if not isinstance(obj, (dict, list)):\n        return errors\n        \n    obj_id = id(obj)\n    if obj_id in visited:\n        cycle_start = visited[obj_id]\n        cycle_path = \" -> \".join(path + [cycle_start])\n        return [f\"Error: Circular reference detected in component graph: {cycle_path}\"]\n        \n    if isinstance(obj, dict):\n        spec_type = obj.get(\"spec_type\", \"unknown\")\n        line = obj.get(\"__line__\", \"?\")\n        label = f\"{spec_type} (line {line})\"\n        \n        new_visited = dict(visited)\n        new_visited[obj_id] = label\n        \n        for k, v in obj.items():\n            if k == \"__line__\":\n                continue\n            errors.extend(check_circular_references(v, new_visited, path + [f\"{label}.{k}\"]))\n            \n    elif isinstance(obj, list):\n        for idx, item in enumerate(obj):\n            errors.extend(check_circular_references(item, visited, path + [f\"[{idx}]\"]))\n            \n    return errors\n\ndef check_layout_bounds(comp: dict[str, Any], parent_w: int | None = None, parent_h: int | None = None) -> list[str]:\n    errors: list[str] = []\n    line = comp.get(\"__line__\", 1)\n    spec_type = comp.get(\"spec_type\", \"unknown\")\n    \n    properties = comp.get(\"properties\", {})\n    w = properties.get(\"width\")\n    h = properties.get(\"height\")\n    \n    # 1. Check if individual width/height exceeds parent's size\n    if parent_w is not None and isinstance(w, int) and w > parent_w:\n        errors.append(f\"[Line {line}] Error: Component '{spec_type}' width {w} exceeds parent max width {parent_w}\")\n    if parent_h is not None and isinstance(h, int) and h > parent_h:\n        errors.append(f\"[Line {line}] Error: Component '{spec_type}' height {h} exceeds parent max height {parent_h}\")\n        \n    # 2. Check children sum\n    children = comp.get(\"children\", [])\n    if isinstance(children, dict):\n        children = [children]\n        \n    if isinstance(children, list) and children:\n        direction = properties.get(\"direction\", \"row\")\n        if hasattr(direction, \"value\"):\n            direction = direction.value\n        direction = str(direction).lower()\n        \n        gap = properties.get(\"gap\", 0)\n        if not isinstance(gap, int):\n            gap = 0\n            \n        fixed_children_w = []\n        fixed_children_h = []\n        for child in children:\n            if isinstance(child, dict):\n                child_props = child.get(\"properties\", {})\n                cw = child_props.get(\"width\")\n                ch = child_props.get(\"height\")\n                if isinstance(cw, int):\n                    fixed_children_w.append(cw)\n                if isinstance(ch, int):\n                    fixed_children_h.append(ch)\n                    \n        # Check sum of children along main axis\n        if direction == \"row\":\n            if isinstance(w, int) and fixed_children_w:\n                total_w = sum(fixed_children_w) + gap * (len(children) - 1)\n                if total_w > w:\n                    errors.append(f\"[Line {line}] Error: Sum of children widths ({total_w}) in 'row' exceeds component '{spec_type}' width {w}\")\n            # Check individual heights against parent height\n            if isinstance(h, int):\n                for child in children:\n                    if isinstance(child, dict):\n                        child_props = child.get(\"properties\", {})\n                        ch = child_props.get(\"height\")\n                        if isinstance(ch, int) and ch > h:\n                            child_line = child.get(\"__line__\", line)\n                            child_type = child.get(\"spec_type\", \"unknown\")\n                            errors.append(f\"[Line {child_line}] Error: Component '{child_type}' height {ch} exceeds parent '{spec_type}' height {h}\")\n        elif direction == \"column\" or direction == \"col\":\n            if isinstance(h, int) and fixed_children_h:\n                total_h = sum(fixed_children_h) + gap * (len(children) - 1)\n                if total_h > h:\n                    errors.append(f\"[Line {line}] Error: Sum of children heights ({total_h}) in 'column' exceeds component '{spec_type}' height {h}\")\n            # Check individual widths against parent width\n            if isinstance(w, int):\n                for child in children:\n                    if isinstance(child, dict):\n                        child_props = child.get(\"properties\", {})\n                        cw = child_props.get(\"width\")\n                        if isinstance(cw, int) and cw > w:\n                            child_line = child.get(\"__line__\", line)\n                            child_type = child.get(\"spec_type\", \"unknown\")\n                            errors.append(f\"[Line {child_line}] Error: Component '{child_type}' width {cw} exceeds parent '{spec_type}' width {w}\")\n                            \n        # Recurse\n        for child in children:\n            if isinstance(child, dict):\n                errors.extend(check_layout_bounds(child, w, h))\n                \n    return errors\n\ndef validate_config(data: dict[str, Any], check_cyclic: bool = False, check_bounds: bool = False) -> list[str]:\n    errors: list[str] = []\n    line = data.get(\"__line__\", 1)\n    \n    cyclic_errors = check_circular_references(data, {}, [])\n    if cyclic_errors:\n        # If user explicitly wants cyclic checking, report it; otherwise it is still fatal\n        errors.extend(cyclic_errors)\n        return errors\n        \n    if \"meta\" in data and \"tokens\" in data:\n        try:\n            theme_pack = ThemePack.from_dict(data)\n            validate_theme_contrast(theme_pack, line, errors)\n        except Exception as e:\n            errors.append(f\"[Line {line}] Error: Invalid ThemePack format: {e}\")\n        return errors\n        \n    if \"components\" in data:\n        components = data[\"components\"]\n        if not isinstance(components, list):\n            errors.append(f\"[Line {line}] Error: 'components' must be a list.\")\n        else:\n            for comp in components:\n                if isinstance(comp, dict):\n                    validate_component(comp, errors)\n                    \n    if check_bounds:\n        if \"components\" in data:\n            components = data[\"components\"]\n            if isinstance(components, list):\n                for comp in components:\n                    if isinstance(comp, dict):\n                        errors.extend(check_layout_bounds(comp))\n                        \n    keybindings = data.get(\"keybindings\")\n    if keybindings is not None:\n        if not isinstance(keybindings, list):\n            errors.append(f\"[Line {line}] Error: 'keybindings' must be a list.\")\n        else:\n            for idx, kb in enumerate(keybindings):\n                if not isinstance(kb, dict):\n                    errors.append(f\"[Line {line}] Error: Keybinding entry at index {idx} must be a dictionary.\")\n                else:\n                    kb_line = kb.get(\"__line__\", line)\n                    if \"key\" not in kb:\n                        errors.append(f\"[Line {kb_line}] Error: Keybinding entry is missing 'key' property.\")\n                    elif not isinstance(kb[\"key\"], str) or not kb[\"key\"].strip():\n                        errors.append(f\"[Line {kb_line}] Error: Keybinding 'key' property must be a non-empty string.\")\n                        \n                    if \"action\" not in kb:\n                        errors.append(f\"[Line {kb_line}] Error: Keybinding entry is missing 'action' property.\")\n                    elif not isinstance(kb[\"action\"], str) or not kb[\"action\"].strip():\n                        errors.append(f\"[Line {kb_line}] Error: Keybinding 'action' property must be a non-empty string.\")\n                    \n    theme_name = data.get(\"theme\")\n    if theme_name:\n        if theme_name in BUILTIN_THEMES:\n            validate_theme_contrast(BUILTIN_THEMES[theme_name], line, errors)\n        else:\n            if os.path.exists(theme_name):\n                try:\n                    with open(theme_name, \"r\", encoding=\"utf-8\") as f:\n                        theme_data = yaml.load(f, Loader=LineNumberLoader)\n                    theme_pack = ThemePack.from_dict(theme_data)\n                    validate_theme_contrast(theme_pack, line, errors)\n                except Exception as e:\n                    errors.append(f\"[Line {line}] Error: Referenced theme file '{theme_name}' is invalid: {e}\")\n            else:\n                errors.append(f\"[Line {line}] Error: Referenced theme '{theme_name}' is not a built-in theme or a valid file.\")\n                \n    return errors\n",
  "termforge/config/input.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\n\n@dataclass\nclass InputBindingSpec:\n    \"\"\"Spec mapping a keypress to an action name.\"\"\"\n    key: str\n    action: str\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\"key\": self.key, \"action\": self.action}\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> InputBindingSpec:\n        return cls(key=d[\"key\"], action=d[\"action\"])\n\n@dataclass\nclass InputRouter:\n    \"\"\"Utility to route keyboard input to registered action handlers.\"\"\"\n    bindings: list[InputBindingSpec] = field(default_factory=list)\n    buffer: list[str] = field(default_factory=list, init=False)\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\"bindings\": [b.to_dict() for b in self.bindings]}\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> InputRouter:\n        return cls(bindings=[InputBindingSpec.from_dict(b) for b in d.get(\"bindings\", [])])\n\n    def reset(self) -> None:\n        \"\"\"Clears the keypress sequence buffer.\"\"\"\n        self.buffer.clear()\n\n    def route(self, keypress: str) -> str | None:\n        \"\"\"Matches a keypress string to a binding action, supporting multi-key chords.\"\"\"\n        kp = keypress.strip().lower()\n        self.buffer.append(kp)\n        \n        # Format current buffer sequence\n        current_seq = \" \".join(self.buffer)\n        \n        # 1. Check for exact match\n        exact_match = None\n        for b in self.bindings:\n            b_key = \" \".join(part.strip().lower() for part in b.key.split())\n            if b_key == current_seq:\n                exact_match = b.action\n                break\n                \n        # 2. Check if current sequence is a prefix of any binding\n        is_prefix = False\n        for b in self.bindings:\n            b_key = \" \".join(part.strip().lower() for part in b.key.split())\n            if b_key.startswith(current_seq + \" \") or (b_key.startswith(current_seq) and len(b_key.split()) > len(self.buffer)):\n                is_prefix = True\n                break\n                \n        if exact_match:\n            if is_prefix:\n                return None\n            else:\n                self.buffer.clear()\n                return exact_match\n                \n        if is_prefix:\n            return None\n            \n        # 4. If no match and not a prefix, try to fallback to the last key pressed\n        if len(self.buffer) > 1:\n            self.buffer = [kp]\n            current_seq = kp\n            exact_match = None\n            for b in self.bindings:\n                b_key = \" \".join(part.strip().lower() for part in b.key.split())\n                if b_key == current_seq:\n                    exact_match = b.action\n                    break\n            is_prefix = False\n            for b in self.bindings:\n                b_key = \" \".join(part.strip().lower() for part in b.key.split())\n                if b_key.startswith(current_seq + \" \") or (b_key.startswith(current_seq) and len(b_key.split()) > 1):\n                    is_prefix = True\n                    break\n            if exact_match:\n                if is_prefix:\n                    return None\n                else:\n                    self.buffer.clear()\n                    return exact_match\n            if is_prefix:\n                return None\n                \n        self.buffer.clear()\n        return None\n",
  "termforge/config/__init__.py": "\"\"\"TermForge config module \u2014 declarative YAML/TOML/JSON specs loader.\"\"\"\nfrom termforge.config.types import ComponentConfig, LayoutConfig\nfrom termforge.config.loader import load_config_yaml, load_config_json, load_config_toml, config_to_specs, save_config_to_file\nfrom termforge.config.validator import validate_config, LineNumberLoader\nfrom termforge.config.input import InputBindingSpec, InputRouter\nfrom termforge.config.schema import generate_json_schema\nfrom termforge.config.formatter import format_config_file\nfrom termforge.config.converter import convert_config_file\nfrom termforge.config.presets import get_preset, list_presets\nfrom termforge.config.form import FieldType, FormFieldSpec, FormSpec\nfrom termforge.keyvalue.types import KeyValueItemSpec, KeyValueGridSpec\nfrom termforge.keylegend.types import KeyLegendSpec\n\n\n__all__ = [\n    \"ComponentConfig\",\n    \"LayoutConfig\",\n    \"load_config_yaml\",\n    \"load_config_json\",\n    \"load_config_toml\",\n    \"config_to_specs\",\n    \"save_config_to_file\",\n    \"validate_config\",\n    \"LineNumberLoader\",\n    \"InputBindingSpec\",\n    \"InputRouter\",\n    \"generate_json_schema\",\n    \"format_config_file\",\n    \"convert_config_file\",\n    \"get_preset\",\n    \"list_presets\",\n    \"FieldType\",\n    \"FormFieldSpec\",\n    \"FormSpec\",\n    \"KeyValueItemSpec\",\n    \"KeyValueGridSpec\",\n    \"KeyLegendSpec\",\n]\n\n",
  "termforge/config/schema.py": "from __future__ import annotations\nfrom typing import Any\n\ndef generate_json_schema() -> dict[str, Any]:\n    \"\"\"Generate Draft-07 JSON Schema for TermForge declarative layout configurations.\"\"\"\n    schema = {\n        \"$schema\": \"http://json-schema.org/draft-07/schema#\",\n        \"title\": \"TermForgeLayoutConfig\",\n        \"type\": \"object\",\n        \"properties\": {\n            \"theme\": {\"type\": [\"string\", \"null\"]},\n            \"title\": {\"type\": [\"string\", \"null\"]},\n            \"keybindings\": {\n                \"type\": \"array\",\n                \"items\": {\n                    \"type\": \"object\",\n                    \"properties\": {\n                        \"key\": {\"type\": \"string\"},\n                        \"action\": {\"type\": \"string\"}\n                    },\n                    \"required\": [\"key\", \"action\"]\n                }\n            },\n            \"components\": {\n                \"type\": \"array\",\n                \"items\": {\"$ref\": \"#/definitions/ComponentConfig\"}\n            }\n        },\n        \"required\": [\"components\"],\n        \"definitions\": {\n            \"ComponentConfig\": {\n                \"type\": \"object\",\n                \"properties\": {\n                    \"spec_type\": {\n                        \"type\": \"string\",\n                        \"enum\": [\n                            \"text\", \"image\", \"chart\", \"border\", \"window\",\n                            \"pane\", \"modal\", \"logo\", \"banner\", \"spinner\", \"transition\"\n                        ]\n                    },\n                    \"properties\": {\n                        \"type\": \"object\",\n                        \"properties\": {\n                            \"text\": {\"type\": \"string\"},\n                            \"align\": {\"type\": \"string\", \"enum\": [\"left\", \"center\", \"right\"]},\n                            \"width\": {\"type\": \"integer\", \"minimum\": 0},\n                            \"height\": {\"type\": \"integer\", \"minimum\": 0},\n                            \"image_path\": {\"type\": \"string\"},\n                            \"fidelity\": {\"type\": \"string\", \"enum\": [\"half_block\", \"ascii\"]},\n                            \"title\": {\"type\": \"string\"},\n                            \"border_style\": {\"type\": \"string\", \"enum\": [\"single\", \"double\", \"rounded\", \"heavy\", \"ascii\"]},\n                            \"shadow\": {\"type\": \"boolean\"},\n                            \"status_tags\": {\n                                \"type\": \"array\",\n                                \"items\": {\"type\": \"string\"}\n                            },\n                            \"direction\": {\"type\": \"string\", \"enum\": [\"row\", \"column\"]},\n                            \"gap\": {\"type\": \"integer\", \"minimum\": 0},\n                            \"ratios\": {\n                                \"type\": \"array\",\n                                \"items\": {\"type\": \"number\"}\n                            },\n                            \"margin\": {\"$ref\": \"#/definitions/Spacing\"},\n                            \"padding\": {\"$ref\": \"#/definitions/Spacing\"},\n                            \"flex_grow\": {\"type\": \"number\", \"minimum\": 0.0},\n                            \"flex_shrink\": {\"type\": \"number\", \"minimum\": 0.0}\n                        }\n                    },\n                    \"children\": {\n                        \"type\": \"array\",\n                        \"items\": {\"$ref\": \"#/definitions/ComponentConfig\"}\n                    }\n                },\n                \"required\": [\"spec_type\"]\n            },\n            \"Spacing\": {\n                \"type\": \"object\",\n                \"properties\": {\n                    \"top\": {\"type\": \"integer\", \"minimum\": 0},\n                    \"bottom\": {\"type\": \"integer\", \"minimum\": 0},\n                    \"left\": {\"type\": \"integer\", \"minimum\": 0},\n                    \"right\": {\"type\": \"integer\", \"minimum\": 0}\n                }\n            }\n        }\n    }\n    return schema\n",

};

        function initTerminal() {
            try {
                if (typeof Terminal === 'undefined') {
                    throw new Error("Terminal class not loaded");
                }
                term = new Terminal({
                    fontFamily: '"Fira Code", monospace',
                    fontSize: 14,
                    lineHeight: 1.25,
                    cols: 80,
                    rows: 24,
                    theme: xtermThemes.catppuccin,
                    cursorBlink: true,
                    cursorStyle: 'block'
                });
                
                term.open(document.getElementById('terminal-screen-preview'));
                
                term.writeln("\x1b[1;36mWelcome to TermForge Storybook Gallery!\x1b[0m");
                term.writeln("Select a story on the left to instantly preview pre-rendered terminal outputs.");
                term.writeln("Click \x1b[33mBoot Interactive REPL\x1b[0m to run actual TermForge python code live in your browser!");
                term.writeln("");
                prompt();
                
                term.onData(data => {
                    if (!interactive) {
                        term.write(data);
                        term.writeln("\r\n\x1b[33m[Hint] Click 'Boot Interactive REPL' at the top right to start a live Python shell!\x1b[0m");
                        prompt();
                        return;
                    }
                    
                    if (pyodideLoading) {
                        return;
                    }
                    
                    const code = data.charCodeAt(0);
                    if (data === "\r") { // Enter
                        term.write("\r\n");
                        handleCommand(currentInput);
                        currentInput = "";
                    } else if (code === 127) { // Backspace
                        if (currentInput.length > 0) {
                            currentInput = currentInput.slice(0, -1);
                            term.write("\b \b");
                        }
                    } else if (data === "\x1b[A") { // Up arrow
                        if (history.length > 0) {
                            if (historyIndex === -1) historyIndex = history.length;
                            if (historyIndex > 0) {
                                historyIndex--;
                                for (let i = 0; i < currentInput.length; i++) term.write("\b \b");
                                currentInput = history[historyIndex];
                                term.write(currentInput);
                            }
                        }
                    } else if (data === "\x1b[B") { // Down arrow
                        if (historyIndex !== -1) {
                            if (historyIndex < history.length - 1) {
                                historyIndex++;
                                for (let i = 0; i < currentInput.length; i++) term.write("\b \b");
                                currentInput = history[historyIndex];
                                term.write(currentInput);
                            } else {
                                historyIndex = -1;
                                for (let i = 0; i < currentInput.length; i++) term.write("\b \b");
                                currentInput = "";
                            }
                        }
                    } else if (data === "\x03") { // Ctrl+C
                        term.write("^C\r\n");
                        currentInput = "";
                        prompt();
                    } else {
                        if (code >= 32) {
                            currentInput += data;
                            term.write(data);
                        }
                    }
                });
            } catch (e) {
                console.warn("xterm.js load failed, falling back to static pre element:", e);
                hasXterm = false;
                const previewDiv = document.getElementById('terminal-screen-preview');
                previewDiv.innerHTML = `<pre id="fallback-term-screen" style="font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.25; color: var(--text-color); background: rgba(0,0,0,0.4); padding: 20px; border-radius: 8px; overflow: auto; min-height: 420px; white-space: pre;"></pre>`;
                
                // Hide interactive button
                const btn = document.getElementById("btn-interactive");
                if (btn) btn.style.display = "none";
                
                writeTerm("Welcome to TermForge Documentation Gallery!\nSelect any story on the left to render its output.\n\n");
            }
        }

        function writeTerm(text) {
            if (hasXterm && term) {
                term.write(text);
            } else {
                const screen = document.getElementById("fallback-term-screen");
                if (screen) {
                    // Strip ANSI codes for clean fallback viewing
                    const cleanText = text.replace(/[\u001b\u009b][[()#;?]*(?:[0-9]{1,4}(?:;[0-9]{0,4})*)?[0-9A-ORZcf-nqry=><]/g, '');
                    screen.textContent += cleanText;
                    screen.scrollTop = screen.scrollHeight;
                }
            }
        }

        function clearTerm() {
            if (hasXterm && term) {
                term.clear();
                term.write("\x1b[H");
            } else {
                const screen = document.getElementById("fallback-term-screen");
                if (screen) {
                    screen.textContent = "";
                }
            }
        }

        function prompt() {
            if (!interactive) return;
            if (inRepl) {
                writeTerm("\x1b[32m>>> \x1b[0m");
            } else {
                writeTerm("\x1b[1;34mdox@termforge\x1b[0m:\x1b[1;32m~\x1b[0m$ ");
            }
        }

        async function ensurePyodide() {
            if (pyodide) return pyodide;
            if (pyodideLoading) return null;
            pyodideLoading = true;
            
            writeTerm("\r\n\x1b[33mBooting Python WebAssembly (Pyodide) from CDN...\x1b[0m\r\n");
            
            try {
                pyodide = await loadPyodide({
                    stdout: (text) => {
                        writeTerm(text + "\r\n");
                    },
                    stderr: (text) => {
                        writeTerm("\x1b[31m" + text + "\x1b[0m\r\n");
                    }
                });
                
                writeTerm("\x1b[32mPython WebAssembly loaded. Bootstrapping dependencies...\x1b[0m\r\n");
                await pyodide.loadPackage("micropip");
                
                writeTerm("\x1b[32mInstalling rich and pyyaml...\x1b[0m\r\n");
                await pyodide.runPythonAsync(`
                    import micropip
                    await micropip.install(['rich', 'pyyaml'])
                `);
                
                writeTerm("\x1b[32mLoading Pillow...\x1b[0m\r\n");
                await pyodide.loadPackage("pillow");
                
                writeTerm("\x1b[32mWriting TermForge source files to virtual environment...\x1b[0m\r\n");
                for (const [path, content] of Object.entries(termforgeSources)) {
                    const parts = path.split('/');
                    let current = "";
                    for (let i = 0; i < parts.length - 1; i++) {
                        current += (current ? "/" : "") + parts[i];
                        try { pyodide.FS.mkdir(current); } catch(e) {}
                    }
                    pyodide.FS.writeFile(path, content);
                }
                
                writeTerm("\x1b[1;32mInitialization complete! Python environment is ready.\x1b[0m\r\n\r\n");
                pyodideLoading = false;
                return pyodide;
            } catch (e) {
                writeTerm("\x1b[31mError loading environment: " + e.message + "\x1b[0m\r\n");
                pyodideLoading = false;
                pyodide = null;
                return null;
            }
        }

        async function runCLICommand(commandModule, commandFunc) {
            writeTerm(`Executing live command: ${commandModule}.${commandFunc}()...\r\n`);
            try {
                await pyodide.runPythonAsync(`
                    import sys
                    sys.argv = ["termforge"]
                    from ${commandModule} import ${commandFunc}
                    try:
                        ${commandFunc}()
                    except SystemExit:
                        pass
                `);
            } catch(e) {
                writeTerm("\x1b[31m" + e.message + "\x1b[0m\r\n");
            }
        }

        async function handleCommand(line) {
            const cmd = line.trim();
            if (inRepl) {
                if (cmd === "exit()" || cmd === "quit()" || cmd === "exit" || cmd === "quit") {
                    inRepl = false;
                    writeTerm("Exiting Python REPL. Back to shell.\r\n");
                    prompt();
                    return;
                }
                if (cmd) {
                    history.push(line);
                    historyIndex = -1;
                    try {
                        await pyodide.runPythonAsync(line);
                    } catch(e) {
                        writeTerm("\x1b[31m" + e.message + "\x1b[0m\r\n");
                    }
                }
                prompt();
                return;
            }
            
            if (!cmd) {
                prompt();
                return;
            }
            
            history.push(line);
            historyIndex = -1;
            
            const parts = cmd.split(" ");
            const mainCmd = parts[0];
            
            if (mainCmd === "help") {
                writeTerm("Available shell commands:\r\n");
                writeTerm("  \x1b[33mtermforge-demo\x1b[0m        Run the flagship TUI dashboard demo\r\n");
                writeTerm("  \x1b[33mtermforge-layout\x1b[0m      Run layout visualizer simulation\r\n");
                writeTerm("  \x1b[33mtermforge-benchmark\x1b[0m   Run rendering performance benchmarker\r\n");
                writeTerm("  \x1b[33mtermforge-validate\x1b[0m    Validate a declarative layout configuration\r\n");
                writeTerm("  \x1b[33mtermforge-inspect\x1b[0m     Inspect layout geometry tree hierarchy\r\n");
                writeTerm("  \x1b[33mpython3\x1b[0m               Launch interactive python playground REPL\r\n");
                writeTerm("  \x1b[33mclear\x1b[0m                 Clear terminal screen\r\n");
                writeTerm("  \x1b[33mexit\x1b[0m                  Exit interactive mode\r\n");
            } else if (mainCmd === "clear") {
                clearTerm();
            } else if (mainCmd === "exit") {
                toggleInteractive();
                return;
            } else if (mainCmd === "python3" || mainCmd === "termforge-play") {
                inRepl = true;
                writeTerm("TermForge Python 3.12 WebAssembly REPL\r\n");
                writeTerm("Type exit() to return to shell.\r\n");
            } else if (mainCmd === "termforge-demo") {
                await runCLICommand("termforge.cli.demo", "main");
            } else if (mainCmd === "termforge-layout") {
                await runCLICommand("termforge.cli.layout", "main");
            } else if (mainCmd === "termforge-benchmark") {
                await runCLICommand("termforge.cli.benchmark", "main");
            } else if (mainCmd === "termforge-validate") {
                await runCLICommand("termforge.cli.validate", "main");
            } else if (mainCmd === "termforge-inspect") {
                await runCLICommand("termforge.cli.inspect", "main");
            } else {
                writeTerm(`bash: ${mainCmd}: command not found. Type 'help' for options.\r\n`);
            }
            prompt();
        }

        async function toggleInteractive() {
            const btn = document.getElementById("btn-interactive");
            if (interactive) {
                interactive = false;
                inRepl = false;
                btn.textContent = "Boot Interactive REPL";
                // Restore currently selected story golden
                if (currentMod && currentComp) {
                    selectStory(currentMod, currentComp);
                } else {
                    clearTerm();
                    writeTerm("Select a story on the left to render.\r\n");
                }
            } else {
                interactive = true;
                btn.textContent = "Exit Interactive Mode";
                clearTerm();
                writeTerm("\x1b[1;36mTermForge Interactive WebAssembly Shell\x1b[0m\r\n");
                prompt();
                
                const loaded = await ensurePyodide();
                if (loaded) {
                    prompt();
                }
            }
        }

        function populateMenu() {
            const scroller = document.getElementById("sidebar-scroller");
            scroller.innerHTML = "";
            
            let firstKey = null;
            
            for (const mod in storiesData) {
                const groupDiv = document.createElement("div");
                groupDiv.className = "module-group";
                
                const header = document.createElement("button");
                header.className = "module-header";
                header.id = "header-" + mod;
                header.onclick = () => toggleModule(mod);
                
                const titleSpan = document.createElement("span");
                titleSpan.textContent = mod;
                
                const chevronSpan = document.createElement("span");
                chevronSpan.className = "chevron";
                chevronSpan.textContent = "▼";
                
                header.appendChild(titleSpan);
                header.appendChild(chevronSpan);
                
                const list = document.createElement("ul");
                list.className = "menu-list";
                list.id = "group-" + mod;
                
                for (const comp in storiesData[mod]) {
                    const key = mod + "/" + comp;
                    if (!firstKey) firstKey = key;
                    
                    const li = document.createElement("li");
                    li.className = "menu-item";
                    li.id = "item-" + mod + "-" + comp;
                    
                    const btn = document.createElement("button");
                    btn.textContent = comp;
                    btn.onclick = () => selectStory(mod, comp);
                    
                    li.appendChild(btn);
                    list.appendChild(li);
                }
                
                groupDiv.appendChild(header);
                groupDiv.appendChild(list);
                scroller.appendChild(groupDiv);
            }
            
            if (firstKey) {
                const [mod, comp] = firstKey.split("/");
                toggleModule(mod);
                selectStory(mod, comp);
            }
        }
        
        function toggleModule(mod) {
            const header = document.getElementById("header-" + mod);
            const list = document.getElementById("group-" + mod);
            
            const isShown = list.classList.contains("show");
            if (isShown) {
                list.classList.remove("show");
                list.style.display = "none";
                header.classList.remove("expanded");
            } else {
                list.classList.add("show");
                list.style.display = "flex";
                header.classList.add("expanded");
            }
        }

        async function selectStory(mod, comp) {
            currentMod = mod;
            currentComp = comp;
            
            // If in interactive mode, exit interactive mode first
            if (interactive) {
                interactive = false;
                inRepl = false;
                const btn = document.getElementById("btn-interactive");
                if (btn) btn.textContent = "Boot Interactive REPL";
            }
            
            document.querySelectorAll(".menu-item").forEach(el => el.classList.remove("active"));
            
            const item = document.getElementById("item-" + mod + "-" + comp);
            if (item) {
                item.classList.add("active");
                const list = document.getElementById("group-" + mod);
                if (list && !list.classList.contains("show")) {
                    toggleModule(mod);
                }
            }
            
            document.getElementById("active-title").textContent = mod.toUpperCase() + " : " + comp.toUpperCase();
            document.getElementById("term-filename").textContent = comp + ".py";
            
            const data = storiesData[mod][comp];
            
            clearTerm();
            writeTerm(`\x1b[1;34mdox@termforge\x1b[0m:\x1b[1;32m~\x1b[0m$ python3 stories/${mod}/${comp}.py\r\n`);
            writeTerm(data.raw_ansi.replace(/\n/g, "\r\n"));
            writeTerm("\r\n");
            
            document.getElementById("terminal-screen-code").innerText = data.code;
        }
        
        function showTab(tab) {
            currentTab = tab;
            document.getElementById("tab-preview").classList.remove("active");
            document.getElementById("tab-code").classList.remove("active");
            
            const actions = document.getElementById("code-actions");
            if (tab === 'preview') {
                document.getElementById("tab-preview").classList.add("active");
                document.getElementById("terminal-screen-preview").style.display = "block";
                document.getElementById("terminal-screen-code").style.display = "none";
                if (actions) actions.style.display = "none";
            } else {
                document.getElementById("tab-code").classList.add("active");
                document.getElementById("terminal-screen-preview").style.display = "none";
                document.getElementById("terminal-screen-code").style.display = "block";
                if (actions) actions.style.display = "flex";
            }
        }

        function resetCode() {
            if (currentMod && currentComp && storiesData[currentMod] && storiesData[currentMod][currentComp]) {
                const originalCode = storiesData[currentMod][currentComp].code;
                document.getElementById("terminal-screen-code").innerText = originalCode;
            }
        }

        async function runCodeLive() {
            const code = document.getElementById("terminal-screen-code").innerText;
            
            showTab('preview');
            
            if (!interactive) {
                await toggleInteractive();
            }
            
            writeTerm(`\r\n\x1b[32m>>> Executing modified code live... \x1b[0m\r\n`);
            
            try {
                await pyodide.runPythonAsync(code);
            } catch (e) {
                writeTerm(`\x1b[31mError during execution: ${e.message}\x1b[0m\r\n`);
            }
            prompt();
        }
        
        function changeThemeSkin(theme) {
            document.body.className = "theme-" + theme;
            if (term && xtermThemes[theme]) {
                term.options.theme = xtermThemes[theme];
            }
        }
        
        window.onload = () => {
            initTerminal();
            populateMenu();
        };
