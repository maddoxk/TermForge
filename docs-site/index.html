  "termforge/text/render.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth, StyleSpec, ColorValue\nfrom termforge.core.color import resolve_color, ANSI_16_COLORS, _PALETTE_256\nfrom termforge.core.theme import ThemeTokens, resolve_token\nfrom termforge.text.types import TextSpec, TextRun, TextAlign, TextOverflow, TextSpan\nfrom termforge.text.markup import parse_markup\nfrom termforge.text.wrap import wrap_run, measure_text, get_string_width\n\ndef style_to_ansi(style: StyleSpec | None, theme: ThemeTokens | None, depth: ColorDepth) -> tuple[str, str]:\n    if not style or depth == ColorDepth.MONOCHROME:\n        return \"\", \"\"\n        \n    start_codes = []\n    end_codes = []\n    \n    # Resolve color tokens\n    fg = style.fg\n    bg = style.bg\n    \n    if theme:\n        if fg and fg.name and fg.name.startswith(\"colors.\"):\n            resolved = resolve_token(theme, fg.name)\n            if isinstance(resolved, ColorValue):\n                fg = resolved\n                \n        if bg and bg.name and bg.name.startswith(\"colors.\"):\n            resolved = resolve_token(theme, bg.name)\n            if isinstance(resolved, ColorValue):\n                bg = resolved\n\n    # FG resolution\n    if fg:\n        rgb = resolve_color(fg, depth)\n        if rgb:\n            if depth == ColorDepth.TRUECOLOR:\n                start_codes.append(f\"\\033[38;2;{rgb[0]};{rgb[1]};{rgb[2]}m\")\n            elif depth == ColorDepth.COLOR_256:\n                try:\n                    idx = _PALETTE_256.index(rgb)\n                    start_codes.append(f\"\\033[38;5;{idx}m\")\n                except ValueError:\n                    start_codes.append(f\"\\033[38;2;{rgb[0]};{rgb[1]};{rgb[2]}m\")\n            elif depth == ColorDepth.COLOR_16:\n                try:\n                    idx = ANSI_16_COLORS.index(rgb)\n                    if idx < 8:\n                        start_codes.append(f\"\\033[{30 + idx}m\")\n                    else:\n                        start_codes.append(f\"\\033[{90 + (idx - 8)}m\")\n                except ValueError:\n                    pass\n\n    # BG resolution\n    if bg:\n        rgb = resolve_color(bg, depth)\n        if rgb:\n            if depth == ColorDepth.TRUECOLOR:\n                start_codes.append(f\"\\033[48;2;{rgb[0]};{rgb[1]};{rgb[2]}m\")\n            elif depth == ColorDepth.COLOR_256:\n                try:\n                    idx = _PALETTE_256.index(rgb)\n                    start_codes.append(f\"\\033[48;5;{idx}m\")\n                except ValueError:\n                    start_codes.append(f\"\\033[48;2;{rgb[0]};{rgb[1]};{rgb[2]}m\")\n            elif depth == ColorDepth.COLOR_16:\n                try:\n                    idx = ANSI_16_COLORS.index(rgb)\n                    if idx < 8:\n                        start_codes.append(f\"\\033[{40 + idx}m\")\n                    else:\n                        start_codes.append(f\"\\033[{100 + (idx - 8)}m\")\n                except ValueError:\n                    pass\n\n    # Attributes\n    if style.bold:\n        start_codes.append(\"\\033[1m\")\n        end_codes.append(\"\\033[22m\")\n    if style.dim:\n        start_codes.append(\"\\033[2m\")\n        end_codes.append(\"\\033[22m\")\n    if style.italic:\n        start_codes.append(\"\\033[3m\")\n        end_codes.append(\"\\033[23m\")\n    if style.underline:\n        start_codes.append(\"\\033[4m\")\n        end_codes.append(\"\\033[24m\")\n    if style.strikethrough:\n        start_codes.append(\"\\033[9m\")\n        end_codes.append(\"\\033[29m\")\n        \n    if start_codes:\n        end_codes.append(\"\\033[0m\")\n        \n    return \"\".join(start_codes), \"\".join(reversed(end_codes))\n\n\ndef apply_overflow_cascade(spec: \"TextSpec\", override: TextOverflow | None) -> \"TextSpec\":\n    \"\"\"Return a new TextSpec with overflow replaced by `override` (if provided).\n    \n    This is the pure function that implements the cascading overflow model:\n    a container (WindowSpec/PaneSpec) passes its text_overflow down, and\n    this function applies it to any child TextSpec before rendering.\n    \n    Args:\n        spec: The original TextSpec.\n        override: Container-level TextOverflow to apply. None = no change.\n    \n    Returns:\n        A new TextSpec with overflow = override, or the original spec unchanged.\n    \"\"\"\n    if override is None:\n        return spec\n    from dataclasses import replace\n    return replace(spec, overflow=override)\n\n\ndef render_text(\n    spec: \"TextSpec\",\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth = ColorDepth.TRUECOLOR,\n    available_width: int | None = None,\n    frame_number: int = 0,\n    override_overflow: TextOverflow | None = None\n) -> list[str]:\n    # Apply container-level overflow cascade if provided\n    if override_overflow is not None:\n        spec = apply_overflow_cascade(spec, override_overflow)\n\n    # 1. Parse content to TextRun\n    if isinstance(spec.content, str):\n        run = parse_markup(spec.content)\n    else:\n        run = spec.content\n        \n    # 2. Determine target width\n    width = spec.max_width\n    if width is None:\n        width = available_width\n    if width is None:\n        # Default fallback if width is completely unspecified\n        width = 80\n        \n    # 3. Handle word wrapping / truncation\n    lines: list[TextRun] = []\n    if spec.overflow == TextOverflow.WRAP:\n        lines = wrap_run(run, width)\n    elif spec.overflow == TextOverflow.MARQUEE:\n        plain = \"\".join(span.text for span in run.spans)\n        if len(plain) <= width:\n            lines = [run]\n        else:\n            marquee_chars = []\n            for span in run.spans:\n                for c in span.text:\n                    marquee_chars.append((c, span.style))\n            \n            last_style = run.spans[-1].style if run.spans else None\n            for _ in range(3):\n                marquee_chars.append((\" \", last_style))\n                \n            cycle_len = len(marquee_chars)\n            repeated_chars = marquee_chars * 3\n            start_idx = frame_number % cycle_len\n            sliced_chars = repeated_chars[start_idx : start_idx + width]\n            \n            spans = []\n            current_span_text = \"\"\n            current_span_style = None\n            for c, style in sliced_chars:\n                if style == current_span_style:\n                    current_span_text += c\n                else:\n                    if current_span_text:\n                        spans.append(TextSpan(text=current_span_text, style=current_span_style))\n                    current_span_text = c\n                    current_span_style = style\n            if current_span_text:\n                spans.append(TextSpan(text=current_span_text, style=current_span_style))\n                \n            lines = [TextRun(spans=spans)]\n    elif spec.overflow == TextOverflow.ELLIPSIS or spec.overflow == TextOverflow.CLIP or spec.overflow == TextOverflow.TRUNCATE:\n        # Truncate content to width\n        from termforge.text.wrap import truncate_text\n        # We can convert run to plain text, truncate, and then reconstruct a simple TextRun\n        plain = \"\".join(span.text for span in run.spans)\n        suffix = \"\u2026\" if spec.overflow == TextOverflow.ELLIPSIS else \"\"\n        truncated = truncate_text(plain, width, suffix)\n        \n        # Build a single TextRun with the truncated content and the original styles\n        # Let's map truncated chars to original styles\n        chars: list[tuple[str, StyleSpec | None]] = []\n        for span in run.spans:\n            for c in span.text:\n                chars.append((c, span.style))\n\n        # Determine how many plain-text chars were kept (before suffix)\n        # truncate_text may add suffix so the plain prefix length = len(truncated) - len(suffix)\n        plain_prefix_len = len(truncated) - len(suffix)\n        truncated_chars = chars[:plain_prefix_len]\n        # Append each suffix char with the style of the last original char\n        if suffix:\n            last_style = chars[-1][1] if chars else None\n            for s_char in suffix:\n                truncated_chars.append((s_char, last_style))\n\n        # Reconstruct TextRun\n        spans = []\n        current_span_text = \"\"\n        current_span_style = None\n        for c, style in truncated_chars:\n            if style == current_span_style:\n                current_span_text += c\n            else:\n                if current_span_text:\n                    spans.append(TextSpan(text=current_span_text, style=current_span_style))\n                current_span_text = c\n                current_span_style = style\n        if current_span_text:\n            spans.append(TextSpan(text=current_span_text, style=current_span_style))\n\n        lines = [TextRun(spans=spans)]\n        \n    # 4. Handle max_lines limit\n    if spec.max_lines is not None:\n        lines = lines[:spec.max_lines]\n        \n    # 5. Format each line (alignment & ANSI codes)\n    rendered_lines = []\n    for line in lines:\n        line_w = measure_text(line)\n        # Compute padding\n        pad_left = 0\n        pad_right = 0\n        if line_w < width:\n            if spec.align == TextAlign.CENTER:\n                total_pad = width - line_w\n                pad_left = total_pad // 2\n                pad_right = total_pad - pad_left\n            elif spec.align == TextAlign.RIGHT:\n                pad_left = width - line_w\n                \n        # Render spans\n        line_ansi = \" \" * pad_left\n        for span in line.spans:\n            if not span.text:\n                continue\n            start_ansi, end_ansi = style_to_ansi(span.style, theme, depth)\n            line_ansi += f\"{start_ansi}{span.text}{end_ansi}\"\n        line_ansi += \" \" * pad_right\n        rendered_lines.append(line_ansi)\n        \n    return rendered_lines\n",
  "termforge/charts/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom enum import Enum\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec\n\nclass ChartType(str, Enum):\n    LINE = \"line\"\n    BAR = \"bar\"\n    SCATTER = \"scatter\"\n    HISTOGRAM = \"histogram\"\n    STACKED_BAR = \"stacked_bar\"\n    MULTI_BAR = \"multi_bar\"\n    HEATMAP = \"heatmap\"\n    SPARKLINE = \"sparkline\"\n    CANDLESTICK = \"candlestick\"\n\n@dataclass\nclass Axis:\n    label: str | None = None\n    min_val: float | None = None\n    max_val: float | None = None\n    tick_count: int = 5\n    format_str: str = \"{:.1f}\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"label\": self.label,\n            \"min_val\": self.min_val,\n            \"max_val\": self.max_val,\n            \"tick_count\": self.tick_count,\n            \"format_str\": self.format_str\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> Axis:\n        return cls(\n            label=d.get(\"label\"),\n            min_val=d.get(\"min_val\"),\n            max_val=d.get(\"max_val\"),\n            tick_count=d.get(\"tick_count\", 5),\n            format_str=d.get(\"format_str\", \"{:.1f}\")\n        )\n\n@dataclass\nclass Series:\n    name: str = \"series\"\n    data: list[float] = field(default_factory=list)\n    color_token: str = \"primary\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"name\": self.name,\n            \"data\": self.data,\n            \"color_token\": self.color_token\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> Series:\n        return cls(\n            name=d.get(\"name\", \"series\"),\n            data=d.get(\"data\", []),\n            color_token=d.get(\"color_token\", \"primary\")\n        )\n\n@dataclass\nclass OHLCSeries:\n    name: str = \"ohlc\"\n    # data is a list of dicts: {\"open\": float, \"high\": float, \"low\": float, \"close\": float, \"volume\": float}\n    data: list[dict[str, float]] = field(default_factory=list)\n    timestamps: list[str] | None = None\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"name\": self.name,\n            \"data\": self.data,\n            \"timestamps\": self.timestamps\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> OHLCSeries:\n        return cls(\n            name=d.get(\"name\", \"ohlc\"),\n            data=d.get(\"data\", []),\n            timestamps=d.get(\"timestamps\")\n        )\n\n@dataclass\nclass ChartSpec(RenderableSpec):\n    chart_type: ChartType = ChartType.LINE\n    series: list[Series] = field(default_factory=list)\n    ohlc_series: OHLCSeries | None = None\n    x_axis: Axis = field(default_factory=Axis)\n    y_axis: Axis = field(default_factory=Axis)\n    width: int = 80\n    height: int = 24\n    title: str | None = None\n    show_legend: bool = True\n    braille: bool = False\n    color_config: dict[str, Any] | None = None\n    highlight_max: bool = False\n    highlight_min: bool = False\n    spec_type: str = \"chart\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"chart_type\": self.chart_type.value,\n            \"series\": [s.to_dict() for s in self.series],\n            \"ohlc_series\": self.ohlc_series.to_dict() if self.ohlc_series else None,\n            \"x_axis\": self.x_axis.to_dict(),\n            \"y_axis\": self.y_axis.to_dict(),\n            \"width\": self.width,\n            \"height\": self.height,\n            \"title\": self.title,\n            \"show_legend\": self.show_legend,\n            \"braille\": self.braille,\n            \"color_config\": self.color_config,\n            \"highlight_max\": self.highlight_max,\n            \"highlight_min\": self.highlight_min\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ChartSpec:\n        series_data = [Series.from_dict(s) for s in d.get(\"series\", [])]\n        ohlc_data = d.get(\"ohlc_series\")\n        ohlc_series = OHLCSeries.from_dict(ohlc_data) if ohlc_data else None\n        \n        return cls(\n            chart_type=ChartType(d.get(\"chart_type\", \"line\")),\n            series=series_data,\n            ohlc_series=ohlc_series,\n            x_axis=Axis.from_dict(d.get(\"x_axis\", {})),\n            y_axis=Axis.from_dict(d.get(\"y_axis\", {})),\n            width=d.get(\"width\", 80),\n            height=d.get(\"height\", 24),\n            title=d.get(\"title\"),\n            show_legend=d.get(\"show_legend\", True),\n            braille=d.get(\"braille\", False),\n            color_config=d.get(\"color_config\"),\n            highlight_max=d.get(\"highlight_max\", False),\n            highlight_min=d.get(\"highlight_min\", False)\n        )\n",
  "termforge/charts/streaming.py": "\"\"\"TermForge chart streaming \u2014 rolling-window data buffer for live/real-time charts.\n\nA ``StreamingChartBuffer`` holds a fixed-size FIFO window of data points that\ncan be snapshotted into a ``ChartSpec`` at any time.  It supports both regular\nmulti-series line/bar data and OHLC candlestick data.\n\nDesign principles (portability contract):\n- Pure data \u2014 no Rich/Textual types anywhere.\n- JSON-serializable: ``to_dict()`` / ``from_dict()`` work for every class.\n- Thread safety is explicitly OUT of scope: callers that need it should\n  wrap ``push()`` / ``push_ohlc()`` in their own ``threading.Lock``.\n\nExample::\n\n    from termforge.charts.streaming import StreamingChartBuffer\n    from termforge.charts.types import ChartType\n\n    buf = StreamingChartBuffer(max_points=60, series_count=2,\n                               series_names=[\"CPU\", \"Memory\"])\n    buf.push([42.1, 68.3])\n    buf.push([44.7, 71.0])\n\n    spec = buf.to_chart_spec(\n        chart_type=ChartType.LINE,\n        title=\"System Metrics\",\n        width=80, height=20,\n    )\n\nOHLC example::\n\n    ohlc_buf = StreamingChartBuffer(max_points=30, ohlc=True)\n    ohlc_buf.push_ohlc(open=100.0, high=102.5, low=99.1, close=101.8)\n    spec = ohlc_buf.to_chart_spec(chart_type=ChartType.CANDLESTICK,\n                                  title=\"BTC/USD\", width=80, height=20)\n\"\"\"\nfrom __future__ import annotations\n\nfrom collections import deque\nfrom dataclasses import dataclass, field\nfrom typing import Any\n\nfrom termforge.charts.types import (\n    Axis,\n    ChartSpec,\n    ChartType,\n    OHLCSeries,\n    Series,\n)\n\n\n# ---------------------------------------------------------------------------\n# Helpers\n# ---------------------------------------------------------------------------\n\ndef _auto_range(\n    values: list[float],\n    y_padding: float = 0.05,\n) -> tuple[float, float]:\n    \"\"\"Return (min, max) for *values* with optional percentage padding.\n\n    Args:\n        values: Flat list of float data values.\n        y_padding: Fraction of the data range to add above and below.\n            Default ``0.05`` == 5 %.\n\n    Returns:\n        A ``(y_min, y_max)`` tuple suitable for ``Axis.min_val`` /\n        ``Axis.max_val``.  If all values are equal, returns\n        ``(value - 1, value + 1)`` to avoid zero-height axes.\n    \"\"\"\n    if not values:\n        return 0.0, 1.0\n    lo, hi = min(values), max(values)\n    span = hi - lo\n    if span == 0:\n        return lo - 1.0, hi + 1.0\n    pad = span * y_padding\n    return lo - pad, hi + pad\n\n\n# ---------------------------------------------------------------------------\n# StreamingChartBuffer\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass StreamingChartBuffer:\n    \"\"\"A fixed-capacity rolling buffer that snapshots into a ``ChartSpec``.\n\n    Attributes:\n        max_points: Maximum number of samples stored.  When the buffer is\n            full, the oldest sample is dropped (FIFO).\n        series_count: Number of parallel data series (for non-OHLC charts).\n        series_names: Display names for each series.  If shorter than\n            *series_count*, missing names default to ``\"series<N>\"``.\n        series_colors: Token names for each series colour.  Defaults to\n            standard token names from the active theme.\n        ohlc: When ``True``, the buffer stores OHLC tuples instead of\n            per-series floats.  ``series_count`` is ignored.\n        ohlc_name: Display name for the OHLC series.\n        y_padding: Fraction of data range to use as padding when\n            auto-scaling the y axis (default ``0.05``).\n        _data: Internal per-series deques (non-OHLC mode).\n        _ohlc: Internal OHLC deque (OHLC mode).\n    \"\"\"\n\n    max_points: int = 120\n    series_count: int = 1\n    series_names: list[str] = field(default_factory=list)\n    series_colors: list[str] = field(default_factory=list)\n    ohlc: bool = False\n    ohlc_name: str = \"ohlc\"\n    y_padding: float = 0.05\n\n    # Internal storage \u2014 not serialized as dataclass defaults,\n    # but round-tripped via to_dict/from_dict.\n    _data: list[deque[float]] = field(default_factory=list, repr=False)\n    _ohlc: deque[dict[str, float]] = field(\n        default_factory=deque, repr=False\n    )\n\n    def __post_init__(self) -> None:\n        if not self.ohlc:\n            # Initialise per-series deques if not already set\n            if not self._data:\n                self._data = [\n                    deque(maxlen=self.max_points)\n                    for _ in range(self.series_count)\n                ]\n            # Pad names list\n            while len(self.series_names) < self.series_count:\n                self.series_names.append(\n                    f\"series{len(self.series_names)}\"\n                )\n            # Pad colours list\n            _default_colors = [\n                \"primary\", \"secondary\", \"accent\",\n                \"success\", \"warning\", \"error\",\n            ]\n            while len(self.series_colors) < self.series_count:\n                idx = len(self.series_colors) % len(_default_colors)\n                self.series_colors.append(_default_colors[idx])\n        else:\n            if not isinstance(self._ohlc, deque):\n                self._ohlc = deque(maxlen=self.max_points)\n            else:\n                self._ohlc = deque(self._ohlc, maxlen=self.max_points)\n\n    # ------------------------------------------------------------------\n    # Data ingestion\n    # ------------------------------------------------------------------\n\n    def push(self, values: list[float]) -> None:\n        \"\"\"Append one sample per series.\n\n        Args:\n            values: A list of floats, one per series.  If shorter than\n                ``series_count``, missing series receive ``0.0``.\n\n        Raises:\n            ValueError: If the buffer was created in OHLC mode.\n        \"\"\"\n        if self.ohlc:\n            raise ValueError(\n                \"Use push_ohlc() for OHLC buffers, not push().\"\n            )\n        for i, dq in enumerate(self._data):\n            dq.append(values[i] if i < len(values) else 0.0)\n\n    def push_ohlc(\n        self,\n        open: float,\n        high: float,\n        low: float,\n        close: float,\n        volume: float = 0.0,\n        timestamp: str | None = None,\n    ) -> None:\n        \"\"\"Append one OHLC candlestick bar.\n\n        Args:\n            open: Opening price.\n            high: High price.\n            low: Low price.\n            close: Closing price.\n            volume: Optional volume (stored but not rendered by default).\n            timestamp: Optional label string for the x-axis.\n\n        Raises:\n            ValueError: If the buffer was NOT created in OHLC mode.\n        \"\"\"\n        if not self.ohlc:\n            raise ValueError(\n                \"Use push() for non-OHLC buffers, not push_ohlc().\"\n            )\n        bar: dict[str, Any] = {\n            \"open\": float(open),\n            \"high\": float(high),\n            \"low\": float(low),\n            \"close\": float(close),\n            \"volume\": float(volume),\n        }\n        if timestamp is not None:\n            bar[\"timestamp\"] = timestamp\n        self._ohlc.append(bar)\n\n    # ------------------------------------------------------------------\n    # Snapshot\n    # ------------------------------------------------------------------\n\n    def to_chart_spec(\n        self,\n        chart_type: ChartType = ChartType.LINE,\n        title: str | None = None,\n        width: int = 80,\n        height: int = 24,\n        show_legend: bool = True,\n        braille: bool = False,\n        x_label: str | None = None,\n        y_label: str | None = None,\n        tick_count: int = 5,\n        y_min: float | None = None,\n        y_max: float | None = None,\n        **kwargs: Any,\n    ) -> ChartSpec:\n        \"\"\"Snapshot the current buffer window into a ``ChartSpec``.\n\n        Y-axis bounds are auto-computed from current window data unless\n        *y_min* / *y_max* are provided explicitly.\n\n        Args:\n            chart_type: The chart type to render.\n            title: Optional chart title.\n            width: Canvas width in characters.\n            height: Canvas height in characters.\n            show_legend: Whether to show the series legend.\n            braille: Whether to use Braille dot rendering.\n            x_label: Optional x-axis label.\n            y_label: Optional y-axis label.\n            tick_count: Number of y-axis ticks.\n            y_min: Override auto-computed y minimum.\n            y_max: Override auto-computed y maximum.\n            **kwargs: Forwarded to ``ChartSpec`` constructor (e.g.\n                ``highlight_max=True``).\n\n        Returns:\n            A fully-configured :class:`~termforge.charts.types.ChartSpec`.\n        \"\"\"\n        if self.ohlc:\n            return self._build_ohlc_spec(\n                chart_type=chart_type,\n                title=title, width=width, height=height,\n                show_legend=show_legend, braille=braille,\n                x_label=x_label, y_label=y_label,\n                tick_count=tick_count,\n                y_min=y_min, y_max=y_max, **kwargs\n            )\n        return self._build_series_spec(\n            chart_type=chart_type,\n            title=title, width=width, height=height,\n            show_legend=show_legend, braille=braille,\n            x_label=x_label, y_label=y_label,\n            tick_count=tick_count,\n            y_min=y_min, y_max=y_max, **kwargs\n        )\n\n    def _build_series_spec(self, *, chart_type: ChartType, title: str | None, width: int, height: int,\n                           show_legend: bool, braille: bool, x_label: str | None, y_label: str | None,\n                           tick_count: int, y_min: float | None, y_max: float | None, **kwargs: Any) -> ChartSpec:\n        series_list = []\n        all_values: list[float] = []\n        for i, dq in enumerate(self._data):\n            pts = list(dq)\n            all_values.extend(pts)\n            series_list.append(Series(\n                name=self.series_names[i],\n                data=pts,\n                color_token=self.series_colors[i],\n            ))\n        computed_min, computed_max = _auto_range(all_values, self.y_padding)\n        y_axis = Axis(\n            label=y_label,\n            min_val=y_min if y_min is not None else computed_min,\n            max_val=y_max if y_max is not None else computed_max,\n            tick_count=tick_count,\n        )\n        return ChartSpec(\n            chart_type=chart_type,\n            series=series_list,\n            x_axis=Axis(label=x_label),\n            y_axis=y_axis,\n            width=width, height=height,\n            title=title,\n            show_legend=show_legend,\n            braille=braille,\n            **kwargs,\n        )\n\n    def _build_ohlc_spec(self, *, chart_type: ChartType, title: str | None, width: int, height: int,\n                         show_legend: bool, braille: bool, x_label: str | None, y_label: str | None,\n                         tick_count: int, y_min: float | None, y_max: float | None, **kwargs: Any) -> ChartSpec:\n        bars = list(self._ohlc)\n        timestamps = [str(b[\"timestamp\"]) for b in bars if \"timestamp\" in b]\n        ohlc_data = [\n            {k: v for k, v in b.items() if k != \"timestamp\"}\n            for b in bars\n        ]\n        # Auto-scale y from all high/low values\n        all_prices: list[float] = []\n        for b in ohlc_data:\n            all_prices.extend([b.get(\"low\", 0.0), b.get(\"high\", 0.0)])\n        computed_min, computed_max = _auto_range(all_prices, self.y_padding)\n        ohlc_series = OHLCSeries(\n            name=self.ohlc_name,\n            data=ohlc_data,\n            timestamps=timestamps if timestamps else None,\n        )\n\n\n        y_axis = Axis(\n            label=y_label,\n            min_val=y_min if y_min is not None else computed_min,\n            max_val=y_max if y_max is not None else computed_max,\n            tick_count=tick_count,\n        )\n        return ChartSpec(\n            chart_type=chart_type,\n            ohlc_series=ohlc_series,\n            x_axis=Axis(label=x_label),\n            y_axis=y_axis,\n            width=width, height=height,\n            title=title,\n            show_legend=show_legend,\n            braille=braille,\n            **kwargs,\n        )\n\n    # ------------------------------------------------------------------\n    # Queries\n    # ------------------------------------------------------------------\n\n    @property\n    def point_count(self) -> int:\n        \"\"\"Number of data points currently stored (across the first series).\"\"\"\n        if self.ohlc:\n            return len(self._ohlc)\n        return len(self._data[0]) if self._data else 0\n\n    @property\n    def is_full(self) -> bool:\n        \"\"\"``True`` if the buffer has reached ``max_points`` capacity.\"\"\"\n        return self.point_count >= self.max_points\n\n    def clear(self) -> None:\n        \"\"\"Remove all data from the buffer without changing configuration.\"\"\"\n        if self.ohlc:\n            self._ohlc.clear()\n        else:\n            for dq in self._data:\n                dq.clear()\n\n    def latest(self, n: int = 1) -> list[list[float]]:\n        \"\"\"Return the last *n* samples as a list of ``[v_series0, ...]`` rows.\n\n        Args:\n            n: Number of most-recent samples to return.\n\n        Returns:\n            List of rows, each row being a list of one float per series.\n        \"\"\"\n        if self.ohlc:\n            raise ValueError(\"Use latest_ohlc() for OHLC buffers.\")\n        n = max(1, n)\n        rows: list[list[float]] = []\n        if not self._data:\n            return rows\n        length = len(self._data[0])\n        start = max(0, length - n)\n        for i in range(start, length):\n            rows.append([list(dq)[i] for dq in self._data])\n        return rows\n\n    def latest_ohlc(self, n: int = 1) -> list[dict[str, float]]:\n        \"\"\"Return the last *n* OHLC bars.\n\n        Args:\n            n: Number of most-recent bars to return.\n\n        Returns:\n            List of OHLC dicts (same format as ``push_ohlc`` arguments).\n        \"\"\"\n        if not self.ohlc:\n            raise ValueError(\"Use latest() for non-OHLC buffers.\")\n        bars = list(self._ohlc)\n        return bars[max(0, len(bars) - n):]\n\n    # ------------------------------------------------------------------\n    # Portability contract\n    # ------------------------------------------------------------------\n\n    def to_dict(self) -> dict[str, Any]:\n        \"\"\"Serialize the buffer to a JSON-compatible dict.\n\n        Note:\n            Serialises the current window content so the snapshot can be\n            restored via :meth:`from_dict`.\n\n        Returns:\n            A plain dict that round-trips through ``json.dumps`` /\n            ``json.loads``.\n        \"\"\"\n        return {\n            \"max_points\": self.max_points,\n            \"series_count\": self.series_count,\n            \"series_names\": list(self.series_names),\n            \"series_colors\": list(self.series_colors),\n            \"ohlc\": self.ohlc,\n            \"ohlc_name\": self.ohlc_name,\n            \"y_padding\": self.y_padding,\n            \"_data\": [list(dq) for dq in self._data],\n            \"_ohlc\": list(self._ohlc),\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> \"StreamingChartBuffer\":\n        \"\"\"Deserialise a buffer previously produced by :meth:`to_dict`.\n\n        Args:\n            d: Dict as returned by :meth:`to_dict`.\n\n        Returns:\n            A new :class:`StreamingChartBuffer` with its data window\n            restored.\n        \"\"\"\n        is_ohlc = d.get(\"ohlc\", False)\n        max_pts = d.get(\"max_points\", 120)\n        buf = cls(\n            max_points=max_pts,\n            series_count=d.get(\"series_count\", 1),\n            series_names=list(d.get(\"series_names\", [])),\n            series_colors=list(d.get(\"series_colors\", [])),\n            ohlc=is_ohlc,\n            ohlc_name=d.get(\"ohlc_name\", \"ohlc\"),\n            y_padding=d.get(\"y_padding\", 0.05),\n        )\n        if is_ohlc:\n            for bar in d.get(\"_ohlc\", []):\n                buf._ohlc.append(dict(bar))\n        else:\n            for i, pts in enumerate(d.get(\"_data\", [])):\n                if i < len(buf._data):\n                    for v in pts:\n                        buf._data[i].append(v)\n        return buf\n",
  "termforge/charts/renderers.py": "from __future__ import annotations\nimport math\nfrom termforge.core.types import StyleSpec, ColorValue, ColorDepth\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.charts.types import ChartSpec, OHLCSeries\nfrom termforge.charts.scale import compute_bounds, scale_value, nice_bounds\nfrom termforge.charts.canvas import Canvas, BrailleCanvas, set_cell, draw_line, set_braille_pixel, draw_braille_line\n\ndef render_sparkline(spec: ChartSpec, theme: ThemeTokens | None = None, depth: ColorDepth = ColorDepth.TRUECOLOR) -> str:\n    if not spec.series or not spec.series[0].data:\n        return \"\"\n    data = spec.series[0].data\n    val_min = min(data)\n    val_max = max(data)\n    if val_min == val_max:\n        return \"\u2584\" * len(data)\n        \n    c_start = None\n    c_end = None\n    if theme and spec.color_config and \"gradient\" in spec.color_config:\n        grad = spec.color_config[\"gradient\"]\n        if isinstance(grad, list) and len(grad) >= 2:\n            from termforge.core.theme import resolve_token\n            c_start = resolve_token(theme, f\"colors.{grad[0]}\")\n            c_end = resolve_token(theme, f\"colors.{grad[1]}\")\n\n    idx_max = data.index(val_max) if (spec.highlight_max and val_min != val_max) else -1\n    idx_min = data.index(val_min) if (spec.highlight_min and val_min != val_max) else -1\n            \n    blocks = \" \u2582\u2583\u2584\u2585\u2586\u2587\u2588\"\n    num_blocks = len(blocks)\n    spark = []\n    for idx_val, val in enumerate(data):\n        ratio = (val - val_min) / (val_max - val_min)\n        idx = min(num_blocks - 1, max(0, int(ratio * (num_blocks - 1))))\n        char = blocks[idx]\n        \n        if idx_val == idx_max:\n            from termforge.text.render import style_to_ansi\n            style = StyleSpec(fg=ColorValue(0, 0, 0, name=\"colors.accent\"))\n            start_ansi, end_ansi = style_to_ansi(style, theme, depth)\n            char = f\"{start_ansi}{char}{end_ansi}\"\n        elif idx_val == idx_min:\n            from termforge.text.render import style_to_ansi\n            style = StyleSpec(fg=ColorValue(0, 0, 0, name=\"colors.error\"))\n            start_ansi, end_ansi = style_to_ansi(style, theme, depth)\n            char = f\"{start_ansi}{char}{end_ansi}\"\n        elif c_start and c_end:\n            from termforge.core.color import interpolate_color\n            from termforge.text.render import style_to_ansi\n            \n            c_curr = interpolate_color(c_start, c_end, ratio)\n            style = StyleSpec(fg=c_curr)\n            start_ansi, end_ansi = style_to_ansi(style, theme, depth)\n            char = f\"{start_ansi}{char}{end_ansi}\"\n            \n        spark.append(char)\n    return \"\".join(spark)\n\ndef get_style_for_token(color_token: str) -> StyleSpec:\n    # A simple token-to-color mapper fallback. Real theme resolving happens at canvas rendering.\n    # We can encode the color token into the style's fg name!\n    # For example, style.fg = ColorValue(0,0,0, name=f\"colors.{color_token}\")\n    # That way style_to_ansi will resolve it directly from the theme pack!\n    return StyleSpec(fg=ColorValue(0, 0, 0, name=f\"colors.{color_token}\"))\n\ndef render_line_chart(spec: ChartSpec, canvas: Canvas | BrailleCanvas) -> None:\n    if not spec.series or not spec.series[0].data:\n        return\n        \n    # Gather all Y data to compute bounds\n    all_y = []\n    for s in spec.series:\n        all_y.extend(s.data)\n        \n    y_min, y_max = compute_bounds(all_y, spec.y_axis)\n    \n    # X bounds are simply 0 to max_len - 1\n    max_len = max(len(s.data) for s in spec.series)\n    x_min, x_max = 0.0, float(max_len - 1)\n    \n    is_braille = isinstance(canvas, BrailleCanvas)\n    \n    for s in spec.series:\n        style = get_style_for_token(s.color_token)\n        points = []\n        \n        # Calculate scaled coordinates\n        for idx, val in enumerate(s.data):\n            if is_braille:\n                cx = scale_value(idx, x_min, x_max, 2 * canvas.width)\n                cy = scale_value(val, y_min, y_max, 4 * canvas.height)\n            else:\n                cx = scale_value(idx, x_min, x_max, canvas.width)\n                cy = scale_value(val, y_min, y_max, canvas.height)\n            points.append((cx, cy))\n            \n        # Draw lines between successive points\n        for i in range(len(points) - 1):\n            x1, y1 = points[i]\n            x2, y2 = points[i+1]\n            if isinstance(canvas, BrailleCanvas):\n                draw_braille_line(canvas, x1, y1, x2, y2, style)\n            elif isinstance(canvas, Canvas):\n                draw_line(canvas, x1, y1, x2, y2, \"*\", style)\n\ndef render_bar_chart(spec: ChartSpec, canvas: Canvas) -> None:\n    if not spec.series or not spec.series[0].data:\n        return\n    data = spec.series[0].data\n    y_min, y_max = compute_bounds(data, spec.y_axis)\n    \n    # We want to fit all bars across the width\n    num_bars = len(data)\n    bar_width = max(1, canvas.width // num_bars)\n    \n    style = get_style_for_token(spec.series[0].color_token)\n    \n    for idx, val in enumerate(data):\n        scaled_y = scale_value(val, y_min, y_max, canvas.height)\n        scaled_zero = scale_value(0.0, y_min, y_max, canvas.height)\n        \n        # Draw column\n        x_start = idx * bar_width\n        start_y = min(scaled_zero, scaled_y)\n        end_y = max(scaled_zero, scaled_y)\n        \n        for x in range(x_start, min(canvas.width, x_start + bar_width - 1)):\n            for y in range(start_y, end_y + 1):\n                set_cell(canvas, x, y, \"\u2588\", style)\n\ndef render_scatter_chart(spec: ChartSpec, canvas: Canvas | BrailleCanvas) -> None:\n    if not spec.series or not spec.series[0].data:\n        return\n        \n    all_y = []\n    for s in spec.series:\n        all_y.extend(s.data)\n    y_min, y_max = compute_bounds(all_y, spec.y_axis)\n    \n    max_len = max(len(s.data) for s in spec.series)\n    x_min, x_max = 0.0, float(max_len - 1)\n    \n    is_braille = isinstance(canvas, BrailleCanvas)\n    \n    for s in spec.series:\n        style = get_style_for_token(s.color_token)\n        for idx, val in enumerate(s.data):\n            if isinstance(canvas, BrailleCanvas):\n                cx = scale_value(idx, x_min, x_max, 2 * canvas.width)\n                cy = scale_value(val, y_min, y_max, 4 * canvas.height)\n                set_braille_pixel(canvas, cx, cy, True, style)\n            elif isinstance(canvas, Canvas):\n                cx = scale_value(idx, x_min, x_max, canvas.width)\n                cy = scale_value(val, y_min, y_max, canvas.height)\n                set_cell(canvas, cx, cy, \"o\", style)\n\ndef render_histogram(spec: ChartSpec, canvas: Canvas) -> None:\n    if not spec.series or not spec.series[0].data:\n        return\n    data = spec.series[0].data\n    \n    # Compute bins\n    num_bins = min(canvas.width // 2, 10) # default 10 bins or less\n    val_min = min(data)\n    val_max = max(data)\n    if val_min == val_max:\n        val_max += 1.0\n        \n    bin_width = (val_max - val_min) / num_bins\n    bins = [0] * num_bins\n    for val in data:\n        bin_idx = min(num_bins - 1, max(0, int((val - val_min) / bin_width)))\n        bins[bin_idx] += 1\n        \n    # Now plot bins as a bar chart\n    y_min, y_max = 0.0, float(max(bins))\n    bar_width = max(1, canvas.width // num_bins)\n    style = get_style_for_token(spec.series[0].color_token)\n    \n    for idx, count in enumerate(bins):\n        scaled_y = scale_value(count, y_min, y_max, canvas.height)\n        x_start = idx * bar_width\n        for x in range(x_start, min(canvas.width, x_start + bar_width - 1)):\n            for y in range(0, scaled_y + 1):\n                set_cell(canvas, x, y, \"\u2588\", style)\n\ndef render_stacked_bar(spec: ChartSpec, canvas: Canvas) -> None:\n    if not spec.series or not spec.series[0].data:\n        return\n        \n    num_bars = len(spec.series[0].data)\n    bar_width = max(1, canvas.width // num_bars)\n    \n    # Compute stacked heights\n    stacked_data = []\n    for i in range(num_bars):\n        col_sum = sum(s.data[i] for s in spec.series if i < len(s.data))\n        stacked_data.append(col_sum)\n        \n    y_min, y_max = compute_bounds(stacked_data, spec.y_axis)\n    \n    for col_idx in range(num_bars):\n        current_y_val = 0.0\n        x_start = col_idx * bar_width\n        \n        for s in spec.series:\n            if col_idx >= len(s.data):\n                continue\n            val = s.data[col_idx]\n            style = get_style_for_token(s.color_token)\n            \n            scaled_start = scale_value(current_y_val, y_min, y_max, canvas.height)\n            scaled_end = scale_value(current_y_val + val, y_min, y_max, canvas.height)\n            \n            for x in range(x_start, min(canvas.width, x_start + bar_width - 1)):\n                for y in range(scaled_start, scaled_end + 1):\n                    set_cell(canvas, x, y, \"\u2588\", style)\n            current_y_val += val\n\ndef render_multi_bar(spec: ChartSpec, canvas: Canvas) -> None:\n    if not spec.series:\n        return\n        \n    num_groups = len(spec.series[0].data)\n    num_series = len(spec.series)\n    group_width = max(1, canvas.width // num_groups)\n    bar_width = max(1, (group_width - 1) // num_series)\n    \n    all_y = []\n    for s in spec.series:\n        all_y.extend(s.data)\n    y_min, y_max = compute_bounds(all_y, spec.y_axis)\n    \n    for group_idx in range(num_groups):\n        group_x = group_idx * group_width\n        for series_idx, s in enumerate(spec.series):\n            if group_idx >= len(s.data):\n                continue\n            val = s.data[group_idx]\n            style = get_style_for_token(s.color_token)\n            \n            scaled_y = scale_value(val, y_min, y_max, canvas.height)\n            x_start = group_x + series_idx * bar_width\n            \n            for x in range(x_start, min(canvas.width, x_start + bar_width)):\n                for y in range(0, scaled_y + 1):\n                    set_cell(canvas, x, y, \"\u2588\", style)\n\ndef render_heatmap(spec: ChartSpec, canvas: Canvas) -> None:\n    if not spec.series:\n        return\n    # In a heatmap, each series is a row, data elements are columns\n    num_rows = len(spec.series)\n    num_cols = len(spec.series[0].data)\n    \n    row_height = max(1, canvas.height // num_rows)\n    col_width = max(1, canvas.width // num_cols)\n    \n    all_vals = []\n    for s in spec.series:\n        all_vals.extend(s.data)\n    val_min = min(all_vals)\n    val_max = max(all_vals)\n    if val_min == val_max:\n        val_max += 1.0\n        \n    # Render cell by cell\n    for r_idx, s in enumerate(spec.series):\n        y_start = r_idx * row_height\n        for c_idx, val in enumerate(s.data):\n            x_start = c_idx * col_width\n            \n            # Map value to color gradient: blue (low) to red (high)\n            ratio = (val - val_min) / (val_max - val_min)\n            # Create a ColorValue based on ratio\n            color = ColorValue(int(255 * ratio), 0, int(255 * (1 - ratio)))\n            style = StyleSpec(fg=color, bg=color) # Solid color box\n            \n            for x in range(x_start, min(canvas.width, x_start + col_width)):\n                for y in range(y_start, min(canvas.height, y_start + row_height)):\n                    set_cell(canvas, x, y, \"\u2588\", style)\n\ndef render_candlestick(spec: ChartSpec, canvas: Canvas) -> None:\n    if not spec.ohlc_series or not spec.ohlc_series.data:\n        return\n    ohlc = spec.ohlc_series.data\n    \n    # Calculate bounds over all highs and lows\n    highs = [d[\"high\"] for d in ohlc]\n    lows = [d[\"low\"] for d in ohlc]\n    y_min, y_max = compute_bounds(highs + lows, spec.y_axis)\n    \n    num_candles = len(ohlc)\n    candle_width = max(3, canvas.width // num_candles) # at least 3 cols wide for wick + body\n    \n    # Theme colors for up/down candles\n    up_style = StyleSpec(fg=ColorValue(0, 0, 0, name=\"colors.success\"))\n    down_style = StyleSpec(fg=ColorValue(0, 0, 0, name=\"colors.error\"))\n    \n    for idx, tick in enumerate(ohlc):\n        o = tick[\"open\"]\n        h = tick[\"high\"]\n        l = tick[\"low\"]\n        c = tick[\"close\"]\n        \n        # Center column of this candlestick\n        x_center = idx * candle_width + (candle_width // 2)\n        \n        # Scale Y positions\n        sy_high = scale_value(h, y_min, y_max, canvas.height)\n        sy_low = scale_value(l, y_min, y_max, canvas.height)\n        sy_open = scale_value(o, y_min, y_max, canvas.height)\n        sy_close = scale_value(c, y_min, y_max, canvas.height)\n        \n        # Determine up/down style\n        style = up_style if c >= o else down_style\n        \n        # 1. Draw wick (high to low)\n        for y in range(min(sy_low, sy_high), max(sy_low, sy_high) + 1):\n            set_cell(canvas, x_center, y, \"\u2502\", style)\n            \n        # 2. Draw body (open to close)\n        body_start = min(sy_open, sy_close)\n        body_end = max(sy_open, sy_close)\n        \n        body_char = \"\u2588\" if c < o else \"\u2591\" # Solid for down, shaded/hollow for up\n        \n        # Body width is candle_width - 2 (leaving gaps)\n        half_w = max(1, (candle_width - 2) // 2)\n        for x in range(x_center - half_w, x_center + half_w + 1):\n            for y in range(body_start, body_end + 1):\n                set_cell(canvas, x, y, body_char, style)\n",
  "termforge/charts/scale.py": "from __future__ import annotations\nimport math\nfrom termforge.charts.types import Axis\n\ndef nice_bounds(min_val: float, max_val: float) -> tuple[float, float]:\n    if min_val == max_val:\n        return min_val - 1.0, max_val + 1.0\n    diff = max_val - min_val\n    try:\n        mag = 10 ** math.floor(math.log10(diff))\n    except (ValueError, OverflowError):\n        mag = 1.0\n        \n    steps = [0.1, 0.2, 0.5, 1.0, 2.0, 5.0, 10.0]\n    step = mag\n    for s in steps:\n        curr_step = s * mag\n        if curr_step > 0 and diff / curr_step <= 10:\n            step = curr_step\n            break\n            \n    nice_min = math.floor(min_val / step) * step\n    nice_max = math.ceil(max_val / step) * step\n    return nice_min, nice_max\n\ndef compute_bounds(data: list[float], axis: Axis) -> tuple[float, float]:\n    if not data:\n        return 0.0, 1.0\n    val_min = min(data)\n    val_max = max(data)\n    \n    # Apply nice bounds first if not overridden\n    nice_min, nice_max = nice_bounds(val_min, val_max)\n    \n    final_min = axis.min_val if axis.min_val is not None else nice_min\n    final_max = axis.max_val if axis.max_val is not None else nice_max\n    \n    if final_min == final_max:\n        final_min -= 1.0\n        final_max += 1.0\n        \n    return final_min, final_max\n\ndef scale_value(value: float, min_val: float, max_val: float, target_size: int) -> int:\n    if min_val == max_val:\n        return 0\n    ratio = (value - min_val) / (max_val - min_val)\n    idx = int(ratio * (target_size - 1))\n    return min(target_size - 1, max(0, idx))\n\ndef _apply_format(val: float, format_str: str) -> str:\n    \"\"\"Apply a format string to a float value.\n    \n    Supports:\n    - Standard Python format strings like \"{:.2f}\" or \"{:,.0f}\"\n    - Shorthand patterns like \"$,.2f\" (prefix $ then format ,.2f)\n    - Suffix patterns like \"{:.1f}K\" are handled natively by Python's format\n    \"\"\"\n    # If it's a plain Python format string with braces, use directly\n    if \"{\" in format_str:\n        try:\n            return format_str.format(val)\n        except Exception:\n            return f\"{val:.1f}\"\n    # Shorthand: prefix chars + Python format spec (no braces)\n    # e.g. \"$,.2f\" -> prefix=\"$\", spec=\",.2f\"\n    # Detect by trying to find a valid format spec after any non-format prefix chars\n    # Heuristic: scan from start for non-digit, non-comma, non-dot, non-f/e/d/g chars as prefix\n    prefix = \"\"\n    spec = format_str\n    for i, ch in enumerate(format_str):\n        if ch in \",.0123456789feEdgGsb%\" or (i > 0 and ch == \"-\"):\n            prefix = format_str[:i]\n            spec = format_str[i:]\n            break\n    try:\n        return prefix + format(val, spec)\n    except Exception:\n        return f\"{val:.1f}\"\n\ndef generate_ticks(min_val: float, max_val: float, count: int, format_str: str = \"{:.1f}\") -> list[tuple[float, str]]:\n    if count <= 1:\n        return [(min_val, _apply_format(min_val, format_str))]\n        \n    ticks = []\n    step = (max_val - min_val) / (count - 1)\n    for i in range(count):\n        val = min_val + step * i\n        label = _apply_format(val, format_str)\n        ticks.append((val, label))\n    return ticks\n",
  "termforge/charts/chart.py": "from __future__ import annotations\nfrom typing import Any\nfrom termforge.core.types import ColorDepth, StyleSpec, ColorValue\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.charts.types import ChartSpec, ChartType\nfrom termforge.charts.scale import compute_bounds, generate_ticks\nfrom termforge.charts.canvas import Canvas, BrailleCanvas, create_canvas, create_braille_canvas, canvas_to_lines, braille_canvas_to_lines\nfrom termforge.charts.renderers import (\n    render_sparkline, render_line_chart, render_bar_chart, render_scatter_chart,\n    render_histogram, render_stacked_bar, render_multi_bar, render_heatmap, render_candlestick\n)\n\ndef render_chart(spec: ChartSpec, theme: ThemeTokens | None = None, depth: ColorDepth = ColorDepth.TRUECOLOR) -> list[str]:\n    # Sparkline is inline, handles itself\n    if spec.chart_type == ChartType.SPARKLINE:\n        return [render_sparkline(spec, theme, depth)]\n        \n    # Calculate Plotting Area dimensions (accounting for axes)\n    # y-axis label column: 8 chars (e.g. \"  12.5 \u2502\")\n    # x-axis tick row: 1 char, x-axis label row: 1 char\n    y_axis_w = 8\n    x_axis_h = 2\n    \n    plot_w = max(10, spec.width - y_axis_w)\n    plot_h = max(5, spec.height - x_axis_h)\n    \n    # 1. Create Canvas\n    is_braille = spec.braille and spec.chart_type in (ChartType.LINE, ChartType.SCATTER)\n    canvas: Any = None\n    if is_braille:\n        canvas = create_braille_canvas(plot_w, plot_h)\n    else:\n        canvas = create_canvas(plot_w, plot_h)\n        \n    # 2. Render plot contents\n    if spec.chart_type == ChartType.LINE:\n        render_line_chart(spec, canvas)\n    elif spec.chart_type == ChartType.BAR:\n        render_bar_chart(spec, canvas)\n    elif spec.chart_type == ChartType.SCATTER:\n        render_scatter_chart(spec, canvas)\n    elif spec.chart_type == ChartType.HISTOGRAM:\n        render_histogram(spec, canvas)\n    elif spec.chart_type == ChartType.STACKED_BAR:\n        render_stacked_bar(spec, canvas)\n    elif spec.chart_type == ChartType.MULTI_BAR:\n        render_multi_bar(spec, canvas)\n    elif spec.chart_type == ChartType.HEATMAP:\n        render_heatmap(spec, canvas)\n    elif spec.chart_type == ChartType.CANDLESTICK:\n        render_candlestick(spec, canvas)\n        \n    # 3. Convert plotting canvas to lines of strings\n    if is_braille:\n        plot_lines = braille_canvas_to_lines(canvas, theme, depth)\n    else:\n        plot_lines = canvas_to_lines(canvas, theme, depth)\n        \n    # 4. Add Y-Axis Labels\n    # Compute bounds for Y axis labels\n    if spec.chart_type == ChartType.CANDLESTICK and spec.ohlc_series:\n        highs = [d[\"high\"] for d in spec.ohlc_series.data]\n        lows = [d[\"low\"] for d in spec.ohlc_series.data]\n        y_min, y_max = compute_bounds(highs + lows, spec.y_axis)\n    else:\n        all_y = []\n        for s in spec.series:\n            all_y.extend(s.data)\n        y_min, y_max = compute_bounds(all_y, spec.y_axis)\n        \n    y_ticks = generate_ticks(y_min, y_max, plot_h, spec.y_axis.format_str)\n    # y_ticks are generated from min to max (bottom to top)\n    # our lines are from top to bottom (row 0 is max, row height-1 is min)\n    # So we reverse the y_ticks to match lines\n    y_ticks = list(reversed(y_ticks))\n    \n    final_lines = []\n    for r in range(plot_h):\n        val, label = y_ticks[r]\n        # Format label to fit exactly y_axis_w - 2 (6 chars), plus axis line \"\u2502\"\n        short_label = label[:y_axis_w - 2].rjust(y_axis_w - 2)\n        final_lines.append(f\"{short_label} \u2502{plot_lines[r]}\")\n        \n    # 5. Add X-Axis Line and Labels\n    # Draw bottom horizontal axis line\n    axis_line = \"\u2500\" * plot_w\n    final_lines.append(\" \" * (y_axis_w - 2) + \" \u2514\" + axis_line)\n    \n    # Generate X-axis labels\n    # We display e.g. 5 ticks across plot_w\n    max_len = 0\n    if spec.chart_type == ChartType.CANDLESTICK and spec.ohlc_series:\n        max_len = len(spec.ohlc_series.data)\n    elif spec.series:\n        max_len = max(len(s.data) for s in spec.series)\n        \n    x_min, x_max = 0.0, float(max_len - 1) if max_len > 0 else 1.0\n    x_ticks = generate_ticks(x_min, x_max, spec.x_axis.tick_count, spec.x_axis.format_str)\n    \n    # We construct the label row.\n    # We want to space out labels at their scaled column index\n    label_row = [\" \"] * (spec.width)\n    for val, label in x_ticks:\n        # Scale X val to plot cols\n        from termforge.charts.scale import scale_value\n        cx = scale_value(val, x_min, x_max, plot_w)\n        # Shift cx by the Y-axis width offset\n        target_x = y_axis_w + cx\n        \n        # Center the label text on target_x\n        start_idx = target_x - len(label) // 2\n        for char_idx, char in enumerate(label):\n            idx = start_idx + char_idx\n            if y_axis_w <= idx < spec.width:\n                label_row[idx] = char\n                \n    final_lines.append(\"\".join(label_row))\n    \n    # Append Title if present\n    if spec.title:\n        title_line = spec.title.center(spec.width)\n        final_lines.insert(0, title_line)\n        \n    return final_lines\n",
  "termforge/charts/canvas.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom termforge.core.types import ColorDepth, StyleSpec\nfrom termforge.core.theme import ThemeTokens\nfrom typing import Any\nfrom termforge.text.render import style_to_ansi\n\n@dataclass\nclass Canvas:\n    width: int\n    height: int\n    cells: list[list[str]]\n    colors: list[list[StyleSpec | None]]\n\ndef create_canvas(width: int, height: int, fill: str = \" \") -> Canvas:\n    cells = [[fill] * width for _ in range(height)]\n    colors: list[list[StyleSpec | None]] = [[None] * width for _ in range(height)]\n    return Canvas(width=width, height=height, cells=cells, colors=colors)\n\ndef set_cell(canvas: Canvas, x: int, y: int, char: str, style: StyleSpec | None = None) -> None:\n    # y is from bottom (0 = bottom, height-1 = top) for typical chart plotting\n    # but we store in standard row-major (0 = top, height-1 = bottom)\n    row = canvas.height - 1 - y\n    if 0 <= row < canvas.height and 0 <= x < canvas.width:\n        canvas.cells[row][x] = char\n        canvas.colors[row][x] = style\n\ndef draw_line(canvas: Canvas, x1: int, y1: int, x2: int, y2: int, char: str, style: StyleSpec | None = None) -> None:\n    # Bresenham's line algorithm\n    dx = abs(x2 - x1)\n    dy = abs(y2 - y1)\n    sx = 1 if x1 < x2 else -1\n    sy = 1 if y1 < y2 else -1\n    err = dx - dy\n    \n    while True:\n        set_cell(canvas, x1, y1, char, style)\n        if x1 == x2 and y1 == y2:\n            break\n        e2 = 2 * err\n        if e2 > -dy:\n            err -= dy\n            x1 += sx\n        if e2 < dx:\n            err += dx\n            y1 += sy\n\ndef draw_rect(canvas: Canvas, x: int, y: int, w: int, h: int, char: str, style: StyleSpec | None = None) -> None:\n    # Draw bottom/top edges\n    for i in range(x, x + w):\n        set_cell(canvas, i, y, char, style)\n        set_cell(canvas, i, y + h - 1, char, style)\n    # Draw left/right edges\n    for j in range(y, y + h):\n        set_cell(canvas, x, j, char, style)\n        set_cell(canvas, x + w - 1, j, char, style)\n\ndef canvas_to_lines(canvas: Canvas, theme: ThemeTokens | None, depth: ColorDepth) -> list[str]:\n    lines = []\n    for r in range(canvas.height):\n        row_ansi = []\n        for c in range(canvas.width):\n            char = canvas.cells[r][c]\n            style = canvas.colors[r][c]\n            if style:\n                start_ansi, end_ansi = style_to_ansi(style, theme, depth)\n                row_ansi.append(f\"{start_ansi}{char}{end_ansi}\")\n            else:\n                row_ansi.append(char)\n        lines.append(\"\".join(row_ansi))\n    return lines\n\n\n@dataclass\nclass BrailleCanvas:\n    width: int # In terminal cells\n    height: int # In terminal cells\n    pixels: list[list[bool]] # 2*width by 4*height\n    styles: list[list[StyleSpec | None]] # 2*width by 4*height\n\ndef create_braille_canvas(width: int, height: int) -> BrailleCanvas:\n    pixels = [[False] * (2 * width) for _ in range(4 * height)]\n    styles: list[list[StyleSpec | None]] = [[None] * (2 * width) for _ in range(4 * height)]\n    return BrailleCanvas(width=width, height=height, pixels=pixels, styles=styles)\n\ndef set_braille_pixel(canvas: BrailleCanvas, x: int, y: int, active: bool = True, style: StyleSpec | None = None) -> None:\n    # y is from bottom (0 = bottom, 4*height - 1 = top)\n    row = (4 * canvas.height) - 1 - y\n    if 0 <= row < (4 * canvas.height) and 0 <= x < (2 * canvas.width):\n        canvas.pixels[row][x] = active\n        canvas.styles[row][x] = style\n\ndef draw_braille_line(canvas: BrailleCanvas, x1: int, y1: int, x2: int, y2: int, style: StyleSpec | None = None) -> None:\n    dx = abs(x2 - x1)\n    dy = abs(y2 - y1)\n    sx = 1 if x1 < x2 else -1\n    sy = 1 if y1 < y2 else -1\n    err = dx - dy\n    \n    while True:\n        set_braille_pixel(canvas, x1, y1, True, style)\n        if x1 == x2 and y1 == y2:\n            break\n        e2 = 2 * err\n        if e2 > -dy:\n            err -= dy\n            x1 += sx\n        if e2 < dx:\n            err += dx\n            y1 += sy\n\ndef braille_canvas_to_lines(canvas: BrailleCanvas, theme: ThemeTokens | None, depth: ColorDepth) -> list[str]:\n    lines = []\n    \n    # Map dot (dx, dy) within a 2x4 block to its braille byte offset\n    # dx in 0..1, dy in 0..3\n    dot_map = {\n        (0, 0): 0x01, (0, 1): 0x02, (0, 2): 0x04, (0, 3): 0x40,\n        (1, 0): 0x08, (1, 1): 0x10, (1, 2): 0x20, (1, 3): 0x80\n    }\n    \n    for r in range(canvas.height):\n        row_ansi = []\n        for c in range(canvas.width):\n            # 2x4 pixel block starts at:\n            # x_pixel = 2 * c\n            # y_pixel = 4 * r (rows from top in pixels)\n            pixel_val = 0\n            cell_style = None\n            \n            # Count pixels and find most common style in this block\n            block_styles: list[StyleSpec] = []\n            for dy in range(4):\n                py = 4 * r + dy\n                for dx in range(2):\n                    px = 2 * c + dx\n                    if canvas.pixels[py][px]:\n                        pixel_val |= dot_map[(dx, dy)]\n                        st = canvas.styles[py][px]\n                        if st is not None:\n                            block_styles.append(st)\n            \n            # Most common style\n            if block_styles:\n                # Map StyleSpec to a hashable tuple representation\n                def style_key(s: StyleSpec) -> tuple[Any, ...]:\n                    fg_val = (s.fg.r, s.fg.g, s.fg.b, s.fg.name) if s.fg else None\n                    bg_val = (s.bg.r, s.bg.g, s.bg.b, s.bg.name) if s.bg else None\n                    return (fg_val, bg_val, s.bold, s.dim, s.italic, s.underline, s.strikethrough)\n                \n                counts: dict[tuple[Any, ...], int] = {}\n                key_to_style: dict[tuple[Any, ...], StyleSpec] = {}\n                for style in block_styles:\n                    key = style_key(style)\n                    counts[key] = counts.get(key, 0) + 1\n                    key_to_style[key] = style\n                \n                best_key = max(counts, key=lambda k: counts[k])\n                cell_style = key_to_style[best_key]\n                \n            char = chr(0x2800 + pixel_val)\n            if cell_style:\n                start_ansi, end_ansi = style_to_ansi(cell_style, theme, depth)\n                row_ansi.append(f\"{start_ansi}{char}{end_ansi}\")\n            else:\n                row_ansi.append(char)\n        lines.append(\"\".join(row_ansi))\n    return lines\n",
  "termforge/charts/__init__.py": "\"\"\"TermForge charts module \u2014 line, bar, scatter, histogram, sparkline, candlestick.\"\"\"\nfrom termforge.charts.types import ChartType, Axis, Series, OHLCSeries, ChartSpec\nfrom termforge.charts.scale import nice_bounds, compute_bounds, scale_value, generate_ticks\nfrom termforge.charts.canvas import Canvas, BrailleCanvas, create_canvas, create_braille_canvas\nfrom termforge.charts.chart import render_chart\nfrom termforge.charts.renderers import render_sparkline\nfrom termforge.charts.streaming import StreamingChartBuffer\n\n__all__ = [\n    \"ChartType\",\n    \"Axis\",\n    \"Series\",\n    \"OHLCSeries\",\n    \"ChartSpec\",\n    \"nice_bounds\",\n    \"compute_bounds\",\n    \"scale_value\",\n    \"generate_ticks\",\n    \"Canvas\",\n    \"BrailleCanvas\",\n    \"create_canvas\",\n    \"create_braille_canvas\",\n    \"render_chart\",\n    \"render_sparkline\",\n    \"StreamingChartBuffer\",\n]\n",
  "termforge/theme/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\nfrom termforge.core.theme import ThemeTokens\n\n@dataclass\nclass ThemeMeta:\n    name: str\n    author: str\n    version: str\n    description: str\n    dark: bool = True\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"name\": self.name,\n            \"author\": self.author,\n            \"version\": self.version,\n            \"description\": self.description,\n            \"dark\": self.dark\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ThemeMeta:\n        return cls(\n            name=d[\"name\"],\n            author=d[\"author\"],\n            version=d[\"version\"],\n            description=d[\"description\"],\n            dark=d.get(\"dark\", True)\n        )\n\n@dataclass\nclass ThemePack:\n    meta: ThemeMeta\n    tokens: ThemeTokens\n\n    def to_dict(self) -> dict[str, Any]:\n        from termforge.core.theme import theme_to_dict\n        return {\n            \"meta\": self.meta.to_dict(),\n            \"tokens\": theme_to_dict(self.tokens)\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ThemePack:\n        from termforge.core.theme import load_theme_from_dict\n        return cls(\n            meta=ThemeMeta.from_dict(d[\"meta\"]),\n            tokens=load_theme_from_dict(d[\"tokens\"])\n        )\n",
  "termforge/theme/builtin.py": "from termforge.core.theme import CATPPUCCIN_MOCHA, DRACULA, TOKYO_NIGHT, HIGH_CONTRAST, GRUVBOX, NORD, ThemeTokens\nfrom termforge.theme.types import ThemePack, ThemeMeta\n\nCATPPUCCIN_MOCHA_PACK = ThemePack(\n    meta=ThemeMeta(\n        name=\"Catppuccin Mocha\",\n        author=\"Catppuccin Org\",\n        version=\"1.0.0\",\n        description=\"Soothing pastel theme for the high-spirited!\",\n        dark=True\n    ),\n    tokens=ThemeTokens.from_dict(CATPPUCCIN_MOCHA)\n)\n\nDRACULA_PACK = ThemePack(\n    meta=ThemeMeta(\n        name=\"Dracula\",\n        author=\"Zeno Rocha\",\n        version=\"1.0.0\",\n        description=\"A dark theme for many editors, shells, and more.\",\n        dark=True\n    ),\n    tokens=ThemeTokens.from_dict(DRACULA)\n)\n\nTOKYO_NIGHT_PACK = ThemePack(\n    meta=ThemeMeta(\n        name=\"Tokyo Night\",\n        author=\"folke\",\n        version=\"1.0.0\",\n        description=\"A clean dark Tokyo Night theme.\",\n        dark=True\n    ),\n    tokens=ThemeTokens.from_dict(TOKYO_NIGHT)\n)\n\nHIGH_CONTRAST_PACK = ThemePack(\n    meta=ThemeMeta(\n        name=\"High Contrast\",\n        author=\"TermForge Contributors\",\n        version=\"1.0.0\",\n        description=\"High contrast accessible black-and-white theme.\",\n        dark=True\n    ),\n    tokens=ThemeTokens.from_dict(HIGH_CONTRAST)\n)\n\nGRUVBOX_PACK = ThemePack(\n    meta=ThemeMeta(\n        name=\"Gruvbox\",\n        author=\"morhetz\",\n        version=\"1.0.0\",\n        description=\"Retro groove color scheme for Vim and terminal.\",\n        dark=True\n    ),\n    tokens=ThemeTokens.from_dict(GRUVBOX)\n)\n\nNORD_PACK = ThemePack(\n    meta=ThemeMeta(\n        name=\"Nord\",\n        author=\"arcticicestudio\",\n        version=\"1.0.0\",\n        description=\"An arctic, north-bluish clean dark theme.\",\n        dark=True\n    ),\n    tokens=ThemeTokens.from_dict(NORD)\n)\n\nBUILTIN_THEMES: dict[str, ThemePack] = {\n    \"catppuccin_mocha\": CATPPUCCIN_MOCHA_PACK,\n    \"dracula\": DRACULA_PACK,\n    \"tokyo_night\": TOKYO_NIGHT_PACK,\n    \"high_contrast\": HIGH_CONTRAST_PACK,\n    \"gruvbox\": GRUVBOX_PACK,\n    \"nord\": NORD_PACK\n}\n\n",
  "termforge/theme/loader.py": "from __future__ import annotations\nimport json\nimport yaml  # type: ignore\nfrom termforge.theme.types import ThemePack\n\ndef load_theme_yaml(path: str) -> ThemePack:\n    with open(path, \"r\", encoding=\"utf-8\") as f:\n        data = yaml.safe_load(f)\n    return ThemePack.from_dict(data)\n\ndef load_theme_json(path: str) -> ThemePack:\n    with open(path, \"r\", encoding=\"utf-8\") as f:\n        data = json.load(f)\n    return ThemePack.from_dict(data)\n\ndef save_theme_yaml(theme: ThemePack, path: str) -> None:\n    with open(path, \"w\", encoding=\"utf-8\") as f:\n        yaml.safe_dump(theme.to_dict(), f, sort_keys=False)\n\ndef save_theme_json(theme: ThemePack, path: str) -> None:\n    with open(path, \"w\", encoding=\"utf-8\") as f:\n        json.dump(theme.to_dict(), f, indent=2)\n",
  "termforge/theme/preview.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth, ColorValue, StyleSpec\nfrom termforge.text.render import style_to_ansi\nfrom termforge.theme.types import ThemePack\nfrom termforge.theme.contrast import check_contrast\n\ndef render_theme_preview(theme: ThemePack, depth: ColorDepth = ColorDepth.TRUECOLOR) -> list[str]:\n    lines = []\n    \n    meta = theme.meta\n    tokens = theme.tokens\n    \n    # 1. Header\n    lines.append(f\"=== Theme Preview: {meta.name} ===\")\n    lines.append(f\"Author:      {meta.author}\")\n    lines.append(f\"Description: {meta.description}\")\n    lines.append(\"\")\n    \n    # 2. Color Palette\n    lines.append(\"--- Color Palette ---\")\n    for name, val in tokens.colors.items():\n        # Render a colored box\n        style = StyleSpec(fg=val, bg=val)\n        start_ansi, end_ansi = style_to_ansi(style, tokens, depth)\n        hex_val = f\"#{val.r:02x}{val.g:02x}{val.b:02x}\"\n        lines.append(f\"  {start_ansi}    {end_ansi}  {name:<12} {hex_val} (RGB: {val.r},{val.g},{val.b})\")\n    lines.append(\"\")\n    \n    # 3. Contrast Check\n    lines.append(\"--- Contrast Audit (vs Surface) ---\")\n    lines.append(\"  Token        \u2502 Ratio \u2502 AA   \u2502 AAA\")\n    lines.append(\"  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\")\n    \n    contrast_results = check_contrast(theme)\n    for res in contrast_results:\n        aa = \"PASS\" if res[\"passes_aa\"] else \"FAIL\"\n        aaa = \"PASS\" if res[\"passes_aaa\"] else \"FAIL\"\n        \n        # Color code the pass/fail\n        green = \"\\033[32m\"\n        red = \"\\033[31m\"\n        reset = \"\\033[0m\"\n        \n        aa_color = green if res[\"passes_aa\"] else red\n        aaa_color = green if res[\"passes_aaa\"] else red\n        \n        aa_str = f\"{aa_color}{aa:<4}{reset}\"\n        aaa_str = f\"{aaa_color}{aaa:<4}{reset}\"\n        \n        lines.append(f\"  {res['fg_token']:<12} \u2502 {res['ratio']:<5} \u2502 {aa_str} \u2502 {aaa_str}\")\n        \n    return lines\n",
  "termforge/theme/contrast.py": "from __future__ import annotations\nfrom termforge.theme.types import ThemePack\nfrom termforge.core.types import ColorValue\n\ndef srgb_to_linear(c: int) -> float:\n    val = c / 255.0\n    if val <= 0.04045:\n        return val / 12.92\n    return float(((val + 0.055) / 1.055) ** 2.4)\n\ndef luminance(color: ColorValue) -> float:\n    # WCAG relative luminance formula\n    r = srgb_to_linear(color.r)\n    g = srgb_to_linear(color.g)\n    b = srgb_to_linear(color.b)\n    return 0.2126 * r + 0.7152 * g + 0.0722 * b\n\ndef contrast_ratio(c1: ColorValue, c2: ColorValue) -> float:\n    l1 = luminance(c1)\n    l2 = luminance(c2)\n    # L1 must be the lighter color\n    if l1 < l2:\n        l1, l2 = l2, l1\n    return (l1 + 0.05) / (l2 + 0.05)\n\ndef meets_aa(ratio: float) -> bool:\n    return ratio >= 4.5\n\ndef meets_aaa(ratio: float) -> bool:\n    return ratio >= 7.0\n\ndef check_contrast(theme: ThemePack) -> list[dict]:\n    # Check key text color tokens on the surface color\n    tokens = theme.tokens\n    surface = tokens.colors.get(\"surface\", ColorValue(0, 0, 0))\n    \n    pairs_to_check = [\"text\", \"primary\", \"secondary\", \"success\", \"error\", \"warning\"]\n    results = []\n    \n    for name in pairs_to_check:\n        fg = tokens.colors.get(name)\n        if fg:\n            ratio = contrast_ratio(fg, surface)\n            results.append({\n                \"fg_token\": name,\n                \"bg_token\": \"surface\",\n                \"fg_rgb\": (fg.r, fg.g, fg.b),\n                \"bg_rgb\": (surface.r, surface.g, surface.b),\n                \"ratio\": round(ratio, 2),\n                \"passes_aa\": meets_aa(ratio),\n                \"passes_aaa\": meets_aaa(ratio)\n            })\n            \n    return results\n",
  "termforge/theme/__init__.py": "\"\"\"TermForge theme module \u2014 WCAG auditing, builtin packs, previewing.\"\"\"\nfrom termforge.theme.types import ThemeMeta, ThemePack\nfrom termforge.theme.builtin import (\n    CATPPUCCIN_MOCHA_PACK,\n    DRACULA_PACK,\n    TOKYO_NIGHT_PACK,\n    HIGH_CONTRAST_PACK,\n    BUILTIN_THEMES,\n)\nfrom termforge.theme.contrast import luminance, contrast_ratio, check_contrast, meets_aa, meets_aaa\nfrom termforge.theme.preview import render_theme_preview\nfrom termforge.theme.loader import load_theme_yaml, load_theme_json, save_theme_yaml, save_theme_json\n\n__all__ = [\n    \"ThemeMeta\",\n    \"ThemePack\",\n    \"CATPPUCCIN_MOCHA_PACK\",\n    \"DRACULA_PACK\",\n    \"TOKYO_NIGHT_PACK\",\n    \"HIGH_CONTRAST_PACK\",\n    \"BUILTIN_THEMES\",\n    \"luminance\",\n    \"contrast_ratio\",\n    \"check_contrast\",\n    \"meets_aa\",\n    \"meets_aaa\",\n    \"render_theme_preview\",\n    \"load_theme_yaml\",\n    \"load_theme_json\",\n    \"save_theme_yaml\",\n    \"save_theme_json\",\n]\n",
  "termforge/dialog/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec, StyleSpec\n\n@dataclass\nclass DialogSpec(RenderableSpec):\n    title: str = \"\"\n    body: str = \"\"\n    buttons: list[str] = field(default_factory=list)\n    focused_button_index: int = 0\n    spec_type: str = \"dialog\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"title\": self.title,\n            \"body\": self.body,\n            \"buttons\": self.buttons,\n            \"focused_button_index\": self.focused_button_index\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> DialogSpec:\n        return cls(\n            title=d[\"title\"],\n            body=d[\"body\"],\n            buttons=d.get(\"buttons\", []),\n            focused_button_index=d.get(\"focused_button_index\", 0)\n        )\n",

  "termforge/dialog/render.py": "from __future__ import annotations\nfrom termforge.core.types import Size\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.borders.types import BorderSpec\nfrom termforge.borders.render import render_border\nfrom termforge.dialog.types import DialogSpec\n\ndef render_dialog(spec: DialogSpec, max_size: Size, theme: ThemeTokens) -> list[str]:\n    # Construct inner body lines\n    content = [spec.body]\n    \n    # Render buttons: [ OK ]  [ Cancel ]\n    btn_row = \"\"\n    for i, btn in enumerate(spec.buttons):\n        is_focused = (i == spec.focused_button_index)\n        btn_str = f\"<{btn}>\" if is_focused else f\"[{btn}]\"\n        btn_row += btn_str + \"  \"\n    \n    content.append(\"\")\n    content.append(btn_row.strip())\n    \n    border_spec = BorderSpec(\n        title=spec.title\n    )\n    \n    # Dialog takes up the full width/height or fits the content\n    lines = render_border(border_spec, content, width=max_size.width, theme=theme)\n    \n    # Pad to max_size.height\n    while len(lines) < max_size.height:\n        lines.append(\" \" * max_size.width)\n        \n    return lines[:max_size.height]\n",
  "termforge/tables/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec, StyleSpec\nfrom termforge.text.types import TextAlign\n\n@dataclass\nclass ColumnSpec:\n    title: str\n    width: int | None = None\n    align: TextAlign = TextAlign.LEFT\n    style: StyleSpec | None = None\n    padding_left: int = 0\n    padding_right: int = 0\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"title\": self.title,\n            \"width\": self.width,\n            \"align\": self.align.value,\n            \"style\": self.style.to_dict() if self.style else None,\n            \"padding_left\": self.padding_left,\n            \"padding_right\": self.padding_right\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ColumnSpec:\n        return cls(\n            title=d[\"title\"],\n            width=d.get(\"width\"),\n            align=TextAlign(d.get(\"align\", \"left\")),\n            style=StyleSpec.from_dict(d[\"style\"]) if d.get(\"style\") else None,\n            padding_left=d.get(\"padding_left\", 0),\n            padding_right=d.get(\"padding_right\", 0)\n        )\n\n@dataclass\nclass TableSpec(RenderableSpec):\n    columns: list[ColumnSpec] = field(default_factory=list)\n    rows: list[list[str]] = field(default_factory=list)\n    header_style: StyleSpec | None = None\n    row_style: StyleSpec | None = None\n    alt_row_style: StyleSpec | None = None\n    column_gap: int = 1\n    spec_type: str = \"table\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"columns\": [c.to_dict() for c in self.columns],\n            \"rows\": self.rows,\n            \"header_style\": self.header_style.to_dict() if self.header_style else None,\n            \"row_style\": self.row_style.to_dict() if self.row_style else None,\n            \"alt_row_style\": self.alt_row_style.to_dict() if self.alt_row_style else None,\n            \"column_gap\": self.column_gap\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> TableSpec:\n        return cls(\n            columns=[ColumnSpec.from_dict(c) for c in d.get(\"columns\", [])],\n            rows=d.get(\"rows\", []),\n            header_style=StyleSpec.from_dict(d[\"header_style\"]) if d.get(\"header_style\") else None,\n            row_style=StyleSpec.from_dict(d[\"row_style\"]) if d.get(\"row_style\") else None,\n            alt_row_style=StyleSpec.from_dict(d[\"alt_row_style\"]) if d.get(\"alt_row_style\") else None,\n            column_gap=d.get(\"column_gap\", 1)\n        )\n",

  "termforge/tables/render.py": "from __future__ import annotations\nfrom termforge.core.types import LayoutResult, Size, StyleSpec\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.tables.types import TableSpec, ColumnSpec\nfrom termforge.text.types import TextSpec, TextAlign\nfrom termforge.text.render import render_text\n\ndef render_table(spec: TableSpec, max_size: Size, theme: ThemeTokens) -> list[str]:\n    # 1. Calculate column widths and inner content widths\n    col_widths = []\n    col_inner_widths = []\n    for i, col in enumerate(spec.columns):\n        if col.width is not None:\n            inner_w = col.width\n        else:\n            w = len(col.title)\n            for row in spec.rows:\n                if i < len(row):\n                    w = max(w, len(str(row[i])))\n            inner_w = w\n        col_inner_widths.append(inner_w)\n        col_widths.append(inner_w + col.padding_left + col.padding_right)\n            \n    # 2. Render header\n    lines = []\n    header_parts = []\n    for col, width, inner_w in zip(spec.columns, col_widths, col_inner_widths):\n        ts = TextSpec(content=col.title, align=col.align, max_width=inner_w)\n        res = render_text(ts, theme=theme, available_width=inner_w)\n        content = res[0] if res else \" \" * inner_w\n        padded_content = \" \" * col.padding_left + content + \" \" * col.padding_right\n        header_parts.append(padded_content)\n        \n    sep = \" \" * spec.column_gap + \"\u2502\" + \" \" * spec.column_gap\n    dash_sep = \"\u2500\" * spec.column_gap + \"\u253c\" + \"\u2500\" * spec.column_gap\n\n    header_line = sep.join(header_parts)\n    lines.append(header_line)\n    lines.append(dash_sep.join(\"\u2500\" * w for w in col_widths))\n    \n    # 3. Render rows\n    for r_idx, row in enumerate(spec.rows):\n        row_parts = []\n        for i, (col, width, inner_w) in enumerate(zip(spec.columns, col_widths, col_inner_widths)):\n            text = str(row[i]) if i < len(row) else \"\"\n            ts = TextSpec(content=text, align=col.align, max_width=inner_w)\n            res = render_text(ts, theme=theme, available_width=inner_w)\n            content = res[0] if res else \" \" * inner_w\n            padded_content = \" \" * col.padding_left + content + \" \" * col.padding_right\n            row_parts.append(padded_content)\n        lines.append(sep.join(row_parts))\n        \n    return lines\n",
