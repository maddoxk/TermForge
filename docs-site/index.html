ottom, left.\"\"\"\n\n    top: int = 0\n    right: int = 0\n    bottom: int = 0\n    left: int = 0\n\n    @property\n    def horizontal(self) -> int:\n        return self.left + self.right\n\n    @property\n    def vertical(self) -> int:\n        return self.top + self.bottom\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"top\": self.top,\n            \"right\": self.right,\n            \"bottom\": self.bottom,\n            \"left\": self.left,\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> Spacing:\n        return cls(\n            top=d.get(\"top\", 0),\n            right=d.get(\"right\", 0),\n            bottom=d.get(\"bottom\", 0),\n            left=d.get(\"left\", 0),\n        )\n\n\n@dataclass\nclass BoxConstraints:\n    \"\"\"Min/max width and height constraints for layout.\"\"\"\n\n    min_width: int = 0\n    max_width: int = 0\n    min_height: int = 0\n    max_height: int = 0\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"min_width\": self.min_width,\n            \"max_width\": self.max_width,\n            \"min_height\": self.min_height,\n            \"max_height\": self.max_height,\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> BoxConstraints:\n        return cls(\n            min_width=d.get(\"min_width\", 0),\n            max_width=d.get(\"max_width\", 0),\n            min_height=d.get(\"min_height\", 0),\n            max_height=d.get(\"max_height\", 0),\n        )\n\n\n@dataclass\nclass LayoutResult:\n    \"\"\"Result of layout computation \u2014 an absolute-positioned tree.\"\"\"\n\n    position: Position\n    size: Size\n    children: list[LayoutResult] = field(default_factory=list)\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"position\": self.position.to_dict(),\n            \"size\": self.size.to_dict(),\n            \"children\": [c.to_dict() for c in self.children],\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> LayoutResult:\n        return cls(\n            position=Position.from_dict(d[\"position\"]),\n            size=Size.from_dict(d[\"size\"]),\n            children=[LayoutResult.from_dict(c) for c in d.get(\"children\", [])],\n        )\n\n\n@dataclass\nclass RenderableSpec:\n    \"\"\"Base spec that all component specs inherit from.\n\n    Every component is described as a plain-data spec before it touches\n    any rendering backend.\n    \"\"\"\n\n    spec_type: str = \"base\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\"spec_type\": self.spec_type}\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> RenderableSpec:\n        return cls(spec_type=d.get(\"spec_type\", \"base\"))\n\n\n@dataclass\nclass StyleSpec:\n    \"\"\"Text styling specification \u2014 colors + decorations.\"\"\"\n\n    fg: ColorValue | None = None\n    bg: ColorValue | None = None\n    bold: bool = False\n    dim: bool = False\n    italic: bool = False\n    underline: bool = False\n    strikethrough: bool = False\n\n    def to_dict(self) -> dict[str, Any]:\n        d: dict[str, Any] = {\n            \"bold\": self.bold,\n            \"dim\": self.dim,\n            \"italic\": self.italic,\n            \"underline\": self.underline,\n            \"strikethrough\": self.strikethrough,\n        }\n        if self.fg is not None:\n            d[\"fg\"] = self.fg.to_dict()\n        if self.bg is not None:\n            d[\"bg\"] = self.bg.to_dict()\n        return d\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> StyleSpec:\n        fg = ColorValue.from_dict(d[\"fg\"]) if \"fg\" in d else None\n        bg = ColorValue.from_dict(d[\"bg\"]) if \"bg\" in d else None\n        return cls(\n            fg=fg,\n            bg=bg,\n            bold=d.get(\"bold\", False),\n            dim=d.get(\"dim\", False),\n            italic=d.get(\"italic\", False),\n            underline=d.get(\"underline\", False),\n            strikethrough=d.get(\"strikethrough\", False),\n        )\n",
  "termforge/core/capability.py": "\"\"\"Terminal capability detection \u2014 pure functions, no Rich imports.\n\nDetects color depth, terminal size, and Unicode support from environment\nvariables and system calls.\n\"\"\"\nfrom __future__ import annotations\n\nimport os\nfrom dataclasses import dataclass\nfrom typing import Any\n\nfrom termforge.core.types import ColorDepth, Size\n\n\ndef detect_color_depth() -> ColorDepth:\n    \"\"\"Detect the terminal's color depth from environment variables.\n\n    Check order:\n    1. COLORTERM == 'truecolor' or '24bit' \u2192 TRUECOLOR\n    2. COLORTERM == '256color' or TERM contains '256color' \u2192 COLOR_256\n    3. TERM is set and not 'dumb' \u2192 COLOR_16\n    4. Fallback \u2192 MONOCHROME\n    \"\"\"\n    colorterm = os.environ.get(\"COLORTERM\", \"\").lower()\n    if colorterm in (\"truecolor\", \"24bit\"):\n        return ColorDepth.TRUECOLOR\n\n    term = os.environ.get(\"TERM\", \"\").lower()\n    if colorterm == \"256color\" or \"256color\" in term:\n        return ColorDepth.COLOR_256\n\n    if term and term != \"dumb\":\n        return ColorDepth.COLOR_16\n\n    return ColorDepth.MONOCHROME\n\n\ndef detect_terminal_size() -> Size:\n    \"\"\"Return the current terminal size, falling back to 80\u00d724.\"\"\"\n    try:\n        cols, rows = os.get_terminal_size()\n        return Size(width=cols, height=rows)\n    except (ValueError, OSError):\n        return Size(width=80, height=24)\n\n\ndef detect_unicode_support() -> bool:\n    \"\"\"Check whether the terminal likely supports Unicode (UTF-8).\n\n    Inspects LC_ALL, LANG, and LC_CTYPE for 'utf' (case-insensitive).\n    \"\"\"\n    for var in (\"LC_ALL\", \"LANG\", \"LC_CTYPE\"):\n        val = os.environ.get(var, \"\")\n        if \"utf\" in val.lower():\n            return True\n    return False\n\n\n@dataclass\nclass TerminalCapabilities:\n    \"\"\"Aggregated terminal capabilities.\"\"\"\n\n    color_depth: ColorDepth\n    size: Size\n    unicode_support: bool\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"color_depth\": self.color_depth.value,\n            \"size\": self.size.to_dict(),\n            \"unicode_support\": self.unicode_support,\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> TerminalCapabilities:\n        return cls(\n            color_depth=ColorDepth(d[\"color_depth\"]),\n            size=Size.from_dict(d[\"size\"]),\n            unicode_support=d[\"unicode_support\"],\n        )\n\n\ndef detect_capabilities() -> TerminalCapabilities:\n    \"\"\"Run all capability detections and return the result.\"\"\"\n    return TerminalCapabilities(\n        color_depth=detect_color_depth(),\n        size=detect_terminal_size(),\n        unicode_support=detect_unicode_support(),\n    )\n",
  "termforge/core/color.py": "\"\"\"Color resolution with depth-tier fallback \u2014 pure functions, no Rich imports.\n\nResolves truecolor (24-bit) values down to 256-color, 16-color, or\nmonochrome, using Euclidean RGB distance for nearest-match selection.\n\"\"\"\nfrom __future__ import annotations\n\nimport math\n\nfrom termforge.core.types import ColorDepth, ColorValue\n\n# ---------------------------------------------------------------------------\n# The 16 standard ANSI colors as (R, G, B)\n# ---------------------------------------------------------------------------\nANSI_16_COLORS: list[tuple[int, int, int]] = [\n    (0, 0, 0),        # 0  Black\n    (128, 0, 0),      # 1  Red\n    (0, 128, 0),      # 2  Green\n    (128, 128, 0),    # 3  Yellow\n    (0, 0, 128),      # 4  Blue\n    (128, 0, 128),    # 5  Magenta\n    (0, 128, 128),    # 6  Cyan\n    (192, 192, 192),  # 7  White (light gray)\n    (128, 128, 128),  # 8  Bright Black (dark gray)\n    (255, 0, 0),      # 9  Bright Red\n    (0, 255, 0),      # 10 Bright Green\n    (255, 255, 0),    # 11 Bright Yellow\n    (0, 0, 255),      # 12 Bright Blue\n    (255, 0, 255),    # 13 Bright Magenta\n    (0, 255, 255),    # 14 Bright Cyan\n    (255, 255, 255),  # 15 Bright White\n]\n\n\ndef color_distance(c1: tuple[int, int, int], c2: tuple[int, int, int]) -> float:\n    \"\"\"Euclidean distance between two RGB colors.\"\"\"\n    return math.sqrt(\n        (c1[0] - c2[0]) ** 2 + (c1[1] - c2[1]) ** 2 + (c1[2] - c2[2]) ** 2\n    )\n\n\n# ---------------------------------------------------------------------------\n# 6\u00d76\u00d76 color cube + 24-step grayscale ramp (indices 16\u2013255)\n# ---------------------------------------------------------------------------\n_CUBE_VALUES = [0, 95, 135, 175, 215, 255]\n\n\ndef _build_256_palette() -> list[tuple[int, int, int]]:\n    \"\"\"Build the full 256-color palette as a list of (R, G, B) tuples.\"\"\"\n    palette: list[tuple[int, int, int]] = list(ANSI_16_COLORS)  # 0-15\n    # 6\u00d76\u00d76 cube: indices 16-231\n    for r_idx in range(6):\n        for g_idx in range(6):\n            for b_idx in range(6):\n                palette.append((_CUBE_VALUES[r_idx], _CUBE_VALUES[g_idx], _CUBE_VALUES[b_idx]))\n    # Grayscale ramp: indices 232-255\n    for i in range(24):\n        v = 8 + 10 * i\n        palette.append((v, v, v))\n    return palette\n\n\n_PALETTE_256 = _build_256_palette()\n\n\ndef _nearest_256(rgb: tuple[int, int, int]) -> tuple[int, int, int]:\n    \"\"\"Find the nearest color in the 256-color palette.\"\"\"\n    best_dist = float(\"inf\")\n    best_color = _PALETTE_256[0]\n    for color in _PALETTE_256:\n        d = color_distance(rgb, color)\n        if d < best_dist:\n            best_dist = d\n            best_color = color\n            if d == 0.0:\n                break\n    return best_color\n\n\ndef _nearest_16(rgb: tuple[int, int, int]) -> tuple[int, int, int]:\n    \"\"\"Find the nearest color in the 16 standard ANSI colors.\"\"\"\n    best_dist = float(\"inf\")\n    best_color = ANSI_16_COLORS[0]\n    for color in ANSI_16_COLORS:\n        d = color_distance(rgb, color)\n        if d < best_dist:\n            best_dist = d\n            best_color = color\n            if d == 0.0:\n                break\n    return best_color\n\n\ndef resolve_color(\n    color: ColorValue, depth: ColorDepth\n) -> tuple[int, int, int] | None:\n    \"\"\"Resolve a ColorValue to an RGB tuple appropriate for the target depth.\n\n    Returns:\n        (r, g, b) for TRUECOLOR, COLOR_256, and COLOR_16.\n        None for MONOCHROME (the renderer decides bold/dim mapping).\n    \"\"\"\n    rgb = color.rgb\n    if depth == ColorDepth.TRUECOLOR:\n        return rgb\n    if depth == ColorDepth.COLOR_256:\n        return _nearest_256(rgb)\n    if depth == ColorDepth.COLOR_16:\n        return _nearest_16(rgb)\n    # MONOCHROME\n    return None\n\n\ndef interpolate_color(c1: ColorValue, c2: ColorValue, t: float) -> ColorValue:\n    \"\"\"Linearly interpolate between two colors.\n\n    Args:\n        c1: Start color (t=0).\n        c2: End color (t=1).\n        t: Interpolation factor, clamped to [0, 1].\n\n    Returns:\n        A new ColorValue with interpolated RGB values.\n    \"\"\"\n    t = max(0.0, min(1.0, t))\n    r = round(c1.r + (c2.r - c1.r) * t)\n    g = round(c1.g + (c2.g - c1.g) * t)\n    b = round(c1.b + (c2.b - c1.b) * t)\n    return ColorValue(r=r, g=g, b=b)\n",
  "termforge/core/theme.py": "\"\"\"Theme token system \u2014 pure data, no Rich imports.\n\nThemes are plain dicts of design tokens (colors, spacing, border glyphs,\ntypography support flags). Built-in themes are defined as data, not code.\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom typing import Any\n\nfrom termforge.core.types import ColorValue\n\n\n# ---------------------------------------------------------------------------\n# ThemeTokens dataclass\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass ThemeTokens:\n    \"\"\"A complete theme defined as design tokens.\"\"\"\n\n    colors: dict[str, ColorValue] = field(default_factory=dict)\n    spacing: dict[str, int] = field(default_factory=dict)\n    border_glyphs: dict[str, dict[str, str]] = field(default_factory=dict)\n    typography: dict[str, bool] = field(default_factory=dict)\n    states: dict[str, dict[str, Any]] = field(default_factory=dict)\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"colors\": {k: v.to_dict() for k, v in self.colors.items()},\n            \"spacing\": dict(self.spacing),\n            \"border_glyphs\": {\n                name: dict(glyphs) for name, glyphs in self.border_glyphs.items()\n            },\n            \"typography\": dict(self.typography),\n            \"states\": {\n                state: {\n                    \"colors\": {\n                        k: v.to_dict() if hasattr(v, \"to_dict\") else v\n                        for k, v in sub.get(\"colors\", {}).items()\n                    },\n                    \"spacing\": dict(sub.get(\"spacing\", {})),\n                    \"border_glyphs\": {\n                        name: dict(glyphs) for name, glyphs in sub.get(\"border_glyphs\", {}).items()\n                    },\n                    \"typography\": dict(sub.get(\"typography\", {})),\n                }\n                for state, sub in self.states.items()\n            },\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ThemeTokens:\n        parsed_states = {}\n        for state, sub in d.get(\"states\", {}).items():\n            parsed_states[state] = {\n                \"colors\": {\n                    k: ColorValue.from_dict(v) if isinstance(v, dict) else v\n                    for k, v in sub.get(\"colors\", {}).items()\n                },\n                \"spacing\": dict(sub.get(\"spacing\", {})),\n                \"border_glyphs\": {\n                    name: dict(glyphs) for name, glyphs in sub.get(\"border_glyphs\", {}).items()\n                },\n                \"typography\": dict(sub.get(\"typography\", {})),\n            }\n        return cls(\n            colors={k: ColorValue.from_dict(v) for k, v in d.get(\"colors\", {}).items()},\n            spacing=dict(d.get(\"spacing\", {})),\n            border_glyphs={\n                name: dict(glyphs)\n                for name, glyphs in d.get(\"border_glyphs\", {}).items()\n            },\n            typography=dict(d.get(\"typography\", {})),\n            states=parsed_states,\n        )\n\n\n\n# ---------------------------------------------------------------------------\n# Token resolution\n# ---------------------------------------------------------------------------\n\ndef resolve_token(tokens: ThemeTokens, token_path: str) -> Any:\n    \"\"\"Look up a token by dot-notation path.\n\n    Examples:\n        resolve_token(tokens, \"colors.primary\")  \u2192 ColorValue(...)\n        resolve_token(tokens, \"spacing.md\")       \u2192 4\n        resolve_token(tokens, \"border_glyphs.rounded.tl\") \u2192 \"\u256d\"\n\n    Raises:\n        KeyError: if the path does not resolve.\n    \"\"\"\n    parts = token_path.split(\".\")\n    if len(parts) < 2:\n        raise KeyError(f\"Token path must have at least two segments: {token_path!r}\")\n\n    category = parts[0]\n    obj: Any = getattr(tokens, category, None)\n    if obj is None:\n        raise KeyError(f\"Unknown token category: {category!r}\")\n\n    for part in parts[1:]:\n        if isinstance(obj, dict):\n            if part not in obj:\n                raise KeyError(f\"Token not found: {token_path!r}\")\n            obj = obj[part]\n        else:\n            raise KeyError(f\"Cannot traverse into non-dict at {part!r} in {token_path!r}\")\n\n    return obj\n\n\ndef resolve_state_token(tokens: ThemeTokens, token_path: str, state: str | None = None) -> Any:\n    \"\"\"Look up a token by dot-notation path, with optional state override.\n\n    If a state is provided (e.g. \"focused\"), we first check if the token path\n    exists under states[state]. If found, we return it. If not found (or state\n    is None), we fall back to the standard token resolution.\n\n    Raises:\n        KeyError: if the path does not resolve in either the state or base theme.\n    \"\"\"\n    if state and state in tokens.states:\n        sub = tokens.states[state]\n        parts = token_path.split(\".\")\n        if len(parts) >= 2:\n            category = parts[0]\n            obj = sub.get(category)\n            if isinstance(obj, dict):\n                found = True\n                for part in parts[1:]:\n                    if isinstance(obj, dict) and part in obj:\n                        obj = obj[part]\n                    else:\n                        found = False\n                        break\n                if found:\n                    return obj\n    return resolve_token(tokens, token_path)\n\n\n\ndef load_theme_from_dict(d: dict[str, Any]) -> ThemeTokens:\n    \"\"\"Deserialize a theme from a plain dict.\"\"\"\n    return ThemeTokens.from_dict(d)\n\n\ndef theme_to_dict(t: ThemeTokens) -> dict[str, Any]:\n    \"\"\"Serialize a theme to a plain dict.\"\"\"\n    return t.to_dict()\n\n\n# ---------------------------------------------------------------------------\n# Helper to build a ColorValue dict quickly\n# ---------------------------------------------------------------------------\n\ndef _c(r: int, g: int, b: int, name: str | None = None) -> ColorValue:\n    return ColorValue(r=r, g=g, b=b, name=name)\n\n\n# ---------------------------------------------------------------------------\n# Default spacing scale (shared by all built-in themes)\n# ---------------------------------------------------------------------------\n\n_DEFAULT_SPACING: dict[str, int] = {\n    \"xs\": 1,\n    \"sm\": 2,\n    \"md\": 4,\n    \"lg\": 8,\n    \"xl\": 16,\n}\n\n# ---------------------------------------------------------------------------\n# Default border glyph sets\n# ---------------------------------------------------------------------------\n\n_BORDER_GLYPHS: dict[str, dict[str, str]] = {\n    \"single\": {\n        \"tl\": \"\u250c\", \"tr\": \"\u2510\", \"bl\": \"\u2514\", \"br\": \"\u2518\",\n        \"h\": \"\u2500\", \"v\": \"\u2502\",\n        \"t_down\": \"\u252c\", \"t_up\": \"\u2534\", \"t_right\": \"\u251c\", \"t_left\": \"\u2524\",\n        \"cross\": \"\u253c\",\n    },\n    \"double\": {\n        \"tl\": \"\u2554\", \"tr\": \"\u2557\", \"bl\": \"\u255a\", \"br\": \"\u255d\",\n        \"h\": \"\u2550\", \"v\": \"\u2551\",\n        \"t_down\": \"\u2566\", \"t_up\": \"\u2569\", \"t_right\": \"\u2560\", \"t_left\": \"\u2563\",\n        \"cross\": \"\u256c\",\n    },\n    \"rounded\": {\n        \"tl\": \"\u256d\", \"tr\": \"\u256e\", \"bl\": \"\u2570\", \"br\": \"\u256f\",\n        \"h\": \"\u2500\", \"v\": \"\u2502\",\n        \"t_down\": \"\u252c\", \"t_up\": \"\u2534\", \"t_right\": \"\u251c\", \"t_left\": \"\u2524\",\n        \"cross\": \"\u253c\",\n    },\n    \"ascii\": {\n        \"tl\": \"+\", \"tr\": \"+\", \"bl\": \"+\", \"br\": \"+\",\n        \"h\": \"-\", \"v\": \"|\",\n        \"t_down\": \"+\", \"t_up\": \"+\", \"t_right\": \"+\", \"t_left\": \"+\",\n        \"cross\": \"+\",\n    },\n}\n\n_DEFAULT_TYPOGRAPHY: dict[str, bool] = {\n    \"bold_supported\": True,\n    \"dim_supported\": True,\n    \"italic_supported\": True,\n}\n\n\n# ---------------------------------------------------------------------------\n# Built-in themes as dicts\n# ---------------------------------------------------------------------------\n\nCATPPUCCIN_MOCHA: dict[str, Any] = {\n    \"colors\": {\n        \"primary\": {\"r\": 137, \"g\": 180, \"b\": 250, \"name\": \"blue\"},\n        \"secondary\": {\"r\": 180, \"g\": 190, \"b\": 254, \"name\": \"lavender\"},\n        \"surface\": {\"r\": 30, \"g\": 30, \"b\": 46, \"name\": \"base\"},\n        \"text\": {\"r\": 205, \"g\": 214, \"b\": 244, \"name\": \"text\"},\n        \"error\": {\"r\": 243, \"g\": 139, \"b\": 168, \"name\": \"red\"},\n        \"warning\": {\"r\": 249, \"g\": 226, \"b\": 175, \"name\": \"yellow\"},\n        \"success\": {\"r\": 166, \"g\": 227, \"b\": 161, \"name\": \"green\"},\n        \"border\": {\"r\": 88, \"g\": 91, \"b\": 112, \"name\": \"overlay0\"},\n    },\n    \"spacing\": _DEFAULT_SPACING,\n    \"border_glyphs\": _BORDER_GLYPHS,\n    \"typography\": _DEFAULT_TYPOGRAPHY,\n}\n\nDRACULA: dict[str, Any] = {\n    \"colors\": {\n        \"primary\": {\"r\": 189, \"g\": 147, \"b\": 249, \"name\": \"purple\"},\n        \"secondary\": {\"r\": 139, \"g\": 233, \"b\": 253, \"name\": \"cyan\"},\n        \"surface\": {\"r\": 40, \"g\": 42, \"b\": 54, \"name\": \"background\"},\n        \"text\": {\"r\": 248, \"g\": 248, \"b\": 242, \"name\": \"foreground\"},\n        \"error\": {\"r\": 255, \"g\": 85, \"b\": 85, \"name\": \"red\"},\n        \"warning\": {\"r\": 241, \"g\": 250, \"b\": 140, \"name\": \"yellow\"},\n        \"success\": {\"r\": 80, \"g\": 250, \"b\": 123, \"name\": \"green\"},\n        \"border\": {\"r\": 68, \"g\": 71, \"b\": 90, \"name\": \"comment\"},\n    },\n    \"spacing\": _DEFAULT_SPACING,\n    \"border_glyphs\": _BORDER_GLYPHS,\n    \"typography\": _DEFAULT_TYPOGRAPHY,\n}\n\nTOKYO_NIGHT: dict[str, Any] = {\n    \"colors\": {\n        \"primary\": {\"r\": 122, \"g\": 162, \"b\": 247, \"name\": \"blue\"},\n        \"secondary\": {\"r\": 187, \"g\": 154, \"b\": 247, \"name\": \"purple\"},\n        \"surface\": {\"r\": 26, \"g\": 27, \"b\": 38, \"name\": \"bg_dark\"},\n        \"text\": {\"r\": 192, \"g\": 202, \"b\": 245, \"name\": \"fg\"},\n        \"error\": {\"r\": 247, \"g\": 118, \"b\": 142, \"name\": \"red\"},\n        \"warning\": {\"r\": 224, \"g\": 175, \"b\": 104, \"name\": \"yellow\"},\n        \"success\": {\"r\": 158, \"g\": 206, \"b\": 106, \"name\": \"green\"},\n        \"border\": {\"r\": 61, \"g\": 63, \"b\": 85, \"name\": \"dark3\"},\n    },\n    \"spacing\": _DEFAULT_SPACING,\n    \"border_glyphs\": _BORDER_GLYPHS,\n    \"typography\": _DEFAULT_TYPOGRAPHY,\n}\n\nHIGH_CONTRAST: dict[str, Any] = {\n    \"colors\": {\n        \"primary\": {\"r\": 0, \"g\": 255, \"b\": 255, \"name\": \"cyan\"},\n        \"secondary\": {\"r\": 255, \"g\": 255, \"b\": 0, \"name\": \"yellow\"},\n        \"surface\": {\"r\": 0, \"g\": 0, \"b\": 0, \"name\": \"black\"},\n        \"text\": {\"r\": 255, \"g\": 255, \"b\": 255, \"name\": \"white\"},\n        \"error\": {\"r\": 255, \"g\": 0, \"b\": 0, \"name\": \"red\"},\n        \"warning\": {\"r\": 255, \"g\": 255, \"b\": 0, \"name\": \"yellow\"},\n        \"success\": {\"r\": 0, \"g\": 255, \"b\": 0, \"name\": \"green\"},\n        \"border\": {\"r\": 255, \"g\": 255, \"b\": 255, \"name\": \"white\"},\n    },\n    \"spacing\": _DEFAULT_SPACING,\n    \"border_glyphs\": _BORDER_GLYPHS,\n    \"typography\": _DEFAULT_TYPOGRAPHY,\n}\n\nGRUVBOX: dict[str, Any] = {\n    \"colors\": {\n        \"primary\": {\"r\": 250, \"g\": 189, \"b\": 47, \"name\": \"gold\"},\n        \"secondary\": {\"r\": 142, \"g\": 192, \"b\": 124, \"name\": \"aqua\"},\n        \"surface\": {\"r\": 40, \"g\": 40, \"b\": 40, \"name\": \"dark0\"},\n        \"text\": {\"r\": 235, \"g\": 219, \"b\": 178, \"name\": \"fg\"},\n        \"error\": {\"r\": 251, \"g\": 73, \"b\": 52, \"name\": \"red\"},\n        \"warning\": {\"r\": 250, \"g\": 189, \"b\": 47, \"name\": \"gold\"},\n        \"success\": {\"r\": 184, \"g\": 187, \"b\": 38, \"name\": \"green\"},\n        \"border\": {\"r\": 146, \"g\": 131, \"b\": 116, \"name\": \"gray\"},\n    },\n    \"spacing\": _DEFAULT_SPACING,\n    \"border_glyphs\": _BORDER_GLYPHS,\n    \"typography\": _DEFAULT_TYPOGRAPHY,\n}\n\nNORD: dict[str, Any] = {\n    \"colors\": {\n        \"primary\": {\"r\": 136, \"g\": 192, \"b\": 208, \"name\": \"frost_blue\"},\n        \"secondary\": {\"r\": 94, \"g\": 129, \"b\": 172, \"name\": \"dark_blue\"},\n        \"surface\": {\"r\": 46, \"g\": 52, \"b\": 64, \"name\": \"polar_night\"},\n        \"text\": {\"r\": 229, \"g\": 233, \"b\": 240, \"name\": \"snow_storm\"},\n        \"error\": {\"r\": 191, \"g\": 97, \"b\": 106, \"name\": \"aurora_red\"},\n        \"warning\": {\"r\": 235, \"g\": 203, \"b\": 139, \"name\": \"aurora_yellow\"},\n        \"success\": {\"r\": 163, \"g\": 190, \"b\": 140, \"name\": \"aurora_green\"},\n        \"border\": {\"r\": 76, \"g\": 86, \"b\": 106, \"name\": \"polar_gray\"},\n    },\n    \"spacing\": _DEFAULT_SPACING,\n    \"border_glyphs\": _BORDER_GLYPHS,\n    \"typography\": _DEFAULT_TYPOGRAPHY,\n}\n\n\n",
  "termforge/core/scheduler.py": "\"\"\"Animation tick scheduler \u2014 pure functions, immutable state, no Rich imports.\n\nProvides a frame-based scheduler that any component can hook into for\nanimations (spinners, transitions, chart streaming, logo reveals).\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom typing import Any, Callable\n\n# Type alias for animation callbacks\nFrameCallback = Callable[[int, float], bool]\n\"\"\"Callable taking (frame_number, elapsed_ms) \u2192 bool (True = keep running).\"\"\"\n\n\n@dataclass(frozen=True)\nclass AnimationSpec:\n    \"\"\"Specification for a registered animation.\"\"\"\n\n    fps: float\n    duration_ms: float | None  # None = infinite\n    callback_id: str\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"fps\": self.fps,\n            \"duration_ms\": self.duration_ms,\n            \"callback_id\": self.callback_id,\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> AnimationSpec:\n        return cls(\n            fps=d[\"fps\"],\n            duration_ms=d.get(\"duration_ms\"),\n            callback_id=d[\"callback_id\"],\n        )\n\n\n@dataclass(frozen=True)\nclass SchedulerState:\n    \"\"\"Immutable scheduler state \u2014 never mutated, always replaced.\"\"\"\n\n    animations: dict[str, AnimationSpec] = field(default_factory=dict)\n    frame_counts: dict[str, int] = field(default_factory=dict)\n    start_times: dict[str, float] = field(default_factory=dict)\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"animations\": {k: v.to_dict() for k, v in self.animations.items()},\n            \"frame_counts\": dict(self.frame_counts),\n            \"start_times\": dict(self.start_times),\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> SchedulerState:\n        return cls(\n            animations={\n                k: AnimationSpec.from_dict(v) for k, v in d.get(\"animations\", {}).items()\n            },\n            frame_counts=dict(d.get(\"frame_counts\", {})),\n            start_times=dict(d.get(\"start_times\", {})),\n        )\n\n\ndef create_scheduler() -> SchedulerState:\n    \"\"\"Create a fresh, empty scheduler state.\"\"\"\n    return SchedulerState()\n\n\ndef register_animation(\n    state: SchedulerState, spec: AnimationSpec\n) -> SchedulerState:\n    \"\"\"Register an animation \u2014 returns a *new* state (immutable).\"\"\"\n    new_animations = dict(state.animations)\n    new_frame_counts = dict(state.frame_counts)\n    new_start_times = dict(state.start_times)\n\n    new_animations[spec.callback_id] = spec\n    new_frame_counts[spec.callback_id] = 0\n    # Start time is set to -1 to indicate \"not started yet\";\n    # the first tick() call will set the real start time.\n    new_start_times[spec.callback_id] = -1.0\n\n    return SchedulerState(\n        animations=new_animations,\n        frame_counts=new_frame_counts,\n        start_times=new_start_times,\n    )\n\n\ndef unregister_animation(\n    state: SchedulerState, callback_id: str\n) -> SchedulerState:\n    \"\"\"Remove an animation \u2014 returns a *new* state.\"\"\"\n    new_animations = dict(state.animations)\n    new_frame_counts = dict(state.frame_counts)\n    new_start_times = dict(state.start_times)\n\n    new_animations.pop(callback_id, None)\n    new_frame_counts.pop(callback_id, None)\n    new_start_times.pop(callback_id, None)\n\n    return SchedulerState(\n        animations=new_animations,\n        frame_counts=new_frame_counts,\n        start_times=new_start_times,\n    )\n\n\ndef tick(\n    state: SchedulerState, current_time_ms: float\n) -> tuple[SchedulerState, list[str]]:\n    \"\"\"Advance the scheduler by one tick.\n\n    Returns:\n        (new_state, callbacks_to_fire): The updated state and a list of\n        callback_ids whose frame should fire this tick.\n\n    Algorithm:\n    1. For each registered animation:\n       a. If start_time == -1, initialize it to current_time_ms.\n       b. Compute elapsed_ms = current_time_ms - start_time.\n       c. If duration_ms is set and elapsed_ms >= duration_ms, mark complete\n          and remove.\n       d. Compute expected_frame = floor(elapsed_ms * fps / 1000).\n       e. If expected_frame > frame_count, fire the callback and bump\n          frame_count to expected_frame.\n    2. Return updated state and list of fired callback_ids.\n    \"\"\"\n    new_animations = dict(state.animations)\n    new_frame_counts = dict(state.frame_counts)\n    new_start_times = dict(state.start_times)\n    fired: list[str] = []\n\n    for cid, spec in state.animations.items():\n        start = new_start_times.get(cid, -1.0)\n        if start < 0:\n            new_start_times[cid] = current_time_ms\n            start = current_time_ms\n\n        elapsed = current_time_ms - start\n\n        # Check duration\n        if spec.duration_ms is not None and elapsed >= spec.duration_ms:\n            new_animations.pop(cid, None)\n            new_frame_counts.pop(cid, None)\n            new_start_times.pop(cid, None)\n            continue\n\n        # Compute expected frame\n        if spec.fps > 0:\n            expected_frame = int(elapsed * spec.fps / 1000.0)\n        else:\n            expected_frame = 0\n\n        current_frame = new_frame_counts.get(cid, 0)\n        if expected_frame > current_frame:\n            fired.append(cid)\n            new_frame_counts[cid] = expected_frame\n\n    return (\n        SchedulerState(\n            animations=new_animations,\n            frame_counts=new_frame_counts,\n            start_times=new_start_times,\n        ),\n        fired,\n    )\n\n\ndef is_animation_complete(\n    state: SchedulerState, callback_id: str, current_time_ms: float\n) -> bool:\n    \"\"\"Check whether an animation has completed (or was never registered).\"\"\"\n    if callback_id not in state.animations:\n        return True\n    spec = state.animations[callback_id]\n    if spec.duration_ms is None:\n        return False\n    start = state.start_times.get(callback_id, -1.0)\n    if start < 0:\n        return False\n    return (current_time_ms - start) >= spec.duration_ms\n",
  "termforge/core/layout.py": "\"\"\"Box-model layout engine \u2014 pure functions, no Rich imports.\n\nImplements a simplified flex-like layout with margin, padding, flex_grow,\nflex_shrink, gap, and wrapping.\n\"\"\"\nfrom __future__ import annotations\nimport logging\nimport os\n\nfrom dataclasses import dataclass, field\nfrom enum import Enum\nfrom typing import Any\n\nfrom termforge.core.types import (\n    BoxConstraints,\n    LayoutResult,\n    Position,\n    RenderableSpec,\n    Size,\n    Spacing,\n)\n\n\nclass LayoutConstraintError(ValueError):\n    \"\"\"Raised when layout constraints are invalid or unsatisfiable.\"\"\"\n    pass\n\n\nclass FlexDirection(Enum):\n    \"\"\"Main axis direction for flex layout.\"\"\"\n\n    ROW = \"row\"\n    COLUMN = \"column\"\n\n\n@dataclass\nclass BoxModel:\n    \"\"\"Box-model properties for a layout node.\"\"\"\n\n    margin: Spacing = field(default_factory=Spacing)\n    padding: Spacing = field(default_factory=Spacing)\n    width: int | None = None\n    height: int | None = None\n    flex_grow: float = 0.0\n    flex_shrink: float = 1.0\n\n    def to_dict(self) -> dict[str, Any]:\n        d: dict[str, Any] = {\n            \"margin\": self.margin.to_dict(),\n            \"padding\": self.padding.to_dict(),\n            \"flex_grow\": self.flex_grow,\n            \"flex_shrink\": self.flex_shrink,\n        }\n        if self.width is not None:\n            d[\"width\"] = self.width\n        if self.height is not None:\n            d[\"height\"] = self.height\n        return d\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> BoxModel:\n        return cls(\n            margin=Spacing.from_dict(d.get(\"margin\", {})),\n            padding=Spacing.from_dict(d.get(\"padding\", {})),\n            width=d.get(\"width\"),\n            height=d.get(\"height\"),\n            flex_grow=d.get(\"flex_grow\", 0.0),\n            flex_shrink=d.get(\"flex_shrink\", 1.0),\n        )\n\n\n@dataclass\nclass FlexContainer:\n    \"\"\"Flex container properties attached to a LayoutNode.\"\"\"\n\n    direction: FlexDirection = FlexDirection.ROW\n    gap: int = 0\n    wrap: bool = False\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"direction\": self.direction.value,\n            \"gap\": self.gap,\n            \"wrap\": self.wrap,\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> FlexContainer:\n        return cls(\n            direction=FlexDirection(d.get(\"direction\", \"row\")),\n            gap=d.get(\"gap\", 0),\n            wrap=d.get(\"wrap\", False),\n        )\n\n\n@dataclass\nclass LayoutNode:\n    \"\"\"A node in the layout tree.\"\"\"\n\n    spec: RenderableSpec\n    box: BoxModel = field(default_factory=BoxModel)\n    flex: FlexContainer | None = None\n    children: list[LayoutNode] = field(default_factory=list)\n\n    def to_dict(self) -> dict[str, Any]:\n        d: dict[str, Any] = {\n            \"spec\": self.spec.to_dict(),\n            \"box\": self.box.to_dict(),\n            \"children\": [c.to_dict() for c in self.children],\n        }\n        if self.flex is not None:\n            d[\"flex\"] = self.flex.to_dict()\n        return d\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> LayoutNode:\n        return cls(\n            spec=RenderableSpec.from_dict(d[\"spec\"]),\n            box=BoxModel.from_dict(d.get(\"box\", {})),\n            flex=FlexContainer.from_dict(d[\"flex\"]) if \"flex\" in d else None,\n            children=[LayoutNode.from_dict(c) for c in d.get(\"children\", [])],\n        )\n\n\ndef _clamp(value: int, lo: int, hi: int) -> int:\n    \"\"\"Clamp value to [lo, hi].\"\"\"\n    return max(lo, min(hi, value))\n\n\ndef _get_logger() -> logging.Logger:\n    logger = logging.getLogger(\"termforge.core.layout\")\n    if not logger.handlers:\n        log_file = os.environ.get(\"TERMFORGE_LOG_FILE\", \"termforge.log\")\n        log_level_str = os.environ.get(\"TERMFORGE_LOG_LEVEL\", \"WARNING\").upper()\n        log_level = getattr(logging, log_level_str, logging.WARNING)\n        \n        logger.setLevel(log_level)\n        handler = logging.FileHandler(log_file, encoding=\"utf-8\")\n        formatter = logging.Formatter(\"%(asctime)s - %(name)s - %(levelname)s - %(message)s\")\n        handler.setFormatter(formatter)\n        logger.addHandler(handler)\n    return logger\n\n\ndef compute_layout(node: LayoutNode, constraints: BoxConstraints) -> LayoutResult:\n    \"\"\"Compute absolute positions and sizes for a layout tree.\n\n    Algorithm:\n    1. For leaf nodes (no children): use explicit width/height from BoxModel,\n       or fall back to minimum constraint, clamped to constraints, plus padding.\n    2. For flex containers: distribute available space along the main axis\n       proportionally to flex_grow. Handle gap between children.\n    3. Apply margin by offsetting positions.\n    4. Returns a tree of LayoutResult with absolute positions.\n    \"\"\"\n    return _compute(node, constraints, Position(x=0, y=0))\n\n\ndef _compute(\n    node: LayoutNode, constraints: BoxConstraints, offset: Position\n) -> LayoutResult:\n    if constraints.min_width > constraints.max_width:\n        raise LayoutConstraintError(\n            f\"Unsatisfiable constraints: min_width {constraints.min_width} exceeds max_width {constraints.max_width}.\"\n        )\n    if constraints.min_height > constraints.max_height:\n        raise LayoutConstraintError(\n            f\"Unsatisfiable constraints: min_height {constraints.min_height} exceeds max_height {constraints.max_height}.\"\n        )\n    if node.box.width is not None and node.box.width < 0:\n        raise LayoutConstraintError(f\"Invalid negative width: {node.box.width} in component '{node.spec.spec_type}'\")\n    if node.box.height is not None and node.box.height < 0:\n        raise LayoutConstraintError(f\"Invalid negative height: {node.box.height} in component '{node.spec.spec_type}'\")\n\n    margin = node.box.margin\n    padding = node.box.padding\n\n    # Effective origin after margin\n    inner_x = offset.x + margin.left\n    inner_y = offset.y + margin.top\n\n    # Available space inside margin\n    avail_w = constraints.max_width - margin.horizontal\n    avail_h = constraints.max_height - margin.vertical\n\n    if avail_w < 0:\n        avail_w = 0\n    if avail_h < 0:\n        avail_h = 0\n\n    # Determine own size\n    if node.box.width is not None:\n        own_w = _clamp(node.box.width, constraints.min_width, avail_w) if avail_w > 0 else node.box.width\n    else:\n        own_w = avail_w\n\n    if node.box.height is not None:\n        own_h = _clamp(node.box.height, constraints.min_height, avail_h) if avail_h > 0 else node.box.height\n    else:\n        own_h = avail_h\n\n    if own_w <= 0 or own_h <= 0:\n        logger = _get_logger()\n        logger.warning(f\"Component '{node.spec.spec_type}' collapsed to size {own_w}x{own_h}!\")\n\n    # Leaf node\n    if not node.children or node.flex is None:\n        w = _clamp(own_w, constraints.min_width, constraints.max_width)\n        h = _clamp(own_h, constraints.min_height, constraints.max_height)\n        if w <= 0 or h <= 0:\n            logger = _get_logger()\n            logger.warning(f\"Component '{node.spec.spec_type}' collapsed to size {w}x{h}!\")\n        return LayoutResult(\n            position=Position(x=inner_x, y=inner_y),\n            size=Size(width=w, height=h),\n        )\n\n    # Flex container\n    flex = node.flex\n    is_row = flex.direction == FlexDirection.ROW\n    gap = flex.gap\n\n    # Content area inside padding\n    content_w = own_w - padding.horizontal\n    content_h = own_h - padding.vertical\n    if content_w < 0:\n        content_w = 0\n    if content_h < 0:\n        content_h = 0\n\n    n = len(node.children)\n    total_gap = gap * (n - 1) if n > 1 else 0\n\n    if is_row:\n        min_needed = total_gap\n        for child in node.children:\n            cm = child.box.margin\n            w_req = child.box.width if child.box.width is not None else 0\n            min_needed += w_req + cm.horizontal\n        if min_needed > content_w and content_w > 0:\n            all_rigid = all(c.box.flex_shrink == 0 for c in node.children if c.box.width is not None)\n            if all_rigid:\n                raise LayoutConstraintError(\n                    f\"Over-constrained row: Minimum required width {min_needed} exceeds available width {content_w}.\"\n                )\n        main_available = content_w - total_gap\n    else:\n        min_needed = total_gap\n        for child in node.children:\n            cm = child.box.margin\n            h_req = child.box.height if child.box.height is not None else 0\n            min_needed += h_req + cm.vertical\n        if min_needed > content_h and content_h > 0:\n            all_rigid = all(c.box.flex_shrink == 0 for c in node.children if c.box.height is not None)\n            if all_rigid:\n                raise LayoutConstraintError(\n                    f\"Over-constrained column: Minimum required height {min_needed} exceeds available height {content_h}.\"\n                )\n        main_available = content_h - total_gap\n\n    if main_available < 0:\n        main_available = 0\n\n    # First pass: measure each child's base size and collect flex_grow\n    child_base_sizes: list[int] = []\n    total_flex_grow = 0.0\n\n    for child in node.children:\n        cm = child.box.margin\n        if is_row:\n            if child.box.width is not None:\n                base = child.box.width + cm.horizontal\n            else:\n                base = 0\n        else:\n            if child.box.height is not None:\n                base = child.box.height + cm.vertical\n            else:\n                base = 0\n        child_base_sizes.append(base)\n        total_flex_grow += child.box.flex_grow\n\n    used = sum(child_base_sizes)\n    remaining = main_available - used\n    if remaining < 0:\n        remaining = 0\n\n    # Second pass: distribute remaining space and compute child layouts\n    total_extra_distributed = sum(\n        int(remaining * (child.box.flex_grow / total_flex_grow))\n        for child in node.children\n        if total_flex_grow > 0 and child.box.flex_grow > 0\n    )\n    if total_flex_grow > 0 and total_extra_distributed != remaining:\n        logger = _get_logger()\n        logger.warning(\n            f\"Layout rounding error: distributed {total_extra_distributed} cells of remaining {remaining} cells \"\n            f\"for container '{node.spec.spec_type}'.\"\n        )\n\n    child_results: list[LayoutResult] = []\n    cursor_x = inner_x + padding.left\n    cursor_y = inner_y + padding.top\n\n    for i, child in enumerate(node.children):\n        # Determine main-axis size for this child\n        extra = 0\n        if total_flex_grow > 0 and child.box.flex_grow > 0:\n            extra = int(remaining * (child.box.flex_grow / total_flex_grow))\n\n        if is_row:\n            child_max_w = child_base_sizes[i] + extra\n            if child_max_w <= 0 and child.box.width is None:\n                child_max_w = int(remaining / n) if total_flex_grow == 0 else extra\n            child_constraints = BoxConstraints(\n                min_width=0,\n                max_width=max(child_max_w, 0),\n                min_height=0,\n                max_height=content_h,\n            )\n            child_result = _compute(child, child_constraints, Position(x=cursor_x, y=cursor_y))\n            cursor_x += child_result.size.width + child.box.margin.horizontal + gap\n        else:\n            child_max_h = child_base_sizes[i] + extra\n            if child_max_h <= 0 and child.box.height is None:\n                child_max_h = int(remaining / n) if total_flex_grow == 0 else extra\n            child_constraints = BoxConstraints(\n                min_width=0,\n                max_width=content_w,\n                min_height=0,\n                max_height=max(child_max_h, 0),\n            )\n            child_result = _compute(child, child_constraints, Position(x=cursor_x, y=cursor_y))\n            cursor_y += child_result.size.height + child.box.margin.vertical + gap\n\n        child_results.append(child_result)\n\n    return LayoutResult(\n        position=Position(x=inner_x, y=inner_y),\n        size=Size(width=own_w, height=own_h),\n        children=child_results,\n    )\n",
  "termforge/core/hooks.py": "\"\"\"TermForge component event hooks module \u2014 lifecycle hooks for passive specs.\n\nHooks allow attaching pure-data callback references to specs that execute\nduring render or layout lifecycle phases. Callbacks are looked up from a\ncaller-provided registry.\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\nfrom enum import Enum\nfrom typing import Any, Callable\n\n\nclass HookPhase(str, Enum):\n    \"\"\"Phases at which a Hook can execute.\"\"\"\n    PRE_RENDER  = \"pre_render\"\n    POST_RENDER = \"post_render\"\n    ON_RESIZE   = \"on_resize\"\n    ON_FOCUS    = \"on_focus\"\n    ON_BLUR     = \"on_blur\"\n\n\n@dataclass\nclass RenderHook:\n    \"\"\"A pure-data description of a lifecycle event callback.\n\n    Attributes:\n        phase: The HookPhase when this hook should run.\n        callback_id: A unique identifier for the callback function, resolved\n            at execution time using a caller-provided registry.\n        priority: Execution priority order (higher priority runs first).\n    \"\"\"\n    phase: HookPhase\n    callback_id: str\n    priority: int = 0\n\n    def to_dict(self) -> dict[str, Any]:\n        \"\"\"Serialize to a JSON-compatible dict.\n\n        Returns:\n            A plain dict with keys ``phase``, ``callback_id``, ``priority``.\n        \"\"\"\n        return {\n            \"phase\": self.phase.value,\n            \"callback_id\": self.callback_id,\n            \"priority\": self.priority,\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> RenderHook:\n        \"\"\"Deserialise from a dict produced by :meth:`to_dict`.\n\n        Args:\n            d: Dict with keys ``phase``, ``callback_id``, ``priority``.\n\n        Returns:\n            A new :class:`RenderHook` instance.\n        \"\"\"\n        return cls(\n            phase=HookPhase(d[\"phase\"]),\n            callback_id=d[\"callback_id\"],\n            priority=d.get(\"priority\", 0),\n        )\n\n\ndef invoke_hooks(\n    hooks: list[RenderHook],\n    phase: HookPhase,\n    registry: dict[str, Callable[[Any, dict[str, Any]], dict[str, Any]]],\n    spec: Any,\n    context: dict[str, Any] | None = None,\n) -> list[dict[str, Any]]:\n    \"\"\"Invoke all hooks matching the specified phase.\n\n    Looks up callables from `registry` by `callback_id`, executes them\n    with `(spec, context)`, and returns a list of dictionaries representing\n    property updates/patches to be applied to the spec.\n\n    Args:\n        hooks: List of RenderHook spec instances.\n        phase: The current lifecycle phase to trigger.\n        registry: A map from callback ID strings to callable hook implementations.\n            Signature: (spec, context) -> patch_dict\n        spec: The RenderableSpec instance that owns the hooks.\n        context: Execution metadata dict supplied by the rendering environment.\n\n    Returns:\n        A list of dictionary patches returned by the active hooks, sorted\n        by hook priority (descending).\n    \"\"\"\n    ctx = context if context is not None else {}\n    active_hooks = [h for h in hooks if h.phase == phase]\n    # Sort by priority descending\n    active_hooks.sort(key=lambda h: h.priority, reverse=True)\n\n    patches: list[dict[str, Any]] = []\n    for hook in active_hooks:\n        callback = registry.get(hook.callback_id)\n        if callback is not None:\n            patch = callback(spec, ctx)\n            if isinstance(patch, dict) and patch:\n                patches.append(patch)\n\n    return patches\n\n\ndef apply_patches(spec_dict: dict[str, Any], patches: list[dict[str, Any]]) -> dict[str, Any]:\n    \"\"\"Apply a list of dictionary patches to a spec dictionary.\n\n    Args:\n        spec_dict: The original serialized spec dictionary.\n        patches: A list of patch dicts to merge into the spec.\n\n    Returns:\n        A new dictionary with patches merged.\n    \"\"\"\n    result = dict(spec_dict)\n    for patch in patches:\n        result.update(patch)\n    return result\n",
  "termforge/core/__init__.py": "\"\"\"TermForge core \u2014 layout, capability detection, theming, scheduler, Renderable protocol.\n\nRe-exports all public types and functions from core submodules.\n\"\"\"\nfrom __future__ import annotations\n\n# --- types ---\nfrom termforge.core.types import (\n    BoxConstraints,\n    ColorDepth,\n    ColorValue,\n    LayoutResult,\n    Position,\n    RenderableSpec,\n    Size,\n    Spacing,\n    StyleSpec,\n)\n\n# --- capability ---\nfrom termforge.core.capability import (\n    TerminalCapabilities,\n    detect_capabilities,\n    detect_color_depth,\n    detect_terminal_size,\n    detect_unicode_support,\n)\n\n# --- color ---\nfrom termforge.core.color import (\n    ANSI_16_COLORS,\n    color_distance,\n    interpolate_color,\n    resolve_color,\n)\n\n# --- theme ---\nfrom termforge.core.theme import (\n    CATPPUCCIN_MOCHA,\n    DRACULA,\n    HIGH_CONTRAST,\n    TOKYO_NIGHT,\n    ThemeTokens,\n    load_theme_from_dict,\n    resolve_token,\n    resolve_state_token,\n    theme_to_dict,\n)\n\n# --- layout ---\nfrom termforge.core.layout import (\n    BoxModel,\n    FlexContainer,\n    FlexDirection,\n    LayoutNode,\n    LayoutConstraintError,\n    compute_layout,\n)\n\n# --- scheduler ---\nfrom termforge.core.scheduler import (\n    AnimationSpec,\n    FrameCallback,\n    SchedulerState,\n    create_scheduler,\n    is_animation_complete,\n    register_animation,\n    tick,\n    unregister_animation,\n)\n\n# --- diff ---\nfrom termforge.core.diff import (\n    ChangeKind,\n    SpecChange,\n    diff_specs,\n    has_changed,\n    filter_changes,\n)\n\n# --- hooks ---\nfrom termforge.core.hooks import (\n    HookPhase,\n    RenderHook,\n    invoke_hooks,\n    apply_patches,\n)\n\n__all__ = [\n    # types\n    \"BoxConstraints\",\n    \"ColorDepth\",\n    \"ColorValue\",\n    \"LayoutResult\",\n    \"Position\",\n    \"RenderableSpec\",\n    \"Size\",\n    \"Spacing\",\n    \"StyleSpec\",\n    # capability\n    \"TerminalCapabilities\",\n    \"detect_capabilities\",\n    \"detect_color_depth\",\n    \"detect_terminal_size\",\n    \"detect_unicode_support\",\n    # color\n    \"ANSI_16_COLORS\",\n    \"color_distance\",\n    \"interpolate_color\",\n    \"resolve_color\",\n    # theme\n    \"CATPPUCCIN_MOCHA\",\n    \"DRACULA\",\n    \"HIGH_CONTRAST\",\n    \"TOKYO_NIGHT\",\n    \"ThemeTokens\",\n    \"load_theme_from_dict\",\n    \"resolve_token\",\n    \"resolve_state_token\",\n    \"theme_to_dict\",\n    # layout\n    \"BoxModel\",\n    \"FlexContainer\",\n    \"FlexDirection\",\n    \"LayoutNode\",\n    \"LayoutConstraintError\",\n    \"compute_layout\",\n    # scheduler\n    \"AnimationSpec\",\n    \"FrameCallback\",\n    \"SchedulerState\",\n    \"create_scheduler\",\n    \"is_animation_complete\",\n    \"register_animation\",\n    \"tick\",\n    \"unregister_animation\",\n    # diff\n    \"ChangeKind\",\n    \"SpecChange\",\n    \"diff_specs\",\n    \"has_changed\",\n    \"filter_changes\",\n    # hooks\n    \"HookPhase\",\n    \"RenderHook\",\n    \"invoke_hooks\",\n    \"apply_patches\",\n]\n",
  "termforge/core/diff.py": "\"\"\"TermForge spec diff \u2014 structural change detection between two RenderableSpec dicts.\n\nComputes a list of :class:`SpecChange` records describing every field that was\nadded, removed, or modified when going from spec *a* to spec *b*.\n\nDesign principles (portability contract):\n- Pure functions only \u2014 no Rich/Textual types, no I/O, no side effects.\n- Input and output are plain JSON-compatible dicts/lists.\n- :class:`SpecChange` is itself JSON-serializable via :meth:`SpecChange.to_dict`.\n- Thread-safe by construction (stateless functions).\n\nExample::\n\n    from termforge.core.diff import diff_specs, SpecChange, ChangeKind\n    from termforge.windows.types import WindowSpec\n\n    before = WindowSpec(title=\"Old\", width=80, height=24)\n    after  = WindowSpec(title=\"New\", width=80, height=30)\n\n    changes = diff_specs(before.to_dict(), after.to_dict())\n    # [SpecChange(path='title',  kind=MODIFIED, old='Old', new='New'),\n    #  SpecChange(path='height', kind=MODIFIED, old=24,    new=30)]\n\n    for c in changes:\n        print(c)  # SpecChange(path='title', kind='modified', old='Old', new='New')\n\n    # All changes are JSON-serializable\n    import json\n    json.dumps([c.to_dict() for c in changes])\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\nfrom enum import Enum\nfrom typing import Any\n\n\n# ---------------------------------------------------------------------------\n# Public data model\n# ---------------------------------------------------------------------------\n\nclass ChangeKind(str, Enum):\n    \"\"\"The nature of a change between two specs.\"\"\"\n    ADDED    = \"added\"    #: key/element present in *b* but not in *a*\n    REMOVED  = \"removed\"  #: key/element present in *a* but not in *b*\n    MODIFIED = \"modified\" #: key/element present in both but with different values\n\n\n@dataclass\nclass SpecChange:\n    \"\"\"A single field-level change between two ``RenderableSpec`` dicts.\n\n    Attributes:\n        path: Dot-separated path to the changed value, e.g.\n            ``\"children.0.border_style\"`` or ``\"y_axis.min_val\"``.\n        kind: Whether the value was :attr:`~ChangeKind.ADDED`,\n            :attr:`~ChangeKind.REMOVED`, or :attr:`~ChangeKind.MODIFIED`.\n        old: The previous value (``None`` for :attr:`~ChangeKind.ADDED`).\n        new: The new value (``None`` for :attr:`~ChangeKind.REMOVED`).\n    \"\"\"\n\n    path: str\n    kind: ChangeKind\n    old: Any\n    new: Any\n\n    def to_dict(self) -> dict[str, Any]:\n        \"\"\"Serialize to a JSON-compatible dict.\n\n        Returns:\n            A plain dict with keys ``path``, ``kind``, ``old``, ``new``.\n        \"\"\"\n        return {\n            \"path\": self.path,\n            \"kind\": self.kind.value,\n            \"old\": self.old,\n            \"new\": self.new,\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> \"SpecChange\":\n        \"\"\"Deserialise from a dict produced by :meth:`to_dict`.\n\n        Args:\n            d: Dict with keys ``path``, ``kind``, ``old``, ``new``.\n\n        Returns:\n            A new :class:`SpecChange` instance.\n        \"\"\"\n        return cls(\n            path=d[\"path\"],\n            kind=ChangeKind(d[\"kind\"]),\n            old=d.get(\"old\"),\n            new=d.get(\"new\"),\n        )\n\n    def __repr__(self) -> str:  # pragma: no cover\n        return (\n            f\"SpecChange(path={self.path!r}, kind={self.kind.value!r}, \"\n            f\"old={self.old!r}, new={self.new!r})\"\n        )\n\n\n# ---------------------------------------------------------------------------\n# Core diff algorithm\n# ---------------------------------------------------------------------------\n\ndef diff_specs(\n    a: dict[str, Any],\n    b: dict[str, Any],\n    path: str = \"\",\n    *,\n    ignore_keys: frozenset[str] | None = None,\n) -> list[SpecChange]:\n    \"\"\"Recursively diff two ``RenderableSpec`` dicts.\n\n    Both *a* and *b* must be plain JSON-compatible dicts (e.g. produced by\n    ``spec.to_dict()``).  The function walks the full tree, comparing every\n    leaf value and recursing into nested dicts and list elements.\n\n    Args:\n        a: The \"before\" spec dict.\n        b: The \"after\" spec dict.\n        path: Dot-separated key path prefix used when recursing.  Callers\n            should leave this at its default ``\"\"`` unless they intentionally\n            want to scope the diff to a subtree.\n        ignore_keys: Optional set of top-level-only key names to skip when\n            comparing both dicts at the *current* level.  Useful to exclude\n            ``spec_type`` from change detection when comparing heterogeneous\n            collections.\n\n    Returns:\n        A list of :class:`SpecChange` objects, one per changed value.  The\n        list is empty when *a* and *b* are structurally identical.\n\n    Example::\n\n        >>> from termforge.core.diff import diff_specs\n        >>> diff_specs({\"x\": 1, \"y\": 2}, {\"x\": 1, \"y\": 3})\n        [SpecChange(path='y', kind='modified', old=2, new=3)]\n\n        >>> diff_specs({\"a\": {\"b\": 1}}, {\"a\": {\"b\": 2}})\n        [SpecChange(path='a.b', kind='modified', old=1, new=2)]\n    \"\"\"\n    _ignore = ignore_keys or frozenset()\n    changes: list[SpecChange] = []\n\n    all_keys = set(a) | set(b)\n    for key in sorted(all_keys):\n        if key in _ignore:\n            continue\n\n        child_path = f\"{path}.{key}\" if path else key\n        in_a = key in a\n        in_b = key in b\n\n        if in_a and not in_b:\n            changes.append(SpecChange(\n                path=child_path,\n                kind=ChangeKind.REMOVED,\n                old=a[key],\n                new=None,\n            ))\n        elif in_b and not in_a:\n            changes.append(SpecChange(\n                path=child_path,\n                kind=ChangeKind.ADDED,\n                old=None,\n                new=b[key],\n            ))\n        else:\n            # Both present \u2014 compare\n            va, vb = a[key], b[key]\n            changes.extend(_compare_values(va, vb, child_path))\n\n    return changes\n\n\ndef _compare_values(\n    va: Any,\n    vb: Any,\n    path: str,\n) -> list[SpecChange]:\n    \"\"\"Compare two leaf or nested values at *path*.\"\"\"\n    if type(va) != type(vb):\n        # Type mismatch \u2014 treat as modification without recursion\n        return [SpecChange(path=path, kind=ChangeKind.MODIFIED, old=va, new=vb)]\n\n    if isinstance(va, dict) and isinstance(vb, dict):\n        return diff_specs(va, vb, path)\n\n    if isinstance(va, list) and isinstance(vb, list):\n        return _diff_lists(va, vb, path)\n\n    if va != vb:\n        return [SpecChange(path=path, kind=ChangeKind.MODIFIED, old=va, new=vb)]\n\n    return []\n\n\ndef _diff_lists(\n    la: list[Any],\n    lb: list[Any],\n    path: str,\n) -> list[SpecChange]:\n    \"\"\"Diff two lists positionally (index-aligned, not LCS-based).\n\n    Items beyond the shorter list are reported as ADDED or REMOVED.\n    This is intentionally simple: TermForge specs rarely reorder children;\n    if needed, callers can pre-align lists themselves before diffing.\n    \"\"\"\n    changes: list[SpecChange] = []\n    max_len = max(len(la), len(lb))\n    for i in range(max_len):\n        item_path = f\"{path}.{i}\"\n        in_a = i < len(la)\n        in_b = i < len(lb)\n        if in_a and not in_b:\n            changes.append(SpecChange(\n                path=item_path,\n                kind=ChangeKind.REMOVED,\n                old=la[i],\n                new=None,\n            ))\n        elif in_b and not in_a:\n            changes.append(SpecChange(\n                path=item_path,\n                kind=ChangeKind.ADDED,\n                old=None,\n                new=lb[i],\n            ))\n        else:\n            changes.extend(_compare_values(la[i], lb[i], item_path))\n    return changes\n\n\n# ---------------------------------------------------------------------------\n# Convenience helpers\n# ---------------------------------------------------------------------------\n\ndef has_changed(\n    a: dict[str, Any],\n    b: dict[str, Any],\n    *,\n    ignore_keys: frozenset[str] | None = None,\n) -> bool:\n    \"\"\"Return ``True`` if *a* and *b* differ in any field.\n\n    Equivalent to ``bool(diff_specs(a, b, ignore_keys=ignore_keys))`` but\n    short-circuits on the first change found.\n\n    Args:\n        a: The \"before\" spec dict.\n        b: The \"after\" spec dict.\n        ignore_keys: Keys to skip during comparison.\n\n    Returns:\n        ``True`` if any structural difference exists.\n\n    Example::\n\n        >>> has_changed({\"x\": 1}, {\"x\": 1})\n        False\n        >>> has_changed({\"x\": 1}, {\"x\": 2})\n        True\n    \"\"\"\n    return bool(diff_specs(a, b, ignore_keys=ignore_keys))\n\n\ndef filter_changes(\n    changes: list[SpecChange],\n    *,\n    kind: ChangeKind | None = None,\n    path_prefix: str | None = None,\n) -> list[SpecChange]:\n    \"\"\"Filter a change list by kind and/or path prefix.\n\n    Args:\n        changes: List of :class:`SpecChange` objects from :func:`diff_specs`.\n        kind: If set, only return changes of this :class:`ChangeKind`.\n        path_prefix: If set, only return changes whose ``path`` starts with\n            this prefix (e.g. ``\"children\"`` to see only child changes).\n\n    Returns:\n        Filtered list of :class:`SpecChange` objects.\n\n    Example::\n\n        >>> changes = diff_specs(before, after)\n        >>> mods = filter_changes(changes, kind=ChangeKind.MODIFIED)\n        >>> child_changes = filter_changes(changes, path_prefix=\"children\")\n    \"\"\"\n    result = changes\n    if kind is not None:\n        result = [c for c in result if c.kind == kind]\n    if path_prefix is not None:\n        result = [c for c in result if c.path.startswith(path_prefix)]\n    return result\n",
  "termforge/selection/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec, StyleSpec\nfrom termforge.text.types import TextAlign\n\n@dataclass\nclass SelectionItemSpec:\n    label: str\n    selected: bool = False\n    style: StyleSpec | None = None\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"label\": self.label,\n            \"selected\": self.selected,\n            \"style\": self.style.to_dict() if self.style else None\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> SelectionItemSpec:\n        return cls(\n            label=d[\"label\"],\n            selected=d.get(\"selected\", False),\n            style=StyleSpec.from_dict(d[\"style\"]) if d.get(\"style\") else None\n        )\n\n@dataclass\nclass SelectionListSpec(RenderableSpec):\n    items: list[SelectionItemSpec] = field(default_factory=list)\n    focused_index: int = 0\n    item_align: TextAlign = TextAlign.LEFT\n    item_spacing: int = 0\n    spec_type: str = \"selection_list\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"items\": [item.to_dict() for item in self.items],\n            \"focused_index\": self.focused_index,\n            \"item_align\": self.item_align.value,\n            \"item_spacing\": self.item_spacing\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> SelectionListSpec:\n        return cls(\n            items=[SelectionItemSpec.from_dict(item) for item in d.get(\"items\", [])],\n            focused_index=d.get(\"focused_index\", 0),\n            item_align=TextAlign(d.get(\"item_align\", \"left\")),\n            item_spacing=d.get(\"item_spacing\", 0)\n        )\n",
  "termforge/selection/__init__.py": "from termforge.selection.types import SelectionListSpec, SelectionItemSpec\nfrom termforge.selection.render import render_selection_list\n\n__all__ = [\n    \"SelectionListSpec\",\n    \"SelectionItemSpec\",\n    \"render_selection_list\",\n]\n",
  "termforge/selection/render.py": "from __future__ import annotations\nfrom termforge.core.types import Size\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.selection.types import SelectionListSpec\nfrom termforge.text.types import TextAlign\n\n\ndef _align_text(text: str, width: int, align: TextAlign) -> str:\n    \"\"\"Pad text to `width` chars using the given alignment.\"\"\"\n    if align == TextAlign.CENTER:\n        return text.center(width)\n    elif align == TextAlign.RIGHT:\n        return text.rjust(width)\n    else:  # LEFT (default)\n        return text.ljust(width)\n\n\ndef render_selection_list(spec: SelectionListSpec, max_size: Size, theme: ThemeTokens) -> list[str]:\n    lines = []\n    for i, item in enumerate(spec.items):\n        is_focused = (i == spec.focused_index)\n        box = \"[x]\" if item.selected else \"[ ]\"\n        pointer = \"> \" if is_focused else \"  \"\n\n        # Compute available width for the label (minus pointer + box + space)\n        prefix = f\"{pointer}{box} \"\n        avail_label_w = max(0, max_size.width - len(prefix))\n\n        # Apply alignment to label within available space\n        label = _align_text(item.label, avail_label_w, spec.item_align)\n\n        line = f\"{prefix}{label}\"\n\n        # Hard-truncate to max width\n        if len(line) > max_size.width:\n            line = line[:max_size.width - 1] + \"\u2026\"\n        lines.append(line)\n\n        # item_spacing: blank lines between each item (but not after the last)\n        if spec.item_spacing > 0 and i < len(spec.items) - 1:\n            for _ in range(spec.item_spacing):\n                lines.append(\"\")\n\n    return lines[:max_size.height]\n",
  "termforge/text/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom enum import Enum\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec, StyleSpec, ColorValue\n\nclass TextAlign(str, Enum):\n    LEFT = \"left\"\n    CENTER = \"center\"\n    RIGHT = \"right\"\n\nclass TextOverflow(str, Enum):\n    CLIP = \"clip\"\n    TRUNCATE = \"truncate\"   # explicit hard-truncate (alias for CLIP, no suffix)\n    ELLIPSIS = \"ellipsis\"\n    WRAP = \"wrap\"\n    MARQUEE = \"marquee\"\n\n@dataclass\nclass TextSpan:\n    text: str\n    style: StyleSpec | None = None\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"text\": self.text,\n            \"style\": self.style.to_dict() if self.style else None\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> TextSpan:\n        style_dict = d.get(\"style\")\n        style = StyleSpec.from_dict(style_dict) if style_dict else None\n        return cls(text=d[\"text\"], style=style)\n\n@dataclass\nclass TextRun:\n    spans: list[TextSpan] = field(default_factory=list)\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spans\": [span.to_dict() for span in self.spans]\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> TextRun:\n        return cls(spans=[TextSpan.from_dict(s) for s in d.get(\"spans\", [])])\n\n@dataclass\nclass TextSpec(RenderableSpec):\n    content: str | TextRun = \"\"\n    align: TextAlign = TextAlign.LEFT\n    overflow: TextOverflow = TextOverflow.WRAP\n    max_width: int | None = None\n    max_lines: int | None = None\n    spec_type: str = \"text\"\n\n    def to_dict(self) -> dict[str, Any]:\n        content_data = self.content.to_dict() if isinstance(self.content, TextRun) else self.content\n        return {\n            \"spec_type\": self.spec_type,\n            \"content\": content_data,\n            \"align\": self.align.value,\n            \"overflow\": self.overflow.value,\n            \"max_width\": self.max_width,\n            \"max_lines\": self.max_lines\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> TextSpec:\n        content_data = d.get(\"content\", \"\")\n        if isinstance(content_data, dict) and \"spans\" in content_data:\n            content = TextRun.from_dict(content_data)\n        else:\n            content = content_data\n        return cls(\n            content=content,\n            align=TextAlign(d.get(\"align\", \"left\")),\n            overflow=TextOverflow(d.get(\"overflow\", \"wrap\")),\n            max_width=d.get(\"max_width\"),\n            max_lines=d.get(\"max_lines\")\n        )\n",
  "termforge/text/markup.py": "from __future__ import annotations\nimport re\nfrom typing import Any\nfrom termforge.core.types import StyleSpec, ColorValue\nfrom termforge.text.types import TextSpan, TextRun\n\ndef parse_color_string(color_str: str) -> ColorValue:\n    color_str = color_str.strip().lower()\n    if color_str.startswith(\"#\"):\n        h = color_str.lstrip(\"#\")\n        try:\n            r = int(h[0:2], 16)\n            g = int(h[2:4], 16)\n            b = int(h[4:6], 16)\n            return ColorValue(r, g, b, name=color_str)\n        except ValueError:\n            pass\n    colors_map = {\n        \"black\": (0, 0, 0), \"red\": (205, 0, 0), \"green\": (0, 205, 0), \"yellow\": (205, 205, 0),\n        \"blue\": (0, 0, 238), \"magenta\": (205, 0, 205), \"cyan\": (0, 205, 205), \"white\": (229, 229, 229),\n        \"bright_black\": (127, 127, 127), \"bright_red\": (255, 0, 0), \"bright_green\": (0, 255, 0),\n        \"bright_yellow\": (255, 255, 0), \"bright_blue\": (92, 92, 255), \"bright_magenta\": (255, 0, 255),\n        \"bright_cyan\": (0, 255, 255), \"bright_white\": (255, 255, 255)\n    }\n    if color_str in colors_map:\n        r, g, b = colors_map[color_str]\n        return ColorValue(r, g, b, name=color_str)\n    return ColorValue(255, 255, 255, name=color_str) # default fallback\n\ndef parse_markup(text: str) -> TextRun:\n    pattern = re.compile(r\"(\\[/?[a-zA-Z_][a-zA-Z0-9_]*(?:=[^\\]]+)?\\]|\\[/\\])\")\n    parts = pattern.split(text)\n    \n    # Track style state stack\n    # Each entry in stack is a dict representing changes, or we can resolve the full style\n    # Let's start with a base style (all False / None)\n    current_style: dict[str, Any] = {\n        \"fg\": None, \"bg\": None,\n        \"bold\": False, \"dim\": False, \"italic\": False,\n        \"underline\": False, \"strikethrough\": False\n    }\n    \n    style_stack = [dict(current_style)]\n    spans = []\n    \n    for part in parts:\n        if not part:\n            continue\n        if part.startswith(\"[\") and part.endswith(\"]\"):\n            # It's a tag\n            tag_content = part[1:-1]\n            if tag_content.startswith(\"/\"):\n                # End tag\n                # E.g. [/bold] or [/fg] or [/]\n                end_tag = tag_content[1:].strip().lower()\n                if end_tag == \"\" or end_tag == \"/\":\n                    # pop all or reset to base if stack is empty\n                    if len(style_stack) > 1:\n                        style_stack.pop()\n                    else:\n                        style_stack = [dict(current_style)]\n                else:\n                    # Pop the last style from stack that matches this tag or just pop top\n                    # For simple nested tags, popping top is usually fine or we can search back.\n                    # Let's do simple stack pop.\n                    if len(style_stack) > 1:\n                        style_stack.pop()\n            else:\n                # Start tag\n                # E.g. [bold] or [fg=red]\n                if \"=\" in tag_content:\n                    tag_name, tag_val = tag_content.split(\"=\", 1)\n                    tag_name = tag_name.strip().lower()\n                    tag_val = tag_val.strip()\n                else:\n                    tag_name = tag_content.strip().lower()\n                    tag_val = None\n                \n                # Copy top style to create new nested style\n                new_style = dict(style_stack[-1])\n                \n                if tag_name == \"bold\":\n                    new_style[\"bold\"] = True\n                elif tag_name == \"dim\":\n                    new_style[\"dim\"] = True\n                elif tag_name == \"italic\":\n                    new_style[\"italic\"] = True\n                elif tag_name == \"underline\":\n                    new_style[\"underline\"] = True\n                elif tag_name == \"strikethrough\":\n                    new_style[\"strikethrough\"] = True\n                elif tag_name == \"fg\" and tag_val:\n                    new_style[\"fg\"] = parse_color_string(tag_val)\n                elif tag_name == \"bg\" and tag_val:\n                    new_style[\"bg\"] = parse_color_string(tag_val)\n                \n                style_stack.append(new_style)\n        else:\n            # Raw text\n            active_style_dict = style_stack[-1]\n            style_spec = StyleSpec(\n                fg=active_style_dict[\"fg\"],\n                bg=active_style_dict[\"bg\"],\n                bold=active_style_dict[\"bold\"],\n                dim=active_style_dict[\"dim\"],\n                italic=active_style_dict[\"italic\"],\n                underline=active_style_dict[\"underline\"],\n                strikethrough=active_style_dict[\"strikethrough\"]\n            )\n            spans.append(TextSpan(text=part, style=style_spec))\n            \n    return TextRun(spans=spans)\n\ndef strip_markup(text: str) -> str:\n    pattern = re.compile(r\"\\[/?[a-zA-Z_][a-zA-Z0-9_]*(?:=[^\\]]+)?\\]|\\[/\\]\")\n    return pattern.sub(\"\", text)\n",
  "termforge/text/wrap.py": "from __future__ import annotations\nimport unicodedata\nfrom termforge.core.types import StyleSpec\nfrom termforge.text.types import TextSpan, TextRun\n\ndef char_width(char: str) -> int:\n    if char == \"\\n\" or char == \"\\r\":\n        return 0\n    w = unicodedata.east_asian_width(char)\n    if w in (\"W\", \"F\"):\n        return 2\n    return 1\n\ndef get_string_width(text: str) -> int:\n    return sum(char_width(c) for c in text)\n\ndef measure_text(run: TextRun) -> int:\n    return sum(get_string_width(span.text) for span in run.spans)\n\ndef wrap_text(text: str, width: int) -> list[str]:\n    if width <= 0:\n        return [text]\n    lines = []\n    for paragraph in text.split(\"\\n\"):\n        current_line: list[str] = []\n        current_width = 0\n        words = paragraph.split(\" \")\n        i = 0\n        while i < len(words):\n            word = words[i]\n            word_w = get_string_width(word)\n            \n            if word_w > width:\n                # Split long word character-by-character\n                sub_word = \"\"\n                sub_w = 0\n                for char in word:\n                    c_w = char_width(char)\n                    if sub_w + c_w > width:\n                        lines.append(sub_word)\n                        sub_word = char\n                        sub_w = c_w\n                    else:\n                        sub_word += char\n                        sub_w += c_w\n                if sub_word:\n                    words[i] = sub_word\n                    continue\n            \n            space_w = 1 if current_line else 0\n            if current_width + space_w + word_w > width:\n                lines.append(\" \".join(current_line))\n                current_line = [word]\n                current_width = word_w\n            else:\n                if space_w:\n                    current_line.append(word)\n                else:\n                    current_line = [word]\n                current_width += space_w + word_w\n            i += 1\n            \n        if current_line:\n            lines.append(\" \".join(current_line))\n        elif not paragraph:\n            lines.append(\"\")\n    return lines\n\ndef truncate_text(text: str, width: int, suffix: str = \"\u2026\") -> str:\n    suffix_w = get_string_width(suffix)\n    if width <= suffix_w:\n        # If target width is extremely small, just truncate the suffix\n        current_w = 0\n        result = \"\"\n        for c in suffix:\n            c_w = char_width(c)\n            if current_w + c_w > width:\n                break\n            result += c\n            current_w += c_w\n        return result\n        \n    current_w = 0\n    result = \"\"\n    for c in text:\n        c_w = char_width(c)\n        if current_w + c_w + suffix_w > width:\n            return result + suffix\n        result += c\n        current_w += c_w\n    return result\n\ndef wrap_run(run: TextRun, width: int) -> list[TextRun]:\n    if width <= 0:\n        return [run]\n        \n    chars: list[tuple[str, StyleSpec | None]] = []\n    for span in run.spans:\n        for c in span.text:\n            chars.append((c, span.style))\n            \n    lines: list[list[tuple[str, StyleSpec | None]]] = []\n    current_line: list[tuple[str, StyleSpec | None]] = []\n    current_w = 0\n    \n    i = 0\n    while i < len(chars):\n        c, style = chars[i]\n        c_w = char_width(c)\n        \n        if c == \"\\n\":\n            lines.append(current_line)\n            current_line = []\n            current_w = 0\n            i += 1\n            continue\n            \n        if current_w + c_w > width:\n            # Word boundary search\n            split_idx = -1\n            for j in range(len(current_line) - 1, -1, -1):\n                if current_line[j][0] == \" \":\n                    split_idx = j\n                    break\n                    \n            if split_idx != -1 and split_idx > 0:\n                word_part = current_line[split_idx+1:]\n                current_line = current_line[:split_idx]\n                lines.append(current_line)\n                current_line = []\n                current_w = 0\n                i -= len(word_part)\n            else:\n                # Force wrap at character boundary\n                if current_line:\n                    lines.append(current_line)\n                    current_line = []\n                    current_w = 0\n                else:\n                    # Single character is wider than line, put it anyway to prevent infinite loop\n                    current_line.append((c, style))\n                    lines.append(current_line)\n                    current_line = []\n                    current_w = 0\n                    i += 1\n        else:\n            current_line.append((c, style))\n            current_w += c_w\n            i += 1\n            \n    if current_line or not lines:\n        lines.append(current_line)\n        \n    run_lines = []\n    for line in lines:\n        spans = []\n        current_span_text = \"\"\n        current_span_style = None\n        \n        for c, style in line:\n            if style == current_span_style:\n                current_span_text += c\n            else:\n                if current_span_text:\n                    spans.append(TextSpan(text=current_span_text, style=current_span_style))\n                current_span_text = c\n                current_span_style = style\n                \n        if current_span_text:\n            spans.append(TextSpan(text=current_span_text, style=current_span_style))\n        run_lines.append(TextRun(spans=spans))\n        \n    return run_lines\n",
  "termforge/text/__init__.py": "\"\"\"TermForge text module \u2014 styled text primitives, markup, wrapping.\"\"\"\nfrom termforge.text.types import (\n    TextAlign,\n    TextOverflow,\n    TextSpan,\n    TextRun,\n    TextSpec,\n)\nfrom termforge.text.markup import (\n    parse_markup,\n    strip_markup,\n)\nfrom termforge.text.wrap import (\n    char_width,\n    get_string_width,\n    measure_text,\n    wrap_text,\n    truncate_text,\n    wrap_run,\n)\n\nfrom termforge.text.render import (\n    style_to_ansi,\n    render_text,\n    apply_overflow_cascade,\n)\n\n__all__ = [\n    \"TextAlign\",\n    \"TextOverflow\",\n    \"TextSpan\",\n    \"TextRun\",\n    \"TextSpec\",\n    \"parse_markup\",\n    \"strip_markup\",\n    \"char_width\",\n    \"get_string_width\",\n    \"measure_text\",\n    \"wrap_text\",\n    \"truncate_text\",\n    \"wrap_run\",\n    \"style_to_ansi\",\n    \"render_text\",\n    \"apply_overflow_cascade\",\n]\n",
