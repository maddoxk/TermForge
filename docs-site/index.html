  "termforge/animation/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom enum import Enum\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec\n\nclass SpinnerStyle(str, Enum):\n    DOTS = \"dots\"\n    LINE = \"line\"\n    BRAILLE = \"braille\"\n    BOUNCE = \"bounce\"\n    CLOCK = \"clock\"\n    MOON = \"moon\"\n    ARROWS = \"arrows\"\n    PULSE = \"pulse\"\n\nclass TransitionType(str, Enum):\n    FADE = \"fade\"\n    SLIDE_LEFT = \"slide_left\"\n    SLIDE_RIGHT = \"slide_right\"\n    SLIDE_UP = \"slide_up\"\n    SLIDE_DOWN = \"slide_down\"\n    WIPE = \"wipe\"\n\n@dataclass\nclass SpinnerSpec(RenderableSpec):\n    style: SpinnerStyle = SpinnerStyle.DOTS\n    label: str | None = None\n    fps: float = 10.0\n    color_token: str = \"primary\"\n    spec_type: str = \"spinner\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"style\": self.style.value,\n            \"label\": self.label,\n            \"fps\": self.fps,\n            \"color_token\": self.color_token\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> SpinnerSpec:\n        return cls(\n            style=SpinnerStyle(d.get(\"style\", \"dots\")),\n            label=d.get(\"label\"),\n            fps=d.get(\"fps\", 10.0),\n            color_token=d.get(\"color_token\", \"primary\")\n        )\n\n@dataclass\nclass TransitionSpec(RenderableSpec):\n    transition_type: TransitionType = TransitionType.FADE\n    duration_ms: float = 1000.0\n    from_content: list[str] = field(default_factory=list)\n    to_content: list[str] = field(default_factory=list)\n    spec_type: str = \"transition\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"transition_type\": self.transition_type.value,\n            \"duration_ms\": self.duration_ms,\n            \"from_content\": self.from_content,\n            \"to_content\": self.to_content\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> TransitionSpec:\n        return cls(\n            transition_type=TransitionType(d.get(\"transition_type\", \"fade\")),\n            duration_ms=d.get(\"duration_ms\", 1000.0),\n            from_content=d.get(\"from_content\", []),\n            to_content=d.get(\"to_content\", [])\n        )\n",
  "termforge/animation/transitions.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth, StyleSpec, ColorValue\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.core.color import interpolate_color\nfrom termforge.text.types import TextRun, TextSpan\nfrom termforge.text.markup import parse_markup, strip_markup\nfrom termforge.text.render import style_to_ansi, render_text\nfrom termforge.animation.types import TransitionSpec, TransitionType\n\ndef line_to_tuples(line: str) -> list[tuple[str, StyleSpec | None]]:\n    # Convert string (which might contain markup or ANSI) to (char, style)\n    # If it is an ANSI string, we can strip it for simple transitions, \n    # but let's parse it using parse_markup if it contains markup,\n    # or just treat it as plain text if it contains raw ANSI.\n    # To be extremely clean, we can assume inputs to transitions are plain strings (or markup).\n    # Let's parse as markup first to extract styles\n    run = parse_markup(line)\n    tuples = []\n    for span in run.spans:\n        for c in span.text:\n            tuples.append((c, span.style))\n    return tuples\n\ndef tuples_to_ansi(tuples: list[tuple[str, StyleSpec | None]], theme: ThemeTokens | None, depth: ColorDepth) -> str:\n    parts = []\n    current_style = None\n    current_text = \"\"\n    for c, style in tuples:\n        if style == current_style:\n            current_text += c\n        else:\n            if current_text:\n                start_ansi, end_ansi = style_to_ansi(current_style, theme, depth)\n                parts.append(f\"{start_ansi}{current_text}{end_ansi}\")\n            current_text = c\n            current_style = style\n    if current_text:\n        start_ansi, end_ansi = style_to_ansi(current_style, theme, depth)\n        parts.append(f\"{start_ansi}{current_text}{end_ansi}\")\n    return \"\".join(parts)\n\ndef render_fade(\n    from_tuples: list[tuple[str, StyleSpec | None]],\n    to_tuples: list[tuple[str, StyleSpec | None]],\n    progress: float,\n    theme: ThemeTokens | None = None\n) -> list[tuple[str, StyleSpec | None]]:\n    # Find background color for fading\n    bg_color = ColorValue(0, 0, 0)\n    if theme and theme.colors:\n        surf = theme.colors.get(\"surface\")\n        if surf:\n            bg_color = surf\n            \n    max_len = max(len(from_tuples), len(to_tuples))\n    # Pad both to max_len\n    from_padded = from_tuples + [(\" \", None)] * (max_len - len(from_tuples))\n    to_padded = to_tuples + [(\" \", None)] * (max_len - len(to_tuples))\n    \n    result: list[tuple[str, StyleSpec | None]] = []\n    for i in range(max_len):\n        c_from, style_from = from_padded[i]\n        c_to, style_to = to_padded[i]\n        \n        # Base styles\n        sf = style_from if style_from else StyleSpec()\n        st = style_to if style_to else StyleSpec()\n        \n        # Base colors (fallback to white/bg)\n        fg_from = sf.fg if sf.fg else ColorValue(255, 255, 255)\n        fg_to = st.fg if st.fg else ColorValue(255, 255, 255)\n        \n        if progress < 0.5:\n            # Fade out from_tuples\n            t = progress * 2.0 # 0.0 to 1.0\n            interp_fg = interpolate_color(fg_from, bg_color, t)\n            # Create style\n            new_style = StyleSpec(\n                fg=interp_fg,\n                bg=sf.bg, # keep bg static or we could fade it too\n                bold=sf.bold, dim=sf.dim, italic=sf.italic\n            )\n            result.append((c_from, new_style))\n        else:\n            # Fade in to_tuples\n            t = (progress - 0.5) * 2.0 # 0.0 to 1.0\n            interp_fg = interpolate_color(bg_color, fg_to, t)\n            new_style = StyleSpec(\n                fg=interp_fg,\n                bg=st.bg,\n                bold=st.bold, dim=st.dim, italic=st.italic\n            )\n            result.append((c_to, new_style))\n            \n    return result\n\ndef render_slide(\n    from_tuples: list[tuple[str, StyleSpec | None]],\n    to_tuples: list[tuple[str, StyleSpec | None]],\n    progress: float,\n    direction: TransitionType\n) -> list[tuple[str, StyleSpec | None]]:\n    width = max(len(from_tuples), len(to_tuples))\n    from_padded = from_tuples + [(\" \", None)] * (width - len(from_tuples))\n    to_padded = to_tuples + [(\" \", None)] * (width - len(to_tuples))\n    \n    shift = int(progress * width)\n    \n    if direction == TransitionType.SLIDE_LEFT:\n        return from_padded[shift:] + to_padded[:shift]\n    elif direction == TransitionType.SLIDE_RIGHT:\n        return to_padded[width - shift :] + from_padded[: width - shift]\n        \n    return to_padded # Fallback\n\ndef render_wipe(\n    from_tuples: list[tuple[str, StyleSpec | None]],\n    to_tuples: list[tuple[str, StyleSpec | None]],\n    progress: float\n) -> list[tuple[str, StyleSpec | None]]:\n    width = max(len(from_tuples), len(to_tuples))\n    from_padded = from_tuples + [(\" \", None)] * (width - len(from_tuples))\n    to_padded = to_tuples + [(\" \", None)] * (width - len(to_tuples))\n    \n    wipe_x = int(progress * width)\n    return to_padded[:wipe_x] + from_padded[wipe_x:]\n\ndef render_transition(\n    spec: TransitionSpec,\n    progress: float,\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth = ColorDepth.TRUECOLOR\n) -> list[str]:\n    # Ensure progress is clamped to 0..1\n    progress = max(0.0, min(1.0, progress))\n    \n    from_lines = spec.from_content\n    to_lines = spec.to_content\n    max_rows = max(len(from_lines), len(to_lines))\n    \n    # Pad rows\n    from_lines_padded = from_lines + [\"\"] * (max_rows - len(from_lines))\n    to_lines_padded = to_lines + [\"\"] * (max_rows - len(to_lines))\n    \n    # Vertical slides (shift rows instead of columns)\n    if spec.transition_type == TransitionType.SLIDE_UP:\n        shift_rows = int(progress * max_rows)\n        combined_rows = from_lines_padded[shift_rows:] + to_lines_padded[:shift_rows]\n        return combined_rows\n    elif spec.transition_type == TransitionType.SLIDE_DOWN:\n        shift_rows = int(progress * max_rows)\n        combined_rows = to_lines_padded[max_rows - shift_rows :] + from_lines_padded[: max_rows - shift_rows]\n        return combined_rows\n        \n    # Column/pixel-level transitions\n    rendered_lines = []\n    for r in range(max_rows):\n        from_tuples = line_to_tuples(from_lines_padded[r])\n        to_tuples = line_to_tuples(to_lines_padded[r])\n        \n        if spec.transition_type == TransitionType.FADE:\n            trans_tuples = render_fade(from_tuples, to_tuples, progress, theme)\n        elif spec.transition_type == TransitionType.WIPE:\n            trans_tuples = render_wipe(from_tuples, to_tuples, progress)\n        else: # SLIDE_LEFT / SLIDE_RIGHT\n            trans_tuples = render_slide(from_tuples, to_tuples, progress, spec.transition_type)\n            \n        rendered_lines.append(tuples_to_ansi(trans_tuples, theme, depth))\n        \n    return rendered_lines\n",
  "termforge/animation/spinners.py": "from __future__ import annotations\nfrom termforge.core.types import StyleSpec, ColorValue, ColorDepth\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.text.render import style_to_ansi\nfrom termforge.animation.types import SpinnerSpec, SpinnerStyle\n\nSPINNER_FRAMES: dict[SpinnerStyle, list[str]] = {\n    SpinnerStyle.DOTS: [\"\u280b\", \"\u2819\", \"\u2839\", \"\u2838\", \"\u283c\", \"\u2834\", \"\u2826\", \"\u2827\", \"\u2807\", \"\u280f\"],\n    SpinnerStyle.LINE: [\"-\", \"\\\\\", \"|\", \"/\"],\n    SpinnerStyle.BRAILLE: [\"\u28fe\", \"\u28fd\", \"\u28fb\", \"\u28bf\", \"\u287f\", \"\u28df\", \"\u28ef\", \"\u28f7\"],\n    SpinnerStyle.BOUNCE: [\"\u2801\", \"\u2802\", \"\u2804\", \"\u2840\", \"\u2880\", \"\u2820\", \"\u2810\", \"\u2808\"],\n    SpinnerStyle.CLOCK: [\"\ud83d\udd50\", \"\ud83d\udd51\", \"\ud83d\udd52\", \"\ud83d\udd53\", \"\ud83d\udd54\", \"\ud83d\udd55\", \"\ud83d\udd56\", \"\ud83d\udd57\", \"\ud83d\udd58\", \"\ud83d\udd59\", \"\ud83d\udd5a\", \"\ud83d\udd5b\"],\n    SpinnerStyle.MOON: [\"\ud83c\udf11\", \"\ud83c\udf12\", \"\ud83c\udf13\", \"\ud83c\udf14\", \"\ud83c\udf15\", \"\ud83c\udf16\", \"\ud83c\udf17\", \"\ud83c\udf18\"],\n    SpinnerStyle.ARROWS: [\"\u2190\", \"\u2196\", \"\u2191\", \"\u2197\", \"\u2192\", \"\u2198\", \"\u2193\", \"\u2199\"],\n    SpinnerStyle.PULSE: [\"\u2588\", \"\u2589\", \"\u258a\", \"\u258b\", \"\u258c\", \"\u258d\", \"\u258e\", \"\u258f\", \" \", \"\u258f\", \"\u258e\", \"\u258d\", \"\u258c\", \"\u258b\", \"\u258a\", \"\u2589\"]\n}\n\ndef get_spinner_frame(style: SpinnerStyle, frame_number: int) -> str:\n    frames = SPINNER_FRAMES.get(style, SPINNER_FRAMES[SpinnerStyle.DOTS])\n    return frames[frame_number % len(frames)]\n\ndef render_spinner(\n    spec: SpinnerSpec,\n    frame_number: int,\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth = ColorDepth.TRUECOLOR\n) -> str:\n    frame = get_spinner_frame(spec.style, frame_number)\n    \n    style = StyleSpec(fg=ColorValue(0, 0, 0, name=f\"colors.{spec.color_token}\"))\n    start_ansi, end_ansi = style_to_ansi(style, theme, depth)\n    \n    styled_frame = f\"{start_ansi}{frame}{end_ansi}\"\n    if spec.label:\n        return f\"{styled_frame} {spec.label}\"\n    return styled_frame\n",
  "termforge/animation/__init__.py": "\"\"\"TermForge animation module \u2014 spinners and transitions.\"\"\"\nfrom termforge.animation.types import SpinnerStyle, TransitionType, SpinnerSpec, TransitionSpec\nfrom termforge.animation.spinners import SPINNER_FRAMES, get_spinner_frame, render_spinner\nfrom termforge.animation.transitions import render_transition\n\n__all__ = [\n    \"SpinnerStyle\",\n    \"TransitionType\",\n    \"SpinnerSpec\",\n    \"TransitionSpec\",\n    \"SPINNER_FRAMES\",\n    \"get_spinner_frame\",\n    \"render_spinner\",\n    \"render_transition\",\n]\n",
  "termforge/tree/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec, StyleSpec\n\n@dataclass\nclass TreeNodeSpec:\n    label: str\n    expanded: bool = False\n    children: list[TreeNodeSpec] = field(default_factory=list)\n    style: StyleSpec | None = None\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"label\": self.label,\n            \"expanded\": self.expanded,\n            \"children\": [c.to_dict() for c in self.children],\n            \"style\": self.style.to_dict() if self.style else None\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> TreeNodeSpec:\n        return cls(\n            label=d[\"label\"],\n            expanded=d.get(\"expanded\", False),\n            children=[TreeNodeSpec.from_dict(c) for c in d.get(\"children\", [])],\n            style=StyleSpec.from_dict(d[\"style\"]) if d.get(\"style\") else None\n        )\n\n@dataclass\nclass TreeSpec(RenderableSpec):\n    root_nodes: list[TreeNodeSpec] = field(default_factory=list)\n    indent_size: int = 2\n    spec_type: str = \"tree\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"root_nodes\": [n.to_dict() for n in self.root_nodes],\n            \"indent_size\": self.indent_size\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> TreeSpec:\n        return cls(\n            root_nodes=[TreeNodeSpec.from_dict(n) for n in d.get(\"root_nodes\", [])],\n            indent_size=d.get(\"indent_size\", 2)\n        )\n",
  "termforge/tree/__init__.py": "from termforge.tree.types import TreeSpec, TreeNodeSpec\nfrom termforge.tree.render import render_tree\n\n__all__ = [\n    \"TreeSpec\",\n    \"TreeNodeSpec\",\n    \"render_tree\",\n]\n",
  "termforge/tree/render.py": "from __future__ import annotations\nfrom termforge.core.types import Size\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.tree.types import TreeSpec, TreeNodeSpec\nfrom termforge.text.types import TextSpec\nfrom termforge.text.render import render_text\n\ndef render_tree(spec: TreeSpec, max_size: Size, theme: ThemeTokens) -> list[str]:\n    lines = []\n    \n    def traverse(nodes: list[TreeNodeSpec], depth: int, is_last_list: list[bool]) -> None:\n        for i, node in enumerate(nodes):\n            is_last = (i == len(nodes) - 1)\n            \n            prefix = \"\"\n            for j in range(depth):\n                if is_last_list[j]:\n                    prefix += \" \" * spec.indent_size\n                else:\n                    prefix += \"\u2502\" + \" \" * (spec.indent_size - 1)\n                    \n            if depth > 0:\n                if is_last:\n                    prefix += \"\u2514\" + \"\u2500\" * (spec.indent_size - 1)\n                else:\n                    prefix += \"\u251c\" + \"\u2500\" * (spec.indent_size - 1)\n                    \n            icon = \"\ud83d\udcc2 \" if node.children and node.expanded else \"\ud83d\udcc1 \" if node.children else \"\ud83d\udcc4 \"\n            \n            # Simple text rendering\n            line = prefix + icon + node.label\n            if len(line) > max_size.width:\n                line = line[:max_size.width - 1] + \"\u2026\"\n                \n            lines.append(line)\n            \n            if node.expanded and node.children:\n                traverse(node.children, depth + 1, is_last_list + [is_last])\n                \n    traverse(spec.root_nodes, 0, [])\n    \n    return lines[:max_size.height]\n",
  "termforge/borders/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom enum import Enum\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec\nfrom termforge.text.types import TextAlign\n\nclass BorderStyle(str, Enum):\n    SINGLE = \"single\"\n    DOUBLE = \"double\"\n    ROUNDED = \"rounded\"\n    HEAVY = \"heavy\"\n    ASCII = \"ascii\"\n    NONE = \"none\"\n\n@dataclass\nclass BorderSide:\n    visible: bool = True\n    style_override: BorderStyle | None = None\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"visible\": self.visible,\n            \"style_override\": self.style_override.value if self.style_override else None\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> BorderSide:\n        override = d.get(\"style_override\")\n        style_override = BorderStyle(override) if override else None\n        return cls(\n            visible=d.get(\"visible\", True),\n            style_override=style_override\n        )\n\n@dataclass\nclass BorderSpec(RenderableSpec):\n    style: BorderStyle = BorderStyle.SINGLE\n    top: BorderSide = field(default_factory=BorderSide)\n    right: BorderSide = field(default_factory=BorderSide)\n    bottom: BorderSide = field(default_factory=BorderSide)\n    left: BorderSide = field(default_factory=BorderSide)\n    title: str | None = None\n    title_align: TextAlign = TextAlign.LEFT\n    title_pad: int = 1                 # spaces on each side of the title text within the border\n    tag_align: TextAlign = TextAlign.RIGHT\n    subtitle: str | None = None\n    content: RenderableSpec | None = None\n    glyphs: dict[str, str] | None = None\n    tags: list[str] = field(default_factory=list)\n    spec_type: str = \"border\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"style\": self.style.value,\n            \"top\": self.top.to_dict(),\n            \"right\": self.right.to_dict(),\n            \"bottom\": self.bottom.to_dict(),\n            \"left\": self.left.to_dict(),\n            \"title\": self.title,\n            \"title_align\": self.title_align.value,\n            \"title_pad\": self.title_pad,\n            \"tag_align\": self.tag_align.value,\n            \"subtitle\": self.subtitle,\n            \"content\": self.content.to_dict() if self.content else None,\n            \"glyphs\": self.glyphs,\n            \"tags\": self.tags\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> BorderSpec:\n        from termforge.core.types import RenderableSpec\n        content_dict = d.get(\"content\")\n        content = None\n        if content_dict:\n            content = RenderableSpec.from_dict(content_dict)\n            \n        return cls(\n            style=BorderStyle(d.get(\"style\", \"single\")),\n            top=BorderSide.from_dict(d.get(\"top\", {})),\n            right=BorderSide.from_dict(d.get(\"right\", {})),\n            bottom=BorderSide.from_dict(d.get(\"bottom\", {})),\n            left=BorderSide.from_dict(d.get(\"left\", {})),\n            title=d.get(\"title\"),\n            title_align=TextAlign(d.get(\"title_align\", \"left\")),\n            title_pad=d.get(\"title_pad\", 1),\n            tag_align=TextAlign(d.get(\"tag_align\", \"right\")),\n            subtitle=d.get(\"subtitle\"),\n            content=content,\n            glyphs=d.get(\"glyphs\"),\n            tags=d.get(\"tags\", [])\n        )\n",
  "termforge/borders/glyphs.py": "from __future__ import annotations\nfrom dataclasses import dataclass\nfrom termforge.core.theme import ThemeTokens, resolve_token\nfrom termforge.borders.types import BorderStyle\n\n@dataclass\nclass BorderGlyphs:\n    tl: str\n    tr: str\n    bl: str\n    br: str\n    h: str\n    v: str\n    t_down: str\n    t_up: str\n    t_right: str\n    t_left: str\n    cross: str\n\nSINGLE_GLYPHS = BorderGlyphs(\n    tl=\"\u250c\", tr=\"\u2510\", bl=\"\u2514\", br=\"\u2518\", h=\"\u2500\", v=\"\u2502\",\n    t_down=\"\u252c\", t_up=\"\u2534\", t_right=\"\u251c\", t_left=\"\u2524\", cross=\"\u253c\"\n)\n\nDOUBLE_GLYPHS = BorderGlyphs(\n    tl=\"\u2554\", tr=\"\u2557\", bl=\"\u255a\", br=\"\u255d\", h=\"\u2550\", v=\"\u2551\",\n    t_down=\"\u2566\", t_up=\"\u2569\", t_right=\"\u2560\", t_left=\"\u2563\", cross=\"\u256c\"\n)\n\nROUNDED_GLYPHS = BorderGlyphs(\n    tl=\"\u256d\", tr=\"\u256e\", bl=\"\u2570\", br=\"\u256f\", h=\"\u2500\", v=\"\u2502\",\n    t_down=\"\u252c\", t_up=\"\u2534\", t_right=\"\u251c\", t_left=\"\u2524\", cross=\"\u253c\"\n)\n\nHEAVY_GLYPHS = BorderGlyphs(\n    tl=\"\u250f\", tr=\"\u2513\", bl=\"\u2517\", br=\"\u251b\", h=\"\u2501\", v=\"\u2503\",\n    t_down=\"\u2533\", t_up=\"\u253b\", t_right=\"\u2523\", t_left=\"\u252b\", cross=\"\u254b\"\n)\n\nASCII_GLYPHS = BorderGlyphs(\n    tl=\"+\", tr=\"+\", bl=\"+\", br=\"+\", h=\"-\", v=\"|\",\n    t_down=\"+\", t_up=\"+\", t_right=\"+\", t_left=\"+\", cross=\"+\"\n)\n\ndef get_glyphs(style: BorderStyle, unicode_supported: bool = True) -> BorderGlyphs:\n    if style == BorderStyle.NONE:\n        return BorderGlyphs(tl=\" \", tr=\" \", bl=\" \", br=\" \", h=\" \", v=\" \", t_down=\" \", t_up=\" \", t_right=\" \", t_left=\" \", cross=\" \")\n    if not unicode_supported or style == BorderStyle.ASCII:\n        return ASCII_GLYPHS\n    if style == BorderStyle.DOUBLE:\n        return DOUBLE_GLYPHS\n    if style == BorderStyle.ROUNDED:\n        return ROUNDED_GLYPHS\n    if style == BorderStyle.HEAVY:\n        return HEAVY_GLYPHS\n    return SINGLE_GLYPHS\n\ndef resolve_border_glyphs(style: BorderStyle, theme: ThemeTokens | None, unicode_supported: bool = True) -> BorderGlyphs:\n    # 1. If theme has custom border_glyphs for this style name, resolve it\n    if theme and theme.border_glyphs:\n        theme_glyphs_dict = theme.border_glyphs.get(style.value)\n        if theme_glyphs_dict:\n            return BorderGlyphs(\n                tl=theme_glyphs_dict.get(\"tl\", \"\u250c\"),\n                tr=theme_glyphs_dict.get(\"tr\", \"\u2510\"),\n                bl=theme_glyphs_dict.get(\"bl\", \"\u2514\"),\n                br=theme_glyphs_dict.get(\"br\", \"\u2518\"),\n                h=theme_glyphs_dict.get(\"h\", \"\u2500\"),\n                v=theme_glyphs_dict.get(\"v\", \"\u2502\"),\n                t_down=theme_glyphs_dict.get(\"t_down\", \"\u252c\"),\n                t_up=theme_glyphs_dict.get(\"t_up\", \"\u2534\"),\n                t_right=theme_glyphs_dict.get(\"t_right\", \"\u251c\"),\n                t_left=theme_glyphs_dict.get(\"t_left\", \"\u2524\"),\n                cross=theme_glyphs_dict.get(\"cross\", \"\u253c\")\n            )\n            \n    # 2. Fall back to built-in sets\n    return get_glyphs(style, unicode_supported)\n",
  "termforge/borders/__init__.py": "\"\"\"TermForge borders module \u2014 swappable glyph sets, per-side control, title slots.\"\"\"\nfrom termforge.borders.types import BorderStyle, BorderSide, BorderSpec\nfrom termforge.borders.glyphs import BorderGlyphs, SINGLE_GLYPHS, DOUBLE_GLYPHS, ROUNDED_GLYPHS, HEAVY_GLYPHS, ASCII_GLYPHS, get_glyphs, resolve_border_glyphs\nfrom termforge.borders.render import render_border, strip_ansi\n\n__all__ = [\n    \"BorderStyle\",\n    \"BorderSide\",\n    \"BorderSpec\",\n    \"BorderGlyphs\",\n    \"SINGLE_GLYPHS\",\n    \"DOUBLE_GLYPHS\",\n    \"ROUNDED_GLYPHS\",\n    \"HEAVY_GLYPHS\",\n    \"ASCII_GLYPHS\",\n    \"get_glyphs\",\n    \"resolve_border_glyphs\",\n    \"render_border\",\n    \"strip_ansi\",\n]\n",
  "termforge/borders/render.py": "from __future__ import annotations\nimport re\nfrom termforge.borders.types import BorderSpec, BorderStyle\nfrom termforge.borders.glyphs import resolve_border_glyphs\nfrom termforge.text.wrap import get_string_width\nfrom termforge.text.types import TextAlign\nfrom termforge.core.theme import ThemeTokens\n\ndef strip_ansi(text: str) -> str:\n    ansi_escape = re.compile(r'\\x1B(?:[@-Z\\\\-_]|\\[[0-?]*[ -/]*[@-~])')\n    return ansi_escape.sub('', text)\n\ndef render_border(\n    spec: BorderSpec,\n    content_lines: list[str],\n    width: int | None = None,\n    theme: ThemeTokens | None = None,\n    unicode_supported: bool = True\n) -> list[str]:\n    glyphs = resolve_border_glyphs(spec.style, theme, unicode_supported)\n    if spec.glyphs:\n        from termforge.borders.glyphs import BorderGlyphs\n        glyphs = BorderGlyphs(\n            tl=spec.glyphs.get(\"tl\", glyphs.tl),\n            tr=spec.glyphs.get(\"tr\", glyphs.tr),\n            bl=spec.glyphs.get(\"bl\", glyphs.bl),\n            br=spec.glyphs.get(\"br\", glyphs.br),\n            h=spec.glyphs.get(\"h\", glyphs.h),\n            v=spec.glyphs.get(\"v\", glyphs.v),\n            t_down=spec.glyphs.get(\"t_down\", glyphs.t_down),\n            t_up=spec.glyphs.get(\"t_up\", glyphs.t_up),\n            t_right=spec.glyphs.get(\"t_right\", glyphs.t_right),\n            t_left=spec.glyphs.get(\"t_left\", glyphs.t_left),\n            cross=spec.glyphs.get(\"cross\", glyphs.cross)\n        )\n    \n    # 1. Determine inner width\n    left_w = 1 if spec.left.visible else 0\n    right_w = 1 if spec.right.visible else 0\n    top_h = 1 if spec.top.visible else 0\n    bottom_h = 1 if spec.bottom.visible else 0\n    \n    if width is not None:\n        inner_w = max(0, width - left_w - right_w)\n    else:\n        inner_w = max(get_string_width(strip_ansi(line)) for line in content_lines) if content_lines else 0\n        width = inner_w + left_w + right_w\n        \n    lines = []\n    \n    # 2. Render Top Border\n    if spec.top.visible:\n        top_line = \"\"\n        if spec.left.visible:\n            top_line += glyphs.tl\n        \n        # Determine top center content (title and tags)\n        _pad = \" \" * max(0, spec.title_pad)\n        title_text = f\"{_pad}{spec.title}{_pad}\" if spec.title else \"\"\n        title_w = get_string_width(title_text)\n        \n        tags_text = \"\"\n        if spec.tags:\n            tags_str = \" \".join(f\"[{t}]\" for t in spec.tags)\n            tags_text = f\" {tags_str} \"\n        tags_w = get_string_width(tags_text)\n        \n        # Build default background array of dashes\n        chars = [glyphs.h] * inner_w\n        \n        if inner_w > 0:\n            # 1. Compute positions\n            # Title alignment\n            if spec.title_align == TextAlign.LEFT:\n                title_pos = 1 if inner_w > 2 and title_w > 0 else 0\n            elif spec.title_align == TextAlign.RIGHT:\n                title_pos = max(0, inner_w - title_w - (1 if inner_w > 2 and title_w > 0 else 0))\n            else: # CENTER\n                title_pos = max(0, (inner_w - title_w) // 2)\n                \n            # Tag alignment\n            if spec.tag_align == TextAlign.LEFT:\n                if spec.title_align == TextAlign.LEFT and title_w > 0:\n                    tag_pos = title_pos + title_w\n                else:\n                    tag_pos = 1 if inner_w > 2 and tags_w > 0 else 0\n            elif spec.tag_align == TextAlign.RIGHT:\n                tag_pos = max(0, inner_w - tags_w - (1 if inner_w > 2 and tags_w > 0 else 0))\n                if spec.title_align == TextAlign.RIGHT and title_w > 0:\n                    tag_pos = max(0, title_pos - tags_w)\n            else: # CENTER\n                tag_pos = max(0, (inner_w - tags_w) // 2)\n                if spec.title_align == TextAlign.CENTER and title_w > 0:\n                    tag_pos = title_pos + title_w\n                    \n            # 2. Write content into array\n            # Write tags first (title has priority/overwrites tags if they overlap)\n            if tags_w > 0 and tag_pos + tags_w <= inner_w:\n                for idx in range(tags_w):\n                    chars[tag_pos + idx] = tags_text[idx]\n            if title_w > 0 and title_pos + title_w <= inner_w:\n                for idx in range(title_w):\n                    chars[title_pos + idx] = title_text[idx]\n                    \n        top_line += \"\".join(chars)\n            \n        if spec.right.visible:\n            top_line += glyphs.tr\n        lines.append(top_line)\n        \n    # 3. Render Body Lines\n    for line in content_lines:\n        line_strip = strip_ansi(line)\n        line_w = get_string_width(line_strip)\n        \n        # Pad or truncate to inner_w\n        if line_w < inner_w:\n            padded_line = line + \" \" * (inner_w - line_w)\n        else:\n            # Simple truncate (in real world we would respect ANSI codes, but for standard strings it is fine)\n            # Or if it is already wrapped, it fits.\n            padded_line = line\n            \n        body_line = \"\"\n        if spec.left.visible:\n            body_line += glyphs.v\n        body_line += padded_line\n        if spec.right.visible:\n            body_line += glyphs.v\n        lines.append(body_line)\n        \n    # 4. Render Bottom Border\n    if spec.bottom.visible:\n        bot_line = \"\"\n        if spec.left.visible:\n            bot_line += glyphs.bl\n            \n        # Subtitle support\n        sub_text = f\" {spec.subtitle} \" if spec.subtitle else \"\"\n        sub_w = get_string_width(sub_text)\n        if sub_w > 0 and sub_w <= inner_w:\n            rem_space = inner_w - sub_w\n            # default bottom subtitle centered or left-aligned\n            bot_line += glyphs.h + sub_text + glyphs.h * (rem_space - 1)\n        else:\n            bot_line += glyphs.h * inner_w\n            \n        if spec.right.visible:\n            bot_line += glyphs.br\n        lines.append(bot_line)\n        \n    return lines\n",
  "termforge/progress/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec, StyleSpec\n\n@dataclass\nclass ProgressSpec(RenderableSpec):\n    progress: float = 0.0\n    filled_char: str = \"\u2588\"\n    empty_char: str = \"\u2591\"\n    head_char: str = \"\"\n    show_text: bool = True\n    text_format: str = \"{percent}%\"\n    width: int | None = None\n    filled_style: StyleSpec | None = None\n    empty_style: StyleSpec | None = None\n    color_config: dict[str, str] | None = None\n    spec_type: str = \"progress\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"progress\": self.progress,\n            \"filled_char\": self.filled_char,\n            \"empty_char\": self.empty_char,\n            \"head_char\": self.head_char,\n            \"show_text\": self.show_text,\n            \"text_format\": self.text_format,\n            \"width\": self.width,\n            \"filled_style\": self.filled_style.to_dict() if self.filled_style else None,\n            \"empty_style\": self.empty_style.to_dict() if self.empty_style else None,\n            \"color_config\": self.color_config\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ProgressSpec:\n        return cls(\n            progress=d.get(\"progress\", 0.0),\n            filled_char=d.get(\"filled_char\", \"\u2588\"),\n            empty_char=d.get(\"empty_char\", \"\u2591\"),\n            head_char=d.get(\"head_char\", \"\"),\n            show_text=d.get(\"show_text\", True),\n            text_format=d.get(\"text_format\", \"{percent}%\"),\n            width=d.get(\"width\"),\n            filled_style=StyleSpec.from_dict(d[\"filled_style\"]) if d.get(\"filled_style\") else None,\n            empty_style=StyleSpec.from_dict(d[\"empty_style\"]) if d.get(\"empty_style\") else None,\n            color_config=d.get(\"color_config\")\n        )\n",
  "termforge/progress/__init__.py": "from termforge.progress.types import ProgressSpec\nfrom termforge.progress.render import render_progress\n\n__all__ = [\n    \"ProgressSpec\",\n    \"render_progress\",\n]\n",
  "termforge/progress/render.py": "from __future__ import annotations\nfrom termforge.core.types import Size, StyleSpec, ColorValue, ColorDepth\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.text.render import style_to_ansi\nfrom termforge.progress.types import ProgressSpec\nimport math\n\ndef render_progress(spec: ProgressSpec, max_size: Size, theme: ThemeTokens, depth: ColorDepth = ColorDepth.TRUECOLOR) -> list[str]:\n    width = spec.width if spec.width is not None else max_size.width\n    if width <= 0:\n        return []\n    \n    text = \"\"\n    if spec.show_text:\n        percent = int(max(0.0, min(1.0, spec.progress)) * 100)\n        text = spec.text_format.replace(\"{percent}\", str(percent))\n        \n    bar_width = width - len(text) - (1 if text else 0)\n    if bar_width < 1:\n        # Not enough space for bar, just text\n        return [text[:width]]\n        \n    filled_len = int(math.floor(max(0.0, min(1.0, spec.progress)) * bar_width))\n    empty_len = bar_width - filled_len\n    \n    # Resolve custom color configurations\n    filled_role = \"primary\"\n    empty_role = \"border\"\n    if spec.color_config:\n        filled_role = spec.color_config.get(\"filled\", \"primary\")\n        empty_role = spec.color_config.get(\"empty\", \"border\")\n        \n    f_style = StyleSpec(fg=ColorValue(0, 0, 0, name=f\"colors.{filled_role}\"))\n    e_style = StyleSpec(fg=ColorValue(0, 0, 0, name=f\"colors.{empty_role}\"))\n    \n    s_fill, e_fill = style_to_ansi(f_style, theme, depth)\n    s_empty, e_empty = style_to_ansi(e_style, theme, depth)\n    \n    filled_str = spec.filled_char * filled_len\n    if spec.head_char and empty_len > 0 and filled_len > 0:\n        filled_str = filled_str[:-1] + spec.head_char\n        \n    empty_str = spec.empty_char * empty_len\n    \n    # Wrap in ANSI codes if resolved\n    if s_fill:\n        filled_str = f\"{s_fill}{filled_str}{e_fill}\"\n    if s_empty:\n        empty_str = f\"{s_empty}{empty_str}{e_empty}\"\n        \n    bar = filled_str + empty_str\n    \n    result = bar + (\" \" + text if text else \"\")\n    return [result]\n",
  "termforge/logos/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec, StyleSpec\n\n@dataclass\nclass LogoSpec(RenderableSpec):\n    text: str = \"TermForge\"\n    font: str = \"standard\"\n    color_token: str = \"primary\"\n    gradient: list[str] | None = None\n    spec_type: str = \"logo\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"text\": self.text,\n            \"font\": self.font,\n            \"color_token\": self.color_token,\n            \"gradient\": self.gradient\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> LogoSpec:\n        return cls(\n            text=d.get(\"text\", \"TermForge\"),\n            font=d.get(\"font\", \"standard\"),\n            color_token=d.get(\"color_token\", \"primary\"),\n            gradient=d.get(\"gradient\")\n        )\n\n@dataclass\nclass BannerSpec(RenderableSpec):\n    text: str = \"\"\n    font: str = \"slant\"\n    style: StyleSpec | None = None\n    spec_type: str = \"banner\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"text\": self.text,\n            \"font\": self.font,\n            \"style\": self.style.to_dict() if self.style else None\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> BannerSpec:\n        style_dict = d.get(\"style\")\n        style = StyleSpec.from_dict(style_dict) if style_dict else None\n        return cls(\n            text=d.get(\"text\", \"\"),\n            font=d.get(\"font\", \"slant\"),\n            style=style\n        )\n",
  "termforge/logos/gradient.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth\nfrom termforge.image.ansi import fg_color_ansi, RESET\n\ndef get_gradient_color(colors: list[tuple[int, int, int]], t: float) -> tuple[int, int, int]:\n    if not colors:\n        return (255, 255, 255)\n    if len(colors) == 1:\n        return colors[0]\n        \n    t = max(0.0, min(1.0, t))\n    num_segments = len(colors) - 1\n    scaled_t = t * num_segments\n    segment_idx = int(scaled_t)\n    segment_idx = min(segment_idx, num_segments - 1)\n    local_t = scaled_t - segment_idx\n    \n    c1 = colors[segment_idx]\n    c2 = colors[segment_idx + 1]\n    \n    r = round(c1[0] + (c2[0] - c1[0]) * local_t)\n    g = round(c1[1] + (c2[1] - c1[1]) * local_t)\n    b = round(c1[2] + (c2[2] - c1[2]) * local_t)\n    return (r, g, b)\n\ndef apply_gradient(lines: list[str], colors: list[tuple[int, int, int]], depth: ColorDepth) -> list[str]:\n    if not lines or not colors:\n        return lines\n        \n    result_lines = []\n    for line in lines:\n        line_len = len(line)\n        if line_len == 0:\n            result_lines.append(\"\")\n            continue\n            \n        colored_chars = []\n        for c_idx, char in enumerate(line):\n            t = c_idx / (line_len - 1) if line_len > 1 else 0.0\n            r, g, b = get_gradient_color(colors, t)\n            fg = fg_color_ansi(r, g, b, depth)\n            colored_chars.append(f\"{fg}{char}\")\n            \n        result_lines.append(\"\".join(colored_chars) + RESET)\n    return result_lines\n\ndef apply_vertical_gradient(lines: list[str], colors: list[tuple[int, int, int]], depth: ColorDepth) -> list[str]:\n    if not lines or not colors:\n        return lines\n        \n    num_rows = len(lines)\n    result_lines = []\n    for r_idx, line in enumerate(lines):\n        t = r_idx / (num_rows - 1) if num_rows > 1 else 0.0\n        r, g, b = get_gradient_color(colors, t)\n        fg = fg_color_ansi(r, g, b, depth)\n        result_lines.append(f\"{fg}{line}{RESET}\")\n    return result_lines\n",
  "termforge/logos/banner.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.text.render import style_to_ansi\nfrom termforge.logos.types import BannerSpec\nfrom termforge.logos.fonts import render_text_art\n\ndef render_banner(\n    spec: BannerSpec,\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth = ColorDepth.TRUECOLOR\n) -> list[str]:\n    lines = render_text_art(spec.text, spec.font)\n    if not lines:\n        return []\n        \n    if depth == ColorDepth.MONOCHROME or not spec.style:\n        return lines\n        \n    start_ansi, end_ansi = style_to_ansi(spec.style, theme, depth)\n    if start_ansi:\n        return [f\"{start_ansi}{line}{end_ansi}\" for line in lines]\n    return lines\n",
  "termforge/logos/__init__.py": "\"\"\"TermForge logos module \u2014 ASCII art fonts, gradient coloring, custom banners.\"\"\"\nfrom termforge.logos.types import LogoSpec, BannerSpec\nfrom termforge.logos.fonts import FONT_SMALL, FONT_STANDARD, FONT_SLANT, render_text_art\nfrom termforge.logos.gradient import apply_gradient, apply_vertical_gradient\nfrom termforge.logos.render import render_logo\nfrom termforge.logos.banner import render_banner\n\n__all__ = [\n    \"LogoSpec\",\n    \"BannerSpec\",\n    \"FONT_SMALL\",\n    \"FONT_STANDARD\",\n    \"FONT_SLANT\",\n    \"render_text_art\",\n    \"apply_gradient\",\n    \"apply_vertical_gradient\",\n    \"render_logo\",\n    \"render_banner\",\n]\n",
  "termforge/logos/fonts.py": "from __future__ import annotations\n\n# Alphanumeric character mappings for 3 fonts\n# Key: char, Value: list of strings (height = 3 or 5)\n\nFONT_SMALL: dict[str, list[str]] = {\n    \"T\": [\"\u250c\u252c\u2510\", \" \u2502 \", \" \u2534 \"],\n    \"E\": [\"\u251c\u2500 \", \"\u251c\u2500 \", \"\u2514\u2500\u2802\"],\n    \"R\": [\"\u251c\u2500\u2510\", \"\u251c\u252c\u2518\", \"\u2534\u2514\u2500\"],\n    \"M\": [\"\u250c\u2510\u250c\u2510\", \"\u2502\u2514\u2518\u2502\", \"\u2534  \u2534\"],\n    \"F\": [\"\u251c\u2500 \", \"\u251c\u2500 \", \"\u2534  \"],\n    \"O\": [\"\u250c\u2500\u2510\", \"\u2502 \u2502\", \"\u2514\u2500\u2518\"],\n    \"G\": [\"\u250c\u2500\u2510\", \"\u2502 \u252c\", \"\u2514\u2500\u2518\"],\n    \"S\": [\"\u250c\u2500 \", \"\u2514\u2500\u2510\", \" \u2500\u2518\"],\n    \"A\": [\"\u250c\u2500\u2510\", \"\u251c\u2500\u2524\", \"\u2534 \u2534\"],\n    \"N\": [\"\u250c\u2510 \", \"\u2502\u2502\u2502\", \"\u2518\u2514\u2518\"],\n    \"D\": [\"\u251c\u2500\u2510\", \"\u2502 \u2502\", \"\u2514\u2500\u2518\"],\n    \"L\": [\"\u2502  \", \"\u2502  \", \"\u2514\u2500\u2500\"],\n    \" \": [\"   \", \"   \", \"   \"]\n}\n\n# Standard block font (height 5)\nFONT_STANDARD: dict[str, list[str]] = {\n    \"T\": [\"\u2588\u2588\u2588\u2588\u2588\u2588\u2588\", \"   \u2588   \", \"   \u2588   \", \"   \u2588   \", \"   \u2588   \"],\n    \"E\": [\"\u2588\u2588\u2588\u2588\u2588\u2588\u2588\", \"\u2588      \", \"\u2588\u2588\u2588\u2588\u2588  \", \"\u2588      \", \"\u2588\u2588\u2588\u2588\u2588\u2588\u2588\"],\n    \"R\": [\"\u2588\u2588\u2588\u2588\u2588\u2588 \", \"\u2588     \u2588\", \"\u2588\u2588\u2588\u2588\u2588\u2588 \", \"\u2588   \u2588  \", \"\u2588    \u2588 \"],\n    \"M\": [\"\u2588\u2588   \u2588\u2588\", \"\u2588\u2588\u2588 \u2588\u2588\u2588\", \"\u2588 \u2588 \u2588 \u2588\", \"\u2588   \u2588 \u2588\", \"\u2588   \u2588 \u2588\"],\n    \"F\": [\"\u2588\u2588\u2588\u2588\u2588\u2588\u2588\", \"\u2588      \", \"\u2588\u2588\u2588\u2588\u2588  \", \"\u2588      \", \"\u2588      \"],\n    \"O\": [\" \u2588\u2588\u2588\u2588\u2588 \", \"\u2588     \u2588\", \"\u2588     \u2588\", \"\u2588     \u2588\", \" \u2588\u2588\u2588\u2588\u2588 \"],\n    \"G\": [\" \u2588\u2588\u2588\u2588\u2588 \", \"\u2588      \", \"\u2588  \u2588\u2588\u2588\u2588\", \"\u2588     \u2588\", \" \u2588\u2588\u2588\u2588\u2588 \"],\n    \"S\": [\" \u2588\u2588\u2588\u2588\u2588\u2588\", \"\u2588      \", \" \u2588\u2588\u2588\u2588\u2588 \", \"      \u2588\", \"\u2588\u2588\u2588\u2588\u2588\u2588 \"],\n    \"A\": [\"  \u2588\u2588\u2588  \", \" \u2588   \u2588 \", \"\u2588\u2588\u2588\u2588\u2588\u2588\u2588\", \"\u2588     \u2588\", \"\u2588     \u2588\"],\n    \"N\": [\"\u2588\u2588    \u2588\", \"\u2588\u2588\u2588   \u2588\", \"\u2588 \u2588   \u2588\", \"\u2588  \u2588  \u2588\", \"\u2588   \u2588\u2588\u2588\"],\n    \"D\": [\"\u2588\u2588\u2588\u2588\u2588\u2588 \", \"\u2588     \u2588\", \"\u2588     \u2588\", \"\u2588     \u2588\", \"\u2588\u2588\u2588\u2588\u2588\u2588 \"],\n    \"L\": [\"\u2588      \", \"\u2588      \", \"\u2588      \", \"\u2588      \", \"\u2588\u2588\u2588\u2588\u2588\u2588\u2588\"],\n    \" \": [\"       \", \"       \", \"       \", \"       \", \"       \"]\n}\n\n# Slant font (height 5)\nFONT_SLANT: dict[str, list[str]] = {\n    \"T\": [\"  \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \", \"  __  \u2588\u2588  _\", \"     \u2588\u2588    \", \"    \u2588\u2588     \", \"   \u2588\u2588      \"],\n    \"E\": [\" \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \", \" \u2588\u2588       \", \" \u2588\u2588\u2588\u2588\u2588\u2588   \", \" \u2588\u2588       \", \" \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \"],\n    \"R\": [\" \u2588\u2588\u2588\u2588\u2588\u2588\u2588  \", \" \u2588\u2588    \u2588\u2588 \", \" \u2588\u2588\u2588\u2588\u2588\u2588\u2588  \", \" \u2588\u2588   \u2588\u2588  \", \" \u2588\u2588    \u2588\u2588 \"],\n    \"M\": [\" \u2588\u2588      \u2588\u2588 \", \" \u2588\u2588\u2588    \u2588\u2588\u2588 \", \" \u2588\u2588 \u2588\u2588 \u2588\u2588 \u2588\u2588\", \" \u2588\u2588  \u2588\u2588  \u2588\u2588 \", \" \u2588\u2588      \u2588\u2588 \"],\n    \"F\": [\" \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \", \" \u2588\u2588       \", \" \u2588\u2588\u2588\u2588\u2588\u2588   \", \" \u2588\u2588       \", \" \u2588\u2588       \"],\n    \"O\": [\"   \u2588\u2588\u2588\u2588\u2588\u2588  \", \"  \u2588\u2588    \u2588\u2588 \", \" \u2588\u2588      \u2588\u2588\", \"  \u2588\u2588    \u2588\u2588 \", \"   \u2588\u2588\u2588\u2588\u2588\u2588  \"],\n    \"G\": [\"   \u2588\u2588\u2588\u2588\u2588\u2588  \", \"  \u2588\u2588    __ \", \" \u2588\u2588   \u2588\u2588\u2588\u2588 \", \"  \u2588\u2588    \u2588\u2588 \", \"   \u2588\u2588\u2588\u2588\u2588\u2588  \"],\n    \"S\": [\"  \u2588\u2588\u2588\u2588\u2588\u2588\u2588 \", \" \u2588\u2588       \", \"  \u2588\u2588\u2588\u2588\u2588\u2588  \", \"       \u2588\u2588 \", \" \u2588\u2588\u2588\u2588\u2588\u2588\u2588  \"],\n    \"A\": [\"   \u2588\u2588\u2588\u2588   \", \"  \u2588\u2588  \u2588\u2588  \", \" \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \", \" \u2588\u2588    \u2588\u2588 \", \" \u2588\u2588    \u2588\u2588 \"],\n    \"N\": [\" \u2588\u2588    \u2588\u2588 \", \" \u2588\u2588\u2588   \u2588\u2588 \", \" \u2588\u2588 \u2588\u2588 \u2588\u2588 \", \" \u2588\u2588  \u2588\u2588\u2588\u2588 \", \" \u2588\u2588    \u2588\u2588 \"],\n    \"D\": [\" \u2588\u2588\u2588\u2588\u2588\u2588\u2588  \", \" \u2588\u2588    \u2588\u2588 \", \" \u2588\u2588    \u2588\u2588 \", \" \u2588\u2588    \u2588\u2588 \", \" \u2588\u2588\u2588\u2588\u2588\u2588\u2588  \"],\n    \"L\": [\" \u2588\u2588       \", \" \u2588\u2588       \", \" \u2588\u2588       \", \" \u2588\u2588       \", \" \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \"],\n    \" \": [\"          \", \"          \", \"          \", \"          \", \"          \"]\n}\n\n# Create fallback representations for letters not in FONT dicts\ndef get_char_art(char: str, font_name: str) -> list[str]:\n    c = char.upper()\n    if font_name == \"small\":\n        if c in FONT_SMALL:\n            return FONT_SMALL[c]\n        # fallback simple representation\n        return [f\"{c}  \", f\"{c}  \", f\"{c}  \"]\n    elif font_name == \"slant\":\n        if c in FONT_SLANT:\n            return FONT_SLANT[c]\n        return [f\" {c}  \", f\" {c}  \", f\" {c}  \", f\" {c}  \", f\" {c}  \"]\n    else: # standard\n        if c in FONT_STANDARD:\n            return FONT_STANDARD[c]\n        return [f\" {c}  \", f\" {c}  \", f\" {c}  \", f\" {c}  \", f\" {c}  \"]\n\ndef render_text_art(text: str, font_name: str = \"standard\") -> list[str]:\n    if not text:\n        return []\n        \n    font_name = font_name.lower()\n    height = 3 if font_name == \"small\" else 5\n    \n    # Initialize empty line buffers\n    lines = [\"\"] * height\n    \n    for idx, char in enumerate(text):\n        char_lines = get_char_art(char, font_name)\n        for r in range(height):\n            # Pad between letters\n            sep = \" \" if idx > 0 else \"\"\n            lines[r] += sep + char_lines[r]\n            \n    return lines\n",
  "termforge/logos/render.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth, ColorValue\nfrom termforge.core.theme import ThemeTokens, resolve_token\nfrom termforge.image.ansi import fg_color_ansi, RESET\nfrom termforge.logos.types import LogoSpec\nfrom termforge.logos.fonts import render_text_art\nfrom termforge.logos.gradient import apply_gradient\n\ndef parse_color_value(color_str: str, theme: ThemeTokens | None) -> tuple[int, int, int]:\n    # Resolve token or parse hex\n    if theme and color_str.startswith(\"colors.\"):\n        resolved = resolve_token(theme, color_str)\n        if isinstance(resolved, ColorValue):\n            return (resolved.r, resolved.g, resolved.b)\n    # Parse hex color manually if needed\n    if color_str.startswith(\"#\"):\n        h = color_str.lstrip(\"#\")\n        try:\n            r = int(h[0:2], 16)\n            g = int(h[2:4], 16)\n            b = int(h[4:6], 16)\n            return (r, g, b)\n        except ValueError:\n            pass\n    # Fallbacks for some basic colors if token resolution fails\n    color_str = color_str.lower()\n    mapping = {\n        \"primary\": (137, 180, 250), # default Catppuccin Blue\n        \"secondary\": (245, 194, 231), # default Catppuccin Pink\n        \"success\": (166, 227, 161),\n        \"error\": (243, 139, 168),\n        \"warning\": (250, 179, 135)\n    }\n    if color_str in mapping:\n        return mapping[color_str]\n    return (255, 255, 255)\n\ndef render_logo(\n    spec: LogoSpec,\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth = ColorDepth.TRUECOLOR\n) -> list[str]:\n    # 1. Render character layout\n    lines = render_text_art(spec.text, spec.font)\n    if not lines:\n        return []\n        \n    if depth == ColorDepth.MONOCHROME:\n        return lines\n        \n    # 2. Check for gradient coloring\n    if spec.gradient:\n        # Resolve all gradient colors\n        colors = []\n        for c_str in spec.gradient:\n            colors.append(parse_color_value(c_str, theme))\n        return apply_gradient(lines, colors, depth)\n        \n    # 3. Solid color fallback\n    # Resolve color token\n    rgb = parse_color_value(spec.color_token, theme)\n    fg = fg_color_ansi(rgb[0], rgb[1], rgb[2], depth)\n    \n    return [f\"{fg}{line}{RESET}\" for line in lines]\n",
  "termforge/image/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass\nfrom enum import Enum\nfrom typing import Any\nfrom termforge.core.types import RenderableSpec\n\nclass ImageFidelity(str, Enum):\n    HALF_BLOCK = \"half_block\"\n    ASCII_RAMP = \"ascii_ramp\"\n\n@dataclass\nclass ImageSpec(RenderableSpec):\n    source: str = \"\"\n    width: int | None = None\n    height: int | None = None\n    fidelity: ImageFidelity | None = None\n    preserve_aspect: bool = True\n    spec_type: str = \"image\"\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"source\": self.source,\n            \"width\": self.width,\n            \"height\": self.height,\n            \"fidelity\": self.fidelity.value if self.fidelity else None,\n            \"preserve_aspect\": self.preserve_aspect\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ImageSpec:\n        fid = d.get(\"fidelity\")\n        fidelity = ImageFidelity(fid) if fid else None\n        return cls(\n            source=d.get(\"source\", \"\"),\n            width=d.get(\"width\"),\n            height=d.get(\"height\"),\n            fidelity=fidelity,\n            preserve_aspect=d.get(\"preserve_aspect\", True)\n        )\n",
  "termforge/image/ansi.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth, ColorValue\nfrom termforge.core.color import resolve_color, ANSI_16_COLORS, _PALETTE_256\n\nRESET = \"\\033[0m\"\n\ndef fg_color_ansi(r: int, g: int, b: int, depth: ColorDepth) -> str:\n    if depth == ColorDepth.MONOCHROME:\n        return \"\"\n    color = ColorValue(r, g, b)\n    rgb = resolve_color(color, depth)\n    if not rgb:\n        return \"\"\n        \n    if depth == ColorDepth.TRUECOLOR:\n        return f\"\\033[38;2;{rgb[0]};{rgb[1]};{rgb[2]}m\"\n    elif depth == ColorDepth.COLOR_256:\n        try:\n            idx = _PALETTE_256.index(rgb)\n            return f\"\\033[38;5;{idx}m\"\n        except ValueError:\n            return f\"\\033[38;2;{rgb[0]};{rgb[1]};{rgb[2]}m\"\n    elif depth == ColorDepth.COLOR_16:\n        try:\n            idx = ANSI_16_COLORS.index(rgb)\n            if idx < 8:\n                return f\"\\033[{30 + idx}m\"\n            else:\n                return f\"\\033[{90 + (idx - 8)}m\"\n        except ValueError:\n            return \"\"\n    return \"\"\n\ndef bg_color_ansi(r: int, g: int, b: int, depth: ColorDepth) -> str:\n    if depth == ColorDepth.MONOCHROME:\n        return \"\"\n    color = ColorValue(r, g, b)\n    rgb = resolve_color(color, depth)\n    if not rgb:\n        return \"\"\n        \n    if depth == ColorDepth.TRUECOLOR:\n        return f\"\\033[48;2;{rgb[0]};{rgb[1]};{rgb[2]}m\"\n    elif depth == ColorDepth.COLOR_256:\n        try:\n            idx = _PALETTE_256.index(rgb)\n            return f\"\\033[48;5;{idx}m\"\n        except ValueError:\n            return f\"\\033[48;2;{rgb[0]};{rgb[1]};{rgb[2]}m\"\n    elif depth == ColorDepth.COLOR_16:\n        try:\n            idx = ANSI_16_COLORS.index(rgb)\n            if idx < 8:\n                return f\"\\033[{40 + idx}m\"\n            else:\n                return f\"\\033[{100 + (idx - 8)}m\"\n        except ValueError:\n            return \"\"\n    return \"\"\n",
  "termforge/image/ascii_ramp.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth\nfrom termforge.image.ansi import fg_color_ansi, RESET\n\nDEFAULT_RAMP = \" .:-=+*#%@\"\n\ndef rgb_to_brightness(r: int, g: int, b: int) -> float:\n    # Perceived luminance (standard Rec. 601 formula)\n    return (0.299 * r + 0.587 * g + 0.114 * b) / 255.0\n\ndef render_ascii(pixels: list[list[tuple[int, int, int]]], ramp: str = DEFAULT_RAMP) -> list[str]:\n    lines = []\n    ramp_len = len(ramp)\n    for row in pixels:\n        line_chars = []\n        for r, g, b in row:\n            brightness = rgb_to_brightness(r, g, b)\n            idx = min(ramp_len - 1, max(0, int(brightness * ramp_len)))\n            line_chars.append(ramp[idx])\n        lines.append(\"\".join(line_chars))\n    return lines\n\ndef render_ascii_colored(pixels: list[list[tuple[int, int, int]]], depth: ColorDepth, ramp: str = DEFAULT_RAMP) -> list[str]:\n    lines = []\n    ramp_len = len(ramp)\n    for row in pixels:\n        line_chars = []\n        for r, g, b in row:\n            brightness = rgb_to_brightness(r, g, b)\n            idx = min(ramp_len - 1, max(0, int(brightness * (ramp_len - 1))))\n            char = ramp[idx]\n            fg = fg_color_ansi(r, g, b, depth)\n            line_chars.append(f\"{fg}{char}\")\n        lines.append(\"\".join(line_chars) + RESET)\n    return lines\n",
  "termforge/image/half_block.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth\nfrom termforge.image.ansi import fg_color_ansi, bg_color_ansi, RESET\n\ndef render_half_block(pixels: list[list[tuple[int, int, int]]], depth: ColorDepth) -> list[str]:\n    lines = []\n    height = len(pixels)\n    if height == 0:\n        return []\n    width = len(pixels[0])\n    \n    for y in range(0, height, 2):\n        line = []\n        for x in range(width):\n            top = pixels[y][x]\n            bottom = pixels[y+1][x] if y+1 < height else (0, 0, 0)\n            \n            fg = fg_color_ansi(top[0], top[1], top[2], depth)\n            bg = bg_color_ansi(bottom[0], bottom[1], bottom[2], depth)\n            \n            if top == bottom:\n                line.append(f\"{fg}\u2588\")\n            else:\n                line.append(f\"{fg}{bg}\u2580\")\n        \n        lines.append(\"\".join(line) + RESET)\n        \n    return lines\n",
  "termforge/image/pipeline.py": "from __future__ import annotations\nimport urllib.request\nimport io\nfrom typing import Any\nfrom PIL import Image\n\ndef resize_for_terminal(img_w: int, img_h: int, term_cols: int | None, term_rows: int | None, preserve_aspect: bool, half_block: bool = True) -> tuple[int, int]:\n    if term_cols is None and term_rows is None:\n        term_cols = 80\n        \n    if term_cols is not None and term_rows is not None:\n        w = term_cols\n        h = term_rows * 2 if half_block else term_rows\n        if preserve_aspect:\n            img_aspect = img_w / img_h\n            if not half_block:\n                display_aspect = w / (h * 2.0)\n            else:\n                display_aspect = w / h\n                \n            if img_aspect > display_aspect:\n                # Width limit\n                w = term_cols\n                if half_block:\n                    h = int(w / img_aspect)\n                else:\n                    h = int(w / (2.0 * img_aspect))\n            else:\n                # Height limit\n                h = term_rows * 2 if half_block else term_rows\n                if half_block:\n                    w = int(h * img_aspect)\n                else:\n                    w = int(h * img_aspect * 2.0)\n        return max(1, w), max(1, h)\n        \n    if term_cols is not None:\n        w = term_cols\n        img_aspect = img_w / img_h\n        if half_block:\n            h = int(w / img_aspect)\n        else:\n            h = int(w / (2.0 * img_aspect))\n        return max(1, w), max(1, h)\n        \n    if term_rows is not None:\n        h = term_rows * 2 if half_block else term_rows\n        img_aspect = img_w / img_h\n        if half_block:\n            w = int(h * img_aspect)\n        else:\n            w = int(h * img_aspect * 2.0)\n        return max(1, w), max(1, h)\n        \n    return 80, 40\n\ndef load_pixels(source: str, target_width: int, target_height: int) -> list[list[tuple[int, int, int]]]:\n    # 1. Load image (from path or URL)\n    img: Any = None\n    if source.startswith(\"http://\") or source.startswith(\"https://\"):\n        req = urllib.request.Request(source, headers={'User-Agent': 'TermForge-Image-Loader'})\n        with urllib.request.urlopen(req) as response:\n            img_data = response.read()\n        img = Image.open(io.BytesIO(img_data))\n    else:\n        img = Image.open(source)\n        \n    # Convert to RGB\n    img = img.convert(\"RGB\")\n    \n    # 2. Resize using Pillow\n    img = img.resize((target_width, target_height), Image.Resampling.LANCZOS)\n    \n    # 3. Extract pixels\n    pixels: list[list[tuple[int, int, int]]] = []\n    width, height = img.size\n    for y in range(height):\n        row: list[tuple[int, int, int]] = []\n        for x in range(width):\n            p = img.getpixel((x, y))\n            row.append((int(p[0]), int(p[1]), int(p[2])))\n        pixels.append(row)\n        \n    return pixels\n",
  "termforge/image/__init__.py": "\"\"\"TermForge image module \u2014 image-to-terminal art pipeline.\"\"\"\nfrom termforge.image.types import ImageFidelity, ImageSpec\nfrom termforge.image.pipeline import load_pixels, resize_for_terminal\nfrom termforge.image.ansi import fg_color_ansi, bg_color_ansi, RESET\nfrom termforge.image.half_block import render_half_block\nfrom termforge.image.ascii_ramp import rgb_to_brightness, render_ascii, render_ascii_colored\nfrom termforge.image.render import render_image\n\n__all__ = [\n    \"ImageFidelity\",\n    \"ImageSpec\",\n    \"load_pixels\",\n    \"resize_for_terminal\",\n    \"fg_color_ansi\",\n    \"bg_color_ansi\",\n    \"RESET\",\n    \"render_half_block\",\n    \"rgb_to_brightness\",\n    \"render_ascii\",\n    \"render_ascii_colored\",\n    \"render_image\",\n]\n",
  "termforge/image/render.py": "from __future__ import annotations\nfrom termforge.core.types import ColorDepth\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.image.types import ImageSpec, ImageFidelity\nfrom termforge.image.pipeline import resize_for_terminal, load_pixels\nfrom termforge.image.half_block import render_half_block\nfrom termforge.image.ascii_ramp import render_ascii, render_ascii_colored\n\ndef render_image(\n    spec: ImageSpec,\n    theme: ThemeTokens | None = None,\n    depth: ColorDepth = ColorDepth.TRUECOLOR,\n    available_width: int | None = None,\n    available_height: int | None = None\n) -> list[str]:\n    # 1. Determine fidelity\n    fidelity = spec.fidelity\n    if fidelity is None:\n        if depth == ColorDepth.MONOCHROME:\n            fidelity = ImageFidelity.ASCII_RAMP\n        else:\n            fidelity = ImageFidelity.HALF_BLOCK\n            \n    # 2. Get image size to scale properly\n    # We open the image first to get its dimensions\n    # Let's import PIL inside render to keep it isolated if needed, but we already have PIL in pipeline.py\n    from PIL import Image\n    import urllib.request\n    import io\n    \n    source = spec.source\n    if not source:\n        return []\n        \n    try:\n        if source.startswith(\"http://\") or source.startswith(\"https://\"):\n            req = urllib.request.Request(source, headers={'User-Agent': 'TermForge-Image-Loader'})\n            with urllib.request.urlopen(req) as response:\n                img_data = response.read()\n            img = Image.open(io.BytesIO(img_data))\n        else:\n            img = Image.open(source)\n        img_w, img_h = img.size\n    except Exception as e:\n        # Fallback or error print\n        return [f\"[Image Load Error: {e}]\"]\n\n    # 3. Calculate target cols/rows\n    cols = spec.width\n    rows = spec.height\n    \n    if cols is None and rows is None:\n        cols = available_width\n        rows = available_height\n        \n    is_hb = (fidelity == ImageFidelity.HALF_BLOCK)\n    w, h = resize_for_terminal(img_w, img_h, cols, rows, spec.preserve_aspect, half_block=is_hb)\n    \n    # 4. Load pixels\n    pixels = load_pixels(source, w, h)\n    \n    # 5. Render\n    if fidelity == ImageFidelity.HALF_BLOCK:\n        return render_half_block(pixels, depth)\n    else:\n        if depth == ColorDepth.MONOCHROME:\n            return render_ascii(pixels)\n        else:\n            return render_ascii_colored(pixels, depth)\n",
  "termforge/config/types.py": "from __future__ import annotations\nfrom dataclasses import dataclass, field\nfrom typing import Any\n\n@dataclass\nclass ComponentConfig:\n    spec_type: str\n    properties: dict[str, Any] = field(default_factory=dict)\n    children: list[ComponentConfig] = field(default_factory=list)\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"spec_type\": self.spec_type,\n            \"properties\": self.properties,\n            \"children\": [c.to_dict() for c in self.children]\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> ComponentConfig:\n        return cls(\n            spec_type=d[\"spec_type\"],\n            properties=d.get(\"properties\", {}),\n            children=[ComponentConfig.from_dict(c) for c in d.get(\"children\", [])]\n        )\n\nfrom termforge.config.input import InputBindingSpec\n\n@dataclass\nclass LayoutConfig:\n    components: list[ComponentConfig] = field(default_factory=list)\n    theme: str | None = None\n    title: str | None = None\n    keybindings: list[InputBindingSpec] = field(default_factory=list)\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"components\": [c.to_dict() for c in self.components],\n            \"theme\": self.theme,\n            \"title\": self.title,\n            \"keybindings\": [k.to_dict() for k in self.keybindings]\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> LayoutConfig:\n        return cls(\n            components=[ComponentConfig.from_dict(c) for c in d.get(\"components\", [])],\n            theme=d.get(\"theme\"),\n            title=d.get(\"title\"),\n            keybindings=[InputBindingSpec.from_dict(k) for k in d.get(\"keybindings\", [])]\n        )\n",
  "termforge/config/form.py": "\"\"\"TermForge declarative forms \u2014 FormSpec and validation engine.\n\nProvides declarative models and validation logic for forms containing text,\ncheckbox, and textarea inputs.\n\"\"\"\nfrom __future__ import annotations\n\nimport re\nfrom dataclasses import dataclass, field\nfrom enum import Enum\nfrom typing import Any\n\n\nclass FieldType(str, Enum):\n    \"\"\"The input type of a form field.\"\"\"\n    TEXT     = \"text\"\n    CHECKBOX = \"checkbox\"\n    TEXTAREA = \"textarea\"\n\n\n@dataclass\nclass FormFieldSpec:\n    \"\"\"A single field specification in a form.\n\n    Attributes:\n        name: Internal string key for the field's data value.\n        label: User-facing display label for the field.\n        field_type: The input component type (TEXT, CHECKBOX, or TEXTAREA).\n        placeholder: Optional helper text displayed when empty.\n        default_value: Initial value (e.g. False for CHECKBOX, or empty string).\n        validation_rules: Dictionary of constraint rules (e.g. required, min_length).\n    \"\"\"\n    name: str\n    label: str\n    field_type: FieldType = FieldType.TEXT\n    placeholder: str | None = None\n    default_value: Any = None\n    validation_rules: dict[str, Any] = field(default_factory=dict)\n\n    def to_dict(self) -> dict[str, Any]:\n        \"\"\"Serialize to a JSON-compatible dict.\n\n        Returns:\n            A plain dict containing field properties.\n        \"\"\"\n        return {\n            \"name\": self.name,\n            \"label\": self.label,\n            \"field_type\": self.field_type.value,\n            \"placeholder\": self.placeholder,\n            \"default_value\": self.default_value,\n            \"validation_rules\": dict(self.validation_rules),\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> FormFieldSpec:\n        \"\"\"Deserialise from a dict produced by :meth:`to_dict`.\n\n        Args:\n            d: Dict containing field properties.\n\n        Returns:\n            A new :class:`FormFieldSpec` instance.\n        \"\"\"\n        return cls(\n            name=d[\"name\"],\n            label=d[\"label\"],\n            field_type=FieldType(d.get(\"field_type\", \"text\")),\n            placeholder=d.get(\"placeholder\"),\n            default_value=d.get(\"default_value\"),\n            validation_rules=d.get(\"validation_rules\", {}),\n        )\n\n\n@dataclass\nclass FormSpec:\n    \"\"\"A complete form specification containing multiple fields and validation.\n\n    Attributes:\n        title: Optional form title.\n        fields: List of FormFieldSpec instances defining the form fields.\n    \"\"\"\n    title: str | None = None\n    fields: list[FormFieldSpec] = field(default_factory=list)\n\n    def to_dict(self) -> dict[str, Any]:\n        \"\"\"Serialize to a JSON-compatible dict.\n\n        Returns:\n            A plain dict containing form properties.\n        \"\"\"\n        return {\n            \"title\": self.title,\n            \"fields\": [f.to_dict() for f in self.fields],\n        }\n\n    @classmethod\n    def from_dict(cls, d: dict[str, Any]) -> FormSpec:\n        \"\"\"Deserialise from a dict produced by :meth:`to_dict`.\n\n        Args:\n            d: Dict containing form properties.\n\n        Returns:\n            A new :class:`FormSpec` instance.\n        \"\"\"\n        return cls(\n            title=d.get(\"title\"),\n            fields=[FormFieldSpec.from_dict(f) for f in d.get(\"fields\", [])],\n        )\n\n    def validate(self, data: dict[str, Any]) -> tuple[bool, dict[str, str]]:\n        \"\"\"Validate form fields against supplied data.\n\n        Applies validation rules such as:\n        - ``required``: Checked for existence and non-empty/non-None status.\n        - ``min_length``: Checks minimum character length of string values.\n        - ``max_length``: Checks maximum character length of string values.\n        - ``regex``: Validates string matches a regular expression pattern.\n        - ``numeric``: Checks if value can be converted to/is a float/int.\n        - ``choices``: Validates value is one of the allowed options.\n\n        Args:\n            data: Dictionary of field names and their current input values.\n\n        Returns:\n            A ``(is_valid, errors)`` tuple, where ``errors`` maps field names\n            to validation error messages.\n        \"\"\"\n        errors: dict[str, str] = {}\n\n        for f in self.fields:\n            val = data.get(f.name)\n            rules = f.validation_rules\n\n            # 1. required check\n            is_required = rules.get(\"required\", False)\n            if is_required:\n                if val is None or (isinstance(val, str) and not val.strip()):\n                    errors[f.name] = f\"{f.label} is required.\"\n                    continue\n\n            # Skip remaining validation if field is empty and not required\n            if val is None or (isinstance(val, str) and not val.strip()):\n                continue\n\n            # 2. choices check\n            choices = rules.get(\"choices\")\n            if choices is not None:\n                if val not in choices:\n                    errors[f.name] = f\"{f.label} must be one of: {', '.join(map(str, choices))}.\"\n                    continue\n\n            # 3. numeric check\n            is_numeric = rules.get(\"numeric\", False)\n            if is_numeric:\n                try:\n                    float(val)\n                except (ValueError, TypeError):\n                    errors[f.name] = f\"{f.label} must be numeric.\"\n                    continue\n\n            # String validations (min_length, max_length, regex)\n            if isinstance(val, str):\n                # 4. min_length check\n                min_len = rules.get(\"min_length\")\n                if min_len is not None and len(val) < int(min_len):\n                    errors[f.name] = f\"{f.label} must be at least {min_len} characters.\"\n                    continue\n\n                # 5. max_length check\n                max_len = rules.get(\"max_length\")\n                if max_len is not None and len(val) > int(max_len):\n                    errors[f.name] = f\"{f.label} must be at most {max_len} characters.\"\n                    continue\n\n                # 6. regex check\n                pattern = rules.get(\"regex\")\n                if pattern is not None:\n                    try:\n                        if not re.search(pattern, val):\n                            errors[f.name] = f\"{f.label} format is invalid.\"\n                            continue\n                    except re.error:\n                        # Faulty regex config -> fallback pass\n                        pass\n\n        return len(errors) == 0, errors\n",
  "termforge/config/presets.py": "\"\"\"TermForge layout presets \u2014 common named UI patterns as RenderableSpec instances.\n\nEach preset is a factory function that returns a fully-configured, JSON-serializable\nRenderableSpec. Presets accept keyword arguments to parameterize dimensions, titles,\nand content. All returned specs follow the portability contract: pure data, no\nRich/Textual types.\n\nUsage::\n\n    from termforge.config.presets import get_preset, list_presets\n\n    spec = get_preset(\"dashboard\", title=\"My App\", width=120, height=40)\n    spec = get_preset(\"split-pane\", ratios=[1, 2], gap=1)\n    spec = get_preset(\"modal-dialog\", message=\"Are you sure?\")\n    spec = get_preset(\"log-viewer\", title=\"Logs\", width=80, height=20)\n\"\"\"\nfrom __future__ import annotations\nfrom typing import Any, Callable\nfrom termforge.core.types import RenderableSpec\nfrom termforge.windows.types import WindowSpec, PaneSpec\nfrom termforge.borders.types import BorderStyle\nfrom termforge.core import FlexDirection\nfrom termforge.text.types import TextSpec, TextOverflow\n\n\n# Registry: name -> (factory_fn, description)\n_PRESET_REGISTRY: dict[str, tuple[Any, str]] = {}\n\n\ndef _register(name: str, description: str) -> Callable[[Callable[..., Any]], Callable[..., Any]]:\n    \"\"\"Decorator to register a preset factory function.\"\"\"\n    def decorator(fn: Callable[..., Any]) -> Callable[..., Any]:\n        _PRESET_REGISTRY[name] = (fn, description)\n        return fn\n    return decorator\n\n\n# ---------------------------------------------------------------------------\n# Preset: dashboard\n# ---------------------------------------------------------------------------\n\n@_register(\n    \"dashboard\",\n    \"Bordered window with a header, scrollable body pane, and a status-bar footer.\"\n)\ndef _preset_dashboard(\n    title: str = \"Dashboard\",\n    width: int = 120,\n    height: int = 40,\n    header_text: str = \"\",\n    footer_text: str = \"\",\n    border_style: str = \"single\",\n    **kwargs: Any,\n) -> RenderableSpec:\n    \"\"\"Three-row vertical pane: header (3 rows) / body (rest) / footer (3 rows).\"\"\"\n    header_h = 3\n    footer_h = 3\n    body_h = max(4, height - header_h - footer_h)\n    total_h = header_h + body_h + footer_h\n\n    # Ratios relative to total\n    header_ratio = header_h / total_h\n    body_ratio = body_h / total_h\n    footer_ratio = footer_h / total_h\n\n    header_spec = WindowSpec(\n        title=header_text or f\"\u2500\u2500 {title} \u2500\u2500\",\n        border_style=BorderStyle(border_style),\n        width=width,\n        height=header_h,\n    )\n    body_spec = WindowSpec(\n        title=\"\",\n        border_style=BorderStyle(border_style),\n        width=width,\n        height=body_h,\n        scroll_y=0,\n    )\n    footer_spec = WindowSpec(\n        title=footer_text or \"Status\",\n        border_style=BorderStyle(border_style),\n        width=width,\n        height=footer_h,\n    )\n\n    return PaneSpec(\n        direction=FlexDirection.COLUMN,\n        children=[header_spec, body_spec, footer_spec],\n        ratios=[header_ratio, body_ratio, footer_ratio],\n        gap=0,\n    )\n\n\n# ---------------------------------------------------------------------------\n# Preset: split-pane (horizontal)\n# ---------------------------------------------------------------------------\n\n@_register(\n    \"split-pane\",\n    \"Two horizontal panes side-by-side with configurable ratios and gap.\"\n)\ndef _preset_split_pane(\n    ratios: list[float] | None = None,\n    gap: int = 1,\n    border_style: str = \"single\",\n    left_title: str = \"Left\",\n    right_title: str = \"Right\",\n    width: int = 120,\n    height: int = 30,\n    **kwargs: Any,\n) -> RenderableSpec:\n    r = ratios or [1.0, 1.0]\n    left = WindowSpec(\n        title=left_title,\n        border_style=BorderStyle(border_style),\n        width=None,\n        height=height,\n    )\n    right = WindowSpec(\n        title=right_title,\n        border_style=BorderStyle(border_style),\n        width=None,\n        height=height,\n    )\n    return PaneSpec(\n        direction=FlexDirection.ROW,\n        children=[left, right],\n        ratios=r,\n        gap=gap,\n    )\n\n\n# ---------------------------------------------------------------------------\n# Preset: split-pane-v (vertical)\n# ---------------------------------------------------------------------------\n\n@_register(\n    \"split-pane-v\",\n    \"Two vertical panes stacked top-and-bottom with configurable ratios and gap.\"\n)\ndef _preset_split_pane_v(\n    ratios: list[float] | None = None,\n    gap: int = 0,\n    border_style: str = \"single\",\n    top_title: str = \"Top\",\n    bottom_title: str = \"Bottom\",\n    width: int = 80,\n    height: int = 30,\n    **kwargs: Any,\n) -> RenderableSpec:\n    r = ratios or [1.0, 1.0]\n    top = WindowSpec(\n        title=top_title,\n        border_style=BorderStyle(border_style),\n        width=width,\n        height=None,\n    )\n    bottom = WindowSpec(\n        title=bottom_title,\n        border_style=BorderStyle(border_style),\n        width=width,\n        height=None,\n    )\n    return PaneSpec(\n        direction=FlexDirection.COLUMN,\n        children=[top, bottom],\n        ratios=r,\n        gap=gap,\n    )\n\n\n# ---------------------------------------------------------------------------\n# Preset: modal-dialog\n# ---------------------------------------------------------------------------\n\n@_register(\n    \"modal-dialog\",\n    \"Centered modal window with a title, message body, and a rounded border.\"\n)\ndef _preset_modal_dialog(\n    title: str = \"Dialog\",\n    message: str = \"\",\n    width: int = 50,\n    height: int = 10,\n    border_style: str = \"rounded\",\n    buttons: list[str] | None = None,\n    **kwargs: Any,\n) -> RenderableSpec:\n    # Compose message + optional button row into the window title/tags\n    tag_list = buttons or [\"OK\"]\n    return WindowSpec(\n        title=title,\n        border_style=BorderStyle(border_style),\n        width=width,\n        height=height,\n        tags=tag_list,\n        padding=1,\n    )\n\n\n# ---------------------------------------------------------------------------\n# Preset: log-viewer\n# ---------------------------------------------------------------------------\n\n@_register(\n    \"log-viewer\",\n    \"Scrollable bordered text window optimised for log / output display.\"\n)\ndef _preset_log_viewer(\n    title: str = \"Logs\",\n    width: int = 80,\n    height: int = 20,\n    border_style: str = \"single\",\n    scroll_y: int = 0,\n    text_overflow: str = \"truncate\",\n    **kwargs: Any,\n) -> RenderableSpec:\n    from termforge.text.types import TextOverflow as TO\n    overflow = TO(text_overflow) if text_overflow else TO.TRUNCATE\n    return WindowSpec(\n        title=title,\n        border_style=BorderStyle(border_style),\n        width=width,\n        height=height,\n        scroll_y=scroll_y,\n        text_overflow=overflow,\n    )\n\n\n# ---------------------------------------------------------------------------\n# Public API\n# ---------------------------------------------------------------------------\n\ndef list_presets() -> list[dict[str, str]]:\n    \"\"\"Return a list of available preset names and their descriptions.\n\n    Returns:\n        List of dicts with keys ``\"name\"`` and ``\"description\"``.\n\n    Example::\n\n        >>> from termforge.config.presets import list_presets\n        >>> for p in list_presets():\n        ...     print(p[\"name\"], \"-\", p[\"description\"])\n    \"\"\"\n    return [\n        {\"name\": name, \"description\": desc}\n        for name, (_, desc) in sorted(_PRESET_REGISTRY.items())\n    ]\n\n\ndef get_preset(name: str, **kwargs: Any) -> RenderableSpec:\n    \"\"\"Instantiate a named layout preset with optional parameter overrides.\n\n    Args:\n        name: Preset name (see :func:`list_presets` for available names).\n        **kwargs: Parameters forwarded to the preset factory.  Each preset\n            documents its own accepted keyword arguments.\n\n    Returns:\n        A fully-configured :class:`~termforge.core.types.RenderableSpec`\n        instance.  The returned spec is JSON-serializable (portability\n        contract: call ``spec.to_dict()`` to verify).\n\n    Raises:\n        ValueError: If ``name`` is not a registered preset.\n\n    Example::\n\n        >>> from termforge.config.presets import get_preset\n        >>> spec = get_preset(\"dashboard\", title=\"My App\", width=120, height=40)\n        >>> d = spec.to_dict()          # portability contract \u2014 must not raise\n        >>> assert d[\"spec_type\"] == \"pane\"\n    \"\"\"\n    if name not in _PRESET_REGISTRY:\n        available = \", \".join(sorted(_PRESET_REGISTRY))\n        raise ValueError(\n            f\"Unknown preset {name!r}. Available presets: {available}\"\n        )\n    factory, _ = _PRESET_REGISTRY[name]\n    res: RenderableSpec = factory(**kwargs)\n    return res\n",
