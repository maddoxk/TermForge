<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TermForge Interactive Showcase Documentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        :root {
            /* Catppuccin Mocha Theme (Default) */
            --bg-color: #1e1e2e;
            --text-color: #cdd6f4;
            --sidebar-bg: rgba(30, 30, 46, 0.75);
            --card-bg: rgba(49, 50, 68, 0.45);
            --border-glow: #b4befe;
            --accent-glow: #89b4fa;
        }
        
        .theme-dracula {
            --bg-color: #282a36;
            --text-color: #f8f8f2;
            --sidebar-bg: rgba(40, 42, 54, 0.8);
            --card-bg: rgba(68, 71, 90, 0.5);
            --border-glow: #bd93f9;
            --accent-glow: #8be9fd;
        }

        .theme-tokyo {
            --bg-color: #1a1b26;
            --text-color: #a9b1d6;
            --sidebar-bg: rgba(26, 27, 38, 0.8);
            --card-bg: rgba(36, 40, 59, 0.5);
            --border-glow: #bb9af7;
            --accent-glow: #7aa2f7;
        }

        .theme-contrast {
            --bg-color: #000000;
            --text-color: #ffffff;
            --sidebar-bg: #111111;
            --card-bg: #222222;
            --border-glow: #ffffff;
            --accent-glow: #00ffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.18;
            pointer-events: none;
        }
        .sphere-1 {
            width: 400px;
            height: 400px;
            background: var(--border-glow);
            top: -100px;
            right: -100px;
        }
        .sphere-2 {
            width: 350px;
            height: 350px;
            background: var(--accent-glow);
            bottom: -50px;
            left: -50px;
        }
        
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        
        .logo-container h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--border-glow), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .menu-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.4;
            margin-bottom: 15px;
        }
        
        .sidebar-scroller {
            overflow-y: auto;
            max-height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
        }

        .sidebar-scroller::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-scroller::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar-scroller::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .sidebar-scroller::-webkit-scrollbar-thumb:hover {
            background: var(--border-glow);
        }

        .module-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 5px;
        }
        
        .module-header {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .module-header:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        .module-header.expanded .chevron {
            transform: rotate(180deg);
        }
        
        .chevron {
            font-size: 10px;
            transition: transform 0.2s ease;
            opacity: 0.5;
        }

        .menu-list {
            list-style: none;
            display: none;
            flex-direction: column;
            gap: 5px;
            padding-left: 10px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .menu-list.show {
            display: flex;
        }
        
        .menu-item button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color);
            text-align: left;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.7;
        }
        
        .menu-item button:hover, .menu-item.active button {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.02);
            color: #ffffff;
            opacity: 1;
        }
        
        .menu-item.active button {
            border-left: 2px solid var(--border-glow);
            border-radius: 0 6px 6px 0;
            padding-left: 10px;
        }
        
        .main-content {
            flex-grow: 1;
            padding: 50px 60px;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .controls-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .controls-title h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
        }
        
        .controls-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .theme-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .theme-selector select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }
        
        .terminal-container {
            background: rgba(10, 11, 16, 0.95);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(127, 0, 255, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        
        .terminal-header {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.08);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .terminal-dots {
            display: flex;
            gap: 8px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        
        .terminal-title {
            font-size: 13px;
            font-family: 'Fira Code', monospace;
            opacity: 0.5;
        }
        
        .btn-interactive {
            background: linear-gradient(135deg, var(--border-glow), var(--accent-glow));
            border: none;
            color: #11111b;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(137, 180, 250, 0.25);
        }

        .btn-interactive:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .tab-bar {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.08);
        }
        
        .tab-button {
            flex: 1;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        
        .tab-button.active {
            color: #ffffff;
            border-bottom: 2px solid var(--border-glow);
            background: rgba(255, 255, 255, 0.02);
        }
        
        .terminal-body {
            padding: 16px;
            min-height: 420px;
            overflow: hidden;
            position: relative;
        }

        #terminal-screen-code {
            padding: 24px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.45;
            white-space: pre;
            overflow-x: auto;
            color: #a9b1d6;
            background: #111217;
            min-height: 420px;
        }

        /* Customize xterm scrollbar */
        .xterm-viewport::-webkit-scrollbar {
            width: 8px;
        }
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(127, 0, 255, 0.15); }
            50% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 35px rgba(0, 240, 255, 0.25); }
            100% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(127, 0, 255, 0.15); }
        }
        
        .terminal-container {
            animation: pulse-glow 8s infinite alternate;
        }
    </style>
</head>
<body class="theme-catppuccin">
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>
    
    <div class="sidebar">
        <div class="logo-container">
            <h1>TermForge</h1>
            <p style="font-size: 12px; opacity: 0.5; margin-top: 5px;">Universal CLI Showcase</p>
        </div>
        
        <div style="display: flex; flex-direction: column; height: 100%;">
            <div class="menu-title">Stories</div>
            <div class="sidebar-scroller" id="sidebar-scroller">
                <!-- Javascript populated grouped modules -->
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="controls-card">
            <div class="controls-title">
                <h2 id="active-title">Story Showcase</h2>
                <p style="font-size: 13px; opacity: 0.6; margin-top: 5px;">Interactive TermForge rendering gallery</p>
            </div>
            <div class="controls-right">
                <div class="theme-selector">
                    <label for="theme-skin" style="font-size: 14px; font-weight: 600;">Theme skin:</label>
                    <select id="theme-skin" onchange="changeThemeSkin(this.value)">
                        <option value="catppuccin">Catppuccin Mocha</option>
                        <option value="dracula">Dracula</option>
                        <option value="tokyo">Tokyo Night</option>
                        <option value="contrast">High Contrast</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="terminal-container">
            <div class="terminal-header">
                <div class="terminal-dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                </div>
                <div class="terminal-title" id="term-filename">story.py</div>
                <button id="btn-interactive" class="btn-interactive" onclick="toggleInteractive()">Boot Interactive REPL</button>
            </div>
            
            <div class="tab-bar" style="display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.4); border-bottom: 1.5px solid rgba(255, 255, 255, 0.08); padding-right: 12px;">
                <div style="display: flex; gap: 2px;">
                    <button id="tab-preview" class="tab-button active" onclick="showTab('preview')">Terminal Preview</button>
                    <button id="tab-code" class="tab-button" onclick="showTab('code')">Python Source Code</button>
                </div>
                <div id="code-actions" style="display: none; gap: 10px;">
                    <button class="btn-interactive" onclick="resetCode()" style="background: rgba(255,255,255,0.08); color: var(--text-color); box-shadow: none; padding: 6px 12px; font-size: 11px;">Reset Code</button>
                    <button class="btn-interactive" onclick="runCodeLive()" style="padding: 6px 12px; font-size: 11px;">Run Code Live ⚡</button>
                </div>
            </div>
            
            <div class="terminal-body" id="terminal-screen-preview" style="display: block;">
                <!-- xterm.js mounts here -->
            </div>
            <pre contenteditable="true" spellcheck="false" class="terminal-body" id="terminal-screen-code" style="display: none; background: #111217; color: #a9b1d6; font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.45; outline: none; border: 1px dashed rgba(255,255,255,0.15); padding: 24px; min-height: 420px; overflow-y: auto; white-space: pre;"></pre>
        </div>
    </div>
    
    <script>
        const storiesData = {
  "keylegend": {
    "keylegend_demo": {
      "raw_ansi": "=== TermForge KeyLegend Component Demo ===\n\n--- 1. Horizontal Layout (Footer Bar Style) ---\n[\u001b[38;2;136;192;208mF1\u001b[0m] \u001b[38;2;94;129;172mHelp\u001b[0m    [\u001b[38;2;136;192;208mCtrl+C\u001b[0m] \u001b[38;2;94;129;172mQuit\u001b[0m    [\u001b[38;2;136;192;208mF10\u001b[0m] \u001b[38;2;94;129;172mMenu\u001b[0m    [\u001b[38;2;136;192;208mShift+Tab\u001b[0m] \u001b[38;2;94;129;172mBack\u001b[0m\n\n--- 2. Vertical Layout (Sidebar panel Style) ---\n\u001b[38;2;0;0;0m\u250c\u2500\u2500\u2500\u2500\u2500 Active Hotkeys \u2500\u2500\u2500\u2500\u2500\u2510\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;136;192;208mF1\u001b[0m -> \u001b[38;2;235;203;139mHelp\u001b[0m                \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;136;192;208mCtrl+C\u001b[0m -> \u001b[38;2;235;203;139mQuit\u001b[0m            \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;136;192;208mF10\u001b[0m -> \u001b[38;2;235;203;139mMenu\u001b[0m               \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;136;192;208mShift+Tab\u001b[0m -> \u001b[38;2;235;203;139mBack\u001b[0m         \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\u001b[0m\n\nJSON serialization length: 359 bytes\nRestored format: [{key}] {description}\nPortability check: OK\n",
      "code": "\"\"\"Story: keylegend/keylegend_demo \u2014 showcase keybinding shortcut legend rendering.\n\nDemonstrates horizontal legend bars, vertical helper blocks, template formatting,\nstyle overrides, and serialization roundtrip checks.\n\"\"\"\nfrom __future__ import annotations\nimport json\nfrom termforge.core.types import Size\nfrom termforge.config.input import InputBindingSpec\nfrom termforge.theme.builtin import BUILTIN_THEMES\nfrom termforge.windows.types import WindowSpec\nfrom termforge.windows.compositor import render_window\nfrom termforge.keylegend.types import KeyLegendSpec\nfrom termforge.keylegend.render import render_key_legend\n\n\ndef main() -> None:\n    print(\"=== TermForge KeyLegend Component Demo ===\\n\")\n\n    # Load theme Nord\n    theme_pack = BUILTIN_THEMES.get(\"nord\")\n    theme = theme_pack.tokens if theme_pack else None\n\n    # 1. Define bindings\n    bindings = [\n        InputBindingSpec(key=\"F1\", action=\"Help\"),\n        InputBindingSpec(key=\"Ctrl+C\", action=\"Quit\"),\n        InputBindingSpec(key=\"F10\", action=\"Menu\"),\n        InputBindingSpec(key=\"Shift+Tab\", action=\"Back\"),\n    ]\n\n    # 2. Render horizontal layout (e.g. for footer bar)\n    legend_h = KeyLegendSpec(\n        bindings=bindings,\n        format=\"[{key}] {description}\",\n        spacing=4,\n        key_style=\"colors.primary\",\n        desc_style=\"colors.secondary\",\n        orientation=\"horizontal\"\n    )\n\n    print(\"--- 1. Horizontal Layout (Footer Bar Style) ---\")\n    h_lines = render_key_legend(legend_h, Size(60, 2), theme=theme)\n    for line in h_lines:\n        print(line)\n    print()\n\n    # 3. Render vertical layout (e.g. for sidebar panel)\n    legend_v = KeyLegendSpec(\n        bindings=bindings,\n        format=\"{key} -> {description}\",\n        spacing=1,\n        key_style=\"colors.primary\",\n        desc_style=\"colors.warning\",\n        orientation=\"vertical\"\n    )\n\n    print(\"--- 2. Vertical Layout (Sidebar panel Style) ---\")\n    v_lines = render_key_legend(legend_v, Size(25, 6), theme=theme)\n    \n    # Render inside a WindowSpec container\n    win = WindowSpec(\n        title=\"Active Hotkeys\",\n        width=28,\n        height=6,\n        focused=True\n    )\n    rendered_win = render_window(win, v_lines)\n    for line in rendered_win:\n        print(line)\n    print()\n\n    # 4. Portability check\n    d = legend_h.to_dict()\n    print(f\"JSON serialization length: {len(json.dumps(d))} bytes\")\n    restored = KeyLegendSpec.from_dict(d)\n    print(f\"Restored format: {restored.format}\")\n    print(\"Portability check: OK\")\n\n\nif __name__ == \"__main__\":\n    main()\n"
    }
  },
  "windows": {
    "window_layout": {
      "raw_ansi": "--- Window Layout Composited Screen ---\n\u001b[38;2;0;0;0m\u250c\u2500\u2500\u2500\u2500 Sidebar \u2500\u2500\u2500\u2500\u2500\u2510\u001b[0m\u001b[38;2;0;0;0m\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 Content Pane \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m* Home            \u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;0;0;0m\u2502\u001b[0mWelcome to TermForge!                 \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;0;0;0m\u250c\u2500\u2500\u2500\u2500\u2500 Modal Alert \u2500\u2500\u2500\u2500\u2500\u2510\u001b[0m   a split screen layout demo.   \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;0;0;0m\u2502\u001b[0m Are you sure you      \u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;80;80;80m\u001b[2m\u2588\u2588\u001b[0m\u001b[22mht window has focus.           \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;0;0;0m\u2502\u001b[0m want to proceed?      \u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;80;80;80m\u001b[2m\u2588\u2588\u001b[0m\u001b[22mmath distributed sizes auto:   \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;0;0;0m\u2502\u001b[0m  [ OK ]  [ Cancel ]   \u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;80;80;80m\u001b[2m\u2588\u2588\u001b[0m\u001b[22m                               \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;0;0;0m\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\u001b[0m\u001b[38;2;80;80;80m\u001b[2m\u2588\u2588\u001b[0m\u001b[22m                               \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m  \u001b[38;2;80;80;80m\u001b[2m\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u001b[0m\u001b[22m                               \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2502\u001b[0m                  \u001b[38;2;0;0;0m\u2502\u001b[0m\u001b[38;2;0;0;0m\u2502\u001b[0m                                      \u001b[38;2;0;0;0m\u2502\u001b[0m\n\u001b[38;2;0;0;0m\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\u001b[0m\u001b[38;2;0;0;0m\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\u001b[0m\n",
      "code": "#!/usr/bin/env python3\nimport sys\nfrom termforge.core import Size, FlexDirection\nfrom termforge.windows.types import WindowSpec, PaneSpec\nfrom termforge.windows.compositor import compose_panes, render_window\n\ndef main() -> None:\n    # We want a layout of width=60, height=10\n    total_size = Size(60, 10)\n    \n    left_win = WindowSpec(title=\"Sidebar\", width=20, height=10)\n    right_win = WindowSpec(title=\"Content Pane\", width=40, height=10, focused=True)\n    \n    pane = PaneSpec(\n        direction=FlexDirection.ROW,\n        children=[left_win, right_win],\n        ratios=[1.0, 2.0],\n        gap=0\n    )\n    \n    # 1. Compose sizes and positions\n    layouts = compose_panes(pane, total_size)\n    \n    # 2. Render each window separately with its computed size\n    left_content = [\"* Home\", \"* Settings\", \"* Dashboard\", \"* Help\"]\n    right_content = [\n        \"Welcome to TermForge!\",\n        \"This is a split screen layout demo.\",\n        \"The right window has focus.\",\n        \"Layout math distributed sizes auto:\"\n    ]\n    \n    # Update widths/heights of specs from composed layout\n    pos_left, size_left, spec_left = layouts[0]\n    spec_left.width = size_left.width\n    spec_left.height = size_left.height\n    \n    pos_right, size_right, spec_right = layouts[1]\n    spec_right.width = size_right.width\n    spec_right.height = size_right.height\n    \n    left_rendered = render_window(spec_left, left_content)\n    right_rendered = render_window(spec_right, right_content)\n    \n    # Render a centered popup modal window with a drop shadow\n    popup_win = WindowSpec(title=\"Modal Alert\", width=25, height=5, shadow=True, focused=True)\n    popup_content = [\n        \" Are you sure you\",\n        \" want to proceed?\",\n        \"  [ OK ]  [ Cancel ]\"\n    ]\n    popup_rendered = render_window(popup_win, popup_content)\n    \n    # 3. Combine and overlay row by row\n    print(\"--- Window Layout Composited Screen ---\")\n    for r in range(total_size.height):\n        if 2 <= r < 8:\n            left_slice = left_rendered[r][:18]\n            mid_slice = popup_rendered[r - 2]\n            right_slice = right_rendered[r][25:]\n            line = left_slice + mid_slice + right_slice\n        else:\n            line = left_rendered[r] + right_rendered[r]\n        print(line)\n\nif __name__ == \"__main__\":\n    main()\n"
    }

      "code": "\"\"\"Story: keyvalue/keyvalue_demo \u2014 showcase aligned KeyValueGrid metadata components.\n\nDemonstrates metadata alignment, separator customization, state style mapping,\nand rendering inside bordered containers.\n\"\"\"\nfrom __future__ import annotations\nimport json\nfrom termforge.core.types import Size\nfrom termforge.theme.builtin import BUILTIN_THEMES\nfrom termforge.windows.types import WindowSpec\nfrom termforge.windows.compositor import render_window\nfrom termforge.keyvalue.types import KeyValueItemSpec, KeyValueGridSpec\nfrom termforge.keyvalue.render import render_keyvalue_grid\n\n\ndef main() -> None:\n    print(\"=== TermForge KeyValueGrid Component Demo ===\\n\")\n\n    # 1. Define metadata specs\n    grid = KeyValueGridSpec(\n        items=[\n            KeyValueItemSpec(key=\"OS Distribution\", value=\"TermForge OS v1.0\", key_style=\"colors.primary\"),\n            KeyValueItemSpec(key=\"CPU Architecture\", value=\"x86_64 (12 Cores)\"),\n            KeyValueItemSpec(key=\"System Load\", value=\"45.8%\", value_style=\"colors.warning\"),\n            KeyValueItemSpec(key=\"Memory status\", value=\"12.4 GB / 16.0 GB\"),\n            KeyValueItemSpec(key=\"Active Network\", value=\"Connected (10 Gbps)\", value_style=\"colors.success\"),\n            KeyValueItemSpec(key=\"System Uptime\", value=\"42 days, 11 hours\", value_style=\"colors.primary\"),\n        ],\n        separator=\" | \"\n    )\n\n    # Load theme Nord\n    theme_pack = BUILTIN_THEMES.get(\"nord\")\n    theme = theme_pack.tokens if theme_pack else None\n\n    # 2. Render KeyValueGrid to lines\n    max_size = Size(width=50, height=8)\n    grid_lines = render_keyvalue_grid(grid, max_size, theme=theme)\n\n    # 3. Composited inside a WindowSpec container\n    win = WindowSpec(\n        title=\"System Diagnostics\",\n        width=54,\n        height=10,\n        focused=True\n    )\n    rendered_win = render_window(win, grid_lines)\n\n    # Output to screen\n    for line in rendered_win:\n        print(line)\n\n    print()\n    # 4. Portability JSON check\n    d = grid.to_dict()\n    print(f\"JSON serialization length: {len(json.dumps(d))} bytes\")\n    restored = KeyValueGridSpec.from_dict(d)\n    print(f\"Restored items count: {len(restored.items)}\")\n    print(\"Portability check: OK\")\n\n\nif __name__ == \"__main__\":\n    main()\n"

  "core": {
    "layout_demo": {
      "raw_ansi": "\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557\n\u2551              TermForge Layout Engine Demo                       \u2551\n\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d\n\n1. Flex Row \u2014 Three Equal Columns (flex_grow=1)\n   Container: 60\u00d710, gap=2\n\n   +----------------+--+----------------+--+----------------+-+\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   |Col-1           |  |Col-2           |  |Col-3           | |\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   +----------------+--+----------------+--+----------------+-+\n\n2. Flex Column \u2014 Two Stacked Rows (flex_grow=1)\n   Container: 40\u00d712, gap=1\n\n   +--------------------------------------+\n   |                                      |\n   |Row-1                                 |\n   |                                      |\n   +--------------------------------------+\n   |                                      |\n   +--------------------------------------+\n   |                                      |\n   |Row-2                                 |\n   |                                      |\n   +--------------------------------------+\n   +--------------------------------------+\n\n3. Sidebar Layout \u2014 Fixed 15-wide sidebar + flexible main\n   Container: 60\u00d78, gap=1\n\n   +-------------+-+------------------------------------------+\n   |             | |                                          |\n   |             | |                                          |\n   |             | |                                          |\n   |Sidebar      | |Main Content                              |\n   |             | |                                          |\n   |             | |                                          |\n   +-------------+-+------------------------------------------+\n\nLayout positions computed by compute_layout():\n  Child 0: pos=(0,0) size=18\u00d710\n  Child 1: pos=(20,0) size=18\u00d710\n  Child 2: pos=(40,0) size=18\u00d710\n\n",
      "code": "#!/usr/bin/env python3\n\"\"\"Story: Layout Demo \u2014 renders a simple 3-column flex layout as ASCII boxes.\n\nDemonstrates compute_layout() by building a flex row with three columns,\nthen drawing them as ASCII-art rectangles in a character grid.\nNo Rich/Textual imports \u2014 plain print output.\n\"\"\"\nfrom __future__ import annotations\n\nfrom termforge.core.types import BoxConstraints, Position, RenderableSpec, Size, Spacing\nfrom termforge.core.layout import (\n    BoxModel,\n    FlexContainer,\n    FlexDirection,\n    LayoutNode,\n    compute_layout,\n)\n\n\ndef draw_layout(result, width: int, height: int, labels: list[str] | None = None) -> list[str]:\n    \"\"\"Render a LayoutResult tree into a 2D character grid.\"\"\"\n    grid = [[\" \"] * width for _ in range(height)]\n\n    def draw_box(lr, depth: int = 0, label: str = \"\") -> None:\n        x, y = lr.position.x, lr.position.y\n        w, h = lr.size.width, lr.size.height\n\n        if w <= 0 or h <= 0:\n            return\n\n        chars = \"+-|\"  # corner, horizontal, vertical\n        corner = \"+\"\n        horiz = \"-\"\n        vert = \"|\"\n\n        # Top edge\n        for col in range(x, min(x + w, width)):\n            if 0 <= y < height:\n                grid[y][col] = horiz\n        # Bottom edge\n        by = y + h - 1\n        for col in range(x, min(x + w, width)):\n            if 0 <= by < height:\n                grid[by][col] = horiz\n        # Left edge\n        for row in range(y, min(y + h, height)):\n            if 0 <= x < width:\n                grid[row][x] = vert\n        # Right edge\n        rx = x + w - 1\n        for row in range(y, min(y + h, height)):\n            if 0 <= rx < width:\n                grid[row][rx] = vert\n        # Corners\n        for cy, cx in [(y, x), (y, x + w - 1), (y + h - 1, x), (y + h - 1, x + w - 1)]:\n            if 0 <= cy < height and 0 <= cx < width:\n                grid[cy][cx] = corner\n\n        # Label inside box\n        if label and h > 1 and w > 2:\n            label_y = y + h // 2\n            label_x = x + 1\n            for i, ch in enumerate(label[: w - 2]):\n                if 0 <= label_y < height and 0 <= label_x + i < width:\n                    grid[label_y][label_x + i] = ch\n\n        for i, child in enumerate(lr.children):\n            child_label = \"\"\n            if labels and depth == 0 and i < len(labels):\n                child_label = labels[i]\n            draw_box(child, depth + 1, child_label)\n\n    draw_box(result, label=\"\")\n    # Draw child labels\n    if labels:\n        for i, child in enumerate(result.children):\n            if i < len(labels):\n                lbl = labels[i]\n                cy = child.position.y + child.size.height // 2\n                cx = child.position.x + 1\n                for j, ch in enumerate(lbl[: child.size.width - 2]):\n                    if 0 <= cy < height and 0 <= cx + j < width:\n                        grid[cy][cx + j] = ch\n\n    return [\"\".join(row) for row in grid]\n\n\ndef main() -> None:\n    print(\"\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557\")\n    print(\"\u2551              TermForge Layout Engine Demo                       \u2551\")\n    print(\"\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d\")\n    print()\n\n    # --- Demo 1: Three-column row layout ---\n    print(\"1. Flex Row \u2014 Three Equal Columns (flex_grow=1)\")\n    print(\"   Container: 60\u00d710, gap=2\")\n    print()\n\n    columns = [\n        LayoutNode(\n            spec=RenderableSpec(spec_type=\"box\"),\n            box=BoxModel(flex_grow=1.0),\n        )\n        for _ in range(3)\n    ]\n    container = LayoutNode(\n        spec=RenderableSpec(spec_type=\"container\"),\n        box=BoxModel(width=60, height=10),\n        flex=FlexContainer(direction=FlexDirection.ROW, gap=2),\n        children=columns,\n    )\n    constraints = BoxConstraints(min_width=0, max_width=60, min_height=0, max_height=10)\n    result = compute_layout(container, constraints)\n\n    lines = draw_layout(result, 60, 10, labels=[\"Col-1\", \"Col-2\", \"Col-3\"])\n    for line in lines:\n        print(f\"   {line}\")\n    print()\n\n    # --- Demo 2: Column layout ---\n    print(\"2. Flex Column \u2014 Two Stacked Rows (flex_grow=1)\")\n    print(\"   Container: 40\u00d712, gap=1\")\n    print()\n\n    rows = [\n        LayoutNode(\n            spec=RenderableSpec(spec_type=\"box\"),\n            box=BoxModel(flex_grow=1.0),\n        )\n        for _ in range(2)\n    ]\n    container2 = LayoutNode(\n        spec=RenderableSpec(spec_type=\"container\"),\n        box=BoxModel(width=40, height=12),\n        flex=FlexContainer(direction=FlexDirection.COLUMN, gap=1),\n        children=rows,\n    )\n    constraints2 = BoxConstraints(min_width=0, max_width=40, min_height=0, max_height=12)\n    result2 = compute_layout(container2, constraints2)\n\n    lines2 = draw_layout(result2, 40, 12, labels=[\"Row-1\", \"Row-2\"])\n    for line in lines2:\n        print(f\"   {line}\")\n    print()\n\n    # --- Demo 3: Fixed-width sidebar + flexible main ---\n    print(\"3. Sidebar Layout \u2014 Fixed 15-wide sidebar + flexible main\")\n    print(\"   Container: 60\u00d78, gap=1\")\n    print()\n\n    sidebar = Layout     "hooks_demo": {
      "raw_ansi": "=== TermForge Component Event Hooks Demo ===\n\n--- 1. Original Spec ---\n  Title:        Monitor Window\n  Border style: BorderStyle.SINGLE\n  Focused:      False\n  Tags:         ['System']\n  Hooks:        ['check_cpu', 'log_rendered']\n\n--- 2. Render flow under normal CPU (45%) ---\n  Final Title:        Monitor Window\n  Final Border style: BorderStyle.SINGLE\n  Final Focused:      False\n  Final Tags:         ['System', 'RENDERED']\n\n--- 3. Render flow under alert CPU (92%) ---\n  Final Title:        \u26a0\ufe0f ALERT: CPU at 92%!\n  Final Border style: BorderStyle.DOUBLE\n  Final Focused:      True\n  Final Tags:         ['System', 'RENDERED']\n\n--- 4. Portability / JSON check ---\n  JSON length: 451 bytes\n  Restored Hook count: 2\n  Restored Hook phases: ['pre_render', 'post_render']\n  Portability: OK\n",
      "code": "\"\"\"Story: core/hooks_demo \u2014 showcase Component Lifecycle Event Hooks.\n\nDemonstrates attaching hooks to a WindowSpec, resolving callbacks from a\nregistry at render time, executing PRE_RENDER and POST_RENDER hooks,\nand performing dynamic property updates.\n\"\"\"\nfrom __future__ import annotations\nimport json\nfrom termforge.core.hooks import HookPhase, RenderHook, invoke_hooks, apply_patches\nfrom termforge.windows.types import WindowSpec\n\n\ndef highlight_on_overdue(spec: WindowSpec, context: dict[str, Any]) -> dict[str, Any]:\n    \"\"\"PRE_RENDER hook callback: highlights the window if context value is high.\"\"\"\n    val = context.get(\"cpu_pct\", 0)\n    if val > 80:\n        return {\n            \"title\": f\"\u26a0\ufe0f ALERT: CPU at {val}%!\",\n            \"border_style\": \"double\",\n            \"focused\": True,\n        }\n    return {}\n\n\ndef log_render_completion(spec: WindowSpec, context: dict[str, Any]) -> dict[str, Any]:\n    \"\"\"POST_RENDER hook callback: logs or modifies state after rendering.\"\"\"\n    # We can return an updated tag to display inside/on the border\n    return {\n        \"tags\": spec.tags + [\"RENDERED\"]\n    }\n\n\ndef main() -> None:\n    print(\"=== TermForge Component Event Hooks Demo ===\\n\")\n\n    # 1. Build spec with hooks\n    spec = WindowSpec(\n        title=\"Monitor Window\",\n        tags=[\"System\"],\n        hooks=[\n            RenderHook(phase=HookPhase.PRE_RENDER, callback_id=\"check_cpu\", priority=10),\n            RenderHook(phase=HookPhase.POST_RENDER, callback_id=\"log_rendered\", priority=1),\n        ]\n    )\n\n    print(\"--- 1. Original Spec ---\")\n    print(f\"  Title:        {spec.title}\")\n    print(f\"  Border style: {spec.border_style}\")\n    print(f\"  Focused:      {spec.focused}\")\n    print(f\"  Tags:         {spec.tags}\")\n    print(f\"  Hooks:        {[h.callback_id for h in spec.hooks]}\")\n    print()\n\n    # 2. Set up callback registry\n    registry = {\n        \"check_cpu\": highlight_on_overdue,\n        \"log_rendered\": log_render_completion,\n    }\n\n    # 3. Simulate Render flow under NORMAL conditions (CPU = 45%)\n    print(\"--- 2. Render flow under normal CPU (45%) ---\")\n    ctx_normal = {\"cpu_pct\": 45}\n\n    # Run PRE_RENDER hooks\n    pre_patches = invoke_hooks(spec.hooks, HookPhase.PRE_RENDER, registry, spec, ctx_normal)\n    spec_dict = apply_patches(spec.to_dict(), pre_patches)\n    spec_pre = WindowSpec.from_dict(spec_dict)\n\n    # Run POST_RENDER hooks\n    post_patches = invoke_hooks(spec_pre.hooks, HookPhase.POST_RENDER, registry, spec_pre, ctx_normal)\n    spec_dict = apply_patches(spec_pre.to_dict(), post_patches)\n    spec_final_normal = WindowSpec.from_dict(spec_dict)\n\n    print(f\"  Final Title:        {spec_final_normal.title}\")\n    print(f\"  Final Border style: {spec_final_normal.border_style}\")\n    print(f\"  Final Focused:      {spec_final_normal.focused}\")\n    print(f\"  Final Tags:         {spec_final_normal.tags}\")\n    print()\n\n    # 4. Simulate Render flow under ALERT conditions (CPU = 92%)\n    print(\"--- 3. Render flow under alert CPU (92%) ---\")\n    ctx_alert = {\"cpu_pct\": 92}\n\n    # Run PRE_RENDER hooks\n    pre_patches = invoke_hooks(spec.hooks, HookPhase.PRE_RENDER, registry, spec, ctx_alert)\n    spec_dict = apply_patches(spec.to_dict(), pre_patches)\n    spec_pre = WindowSpec.from_dict(spec_dict)\n\n    # Run POST_RENDER hooks\n    post_patches = invoke_hooks(spec_pre.hooks, HookPhase.POST_RENDER, registry, spec_pre, ctx_alert)\n    spec_dict = apply_patches(spec_pre.to_dict(), post_patches)\n    spec_final_alert = WindowSpec.from_dict(spec_dict)\n\n    print(f\"  Final Title:        {spec_final_alert.title}\")\n    print(f\"  Final Border style: {spec_final_alert.border_style}\")\n    print(f\"  Final Focused:      {spec_final_alert.focused}\")\n    print(f\"  Final Tags:         {spec_final_alert.tags}\")\n    print()\n\n    # 5. Verify Portability\n    print(\"--- 4. Portability / JSON check ---\")\n    j = json.dumps(spec.to_dict())\n    print(f\"  JSON length: {len(j)} bytes\")\n    restored = WindowSpec.from_dict(json.loads(j))\n    print(f\"  Restored Hook count: {len(restored.hooks)}\")\n    print(f\"  Restored Hook phases: {[h.phase.value for h in restored.hooks]}\")\n    print(\"  Portability: OK\")\n\n\nif __name__ == \"__main__\":\n    main()\n"
    },

      "code": "#!/usr/bin/env python3\n\"\"\"Story: Theme Showcase \u2014 prints all 4 built-in themes' color palettes.\n\nRenders each theme's named colors as colored blocks using ANSI escape codes.\nNo Rich/Textual imports \u2014 raw ANSI only.\n\"\"\"\nfrom __future__ import annotations\n\nfrom termforge.core.theme import (\n    CATPPUCCIN_MOCHA,\n    DRACULA,\n    HIGH_CONTRAST,\n    TOKYO_NIGHT,\n    load_theme_from_dict,\n)\n\n\ndef _ansi_bg(r: int, g: int, b: int) -> str:\n    \"\"\"Return ANSI escape for 24-bit background color.\"\"\"\n    return f\"\\033[48;2;{r};{g};{b}m\"\n\n\ndef _ansi_fg(r: int, g: int, b: int) -> str:\n    \"\"\"Return ANSI escape for 24-bit foreground color.\"\"\"\n    return f\"\\033[38;2;{r};{g};{b}m\"\n\n\nRESET = \"\\033[0m\"\nBOLD = \"\\033[1m\"\n\n\ndef render_theme(name: str, theme_dict: dict) -> None:\n    tokens = load_theme_from_dict(theme_dict)\n\n    # Header\n    surface = tokens.colors.get(\"surface\")\n    text = tokens.colors.get(\"text\")\n    if surface and text:\n        print(\n            f\"\\n{BOLD}{_ansi_fg(text.r, text.g, text.b)}\"\n            f\"{_ansi_bg(surface.r, surface.g, surface.b)}\"\n            f\"  \u2550\u2550\u2550 {name} \u2550\u2550\u2550  \"\n            f\"{RESET}\"\n        )\n    else:\n        print(f\"\\n{BOLD}  \u2550\u2550\u2550 {name} \u2550\u2550\u2550  {RESET}\")\n\n    # Color swatches\n    for token_name, color in tokens.colors.items():\n        swatch = f\"{_ansi_bg(color.r, color.g, color.b)}      {RESET}\"\n        rgb_str = f\"({color.r:3d}, {color.g:3d}, {color.b:3d})\"\n        label = color.name or token_name\n        print(f\"  {swatch}  {token_name:<12s}  {rgb_str}  {label}\")\n\n    # Spacing scale\n    print(f\"\\n  Spacing scale: \", end=\"\")\n    for key, val in sorted(tokens.spacing.items(), key=lambda kv: kv[1]):\n        print(f\"{key}={val}  \", end=\"\")\n    print()\n\n    # Border glyph preview\n    for glyph_name, glyphs in tokens.border_glyphs.items():\n        tl = glyphs[\"tl\"]\n        tr = glyphs[\"tr\"]\n        bl = glyphs[\"bl\"]\n        br = glyphs[\"br\"]\n        h = glyphs[\"h\"]\n        v = glyphs[\"v\"]\n        width = 20\n        top = f\"{tl}{h * width}{tr}\"\n        mid = f\"{v}{' ' * width}{v}\"\n        bot = f\"{bl}{h * width}{br}\"\n        print(f\"  {glyph_name:8s}: {top}\")\n        print(f\"            {mid}\")\n        print(f\"            {bot}\")\n\n\ndef main() -> None:\n    themes = [\n        (\"Catppuccin Mocha\", CATPPUCCIN_MOCHA),\n        (\"Dracula\", DRACULA),\n        (\"Tokyo Night\", TOKYO_NIGHT),\n        (\"High Contrast\", HIGH_CONTRAST),\n    ]\n    for name, theme_dict in themes:\n        render_theme(name, theme_dict)\n    print()\n\n\nif __name__ == \"__main__\":\n    main()\n"
    },
    "diff_demo": {
      "raw_ansi": "=== TermForge Spec Diff Demo ===\n\n\u2500\u2500\u2500 1. Flat WindowSpec field changes \u2500\u2500\u2500\n  [MODIFIED] height: 24 \u2192 30\n  [MODIFIED] padding: 0 \u2192 1\n  [MODIFIED] title: 'Dashboard' \u2192 'Dashboard v2'\n\n\u2500\u2500\u2500 2. has_changed() quick check \u2500\u2500\u2500\n  spec_a == spec_b? has_changed=False\n  spec_a == spec_c? has_changed=True\n\n\u2500\u2500\u2500 3. Nested PaneSpec children diff \u2500\u2500\u2500\n  [MODIFIED] children.0.title: 'Left Panel' \u2192 'Left Panel \u2014 Updated'\n\n\u2500\u2500\u2500 4. filter_changes() by kind \u2500\u2500\u2500\n  total changes: 2\n  MODIFIED: ['title']\n  ADDED:    ['height']\n\n\u2500\u2500\u2500 5. Portability: SpecChange JSON round-trip \u2500\u2500\u2500\n  serialized: 124 bytes\n  restored 2 SpecChange(s)\n    title: 'A' \u2192 'B'\n    width: 60 \u2192 80\n  Portability: OK\n",
      "code": "\"\"\"Story: core/diff_demo \u2014 showcase structural spec diffing.\n\nDemonstrates diff_specs(), has_changed(), and filter_changes() against\nreal TermForge spec objects, all with seeded/deterministic data.\n\"\"\"\nimport json\nfrom termforge.core.diff import (\n    ChangeKind, SpecChange, diff_specs, has_changed, filter_changes,\n)\nfrom termforge.windows.types import WindowSpec, PaneSpec\nfrom termforge.core import FlexDirection\nfrom termforge.text.types import TextAlign\n\n\ndef main() -> None:\n    print(\"=== TermForge Spec Diff Demo ===\\n\")\n\n    # ------------------------------------------------------------------ 1\n    print(\"\u2500\u2500\u2500 1. Flat WindowSpec field changes \u2500\u2500\u2500\")\n    before = WindowSpec(title=\"Dashboard\", width=80, height=24, padding=0)\n    after  = WindowSpec(title=\"Dashboard v2\", width=80, height=30, padding=1)\n    changes = diff_specs(before.to_dict(), after.to_dict())\n    for c in changes:\n        print(f\"  [{c.kind.value.upper():8}] {c.path}: {c.old!r} \u2192 {c.new!r}\")\n    print()\n\n    # ------------------------------------------------------------------ 2\n    print(\"\u2500\u2500\u2500 2. has_changed() quick check \u2500\u2500\u2500\")\n    spec_a = WindowSpec(title=\"Same\", width=40, height=10)\n    spec_b = WindowSpec(title=\"Same\", width=40, height=10)\n    spec_c = WindowSpec(title=\"Different\", width=40, height=10)\n    print(f\"  spec_a == spec_b? has_changed={has_changed(spec_a.to_dict(), spec_b.to_dict())}\")\n    print(f\"  spec_a == spec_c? has_changed={has_changed(spec_a.to_dict(), spec_c.to_dict())}\")\n    print()\n\n    # ------------------------------------------------------------------ 3\n    print(\"\u2500\u2500\u2500 3. Nested PaneSpec children diff \u2500\u2500\u2500\")\n    child1_before = WindowSpec(title=\"Left Panel\", width=40, height=20)\n    child1_after  = WindowSpec(title=\"Left Panel \u2014 Updated\", width=40, height=20)\n    pane_before = PaneSpec(direction=FlexDirection.ROW, children=[child1_before])\n    pane_after  = PaneSpec(direction=FlexDirection.ROW, children=[child1_after])\n    nested_changes = diff_specs(pane_before.to_dict(), pane_after.to_dict())\n    for c in nested_changes:\n        print(f\"  [{c.kind.value.upper():8}] {c.path}: {c.old!r} \u2192 {c.new!r}\")\n    print()\n\n    # ------------------------------------------------------------------ 4\n    print(\"\u2500\u2500\u2500 4. filter_changes() by kind \u2500\u2500\u2500\")\n    a = {\"title\": \"Old\", \"width\": 80}\n    b = {\"title\": \"New\", \"width\": 80, \"height\": 30}\n    all_changes = diff_specs(a, b)\n    mods = filter_changes(all_changes, kind=ChangeKind.MODIFIED)\n    added = filter_changes(all_changes, kind=ChangeKind.ADDED)\n    print(f\"  total changes: {len(all_changes)}\")\n    print(f\"  MODIFIED: {[c.path for c in mods]}\")\n    print(f\"  ADDED:    {[c.path for c in added]}\")\n    print()\n\n    # ------------------------------------------------------------------ 5\n    print(\"\u2500\u2500\u2500 5. Portability: SpecChange JSON round-trip \u2500\u2500\u2500\")\n    changes_for_json = diff_specs(\n        WindowSpec(title=\"A\", width=60).to_dict(),\n        WindowSpec(title=\"B\", width=80).to_dict(),\n    )\n    j = json.dumps([c.to_dict() for c in changes_for_json])\n    restored = [SpecChange.from_dict(d) for d in json.loads(j)]\n    print(f\"  serialized: {len(j)} bytes\")\n    print(f\"  restored {len(restored)} SpecChange(s)\")\n    for r in restored:\n        print(f\"    {r.path}: {r.old!r} \u2192 {r.new!r}\")\n    print(\"  Portability: OK\")\n\n\nif __name__ == \"__main__\":\n    main()\n"
    }

      "code": "#!/usr/bin/env python3\nimport sys\nfrom termforge.core.types import ColorDepth\nfrom termforge.text.types import TextSpec, TextAlign, TextOverflow\nfrom termforge.text.render import render_text\n\ndef main() -> None:\n    markup_examples = [\n        \"Plain text example.\",\n        \"[bold]Bold text example.[/bold]\",\n        \"[dim]Dim text example.[/dim]\",\n        \"[italic]Italic text example.[/italic]\",\n        \"[underline]Underline text example.[/underline]\",\n        \"[strikethrough]Strikethrough text example.[/strikethrough]\",\n        \"[bold][italic][underline]Bold, italic, and underline combined.[/][/][/]\",\n        \"[fg=red]Red foreground text.[/fg]\",\n        \"[bg=blue]Blue background text.[/bg]\",\n        \"[fg=green][bg=yellow]Green on yellow text.[/fg][/bg]\",\n        \"[fg=#ff00ff]Custom Magenta via hex #ff00ff[/fg]\"\n    ]\n    \n    print(\"--- TermForge Text Markup Gallery ---\")\n    for ex in markup_examples:\n        spec = TextSpec(content=ex, align=TextAlign.LEFT, overflow=TextOverflow.WRAP, max_width=60)\n        lines = render_text(spec, depth=ColorDepth.TRUECOLOR)\n        for line in lines:\n            print(line)\n            \n    print(\"\\n--- Alignment Examples (width=40) ---\")\n    aligns = [TextAlign.LEFT, TextAlign.CENTER, TextAlign.RIGHT]\n    for align in aligns:\n        spec = TextSpec(content=f\"[bold]Aligned {align.value.upper()}[/bold]\", align=align, max_width=40)\n        lines = render_text(spec, depth=ColorDepth.TRUECOLOR)\n        print(f\"|{lines[0]}|\")\n        \n    print(\"\\n--- Truncation / Overflow Examples (width=15) ---\")\n    long_text = \"This is a very long string that will be cut off or wrapped.\"\n    for overflow in [TextOverflow.CLIP, TextOverflow.ELLIPSIS, TextOverflow.WRAP]:\n        spec = TextSpec(content=long_text, overflow=overflow, max_width=15)\n        lines = render_text(spec, depth=ColorDepth.TRUECOLOR)\n        print(f\"--- {overflow.value.upper()} ---\"       "raw_ansi": "--- Nord Theme Sparkline Gradient Showcase ---\n\u001b[38;2;163;190;140m \u001b[0m\u001b[38;2;168;173;134m\u2582\u001b[0m\u001b[38;2;166;182;137m \u001b[0m\u001b[38;2;173;156;128m\u2583\u001b[0m\u001b[38;2;178;139;121m\u2584\u001b[0m\u001b[38;2;176;148;125m\u2584\u001b[0m\u001b[38;2;183;122;115m\u2586\u001b[0m\u001b[38;2;188;105;109m\u2587\u001b[0m\u001b[38;2;181;131;118m\u2585\u001b[0m\u001b[38;2;191;97;106m\u2588\u001b[0m\n",

    "streaming_demo": {
      "raw_ansi": "=== TermForge Chart Streaming Demo ===\n\n\u2500\u2500\u2500 1. Single-series CPU rolling buffer (max_points=5) \u2500\u2500\u2500\n  pushed 8 samples, window holds 5\n  is_full: True\n  latest 2 rows: [[71.2], [63.5]]\n  spec type: line  y_min=47.78  y_max=72.31\n\n\u2500\u2500\u2500 2. Multi-series CPU + Memory (max_points=4) \u2500\u2500\u2500\n  series: ['CPU', 'Memory']\n  window size: 4\n  [CPU] data=[44.7, 47.3, 50.0, 52.8]\n  [Memory] data=[71.0, 73.5, 75.1, 77.3]\n\n\u2500\u2500\u2500 3. OHLC candlestick buffer (max_points=4) \u2500\u2500\u2500\n  bars in window: 4\n  latest bar: {'open': 108.7, 'high': 112.0, 'low': 107.4, 'close': 110.5, 'volume': 0.0, 'timestamp': 'T5'}\n  ohlc_series name: BTC/USD\n  timestamps: ['T2', 'T3', 'T4', 'T5']\n  y range: [100.45, 112.55]\n\n\u2500\u2500\u2500 4. Portability: JSON round-trip \u2500\u2500\u2500\n  JSON bytes: 245\n  restored series count: 2\n  restored point count: 4\n  Portability: OK\n",
      "code": "\"\"\"Story: charts/streaming_demo \u2014 showcase StreamingChartBuffer.\n\nDemonstrates the three main use patterns:\n1. Single-series rolling window (seeded random CPU data)\n2. Multi-series rolling window (CPU + Memory)\n3. OHLC candlestick rolling window (synthetic stock ticks)\n\"\"\"\nimport random\nfrom termforge.charts.streaming import StreamingChartBuffer\nfrom termforge.charts.types import ChartType\n\n\ndef main() -> None:\n    rng = random.Random(42)  # seeded for deterministic golden\n\n    print(\"=== TermForge Chart Streaming Demo ===\\n\")\n\n    # ------------------------------------------------------------------ 1\n    print(\"\u2500\u2500\u2500 1. Single-series CPU rolling buffer (max_points=5) \u2500\u2500\u2500\")\n    buf = StreamingChartBuffer(max_points=5, series_names=[\"CPU %\"])\n    cpu_values = [45.2, 52.1, 60.8, 55.3, 48.9, 67.4, 71.2, 63.5]\n    for v in cpu_values:\n        buf.push([v])\n    print(f\"  pushed {len(cpu_values)} samples, window holds {buf.point_count}\")\n    print(f\"  is_full: {buf.is_full}\")\n    print(f\"  latest 2 rows: {buf.latest(2)}\")\n    spec = buf.to_chart_spec(chart_type=ChartType.LINE, title=\"CPU %\",\n                             width=60, height=10)\n    d = spec.to_dict()\n    print(f\"  spec type: {d['chart_type']}  y_min={d['y_axis']['min_val']:.2f}\"\n          f\"  y_max={d['y_axis']['max_val']:.2f}\")\n    print()\n\n    # ------------------------------------------------------------------ 2\n    print(\"\u2500\u2500\u2500 2. Multi-series CPU + Memory (max_points=4) \u2500\u2500\u2500\")\n    mbuf = StreamingChartBuffer(max_points=4, series_count=2,\n                                series_names=[\"CPU\", \"Memory\"])\n    samples = [(42.1, 68.3), (44.7, 71.0), (47.3, 73.5), (50.0, 75.1), (52.8, 77.3)]\n    for cpu, mem in samples:\n        mbuf.push([cpu, mem])\n    print(f\"  series: {mbuf.series_names}\")\n    print(f\"  window size: {mbuf.point_count}\")\n    mspec = mbuf.to_chart_spec(title=\"System Metrics\", width=60, height=12)\n    md = mspec.to_dict()\n    for s in md[\"series\"]:\n        print(f\"  [{s['name']}] data={s['data']}\")\n    print()\n\n    # ------------------------------------------------------------------ 3\n    print(\"\u2500\u2500\u2500 3. OHLC candlestick buffer (max_points=4) \u2500\u2500\u2500\")\n    obuf = StreamingChartBuffer(max_points=4, ohlc=True, ohlc_name=\"BTC/USD\")\n    ticks = [\n        (100.0, 104.5, 99.2, 102.3, \"T1\"),\n        (102.3, 106.1, 101.0, 105.8, \"T2\"),\n        (105.8, 107.2, 103.5, 104.1, \"T3\"),\n        (104.1, 109.3, 102.8, 108.7, \"T4\"),\n        (108.7, 112.0, 107.4, 110.5, \"T5\"),\n    ]\n    for o, h, lo, c, ts in ticks:\n        obuf.push_ohlc(open=o, high=h, low=lo, close=c, timestamp=ts)\n    print(f\"  bars in window: {obuf.point_count}\")\n    print(f\"  latest bar: {obuf.latest_ohlc(1)[0]}\")\n    ospec = obuf.to_chart_spec(chart_type=ChartType.CANDLESTICK,\n                               title=\"BTC/USD\", width=60, height=14)\n    od = ospec.to_dict()\n    print(f\"  ohlc_series name: {od['ohlc_series']['name']}\")\n    print(f\"  timestamps: {od['ohlc_series']['timestamps']}\")\n    print(f\"  y range: [{od['y_axis']['min_val']:.2f}, {od['y_axis']['max_val']:.2f}]\")\n    print()\n\n    # ------------------------------------------------------------------ 4 \u2014 portability\n    print(\"\u2500\u2500\u2500 4. Portability: JSON round-trip \u2500\u2500\u2500\")\n    import json\n    d_serial = mbuf.to_dict()\n    json_str = json.dumps(d_serial)\n    buf_restored = StreamingChartBuffer.from_dict(json.loads(json_str))\n    print(f\"  JSON bytes: {len(json_str)}\")\n    print(f\"  restored series count: {buf_restored.series_count}\")\n    print(f\"  restored point count: {buf_restored.point_count}\")\n    assert buf_restored.series_names == mbuf.series_names\n    print(\"  Portability: OK\")\n\n\nif __name__ == \"__main__\":\n    main()\n"
    }

    "theme_states_demo": {
      "raw_ansi": "=== TermForge Themed State Overrides Demo ===\n\n\u001b[38;2;100;100;100m\u250c\u2500\u2500\u2500\u2500 Unfocused \u2500\u2500\u2500\u2500\u2500\u2510\u001b[0m\u001b[38;2;50;255;50m\u250c\u2500 Focused (Green) \u2500\u2500\u2510\u001b[0m\u001b[38;2;50;50;50m\u250c\u2500 Disabled (Gray) \u2500\u2500\u2510\u001b[0m\n\u001b[38;2;100;100;100m\u2502\u001b[0mBase style          \u001b[38;2;100;100;100m\u2502\u001b[0m\u001b[38;2;50;255;50m\u2502\u001b[0mState: focused      \u001b[38;2;50;255;50m\u2502\u001b[0m\u001b[38;2;50;50;50m\u2502\u001b[0mState: disabled     \u001b[38;2;50;50;50m\u2502\u001b[0m\n\u001b[38;2;100;100;100m\u2502\u001b[0m                    \u001b[38;2;100;100;100m\u2502\u001b[0m\u001b[38;2;50;255;50m\u2502\u001b[0m                    \u001b[38;2;50;255;50m\u2502\u001b[0m\u001b[38;2;50;50;50m\u2502\u001b[0m                    \u001b[38;2;50;50;50m\u2502\u001b[0m\n\u001b[38;2;100;100;100m\u2502\u001b[0m                    \u001b[38;2;100;100;100m\u2502\u001b[0m\u001b[38;2;50;255;50m\u2502\u001b[0m                    \u001b[38;2;50;255;50m\u2502\u001b[0m\u001b[38;2;50;50;50m\u2502\u001b[0m                    \u001b[38;2;50;50;50m\u2502\u001b[0m\n\u001b[38;2;100;100;100m\u2502\u001b[0m                    \u001b[38;2;100;100;100m\u2502\u001b[0m\u001b[38;2;50;255;50m\u2502\u001b[0m                    \u001b[38;2;50;255;50m\u2502\u001b[0m\u001b[38;2;50;50;50m\u2502\u001b[0m                    \u001b[38;2;50;50;50m\u2502\u001b[0m\n\u001b[38;2;100;100;100m\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\u001b[0m\u001b[38;2;50;255;50m\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\u001b[0m\u001b[38;2;50;50;50m\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\u001b[0m\n\nTheme JSON serialization length: 502 bytes\nRestored focused override: (50, 255, 50)\nPortability: OK\n",
      "code": "\"\"\"Story: theme/theme_states_demo \u2014 showcase Themed State Overrides.\n\nDemonstrates creating custom themes with state-specific overrides, rendering\nwindows with varying focus/disabled states, and checking theme serialisation.\n\"\"\"\nfrom __future__ import annotations\nimport json\nfrom termforge.core.types import Size, ColorValue\nfrom termforge.core import FlexDirection\nfrom termforge.core.theme import ThemeTokens\nfrom termforge.windows.types import WindowSpec, PaneSpec\nfrom termforge.windows.compositor import compose_panes, render_window\n\n\ndef main() -> None:\n    print(\"=== TermForge Themed State Overrides Demo ===\\n\")\n\n    # 1. Define custom theme with overrides for focused and disabled states\n    custom_theme = ThemeTokens(\n        colors={\n            \"border\": ColorValue(100, 100, 100, name=\"colors.border\"),      # base: gray\n            \"primary\": ColorValue(100, 100, 255, name=\"colors.primary\"),    # base: light blue\n        },\n        states={\n            \"focused\": {\n                \"colors\": {\n                    \"border\": ColorValue(50, 255, 50, name=\"colors.border\")  # neon green when focused\n                }\n            },\n            \"disabled\": {\n                \"colors\": {\n                    \"border\": ColorValue(50, 50, 50, name=\"colors.border\")   # dark charcoal when disabled\n                }\n            }\n        }\n    )\n\n    # 2. Configure 3 windows with different state indicators\n    total_size = Size(66, 6)\n    \n    # We want a split layout of 3 columns\n    win1 = WindowSpec(title=\"Unfocused\", width=22, height=6)\n    win2 = WindowSpec(title=\"Focused (Green)\", width=22, height=6, focused=True)\n    \n    # We'll tag win3 as disabled. Although WindowSpec doesn't have a disabled property by default,\n    # we can pass it or check it using a hook/property, or we can use spec.disabled = True.\n    # Wait, does WindowSpec support disabled?\n    # WindowSpec is a dataclass. Let's see if we can set attributes or if WindowSpec has a disabled field.\n    # Let's add disabled: bool = False to WindowSpec if needed, or we can patch/assign it.\n    # Wait! Python dataclasses allow dynamically setting attributes unless they have slots.\n    # Let's check WindowSpec definition.\n    # But wait, to be 100% safe, let's verify if we can set win3.disabled = True, or let's check.\n    # Let's check if win3 has any other state, or let's check.\n    # In compositor.py, we resolved state based on spec.focused:\n    # `state = \"focused\" if spec.focused else None`\n    # Let's see: if we want to show a disabled state, we can add it to render_window!\n    # Wait, inside compositor.py we did:\n    # `state = \"focused\" if spec.focused else None`\n    # Can we update it to check `getattr(spec, \"disabled\", False)` or check active states?\n    # Yes, we wrote:\n    # `state = \"focused\" if spec.focused else None`\n    # Let's modify it to check disabled first:\n    # `state = \"disabled\" if getattr(spec, \"disabled\", False) else (\"focused\" if spec.focused else None)`\n    # Let's verify this. Yes! That's incredibly clean.\n    win3 = WindowSpec(title=\"Disabled (Gray)\", width=22, height=6)\n    # Set disabled attribute\n    setattr(win3, \"disabled\", True)\n\n    # Compile layout\n    pane = PaneSpec(\n        direction=FlexDirection.ROW,\n        children=[win1, win2, win3],\n        ratios=[1.0, 1.0, 1.0],\n        gap=0\n    )\n    layouts = compose_panes(pane, total_size)\n\n    # Render each window\n    r_win1 = render_window(layouts[0][2], [\"Base style\"], theme=custom_theme)\n    r_win2 = render_window(layouts[1][2], [\"State: focused\"], theme=custom_theme)\n    r_win3 = render_window(layouts[2][2], [\"State: disabled\"], theme=custom_theme)\n\n    # Print aligned columns\n    for r in range(total_size.height):\n        print(r_win1[r] + r_win2[r] + r_win3[r])\n\n    print()\n    # 3. Portability check\n    j = json.dumps(custom_theme.to_dict())\n    print(f\"Theme JSON serialization length: {len(j)} bytes\")\n    restored = ThemeTokens.from_dict(json.loads(j))\n    print(f\"Restored focused override: {restored.states['focused']['colors']['border'].rgb}\")\n    print(\"Portability: OK\")\n\n\nif __name__ == \"__main__\":\n    main()\n"
    }

      "code": "#!/usr/bin/env python3\nimport sys\nimport os\nimport tempfile\nfrom PIL import Image as PILImage\nfrom termforge.core.types import ColorDepth\nfrom termforge.image.types import ImageSpec, ImageFidelity\nfrom termforge.image.render import render_image\n\ndef create_gradient_image() -> str:\n    # Create a 30x15 gradient image (blue to yellow horizontally, black to red vertically)\n    width = 30\n    height = 15\n    img = PILImage.new(\"RGB\", (width, height))\n    \n    for y in range(height):\n        for x in range(width):\n            r = int(255 * (y / (height - 1)))\n            g = int(255 * (x / (width - 1)))\n            b = int(255 * (1 - (x / (width - 1))))\n            img.putpixel((x, y), (r, g, b))\n            \n    fd, path = tempfile.mkstemp(suffix=\".png\")\n    os.close(fd)\n    img.save(path)\n    return path\n\ndef main() -> None:\n    img_path = create_gradient_image()\n    try:\n        print(\"--- TermForge Image Gallery ---\")\n        \n        print(\"\\n1. Half-Block Mode (True Color, width=30):\")\n        spec_hb = ImageSpec(source=img_path, width=30, fidelity=ImageFidelity.HALF_BLOCK)\n        lines_hb = render_image(spec_hb, depth=ColorDepth.TRUECOLOR)\n        for line in lines_hb:\n            print(line)\n            \n        print(\"\\n2. ASCII Colored Mode (256-Color, width=40):\")\n        spec_ascii = ImageSpec(source=img_path, width=40, fidelity=ImageFidelity.ASCII_RAMP)\n        lines_ascii = render_image(spec_ascii, depth=ColorDepth.COLOR_256)\n        for line in lines_ascii:\n            print(line)\n            \n        print(\"\\n3. Monochrome ASCII Mode (width=40):\")\n        lines_mono = render_image(spec_ascii, depth=ColorDepth.MONOCHROME)\n        for line in lines_mono:\n            print(line)\n            \n    finally:\n        if os.path.exists(img_path):\n            os.remove(img_path)\n\nif __name__ == \"__main__\":\n    main()\n"

      "code": "\"\"\"Story: config/form_demo \u2014 showcase declarative FormSpec and validation.\n\nDemonstrates form field definitions, applying constraints, executing\nvalidation checks, and JSON roundtrip portability.\n\"\"\"\nfrom __future__ import annotations\nimport json\nfrom termforge.config.form import FieldType, FormFieldSpec, FormSpec\n\n\ndef main() -> None:\n    print(\"=== TermForge Declarative Forms & Validation Demo ===\\n\")\n\n    # 1. Define form specification\n    form = FormSpec(\n        title=\"Account Setup\",\n        fields=[\n            FormFieldSpec(\n                name=\"username\",\n                label=\"Username\",\n                field_type=FieldType.TEXT,\n                placeholder=\"e.g. johndoe\",\n                validation_rules={\"required\": True, \"min_length\": 4, \"regex\": \"^[a-z0-9_]+$\"}\n            ),\n            FormFieldSpec(\n                name=\"age\",\n                label=\"Age\",\n                field_type=FieldType.TEXT,\n                placeholder=\"e.g. 21\",\n                validation_rules={\"required\": True, \"numeric\": True}\n            ),\n            FormFieldSpec(\n                name=\"role\",\n                label=\"Role\",\n                field_type=FieldType.TEXT,\n                default_value=\"developer\",\n                validation_rules={\"required\": False, \"choices\": [\"admin\", \"developer\", \"guest\"]}\n            ),\n            FormFieldSpec(\n                name=\"newsletter\",\n                label=\"Subscribe to newsletter\",\n                field_type=FieldType.CHECKBOX,\n                default_value=True\n            )\n        ]\n    )\n\n    print(\"--- 1. Form Specification ---\")\n    print(f\"  Title: {form.title}\")\n    for f in form.fields:\n        print(f\"  - [{f.field_type.value:8}] {f.name:12} | Label: {f.label:24} | Rules: {f.validation_rules}\")\n    print()\n\n    # 2. Test valid input\n    print(\"--- 2. Valid Input Test ---\")\n    valid_data = {\n        \"username\": \"dox_user\",\n        \"age\": \"28\",\n        \"role\": \"developer\",\n        \"newsletter\": True\n    }\n    is_ok, errs = form.validate(valid_data)\n    print(f\"  Data: {valid_data}\")\n    print(f\"  Valid? {is_ok}\")\n    print(f\"  Errors: {errs}\")\n    print()\n\n    # 3. Test invalid input (failing username regex/min_length, age non-numeric, role choice)\n    print(\"--- 3. Invalid Input Test ---\")\n    invalid_data = {\n        \"username\": \"JD\",       # too short, has capitals (regex fails)\n        \"age\": \"twenty\",        # non-numeric\n        \"role\": \"manager\",      # not in choices\n        \"newsletter\": False\n    }\n    is_ok, errs = form.validate(invalid_data)\n    print(f\"  Data: {invalid_data}\")\n    print(f\"  Valid? {is_ok}\")\n    print(\"  Validation Errors:\")\n    for field_name, msg in errs.items():\n        print(f\"    - {field_name}: {msg}\")\n    print()\n\n    # 4. Verify Portability\n    print(\"--- 4. Portability / JSON check ---\")\n    j = json.dumps(form.to_dict())\n    print(f\"  JSON length: {len(j)} bytes\")\n    restored = FormSpec.from_dict(json.loads(j))\n    print(f\"  Restored Title: {restored.title}\")\n    print(f\"  Restored field count: {len(restored.fields)}\")\n    print(\"  Portability: OK\")\n\n\nif __name__ == \"__main__\":\n    main()\n"
    },

      "code": "#!/usr/bin/env python3\nimport sys\nimport os\nimport tempfile\nfrom termforge.core import Size, ColorDepth\nfrom termforge.config.loader import load_config_yaml, config_to_specs\nfrom termforge.windows.types import WindowSpec, PaneSpec\nfrom termforge.windows.compositor import compose_panes, render_window\nfrom termforge.text.types import TextSpec\nfrom termforge.text.render import render_text\nfrom termforge.charts.types import ChartSpec\nfrom termforge.charts.chart import render_chart\n\ndef create_yaml_config() -> str:\n    yaml_content = \"\"\"\ntheme: catppuccin_mocha\ntitle: Declarative Layout Demo\ncomponents:\n  - spec_type: window\n    properties:\n      title: System Dashboard\n      width: 60\n      height: 12\n    children:\n      - spec_type: pane\n        properties:\n          direction: row\n          ratios: [1.0, 2.0]\n          gap: 0\n        children:\n          - spec_type: text\n            properties:\n              content: \"[bold]CPU Load[/bold]\\\\nCore 1: 45%\\\\nCore 2: 60%\\\\nCore 3: 12%\"\n              align: left\n          - spec_type: chart\n            properties:\n              chart_type: bar\n              series:\n                - name: cpu_usage\n                  data: [45.0, 60.0, 12.0]\n              width: 38\n              height: 10\n              show_legend: false\n\"\"\"\n    fd, path = tempfile.mkstemp(suffix=\".yaml\")\n    with os.fdopen(fd, \"w\") as f:\n        f.write(yaml_content)\n    return path\n\ndef main() -> None:\n    path = create_yaml_config()\n    try:\n        # Load and parse config\n        config = load_config_yaml(path)\n        specs = config_to_specs(config)\n        \n        main_window_spec = specs[0]\n        assert isinstance(main_window_spec, WindowSpec)\n        \n        # Render nested layout manually to composite\n        # Main window has width 60, height 12 -> inner_w=58, inner_h=10\n        inner_size = Size(58, 10)\n        \n        pane_spec = main_window_spec.content\n        assert isinstance(pane_spec, PaneSpec)\n        \n        # 1. Compose panes\n        layouts = compose_panes(pane_spec, inner_size)\n        \n        # 2. Render children\n        # Left pane (text)\n        pos_l, size_l, spec_l = layouts[0]\n        assert isinstance(spec_l, TextSpec)\n        spec_l.max_width = size_l.width\n        spec_l.max_lines = size_l.height\n        lines_l = render_text(spec_l, available_width=size_l.width)\n        # Pad lines_l to size_l.height\n        lines_l += [\" \" * size_l.width] * (size_l.height - len(lines_l))\n        \n        # Right pane (chart)\n        pos_r, size_r, spec_r = layouts[1]\n        assert isinstance(spec_r, ChartSpec)\n        spec_r.width = size_r.width\n        spec_r.height = size_r.height\n        lines_r = render_chart(spec_r)\n        lines_r += [\" \" * size_r.width] * (size_r.height - len(lines_r))\n        \n        # 3. Composite body lines\n        body_lines = []\n        for r in range(inner_size.height):\n            # Left pane line + right pane line\n            body_lines.append(lines_l[r] + lines_r[r])\n            \n        # 4. Render outer Window Spec enclosing the composited body lines\n        final_screen = render_window(main_window_spec, body_lines, depth=ColorDepth.TRUECOLOR)\n        \n        print(\"--- Declarative Config Rendered Layout ---\")\n        for line in final_screen:\n            print(line)\n            \n        # Showcase save_config_to_file\n        from termforge.config.loader import save_config_to_file\n        temp_export = os.path.join(tempfile.gettempdir(), \"termforge_export_demo.yaml\")\n        save_config_to_file(main_window_spec, temp_export, format=\"yaml\", theme=\"catppuccin_mocha\")\n        print(f\"\\n[Exporter] Successfully exported spec config back to {temp_export}\")\n        if os.path.exists(temp_export):\n            os.remove(temp_export)\n            \n    finally:\n        if os.path.exists(path):\n            os.remo
