    <title>TermForge Showcase Documentation</title>

    <style>

            --text-color: #cdd6f4;

            --border-glow: #b4befe;
            --accent-glow: #89b4fa;
            
            --ansi-black: #1e1e2e;
            --ansi-red: #f38ba8;
            --ansi-green: #a6e3a1;
            --ansi-yellow: #f9e2af;

            --text-color: #f8f8f2;
            --sidebar-bg: rgba(40, 42, 54, 0.8);
            --card-bg: rgba(68, 71, 90, 0.5);
            --border-glow: #bd93f9;
            --accent-glow: #8be9fd;
            
            --ansi-black: #21222c;
            --ansi-red: #ff5555;
            --ansi-green: #50fa7b;
            --ansi-yellow: #f1fa8c;
            --ansi-blue: #bd93f9;
            --ansi-magenta: #ff79c6;
            --ansi-cyan: #8be9fd;
            --ansi-white: #f8f8f2;
            
            --ansi-bright_black: #6272a4;
            --ansi-bright_red: #ff6e6e;
            --ansi-bright_green: #69ff94;
            --ansi-bright_yellow: #ffffa5;
            --ansi-bright_blue: #d6acff;
            --ansi-bright_magenta: #ff92df;
            --ansi-bright_cyan: #a4ffff;

            --text-color: #a9b1d6;
            --sidebar-bg: rgba(26, 27, 38, 0.8);
            --card-bg: rgba(36, 40, 59, 0.5);
            --border-glow: #bb9af7;
            --accent-glow: #7aa2f7;
            
            --ansi-black: #15161e;
            --ansi-red: #f7768e;
            --ansi-green: #9ece6a;
            --ansi-yellow: #e0af68;
            --ansi-blue: #7aa2f7;
            --ansi-magenta: #bb9af7;
            --ansi-cyan: #7dcfff;
            --ansi-white: #a9b1d6;

            --ansi-bright_red: #ff7a93;
            --ansi-bright_green: #b9f27c;
            --ansi-bright_yellow: #ff9e64;
            --ansi-bright_blue: #7da6ff;
            --ansi-bright_magenta: #bb9af7;

        .theme-contrast {
            --bg-color: #000000;
            --text-color: #ffffff;
            --sidebar-bg: #111111;
            --card-bg: #222222;
            --border-glow: #ffffff;
            --accent-glow: #00ffff;
            
            --ansi-black: #000000;
            --ansi-red: #ffffff;
            --ansi-green: #ffffff;
            --ansi-yellow: #ffffff;
            --ansi-blue: #ffffff;
            --ansi-magenta: #ffffff;
            --ansi-cyan: #ffffff;
            --ansi-white: #ffffff;
            
            --ansi-bright_black: #555555;
            --ansi-bright_red: #ffffff;
            --ansi-bright_green: #ffffff;
            --ansi-bright_yellow: #ffffff;
            --ansi-bright_blue: #ffffff;
            --ansi-bright_magenta: #ffffff;
            --ansi-bright_cyan: #ffffff;
            --ansi-bright_white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.25;
        }
        .sphere-1 {
            width: 400px;
            height: 400px;
            background: var(--border-glow);
            top: -100px;
            right: -100px;
        }
        .sphere-2 {
            width: 350px;
            height: 350px;
            background: var(--accent-glow);
            bottom: -50px;
            left: -50px;
        }
        
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        
        .logo-container h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--border-glow), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .menu-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.4;
            margin-bottom: 10px;
        }
        
        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .menu-item button {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color);
            text-align: left;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .menu-item button:hover, .menu-item.active button {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.02);
            color: #ffffff;
        }
        
        .menu-item.active button {
            border-left: 3px solid var(--border-glow);
            border-radius: 0 8px 8px 0;
            padding-left: 12px;
        }
        
        .main-content {
            flex-grow: 1;
            padding: 50px 60px;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .controls-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .controls-title h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
        }
        
        .theme-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .theme-selector select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }
        
        .terminal-container {
            background: rgba(10, 11, 16, 0.95);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(127, 0, 255, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        
        .terminal-header {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.08);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .terminal-dots {
            display: flex;
            gap: 8px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        
        .terminal-title {
            font-size: 13px;
            font-family: 'Fira Code', monospace;
            opacity: 0.5;
        }
        
        .tab-bar {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.08);
        }
        
        .tab-button {
            flex: 1;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        
        .tab-button.active {
            color: #ffffff;
            border-bottom: 2px solid var(--border-glow);
            background: rgba(255, 255, 255, 0.02);
        }
        
        .terminal-body {
            padding: 24px;
            font-family: 'Fira Code', monospace;
            font-size: 15px;
            line-height: 1.45;
            white-space: pre;
            overflow-x: auto;
            color: var(--ansi-white);
            min-height: 380px;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(127, 0, 255, 0.15); }
            50% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 35px rgba(0, 240, 255, 0.25); }
            100% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(127, 0, 255, 0.15); }
        }
        
        .terminal-container {
            animation: pulse-glow 8s infinite alternate;
        }
    </style>
</head>
<body class="theme-catppuccin">
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>
    
    <div class="sidebar">
        <div class="logo-container">
            <h1>TermForge</h1>
            <p style="font-size: 12px; opacity: 0.5; margin-top: 5px;">Universal CLI Showcase</p>
        </div>
        
        <div>
            <div class="menu-title">Stories</div>
            <ul class="menu-list" id="component-menu">

        <div class="controls-card">
            <div class="controls-title">

    <script>
        const storiesData = {
  "windows": {
    "window_layout": {
      "render": "--- Window Layout Composited Screen ---\n<span style=\"color: rgb(0,0,0)\">\u250c\u2500 Sidebar \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510</span><span style=\"color: rgb(0,0,0)\">\u250c\u2500 Content Pane \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510</span>\n<span style=\"color: rgb(0,0,0)\">\u2502</span>* Home            <span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(0,0,0)\">\u2502</span>Welcome to TermForge!                 <span style=\"color: rgb(0,0,0)\">\u2502</span>\n<span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(0,0,0)\">\u250c\u2500 Modal Alert \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510</span>   a split screen layout demo.   <span style=\"color: rgb(0,0,0)\">\u2502</span>\n<span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(0,0,0)\">\u2502</span> Are you sure you      <span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(80,80,80); opacity: 0.6\">\u2588\u2588</span>ht window has focus.           <span style=\"color: rgb(0,0,0)\">\u2502</span>\n<span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(0,0,0)\">\u2502</span> want to proceed?      <span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(80,80,80); opacity: 0.6\">\u2588\u2588</span>math distributed sizes auto:   <span style=\"color: rgb(0,0,0)\">\u2502</span>\n<span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(0,0,0)\">\u2502</span>  [ OK ]  [ Cancel ]   <span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(80,80,80); opacity: 0.6\">\u2588\u2588</span>                               <span style=\"color: rgb(0,0,0)\">\u2502</span>\n<span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(0,0,0)\">\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518</span><span style=\"color: rgb(80,80,80); opacity: 0.6\">\u2588\u2588</span>                               <span style=\"color: rgb(0,0,0)\">\u2502</span>\n<span style=\"color: rgb(0,0,0)\">\u2502</span>  <span style=\"color: rgb(80,80,80); opacity: 0.6\">\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588</span>                               <span style=\"color: rgb(0,0,0)\">\u2502</span>\n<span style=\"color: rgb(0,0,0)\">\u2502</span>                  <span style=\"color: rgb(0,0,0)\">\u2502</span><span style=\"color: rgb(0,0,0)\">\u2502</span>                                      <span style=\"color: rgb(0,0,0)\">\u2502</span>\n<span style=\"color: rgb(0,0,0)\">\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518</span><span style=\"color: rgb(0,0,0)\">\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518</span>\n",
      "code": "#!/usr/bin/env python3\nimport sys\nfrom termforge.core import Size, FlexDirection\nfrom termforge.windows.types import WindowSpec, PaneSpec\nfrom termforge.windows.compositor import compose_panes, render_window\n\ndef main() -> None:\n    # We want a layout of width=60, height=10\n    total_size = Size(60, 10)\n    \n    left_win = WindowSpec(title=\"Sidebar\", width=20, height=10)\n    right_win = WindowSpec(title=\"Content Pane\", width=40, height=10, focused=True)\n    \n    pane = PaneSpec(\n        direction=FlexDirection.ROW,\n        children=[left_win, right_win],\n        ratios=[1.0, 2.0],\n        gap=0\n    )\n    \n    # 1. Compose sizes and positions\n    layouts = compose_panes(pane, total_size)\n    \n    # 2. Render each window separately with its computed size\n    left_content = [\"* Home\", \"* Settings\", \"* Dashboard\", \"* Help\"]\n    right_content = [\n        \"Welcome to TermForge!\",\n        \"This is a split screen layout demo.\",\n        \"The right window has focus.\",\n        \"Layout math distributed sizes auto:\"\n    ]\n    \n    # Update widths/heights of specs from composed layout\n    pos_left, size_left, spec_left = layouts[0]\n    spec_left.width = size_left.width\n    spec_left.height = size_left.height\n    \n    pos_right, size_right, spec_right = layouts[1]\n    spec_right.width = size_right.width\n    spec_right.height = size_right.height\n    \n    left_rendered = render_window(spec_left, left_content)\n    right_rendered = render_window(spec_right, right_content)\n    \n    # Render a centered popup modal window with a drop shadow\n    popup_win = WindowSpec(title=\"Modal Alert\", width=25, height=5, shadow=True, focused=True)\n    popup_content = [\n        \" Are you sure you\",\n        \" want to proceed?\",\n        \"  [ OK ]  [ Cancel ]\"\n    ]\n    popup_rendered = render_window(popup_win, popup_content)\n    \n    # 3. Combine and overlay row by row\n    print(\"--- Window Layout Composited Screen ---\")\n    for r in range(total_size.height):\n        if 2 <= r < 8:\n            left_slice = left_rendered[r][:18]\n            mid_slice = popup_rendered[r - 2]\n            right_slice = right_rendered[r][25:]\n            line = left_slice + mid_slice + right_slice\n        else:\n            line = left_rendered[r] + right_rendered[r]\n        print(line)\n\nif __name__ == \"__main__\":\n    main()\n"
    }
  },

      "code": "from termforge.tabs import TabSpec, render_tabs\nfrom termforge.core.theme import load_theme_from_dict, TOKYO_NIGHT\nfrom termforge.core.types import Size\n\ndef main():\n    theme = load_theme_from_dict(TOKYO_NIGHT)\n    \n    spec = TabSpec(\n        titles=[\"Overview\", \"Logs\", \"Settings\"],\n        active_index=0\n    )\n    \n    result = render_tabs(spec, Size(40, 5), theme)\n    print(\"\\n\".join(result))\n\nif __name__ == \"__main__\":\n    main()\n"
    }
  },
  "core": {
    "layout_demo": {
      "render": "\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557\n\u2551              TermForge Layout Engine Demo                       \u2551\n\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d\n\n1. Flex Row \u2014 Three Equal Columns (flex_grow=1)\n   Container: 60\u00d710, gap=2\n\n   +----------------+--+----------------+--+----------------+-+\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   |Col-1           |  |Col-2           |  |Col-3           | |\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   |                |  |                |  |                | |\n   +----------------+--+----------------+--+----------------+-+\n\n2. Flex Column \u2014 Two Stacked Rows (flex_grow=1)\n   Container: 40\u00d712, gap=1\n\n   +--------------------------------------+\n   |                                      |\n   |Row-1                                 |\n   |                                      |\n   +--------------------------------------+\n   |                                      |\n   +--------------------------------------+\n   |                                      |\n   |Row-2                                 |\n   |                                      |\n   +--------------------------------------+\n   +--------------------------------------+\n\n3. Sidebar Layout \u2014 Fixed 15-wide sidebar + flexible main\n   Container: 60\u00d78, gap=1\n\n   +-------------+-+------------------------------------------+\n   |             | |                                          |\n   |             | |                                          |\n   |             | |                                          |\n   |Sidebar      | |Main Content                              |\n   |             | |                                          |\n   |             | |                                          |\n   +-------------+-+------------------------------------------+\n\nLayout positions computed by compute_layout():\n  Child 0: pos=(0,0) size=18\u00d710\n  Child 1: pos=(20,0) size=18\u00d710\n  Child 2: pos=(40,0) size=18\u00d710\n\n",
      "code": "#!/usr/bin/env python3\n\"\"\"Story: Layout Demo \u2014 renders a simple 3-column flex layout as ASCII boxes.\n\nDemonstrates compute_layout() by building a flex row with three columns,\nthen drawing them as ASCII-art rectangles in a character grid.\nNo Rich/Textual imports \u2014 plain print output.\n\"\"\"\nfrom __future__ import annotations\n\nfrom termforge.core.types import BoxConstraints, Position, RenderableSpec, Size, Spacing\nfrom termforge.core.layout import (\n    BoxModel,\n    FlexContainer,\n    FlexDirection,\n    LayoutNode,\n    compute_layout,\n)\n\n\ndef draw_layout(result, width: int, height: int, labels: list[str] | None = None) -> list[str]:\n    \"\"\"Render a LayoutResult tree into a 2D character grid.\"\"\"\n    grid = [[\" \"] * width for _ in range(height)]\n\n    def draw_box(lr, depth: int = 0, label: str = \"\") -> None:\n        x, y = lr.position.x, lr.position.y\n        w, h = lr.size.width, lr.size.height\n\n        if w <= 0 or h <= 0:\n            return\n\n        chars = \"+-|\"  # corner, horizontal, vertical\n        corner = \"+\"\n        horiz = \"-\"\n        vert = \"|\"\n\n        # Top edge\n        for col in range(x, min(x + w, width)):\n            if 0 <= y < height:\n                grid[y][col] = horiz\n        # Bottom edge\n        by = y + h - 1\n        for col in range(x, min(x + w, width)):\n            if 0 <= by < height:\n                grid[by][col] = horiz\n        # Left edge\n        for row in range(y, min(y + h, height)):\n            if 0 <= x < width:\n                grid[row][x] = vert\n        # Right edge\n        rx = x + w - 1\n        for row in range(y, min(y + h, height)):\n            if 0 <= rx < width:\n                grid[row][rx] = vert\n        # Corners\n        for cy, cx in [(y, x), (y, x + w - 1), (y + h - 1, x), (y + h - 1, x + w - 1)]:\n            if 0 <= cy < height and 0 <= cx < width:\n                grid[cy][cx] = corner\n\n        # Label inside box\n        if label and h > 1 and w > 2:\n            label_y = y + h // 2\n            label_x = x + 1\n            for i, ch in enumerate(label[: w - 2]):\n                if 0 <= label_y < height and 0 <= label_x + i < width:\n                    grid[label_y][label_x + i] = ch\n\n        for i, child in enumerate(lr.children):\n            child_label = \"\"\n            if labels and depth == 0 and i < len(labels):\n                child_label = labels[i]\n            draw_box(child, depth + 1, child_label)\n\n    draw_box(result, label=\"\")\n    # Draw child labels\n    if labels:\n        for i, child in enumerate(result.children):\n            if i < len(labels):\n                lbl = labels[i]\n                cy = child.position.y + child.size.height // 2\n                cx = child.position.x + 1\n                for j, ch in enumerate(lbl[: child.size.width - 2]):\n                    if 0 <= cy < height and 0 <= cx + j < width:\n                        grid[cy][cx + j] = ch\n\n    return [\"\".join(row) for row in grid]\n\n\ndef main() -> None:\n    print(\"\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557\")\n    print(\"\u2551              TermForge Layout Engine Demo                       \u2551\")\n    print(\"\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255d\")\n    print()\n\n    # --- Demo 1: Three-column row layout ---\n    print(\"1. Flex Row \u2014 Three Equal Columns (flex_grow=1)\")\n    print(\"   Container: 60\u00d710, gap=2\")\n    print()\n\n    columns = [\n        LayoutNode(\n            spec=RenderableSpec(spec_type=\"box\"),\n            box=BoxModel(flex_grow=1.0),\n        )\n        for _ in range(3)\n    ]\n    container = LayoutNode(\n        spec=RenderableSpec(spec_type=\"container\"),\n        box=BoxModel(width=60, height=10),\n        flex=FlexContainer(direction=FlexDirection.ROW, gap=2),\n        children=columns,\n    )\n    constraints = BoxConstraints(min_width=0, max_width=60, min_height=0, max_height=10)\n    result = compute_layout(container, constraints)\n\n    lines = draw_layout(result, 60, 10, labels=[\"Col-1\", \"Col-2\", \"Col-3\"])\n    for line in lines:\n        print(f\"   {line}\")\n    print()\n\n    # --- Demo 2: Column layout ---\n    print(\"2. Flex Column \u2014 Two Stacked Rows (flex_grow=1)\")\n    print(\"   Container: 40\u00d712, gap=1\")\n    print()\n\n    rows = [\n        LayoutNode(\n            spec=RenderableSpec(spec_type=\"box\"),\n            box=BoxModel(flex_grow=1.0),\n        )\n        for _ in range(2)\n    ]\n    container2 = LayoutNode(\n        spec=RenderableSpec(spec_type=\"container\"),\n        box=BoxModel(width=40, height=12),\n        flex=FlexContainer(direction=FlexDirection.COLUMN, gap=1),\n        children=rows,\n    )\n    constraints2 = BoxConstraints(min_width=0, max_width=40, min_height=0, max_height=12)\n    result2 = compute_layout(container2, constraints2)\n\n    lines2 = draw_layout(result2, 40, 12, labels=[\"Row-1\", \"Row-2\"])\n    for line in lines2:\n        print(f\"   {line}\")\n    print()\n\n    # --- Demo 3: Fixed-width sidebar + flexible main ---\n    print(\"3. Sidebar Layout \u2014 Fixed 15-wide sidebar + flexible main\")\n    print(\"   Container: 60\u00d78, gap=1\")\n    print()\n\n    sidebar = LayoutNode(\n        spec=RenderableSpec(spec_type=\"box\"),\n        box=BoxModel(width=15, height=8),\n    )\n    main_content = LayoutNode(\n        spec=RenderableSpec(spec_type=\"box\"),\n        box=BoxModel(flex_grow=1.0),\n    )\n    container3 = LayoutNode(\n        spec=RenderableSpec(spec_type=\"container\"),\n        box=BoxModel(width=60, height=8),\n        flex=FlexContainer(direction=FlexDirection.ROW, gap=1),\n        children=[sidebar, main_content],\n    )\n    constraints3 = BoxConstraints(min_width=0, max_width=60, min_height=0, max_height=8)\n    result3 = compute_layout(container3, constraints3)\n\n    lines3 = draw_layout(result3, 60, 8, labels=[\"Sidebar\", \"Main Content\"])\n    for line in lines3:\n        print(f\"   {line}\")\n    print()\n\n    # Summary\n    print(\"Layout positions computed by compute_layout():\")\n    for i, child in enumerate(result.children):\n        print(\n            f\"  Child {i}: pos=({child.position.x},{child.position.y}) \"\n            f\"size={child.size.width}\u00d7{child.size.height}\"\n        )\n    print()\n\n\nif __name__ == \"__main__\":\n    main()\n"
    },

      "code": "#!/usr/bin/env python3\n\"\"\"Story: Theme Showcase \u2014 prints all 4 built-in themes' color palettes.\n\nRenders each theme's named colors as colored blocks using ANSI escape codes.\nNo Rich/Textual imports \u2014 raw ANSI only.\n\"\"\"\nfrom __future__ import annotations\n\nfrom termforge.core.theme import (\n    CATPPUCCIN_MOCHA,\n    DRACULA,\n    HIGH_CONTRAST,\n    TOKYO_NIGHT,\n    load_theme_from_dict,\n)\n\n\ndef _ansi_bg(r: int, g: int, b: int) -> str:\n    \"\"\"Return ANSI escape for 24-bit background color.\"\"\"\n    return f\"\\033[48;2;{r};{g};{b}m\"\n\n\ndef _ansi_fg(r: int, g: int, b: int) -> str:\n    \"\"\"Return ANSI escape for 24-bit foreground color.\"\"\"\n    return f\"\\033[38;2;{r};{g};{b}m\"\n\n\nRESET = \"\\033[0m\"\nBOLD = \"\\033[1m\"\n\n\ndef render_theme(name: str, theme_dict: dict) -> None:\n    tokens = load_theme_from_dict(theme_dict)\n\n    # Header\n    surface = tokens.colors.get(\"surface\")\n    text = tokens.colors.get(\"text\")\n    if surface and text:\n        print(\n            f\"\\n{BOLD}{_ansi_fg(text.r, text.g, text.b)}\"\n            f\"{_ansi_bg(surface.r, surface.g, surface.b)}\"\n            f\"  \u2550\u2550\u2550 {name} \u2550\u2550\u2550  \"\n            f\"{RESET}\"\n        )\n    else:\n        print(f\"\\n{BOLD}  \u2550\u2550\u2550 {name} \u2550\u2550\u2550  {RESET}\")\n\n    # Color swatches\n    for token_name, color in tokens.colors.items():\n        swatch = f\"{_ansi_bg(color.r, color.g, color.b)}      {RESET}\"\n        rgb_str = f\"({color.r:3d}, {color.g:3d}, {color.b:3d})\"\n        label = color.name or token_name\n        print(f\"  {swatch}  {token_name:<12s}  {rgb_str}  {label}\")\n\n    # Spacing scale\n    print(f\"\\n  Spacing scale: \", end=\"\")\n    for key, val in sorted(tokens.spacing.items(), key=lambda kv: kv[1]):\n        print(f\"{key}={val}  \", end=\"\")\n    print()\n\n    # Border glyph preview\n    for glyph_name, glyphs in tokens.border_glyphs.items():\n        tl = glyphs[\"tl\"]\n        tr = glyphs[\"tr\"]\n        bl = glyphs[\"bl\"]\n        br = glyphs[\"br\"]\n        h = glyphs[\"h\"]\n        v = glyphs[\"v\"]\n        width = 20\n        top = f\"{tl}{h * width}{tr}\"\n        mid = f\"{v}{' ' * width}{v}\"\n        bot = f\"{bl}{h * width}{br}\"\n        print(f\"  {glyph_name:8s}: {top}\")\n        print(f\"            {mid}\")\n        print(f\"            {bot}\")\n\n\ndef main() -> None:\n    themes = [\n        (\"Catppuccin Mocha\", CATPPUCCIN_MOCHA),\n        (\"Dracula\", DRACULA),\n        (\"Tokyo Night\", TOKYO_NIGHT),\n        (\"High Contrast\", HIGH_CONTRAST),\n    ]\n    for name, theme_dict in themes:\n        render_theme(name, theme_dict)\n    print()\n\n\nif __name__ == \"__main__\":\n    main()\n"
    }

500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518</span>\n\n[Exporter] Successfully exported spec config back to /tmp/termforge_export_demo.yaml\n",
      "code": "#!/usr/bin/env python3\nimport sys\nimport os\nimport tempfile\nfrom termforge.core import Size, ColorDepth\nfrom termforge.config.loader import load_config_yaml, config_to_specs\nfrom termforge.windows.types import WindowSpec, PaneSpec\nfrom termforge.windows.compositor import compose_panes, render_window\nfrom termforge.text.types import TextSpec\nfrom termforge.text.render import render_text\nfrom termforge.charts.types import ChartSpec\nfrom termforge.charts.chart import render_chart\n\ndef create_yaml_config() -> str:\n    yaml_content = \"\"\"\ntheme: catppuccin_mocha\ntitle: Declarative Layout Demo\ncomponents:\n  - spec_type: window\n    properties:\n      title: System Dashboard\n      width: 60\n      height: 12\n    children:\n      - spec_type: pane\n        properties:\n          direction: row\n          ratios: [1.0, 2.0]\n          gap: 0\n        children:\n          - spec_type: text\n            properties:\n              content: \"[bold]CPU Load[/bold]\\\\nCore 1: 45%\\\\nCore 2: 60%\\\\nCore 3: 12%\"\n              align: left\n          - spec_type: chart\n            properties:\n              chart_type: bar\n              series:\n                - name: cpu_usage\n                  data: [45.0, 60.0, 12.0]\n              width: 38\n              height: 10\n              show_legend: false\n\"\"\"\n    fd, path = tempfile.mkstemp(suffix=\".yaml\")\n    with os.fdopen(fd, \"w\") as f:\n        f.write(yaml_content)\n    return path\n\ndef main() -> None:\n    path = create_yaml_config()\n    try:\n        # Load and parse config\n        config = load_config_yaml(path)\n        specs = config_to_specs(config)\n        \n        main_window_spec = specs[0]\n        assert isinstance(main_window_spec, WindowSpec)\n        \n        # Render nested layout manually to composite\n        # Main window has width 60, height 12 -> inner_w=58, inner_h=10\n        inner_size = Size(58, 10)\n        \n        pane_spec = main_window_spec.content\n        assert isinstance(pane_spec, PaneSpec)\n        \n        # 1. Compose panes\n        layouts = compose_panes(pane_spec, inner_size)\n        \n        # 2. Render children\n        # Left pane (text)\n        pos_l, size_l, spec_l = layouts[0]\n        assert isinstance(spec_l, TextSpec)\n        spec_l.max_width = size_l.width\n        spec_l.max_lines = size_l.height\n        lines_l = render_text(spec_l, available_width=size_l.width)\n        # Pad lines_l to size_l.height\n        lines_l += [\" \" * size_l.width] * (size_l.height - len(lines_l))\n        \n        # Right pane (chart)\n        pos_r, size_r, spec_r = layouts[1]\n        assert isinstance(spec_r, ChartSpec)\n        spec_r.width = size_r.width\n        spec_r.height = size_r.height\n        lines_r = render_chart(spec_r)\n        lines_r += [\" \" * size_r.width] * (size_r.height - len(lines_r))\n        \n        # 3. Composite body lines\n        body_lines = []\n        for r in range(inner_size.height):\n            # Left pane line + right pane line\n            body_lines.append(lines_l[r] + lines_r[r])\n            \n        # 4. Render outer Window Spec enclosing the composited body lines\n        final_screen = render_window(main_window_spec, body_lines, depth=ColorDepth.TRUECOLOR)\n        \n        print(\"--- Declarative Config Rendered Layout ---\")\n        for line in final_screen:\n            print(line)\n            \n        # Showcase save_config_to_file\n        from termforge.config.loader import save_config_to_file\n        temp_export = os.path.join(tempfile.gettempdir(), \"termforge_export_demo.yaml\")\n        save_config_to_file(main_window_spec, temp_export, format=\"yaml\", theme=\"catppuccin_mocha\")\n        print(f\"\\n[Exporter] Successfully exported spec config back to {temp_export}\")\n        if os.path.exists(temp_export):\n            os.remove(temp_export)\n            \n    finally:\n        if os.path.exists(path):\n            os.remove(path)\n\nif __name__ == \"__main__\":\n    main()\n"

        let currentMod = "";
        let currentComp = "";
        let currentTab = "preview";
        
        function populateMenu() {
            const menu = document.getElementById("component-menu");
            menu.innerHTML = "";
            
            let firstKey = null;
            
            for (const mod in storiesData) {
                for (const comp in storiesData[mod]) {
                    const key = mod + "/" + comp;
                    if (!firstKey) firstKey = key;
                    
                    const li = document.createElement("li");
                    li.className = "menu-item";
                    li.id = "item-" + mod + "-" + comp;
                    
                    const btn = document.createElement("button");
                    btn.textContent = mod + " : " + comp;
                    btn.onclick = () => selectStory(mod, comp);
                    
                    li.appendChild(btn);
                    menu.appendChild(li);
                }
            }
            
            if (firstKey) {
                const [mod, comp] = firstKey.split("/");
                selectStory(mod, comp);
            }
        }
        
        function selectStory(mod, comp) {
            currentMod = mod;
            currentComp = comp;
            
            document.querySelectorAll(".menu-item").forEach(el => el.classList.remove("active"));
            
            const item = document.getElementById("item-" + mod + "-" + comp);
            if (item) item.classList.add("active");
            
            document.getElementById("active-title").textContent = mod.toUpperCase() + " : " + comp.toUpperCase();
            document.getElementById("term-filename").textContent = comp + ".py";
            
            const data = storiesData[mod][comp];
            
            // Render view
            document.getElementById("terminal-screen-preview").innerHTML = data.render;
            
            // Code view
            const codeEscaped = data.code
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
            document.getElementById("terminal-screen-code").innerHTML = codeEscaped;
        }
        
        function showTab(tab) {
            currentTab = tab;
            document.getElementById("tab-preview").classList.remove("active");
            document.getElementById("tab-code").classList.remove("active");
            
            if (tab === 'preview') {
                document.getElementById("tab-preview").classList.add("active");
                document.getElementById("terminal-screen-preview").style.display = "block";
                document.getElementById("terminal-screen-code").style.display = "none";
            } else {
                document.getElementById("tab-code").classList.add("active");
                document.getElementById("terminal-screen-preview").style.display = "none";
                document.getElementById("terminal-screen-code").style.display = "block";
            }
        }
        
        function changeThemeSkin(theme) {
            document.body.className = "theme-" + theme;
        }
        
        window.onload = populateMenu;
    </script>
